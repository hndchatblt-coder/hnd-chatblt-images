<meta charset="utf-8" />
<title>High N' Dry: Global Domination — The Pass</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#140f0c" />
<style>
  /*
    HIGH N' DRY: GLOBAL DOMINATION — "The Pass" (M2 feel build, craft pass 2)
    Built from GAME_DESIGN.md §3 (The Expeditor). Single committed dark theme: a night kitchen
    lit by the grill. Canvas2D scene + DOM control deck. One ember accent; semantic green =
    servable, red = walking, gold = tips/heat. Sound synthesised via Web Audio (no assets).
    Numbers from economy.config.json activeLayer where defined.
  */
  :root {
    --ink: #140f0c;
    --ink-2: #1b1510;
    --char: #241c15;
    --char-2: #2f251b;
    --char-3: #3a2e22;
    --line: #40331f;
    --line-soft: #362a1f;
    --ember: #ff6a2b;
    --ember-2: #ff8a3d;
    --ember-glow: #ffb061;
    --steel: #7fb0c4;
    --chip: #e8b93f;
    --sear: #e5453a;
    --good: #9bc06b;
    --gold: #ffc65c;
    --cream: #f3e9d6;
    --cream-dim: #ad9c81;
    --cream-faint: #6f6252;
    --fs: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --fm: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--ink); color: var(--cream); font-family: var(--fs); overscroll-behavior: none; }
  #app {
    min-height: 100dvh; max-width: 440px; margin: 0 auto;
    padding: 0 0 max(18px, env(safe-area-inset-bottom));
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; cursor: pointer; color: inherit; border: none; background: none; }

  /* ---------- header ---------- */
  .hdr { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px; padding: 11px 14px 8px; }
  .mark { min-width: 0; }
  .mark .name { font-family: var(--fs); font-weight: 800; font-size: 19px; line-height: 1; letter-spacing: 0.055em; }
  .mark .name b { color: var(--ember); }
  .mark .sub { font-family: var(--fm); font-size: 9px; letter-spacing: 0.16em; color: var(--cream-faint); margin-top: 4px; }
  .cashbox { text-align: right; }
  .cashbox .cash { font-family: var(--fm); font-weight: 700; font-size: 22px; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .cashbox .clock { font-family: var(--fm); font-size: 10px; color: var(--cream-dim); margin-top: 3px; font-variant-numeric: tabular-nums; }
  .cashbox .clock b { color: var(--ember-glow); font-weight: 700; letter-spacing: 0.06em; }
  .mute { border: 1px solid var(--line); border-radius: 10px; width: 36px; height: 36px; font-size: 15px; display: grid; place-items: center; background: var(--char); }

  /* streak / heat chip */
  .heat {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; height: 0; overflow: hidden;
    opacity: 0; transition: height 0.25s ease, opacity 0.25s ease, margin 0.25s ease; margin-top: 0;
  }
  .heat.on { height: 20px; opacity: 1; margin-top: 4px; }
  .heat .flame { font-size: 13px; filter: drop-shadow(0 0 5px rgba(255,106,43,0.7)); }
  .heat .bar { flex: 1; height: 6px; border-radius: 6px; background: var(--char-2); overflow: hidden; box-shadow: inset 0 0 0 1px var(--line-soft); }
  .heat .bar > i { display: block; height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, var(--ember), var(--gold)); transition: width 0.15s linear; }
  .heat .lbl { font-family: var(--fm); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--gold); font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ---------- scene ---------- */
  .stage {
    position: relative; margin: 4px 10px 0; border-radius: 15px; overflow: hidden;
    border: 1px solid var(--line); line-height: 0;
    box-shadow: 0 14px 34px -16px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,176,97,0.06);
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .stage.surge { border-color: var(--ember); box-shadow: 0 14px 40px -14px rgba(255,106,43,0.45), inset 0 1px 0 rgba(255,176,97,0.14); }
  #scene { width: 100%; display: block; touch-action: manipulation; }

  .coach { margin: 8px 16px 2px; font-size: 11px; line-height: 1.4; color: var(--cream-dim); text-align: center; min-height: 15px; }
  .coach b { color: var(--good); font-weight: 700; }
  .coach.warn b { color: var(--ember-glow); }

  /* ---------- deck ---------- */
  .deck { padding: 0 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid3 + .grid3 { margin-top: 8px; }
  .dh { display: flex; align-items: baseline; justify-content: space-between; margin: 15px 4px 7px; }
  .dh .t { font-family: var(--fm); font-size: 10px; letter-spacing: 0.16em; color: var(--cream-dim); text-transform: uppercase; }
  .dh .h { font-family: var(--fm); font-size: 9.5px; color: var(--cream-faint); }

  .pad {
    position: relative; overflow: hidden; padding: 10px 8px 9px; border-radius: 13px; text-align: left;
    background: linear-gradient(180deg, var(--char-2), var(--char));
    box-shadow: inset 0 1px 0 rgba(255,220,180,0.06), 0 2px 6px -3px rgba(0,0,0,0.6), inset 0 0 0 1.5px var(--line-soft);
    transition: transform 0.06s ease, box-shadow 0.15s;
  }
  .pad:active { transform: scale(0.965) translateY(1px); }
  .pad .fill { position: absolute; left: 0; bottom: 0; height: 3px; width: 0%; transition: width 0.09s linear; border-radius: 0 3px 0 0; }
  .pad .top { display: flex; align-items: center; justify-content: space-between; }
  .pad .ic { font-size: 20px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5)); }
  .pad .stock { font-family: var(--fm); font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
  .pad .stock .cap { color: var(--cream-faint); font-weight: 500; }
  .pad .lbl { font-family: var(--fm); font-size: 9px; letter-spacing: 0.09em; color: var(--cream-faint); margin-top: 4px; text-transform: uppercase; }
  .pad .need { position: absolute; top: 7px; right: 8px; background: var(--sear); color: #fff; font-family: var(--fm); font-weight: 700; font-size: 9px; padding: 1px 5px; border-radius: 8px; opacity: 0; transform: translateY(-2px); transition: opacity 0.15s, transform 0.15s; }
  .pad.short { box-shadow: inset 0 1px 0 rgba(255,220,180,0.06), 0 0 14px -2px currentColor, inset 0 0 0 1.5px currentColor; }
  .pad.short .need { opacity: 1; transform: none; }

  .verb {
    position: relative; overflow: hidden; padding: 10px 8px 9px; border-radius: 13px; text-align: left;
    background: linear-gradient(180deg, var(--char-2), var(--char));
    box-shadow: inset 0 1px 0 rgba(255,220,180,0.05), 0 2px 6px -3px rgba(0,0,0,0.6), inset 0 0 0 1.5px var(--line-soft);
    transition: transform 0.06s, opacity 0.15s;
  }
  .verb:active { transform: scale(0.965) translateY(1px); }
  .verb .fill { position: absolute; left: 0; bottom: 0; height: 3px; width: 0%; }
  .verb .ic { font-size: 18px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5)); }
  .verb .lbl { font-size: 11.5px; font-weight: 700; margin-top: 3px; }
  .verb .sub { font-family: var(--fm); font-size: 9px; color: var(--cream-dim); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .verb:disabled { opacity: 0.42; }
  #rnd { box-shadow: inset 0 1px 0 rgba(220,200,255,0.06), inset 0 0 0 1.5px #45375e; background: linear-gradient(180deg,#251d33,#1c1626); }
  #rnd .fill { background: #b49be0; }
  #prep { box-shadow: inset 0 1px 0 rgba(200,230,170,0.06), inset 0 0 0 1.5px #3c4d2c; background: linear-gradient(180deg,#232f19,#1a2114); }
  #prep .fill { background: var(--good); }
  #ads { box-shadow: inset 0 1px 0 rgba(255,200,215,0.06), inset 0 0 0 1.5px #5a3040; background: linear-gradient(180deg,#2d1c25,#21151b); }
  #ads .sub { color: #e6a0b8; }

  .lane { display: flex; flex-direction: column; gap: 6px; }
  .hireBtn {
    padding: 10px 4px; border-radius: 10px; font-weight: 800; font-size: 12px; line-height: 1.12; text-align: center;
    background: linear-gradient(180deg, var(--ember-glow), var(--ember)); color: #2a1408;
    box-shadow: 0 3px 10px -3px rgba(255,106,43,0.5), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .hireBtn:active { transform: translateY(1px); }
  .hireBtn:disabled { background: var(--char); color: var(--cream-faint); box-shadow: inset 0 0 0 1px var(--line); }
  .hireBtn .c { display: block; font-family: var(--fm); font-size: 11px; font-weight: 700; margin-top: 2px; }
  .hired { padding: 9px 4px; text-align: center; font-size: 11px; font-weight: 700; color: var(--good); background: #1b2415; border-radius: 10px; box-shadow: inset 0 0 0 1px #2f3f22; }
  .up { padding: 8px 5px; border-radius: 10px; font-size: 10px; line-height: 1.2; text-align: center; background: var(--char); color: var(--cream); box-shadow: inset 0 0 0 1px var(--line-soft); }
  .up:active { transform: translateY(1px); }
  .up:disabled { opacity: 0.4; }
  .up .c { display: block; font-family: var(--fm); color: var(--ember-glow); margin-top: 2px; font-size: 10px; }
  .up.max { color: var(--cream-dim); }

  #reno {
    display: block; width: 100%; margin-top: 12px; padding: 13px; border-radius: 12px; font-weight: 800;
    font-size: 12.5px; letter-spacing: 0.03em; background: var(--char); color: var(--cream);
    box-shadow: inset 0 0 0 1px var(--ember), 0 3px 12px -5px rgba(255,106,43,0.4);
  }
  #reno:disabled { box-shadow: inset 0 0 0 1px var(--line); opacity: 0.55; }
  #reno[hidden] { display: none; }

  .foot { display: flex; justify-content: space-between; gap: 8px; margin: 13px 4px 0; font-family: var(--fm); font-size: 10px; color: var(--cream-faint); font-variant-numeric: tabular-nums; }
  .foot b { color: var(--cream-dim); font-weight: 700; }

  /* ---------- toast + title ---------- */
  #toast {
    position: fixed; left: 50%; bottom: max(14px, env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(8px);
    width: min(400px, calc(100% - 32px)); padding: 12px 15px; border-radius: 12px;
    background: linear-gradient(180deg, #fbf3e3, var(--cream)); color: var(--ink);
    font-size: 12.5px; font-weight: 600; line-height: 1.35; box-shadow: 0 14px 34px -8px rgba(0,0,0,0.7);
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 40;
  }
  #toast.show { opacity: 1; transform: translateX(-50%); pointer-events: auto; }

  #title {
    position: fixed; inset: 0; z-index: 60; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px; overflow: hidden;
    background: radial-gradient(130% 80% at 50% 12%, #34200f 0%, #1c130d 46%, var(--ink) 100%);
  }
  #title[hidden] { display: none; }
  #title .glow { position: absolute; top: -20%; left: 50%; width: 120%; height: 60%; transform: translateX(-50%); background: radial-gradient(closest-side, rgba(255,106,43,0.28), transparent); pointer-events: none; }
  #title .kicker { font-family: var(--fm); font-size: 11px; letter-spacing: 0.24em; color: var(--ember); text-transform: uppercase; position: relative; }
  #title h1 { font-family: var(--fs); font-weight: 800; font-size: clamp(32px, 13vw, 48px); letter-spacing: 0.03em; margin: 16px 0 6px; line-height: 0.96; text-wrap: balance; position: relative; }
  #title h1 b { color: var(--ember); }
  #title .dek { font-size: 14px; color: var(--cream-dim); max-width: 300px; line-height: 1.55; margin: 8px 0 32px; position: relative; }
  #title .go { position: relative; padding: 15px 44px; border-radius: 12px; background: linear-gradient(180deg, var(--ember-glow), var(--ember)); color: #2a1408; font-family: var(--fs); font-weight: 800; font-size: 16px; letter-spacing: 0.05em; box-shadow: 0 12px 30px -8px rgba(255,106,43,0.65), inset 0 1px 0 rgba(255,255,255,0.4); animation: pulse 2.2s ease-in-out infinite; }
  #title .snd { margin-top: 18px; font-family: var(--fm); font-size: 10px; color: var(--cream-faint); letter-spacing: 0.08em; position: relative; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }

  @media (prefers-reduced-motion: reduce) { .pad, .verb, #toast, #title .go { transition: none; animation: none; } }
</style>

<div id="app">
  <div class="hdr">
    <div class="mark">
      <div class="name">HIGH <b>N'</b> DRY</div>
      <div class="sub">GLOBAL DOMINATION · LEICHHARDT</div>
    </div>
    <div class="cashbox">
      <div class="cash" id="cash">$260</div>
      <div class="clock"><span id="clockTime">Fri 17:30</span> · <b id="clockPart">ARVO</b></div>
    </div>
    <button class="mute" id="mute" aria-label="Toggle sound">🔊</button>
    <div class="heat" id="heat">
      <span class="flame">🔥</span>
      <div class="bar"><i id="heatBar"></i></div>
      <span class="lbl" id="heatLbl">×2</span>
    </div>
  </div>

  <div class="stage" id="stage"><canvas id="scene" width="400" height="280"></canvas></div>
  <div class="coach" id="coach">Tap a customer when the pass has their whole order.</div>

  <div class="deck">
    <div class="dh"><span class="t">The Pass — restock</span><span class="h">tap to fire the grill</span></div>
    <div class="grid3" id="pads"></div>

    <div class="dh"><span class="t">Downtime</span><span class="h">work the lulls</span></div>
    <div class="grid3">
      <button class="verb" id="rnd"><div class="fill" id="rndFill"></div><div class="ic">🧪</div><div class="lbl">New Special</div><div class="sub" id="rndSub">0/35 · R&amp;D</div></button>
      <button class="verb" id="prep"><div class="fill" id="prepFill"></div><div class="ic">🔪</div><div class="lbl" id="prepLbl">Prep</div><div class="sub" id="prepSub">0/15 · +60% cook</div></button>
      <button class="verb" id="ads"><div class="ic">📣</div><div class="lbl" id="adsLbl">Boost Socials</div><div class="sub" id="adsSub">$200 · 45s rush</div></button>
    </div>

    <div class="dh"><span class="t">Back office</span><span class="h">hire &amp; upgrade</span></div>
    <div class="grid3" id="lanes"></div>

    <button id="reno"></button>

    <div class="foot"><span id="fServed">served <b>0</b></span><span id="fWalked">walked <b>0</b></span><span id="fBest">best streak <b>0</b></span></div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  "use strict";

  // ============================ CONFIG ============================
  const ITEMS = {
    burger: { icon: "🍔", price: 12, cook: 4.0, col: "#ff6a2b", lbl: "Grill" },
    chips:  { icon: "🍟", price: 5,  cook: 3.0, col: "#e8b93f", lbl: "Fryer" },
    drink:  { icon: "🥤", price: 3,  cook: 2.0, col: "#7fb0c4", lbl: "Drinks" },
  };
  const LANES = ["burger", "chips", "drink"];
  const HIRE = {
    drink:  { name: "Sammy", cost: 150, speed: { base: 60,  g: 1.9 }, space: { base: 110, g: 2.0 } },
    chips:  { name: "Tash",  cost: 250, speed: { base: 100, g: 1.9 }, space: { base: 160, g: 2.0 } },
    burger: { name: "Deano", cost: 900, speed: { base: 220, g: 1.9 }, space: { base: 350, g: 2.0 } },
  };
  const SIZES = [
    { name: "Shopfront",   cost: 0,    speedCap: 3, spaceCap: 2, maxQ: 5, prepCap: 15 },
    { name: "Corner Site", cost: 2500, speedCap: 5, spaceCap: 4, maxQ: 7, prepCap: 25 },
    { name: "Flagship",    cost: 9000, speedCap: 8, spaceCap: 6, maxQ: 9, prepCap: 40 },
  ];
  const BASE_STOCK = { burger: 3, chips: 4, drink: 5 };
  const NET = 0.44, TIP_PCT = 0.25, TIP_WINDOW = 0.6, TAP_BOOST = 0.34, STAFF_MULT = 3.0;
  const PATIENCE = 24, GMIN_PER_SEC = 2;
  const RNDV = { taps: 35, banger: 0.2, surge: 60, flop: 25 };
  const PREP_BOOST = 1.6;
  const ADS = { base: 200, g: 1.3, surge: 45, cool: 60 };
  const FLYER = 0.55, COIN = { chance: 0.3, life: 4 };
  const STREAK_TIP_STEP = 0.02, STREAK_TIP_CAP = 0.2;   // heat bonus: +2% tip per streak, capped +20% (upside only)

  const SP_A = ["Seoul Fire","Vegemite Aioli","Midnight Char","Double Leprechaun","Bondi Smash","Truffle Tradie","Gochujang Gauntlet","Brisket Sunrise","Marrickville Melt"];
  const SP_B = ["Burger","Stack","Melt","Loader","Beast","Special","Situation"];
  const FLOP = ["Leichhardt has voted. The verdict: no.","One sold. To your mum. Moving on.","The staff ate well tonight. That's the upside.","Bold. Wrong, but bold.","Filed under 'lessons'."];
  const FACES = ["🧔","👩","🧑","👨‍🦱","👵","🧢","🧕","🕺","👩‍🎤","👨‍🦰","👩‍🦱","🧑‍🦲"];
  const BODY = ["#3f6f7c","#7a5a48","#5b6b3f","#7c5563","#4a5b7c","#6b5b7c","#8a6a3c","#556b6b"];
  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const fmt = (v) => v >= 1e6 ? (v/1e6).toFixed(2)+"M" : v >= 1e4 ? (v/1e3).toFixed(1)+"k" : Math.floor(v).toLocaleString();
  const upCost = (u, l) => Math.round(u.base * Math.pow(u.g, l));
  const rand = (a, b) => a + Math.random() * (b - a);
  const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ============================ STATE ============================
  let cid = 0;
  const S = {
    running: true,   // no start gate — the shift is live the moment the page loads
    cash: 260, dispCash: 260, life: 0, served: 0, walked: 0, tips: 0,
    streak: 0, bestStreak: 0, heatFlash: 0,
    gmin: 4 * 1440 + 17 * 60 + 30,
    size: 0,
    lanes: {
      burger: { hired: false, speedLvl: 0, spaceLvl: 0, stock: 1, prog: 0, flash: 0, cooking: 0, steamT: 0 },
      chips:  { hired: false, speedLvl: 0, spaceLvl: 0, stock: 2, prog: 0, flash: 0, cooking: 0, steamT: 0 },
      drink:  { hired: false, speedLvl: 0, spaceLvl: 0, stock: 3, prog: 0, flash: 0, cooking: 0, steamT: 0 },
    },
    customers: [], coins: [], parts: [], floats: [], flyshapes: [], street: [],
    nextWave: 1.0, nextBus: rand(55, 105), nextWalk: 2,
    prep: 0, research: 0, rndFlash: 0,
    adUses: 0, adCool: 0,
    surge: 0, surgeLbl: null,
    shake: 0,
    firstServe: false, firstHire: false, everShort: false,
  };
  const cap = (l) => BASE_STOCK[l] + S.lanes[l].spaceLvl + S.size;
  const size = () => SIZES[S.size];

  // ============================ AUDIO ============================
  const A = (() => {
    let ctx=null, master=null, sizzle=null, muted=false, ok=false;
    function init() {
      if (ctx) return;
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain(); master.gain.value = 0.9; master.connect(ctx.destination);
        const buf = ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate); const d = buf.getChannelData(0);
        for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
        const src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
        const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=720; lp.Q.value=0.6;
        sizzle=ctx.createGain(); sizzle.gain.value=0; src.connect(lp).connect(sizzle).connect(master); src.start();
        ok=true;
      } catch(e){ ok=false; }
    }
    function resume(){ if (ctx && ctx.state==="suspended") ctx.resume(); }
    function blip(f0,f1,dur,type,peak,delay){
      if(!ok||muted) return;
      const t=ctx.currentTime+(delay||0); const o=ctx.createOscillator(), g=ctx.createGain();
      o.type=type||"triangle"; o.frequency.setValueAtTime(f0,t);
      if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g).connect(master); o.start(t); o.stop(t+dur+0.02);
    }
    function nz(dur,peak,freq){ if(!ok||muted) return; const t=ctx.currentTime; const b=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate); const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); const s=ctx.createBufferSource(); s.buffer=b; const f=ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=freq||500; const g=ctx.createGain(); g.gain.value=peak; s.connect(f).connect(g).connect(master); s.start(t); }
    return {
      init, resume,
      setMuted(m){ muted=m; if(sizzle) sizzle.gain.value=0; }, isMuted(){ return muted; },
      sizzle(a){ if(ok&&sizzle&&!muted) sizzle.gain.value=Math.min(0.05,a*0.02); else if(sizzle) sizzle.gain.value=0; },
      serve(streak){ const s=Math.min(12,streak); const base=560*Math.pow(1.04,s); blip(base,base*1.34,0.12,"triangle",0.22); blip(base*1.34,base*1.6,0.13,"triangle",0.15,0.06); },
      tip(streak){ const s=Math.min(12,streak); const b=1046*Math.pow(1.03,s); [b,b*1.26,b*1.5].forEach((f,i)=>blip(f,f,0.1,"sine",0.13,i*0.04)); },
      milestone(){ [523,659,784,1046].forEach((f,i)=>blip(f,f,0.16,"triangle",0.14,i*0.05)); nz(0.2,0.04,1400); },
      coin(){ blip(1200,1600,0.09,"square",0.10); },
      flop(){ blip(320,150,0.35,"sawtooth",0.12); },
      banger(){ blip(220,660,0.3,"square",0.14); nz(0.25,0.05,1200); },
      hire(){ [440,554,659,880].forEach((f,i)=>blip(f,f,0.18,"triangle",0.12,i*0.05)); },
      reno(){ [330,440,554,660,880].forEach((f,i)=>blip(f,f,0.22,"sine",0.11,i*0.06)); },
      walkout(){ blip(120,70,0.24,"sine",0.14); nz(0.16,0.06,240); },
      nope(){ blip(200,150,0.09,"square",0.07); },
    };
  })();

  // ============================ CUSTOMERS ============================
  function makeCustomer(big, fat) {
    const r = Math.random(); let need;
    if (big) need = { burger: 3+(Math.random()*3|0), chips: 2, drink: 2 };
    else if (r<0.30) need = { burger:1, chips:Math.random()<0.5?1:0, drink:Math.random()<0.5?1:0 };
    else if (r<0.55) need = { burger:0, chips:1, drink:Math.random()<0.6?1:0 };
    else if (r<0.75) need = { burger:0, chips:0, drink:1+(Math.random()<0.3?1:0) };
    else need = { burger:1+(Math.random()<0.4?1:0), chips:1, drink:1 };
    if (fat) { if(Math.random()<0.6) need.burger++; if(Math.random()<0.5) need.chips++; }
    const value = LANES.reduce((a,k)=>a+need[k]*ITEMS[k].price,0);
    return { id:++cid, need, value, patience:1, big, face: big?"👷":FACES[cid%FACES.length], body: big?"#d9a838":BODY[cid%BODY.length], x:430+Math.random()*20, y:0, state:"in", shakeT:0, pop:0, coined:false };
  }
  const waitingCount = () => S.customers.filter(c=>c.state==="in"||c.state==="wait").length;
  const servable = (c) => LANES.every(k => S.lanes[k].stock >= c.need[k]);

  // particle burst
  function burst(x, y, n, colors, spread, speed) {
    for (let i=0;i<n;i++) { const a=rand(0,Math.PI*2), sp=rand(speed*0.4,speed); S.parts.push({ x, y, vx:Math.cos(a)*sp*spread, vy:Math.sin(a)*sp - rand(10,40), life:rand(0.4,0.8), max:0.8, size:rand(1.5,3.5), col: colors[Math.random()*colors.length|0] }); }
  }

  // ============================ UPDATE ============================
  function daypart(h){
    if (h>=11&&h<=14) return {key:"LUNCH",i:0.85};
    if (h>=18&&h<=21) return {key:"DINNER",i:1.0};
    if (h>=15&&h<=17) return {key:"ARVO",i:0.35};
    if (h>=7&&h<=10)  return {key:"MORNING",i:0.30};
    if (h>=22||h<=5)  return {key:"LATE",i:0.15};
    return {key:"OPEN",i:0.3};
  }

  function update(dt) {
    const s = S;
    s.gmin += GMIN_PER_SEC * dt;
    const day=(s.gmin/1440|0)%7, hour=(s.gmin%1440/60|0), dp=daypart(hour);
    let intensity = Math.min(1, dp.i*(day>=4?1.15:1));
    if (s.surge>0){ s.surge-=dt; intensity=1.2; if(s.surge<=0){ s.surgeLbl=null; toast("Surge is done. Back to earning it the slow way."); } }
    if (s.adCool>0) s.adCool-=dt;

    s.nextWave-=dt;
    if (s.nextWave<=0){
      s.nextWave=Math.max(4,16-intensity*10)+Math.random()*6;
      const n=1+(Math.random()*(1+Math.round(intensity*2.6))|0);
      for(let i=0;i<n;i++){ if(waitingCount()<size().maxQ){ const c=makeCustomer(false,s.surge>0); c.x+=i*34; s.customers.push(c);} else s.walked++; }
    }
    s.nextBus-=dt;
    if (s.nextBus<=0){ s.nextBus=rand(70,140); if(waitingCount()<size().maxQ){ s.customers.push(makeCustomer(true,false)); toast("Tradie crew's in. Big order, short fuse, big money."); } }
    s.nextWalk-=dt;
    if (s.nextWalk<=0){ s.nextWalk=rand(3,7); s.street.push({id:++cid,x:-14,done:false}); }

    let slot=0; const step=Math.min(42,300/size().maxQ);
    s.customers.forEach((c)=>{
      if (c.state==="in"||c.state==="wait"){
        c.targetX=66+slot*step; slot++;
        if(c.state==="in"){ c.x+=(c.targetX-c.x)*Math.min(1,dt*3.5); if(Math.abs(c.x-c.targetX)<3) c.state="wait"; }
        else { c.x+=(c.targetX-c.x)*Math.min(1,dt*6); c.patience-=dt/(PATIENCE*(c.big?0.85:1)); if(c.patience<=0){ c.state="leaving"; c.angry=true; s.walked++; if(s.streak>0){ s.streak=0; toast("They walked. Streak's gone — keep the queue moving."); } A.walkout(); s.shake=Math.max(s.shake,3); } }
      } else if (c.state==="served"){ c.x-=150*dt; c.pop=Math.max(0,c.pop-dt*3); }
      else if (c.state==="leaving"){ c.x+=170*dt; }
      if(c.shakeT>0) c.shakeT-=dt;
    });
    s.customers=s.customers.filter(c=>c.x>-40&&c.x<460);

    let activity=0;
    for(const k of LANES){
      const L=s.lanes[k];
      if(L.stock<cap(k)){
        let rate=(1/ITEMS[k].cook)*Math.pow(1.18,L.speedLvl)*(L.hired?STAFF_MULT:1);
        if(s.prep>0) rate*=PREP_BOOST;
        L.prog+=rate*dt; L.cooking=1; activity+=rate;
        L.steamT-=dt; if(L.steamT<=0 && !REDUCED){ L.steamT=rand(0.25,0.6); s.parts.push({x:STX[k]+rand(-8,8),y:112,vx:rand(-4,4),vy:-rand(14,26),life:rand(0.7,1.2),max:1.2,size:rand(3,6),col:"steam"}); }
        if(L.prog>=1){ L.prog-=1; L.stock++; L.flash=1; if(s.prep>0) s.prep--; }
      } else { L.prog=0; L.cooking*=Math.pow(0.05,dt); }
      L.flash*=Math.pow(0.02,dt);
    }
    A.sizzle(activity);

    if(!REDUCED && s.lanes.burger.cooking>0.2 && Math.random()<dt*10) s.parts.push({x:108+rand(-10,10),y:120,vx:rand(-6,6),vy:-rand(24,44),life:rand(0.5,0.9),max:0.9,size:rand(1.2,2.4),col:"ember"});

    // particles
    s.parts.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=(p.col==="steam"||p.col==="ember"?-14:120)*dt; p.life-=dt; });
    s.parts=s.parts.filter(p=>p.life>0).slice(-180);

    s.coins.forEach(c=>c.life-=dt); s.coins=s.coins.filter(c=>c.life>0);
    s.floats.forEach(f=>f.t+=dt); s.floats=s.floats.filter(f=>f.t<1);
    s.flyshapes.forEach(p=>p.t+=dt*2.2); s.flyshapes=s.flyshapes.filter(p=>p.t<1);
    s.street.forEach(p=>p.x+=26*dt); s.street=s.street.filter(p=>p.x<420);
    s.rndFlash*=Math.pow(0.02,dt); s.heatFlash*=Math.pow(0.05,dt);
    s.shake*=Math.pow(0.001,dt);
    s.dispCash+=(s.cash-s.dispCash)*Math.min(1,dt*8);

    if(!s.firstServe && s.served===0) coach("Tap a customer when the pass has their whole order.");
    else if(s.everShort && !s.firstHire && s.cash<HIRE.drink.cost) coach("Short on stock? <b>Tap the grill pads</b> below to fire it faster.", true);
    else if(!s.firstHire && s.cash>=HIRE.drink.cost) coach("You can afford <b>Sammy</b>. A hire runs a lane so you can watch the room.");
    else if(s.streak>=3) coach("On a roll — <b>keep 'em moving</b> and the tips climb.");
    else coach("");
  }

  // ============================ ACTIONS ============================
  function serve(c) {
    const s = S;
    if (c.state!=="wait") return;
    if (!servable(c)) { c.shakeT=0.45; A.nope(); if(navigator.vibrate) navigator.vibrate([12,24,12]); return; }
    LANES.forEach(k=>{ s.lanes[k].stock-=c.need[k]; for(let i=0;i<c.need[k];i++) s.flyshapes.push({k, cx:STX[k], cy:132, tx:c.x, ty:c.y-8, t:-i*0.12}); });
    s.streak++; if(s.streak>s.bestStreak) s.bestStreak=s.streak; s.heatFlash=1;
    const heatBonus = Math.min(STREAK_TIP_CAP, s.streak*STREAK_TIP_STEP);
    let p = c.value*NET;
    const tipped = c.patience>TIP_WINDOW;
    if (tipped){ p += c.value*(TIP_PCT+heatBonus); s.tips++; }
    s.cash+=p; s.life+=p; s.served++;
    c.state="served"; c.pop=1;
    s.floats.push({ x:c.x, y:c.y-30, txt:(tipped?"+$"+Math.round(p)+" TIP":"+$"+Math.round(p))+(s.streak>=3?"  ×"+s.streak:""), t:0, gold:tipped });
    burst(c.x, c.y-10, tipped?12:8, tipped?["#ffc65c","#ffb061","#ffffff"]:["#9bc06b","#ffffff","#ffb061"], 1, tipped?120:90);
    s.shake=Math.max(s.shake, c.big?5:tipped?2.5:1.5);
    if (Math.random()<COIN.chance) s.coins.push({ x:c.x+rand(16,40), y:150, val:2+Math.round(Math.random()*3), life:COIN.life, id:++cid });
    const milestone = s.streak===5||s.streak===10||s.streak===20||s.streak===40;
    if (milestone){ A.milestone(); s.shake=Math.max(s.shake,4); burst(c.x,c.y-14,18,["#ffc65c","#ff6a2b","#ffffff"],1.4,150); toast("🔥 "+s.streak+" in a row. The pass is HUMMING."); }
    else if (tipped) A.tip(s.streak); else A.serve(s.streak);
    if (navigator.vibrate) navigator.vibrate(tipped?[8,18,8]:10);
    s.firstServe=true;
  }

  function boost(k){ const L=S.lanes[k]; if(L.stock>=cap(k)) return; L.prog+=TAP_BOOST; L.flash=1; if(L.prog>=1){ L.prog-=1; L.stock++; } if(navigator.vibrate) navigator.vibrate(4); }
  function tapRnd(){ const s=S; s.research++; s.rndFlash=1; if(navigator.vibrate) navigator.vibrate(3);
    if(s.research>=RNDV.taps){ s.research=0; const name="The "+SP_A[Math.random()*SP_A.length|0]+" "+SP_B[Math.random()*SP_B.length|0];
      if(Math.random()<RNDV.banger){ startSurge(RNDV.surge,"BANGER: "+name); toast(name+" is going OFF. Word's out — brace."); A.banger(); }
      else { s.cash+=RNDV.flop; s.life+=RNDV.flop; toast(name+". "+FLOP[Math.random()*FLOP.length|0]+" +$"+RNDV.flop); A.flop(); } } }
  function tapPrep(){ if(S.prep>=size().prepCap) return; S.prep++; if(navigator.vibrate) navigator.vibrate(3); }
  const adCost = () => Math.round(ADS.base*Math.pow(ADS.g,S.adUses));
  function buyAd(){ const s=S; if(s.adCool>0||s.cash<adCost()) return; s.cash-=adCost(); s.adUses++; s.adCool=ADS.cool+ADS.surge; startSurge(ADS.surge,"AD BLITZ"); toast("Boosted. The algorithm chose you. Don't waste it."); A.banger(); }
  function startSurge(sec,lbl){ S.surge=Math.max(S.surge,sec); S.surgeLbl=lbl; S.nextWave=Math.min(S.nextWave,0.8); }
  function hire(k){ const s=S,h=HIRE[k]; if(s.cash<h.cost||s.lanes[k].hired) return; s.cash-=h.cost; s.lanes[k].hired=true; s.firstHire=true; toast(h.name+"'s on the "+ITEMS[k].lbl.toLowerCase()+". Fills itself now — you run the pass."); A.hire(); if(navigator.vibrate) navigator.vibrate([10,30,10]); }
  function buyUp(k,kind){ const s=S,L=s.lanes[k],sz=size(); const lvl=kind==="speed"?L.speedLvl:L.spaceLvl; const cp=kind==="speed"?sz.speedCap:sz.spaceCap; if(lvl>=cp) return; const c=upCost(HIRE[k][kind==="speed"?"speed":"space"],lvl); if(s.cash<c) return; s.cash-=c; if(kind==="speed") L.speedLvl++; else L.spaceLvl++; if(navigator.vibrate) navigator.vibrate(6); }
  function renovate(){ const s=S; if(s.size>=2) return; const nx=SIZES[s.size+1]; if(s.cash<nx.cost) return; s.cash-=nx.cost; s.size++; s.shake=Math.max(s.shake,6); toast(nx.name+". Longer queue, deeper pass, higher caps. This is how you take a suburb."); A.reno(); if(navigator.vibrate) navigator.vibrate([12,40,12,40,12]); }

  // ============================ CANVAS ============================
  const canvas=document.getElementById("scene"), ctx=canvas.getContext("2d");
  const LW=400, LH=280;
  const STX={ burger:108, chips:200, drink:292 };
  let scaleX=1, scaleY=1;
  function resize(){ const cssW=canvas.clientWidth||canvas.parentElement.clientWidth; const cssH=cssW*LH/LW; canvas.style.height=cssH+"px"; const dpr=Math.min(3,window.devicePixelRatio||1); canvas.width=Math.round(cssW*dpr); canvas.height=Math.round(cssH*dpr); scaleX=canvas.width/LW; scaleY=canvas.height/LH; }
  window.addEventListener("resize", resize);
  function rr(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,r); else { ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); } }
  function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

  function draw(t) {
    const s=S;
    const sh = s.shake>0.1 ? s.shake : 0;
    const ox = sh?(Math.random()*2-1)*sh:0, oy = sh?(Math.random()*2-1)*sh:0;
    ctx.setTransform(scaleX,0,0,scaleY,ox*scaleX,oy*scaleY);
    const hour=(s.gmin%1440/60|0);
    const night = hour>=19||hour<=5 ? 0.55 : hour>=17 ? 0.3 : 0.06;

    // room gradient
    const sky=ctx.createLinearGradient(0,0,0,LH);
    sky.addColorStop(0,`rgb(${40-night*22},${28-night*14},${20-night*9})`);
    sky.addColorStop(0.55,`rgb(${30-night*14},${22-night*10},${16-night*7})`);
    sky.addColorStop(1,"#140f0c");
    ctx.fillStyle=sky; ctx.fillRect(-8,-8,LW+16,LH+16);

    // warm grill key-light wash over the kitchen
    const key=ctx.createRadialGradient(200,150,10,200,150,220);
    key.addColorStop(0,hexA("#ff7a2f",0.10)); key.addColorStop(1,hexA("#ff7a2f",0));
    ctx.fillStyle=key; ctx.fillRect(0,40,LW,110);

    // street
    ctx.fillStyle="#0f0b08"; ctx.fillRect(-8,-8,LW+16,48);
    ctx.strokeStyle="rgba(255,176,97,0.10)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,40); ctx.lineTo(LW,40); ctx.stroke();
    s.street.forEach(p=>{ ctx.globalAlpha=0.8; ctx.font="15px sans-serif"; ctx.textAlign="center"; ctx.fillText("🚶",p.x,30+Math.sin(t*6+p.id)*1.2); ctx.globalAlpha=1; });

    // back wall
    ctx.fillStyle="#1a140f"; ctx.fillRect(0,40,LW,108);
    // subtle tiling
    ctx.strokeStyle="rgba(255,255,255,0.02)"; ctx.lineWidth=1;
    for(let gx=0;gx<LW;gx+=26){ ctx.beginPath(); ctx.moveTo(gx,46); ctx.lineTo(gx,140); ctx.stroke(); }

    // stations
    ctx.textAlign="center";
    LANES.forEach((k)=>{
      const L=s.lanes[k], cx=STX[k], glow=L.cooking;
      // hood
      ctx.fillStyle="#221a13"; rr(cx-44,50,88,15,4); ctx.fill();
      ctx.fillStyle="rgba(243,233,214,0.42)"; ctx.font="600 8px "+ "monospace"; ctx.fillText(ITEMS[k].lbl.toUpperCase(),cx,61);
      // under-glow
      if(glow>0.05){ const g=ctx.createRadialGradient(cx,124,2,cx,124,36); g.addColorStop(0,hexA(ITEMS[k].col,0.55*glow)); g.addColorStop(1,hexA(ITEMS[k].col,0)); ctx.fillStyle=g; ctx.fillRect(cx-36,94,72,48); }
      // flame on the grill
      if(k==="burger" && glow>0.1 && !REDUCED){
        for(let i=0;i<6;i++){ const fx=cx-18+i*7.2; const h=11+Math.sin(t*9+i*1.6)*5+Math.random()*4;
          const fg=ctx.createLinearGradient(0,128-h,0,128); fg.addColorStop(0,hexA("#ffe08a",0.95)); fg.addColorStop(0.45,hexA("#ff6a2b",0.85)); fg.addColorStop(1,hexA("#e5453a",0.05));
          ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(fx-3,128); ctx.quadraticCurveTo(fx,128-h,fx+3,128); ctx.closePath(); ctx.fill(); }
      }
      // staff / idle food
      if(L.hired){ ctx.font="17px sans-serif"; ctx.fillText("🧑‍🍳",cx,116+Math.sin(t*5+cx)*1.4); }
      else { ctx.globalAlpha=0.5; ctx.font="15px sans-serif"; ctx.fillText(ITEMS[k].icon,cx,114); ctx.globalAlpha=1; }
      // cook arc
      if(L.stock<cap(k)){ ctx.strokeStyle="rgba(255,255,255,0.12)"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(cx,130,4,0,7); ctx.stroke(); ctx.strokeStyle=ITEMS[k].col; ctx.beginPath(); ctx.arc(cx,130,4,-Math.PI/2,-Math.PI/2+Math.min(1,L.prog)*Math.PI*2); ctx.stroke(); }
    });

    // particles behind the counter (steam/embers)
    s.parts.forEach(p=>{ const a=Math.max(0,p.life/p.max); if(p.col==="steam"){ ctx.globalAlpha=a*0.16; ctx.fillStyle="#f3e9d6"; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); } else if(p.col==="ember"){ ctx.globalAlpha=a*0.85; ctx.fillStyle="#ffb061"; ctx.fillRect(p.x,p.y,p.size,p.size); } });
    ctx.globalAlpha=1;

    // counter
    const cg=ctx.createLinearGradient(0,148,0,174); cg.addColorStop(0,"#523f2d"); cg.addColorStop(0.5,"#3a2c1e"); cg.addColorStop(1,"#281e14");
    ctx.fillStyle=cg; ctx.fillRect(-8,148,LW+16,26);
    ctx.fillStyle="rgba(255,190,120,0.16)"; ctx.fillRect(-8,148,LW+16,2);
    ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.fillRect(-8,172,LW+16,2);

    // trays
    LANES.forEach((k)=>{ const L=s.lanes[k], cx=STX[k], n=cap(k); const tw=Math.min(80,n*10+8), tx=cx-tw/2;
      ctx.fillStyle="rgba(0,0,0,0.28)"; rr(tx,152,tw,15,4); ctx.fill();
      if(L.flash>0.25){ ctx.fillStyle=hexA(ITEMS[k].col,L.flash*0.4); rr(tx,152,tw,15,4); ctx.fill(); }
      ctx.textAlign="left"; ctx.font="9px sans-serif";
      for(let j=0;j<n;j++){ ctx.globalAlpha=j<L.stock?1:0.15; ctx.fillText(ITEMS[k].icon,tx+5+j*10,164); }
      ctx.globalAlpha=1; ctx.textAlign="center"; });

    // coins
    s.coins.forEach(c=>{ ctx.globalAlpha=Math.min(1,c.life/1.5); ctx.font="13px sans-serif"; ctx.fillText("🪙",c.x,150+Math.sin(t*6+c.id)*2); ctx.globalAlpha=1; });

    // customers
    s.customers.forEach((c)=>{
      const shk=c.shakeT>0?Math.sin(t*55)*3:0, baseY=238, bob=(c.state==="wait")?Math.sin(t*4+c.id)*1.5:0, x=c.x+shk;
      c.y=baseY-26; const canDo=c.state==="wait"&&servable(c);
      // shadow
      ctx.fillStyle="rgba(0,0,0,0.28)"; ctx.beginPath(); ctx.ellipse(x,baseY+3,c.big?15:12,3.5,0,0,7); ctx.fill();
      // servable glow
      if(canDo){ const g=ctx.createRadialGradient(x,baseY-18,2,x,baseY-18,32); const pulse=0.4+Math.sin(t*4+c.id)*0.14; g.addColorStop(0,hexA("#9bc06b",pulse)); g.addColorStop(1,hexA("#9bc06b",0)); ctx.fillStyle=g; ctx.fillRect(x-32,baseY-50,64,64); }
      if(c.pop>0){ ctx.strokeStyle=hexA("#ffffff",c.pop*0.55); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,baseY-18,10+(1-c.pop)*26,0,7); ctx.stroke(); }
      // squash/stretch on serve pop
      const sc=c.pop>0?1+Math.sin(c.pop*Math.PI)*0.12:1;
      const bw=(c.big?26:20)*sc, bh=(c.big?26:22)*(2-sc);
      // body with shading
      const bg=ctx.createLinearGradient(0,baseY-bh,0,baseY); bg.addColorStop(0,c.body); bg.addColorStop(1,hexA("#000000",0.0));
      ctx.fillStyle=c.body; rr(x-bw/2,baseY-bh+bob,bw,bh,6); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.08)"; rr(x-bw/2,baseY-bh+bob,bw,bh*0.4,6); ctx.fill();
      // head
      ctx.font=(c.big?21:17)+"px sans-serif"; ctx.fillText(c.state==="served"?"😋":c.angry?"😤":c.face, x, baseY-bh-2+bob);

      if(c.state==="wait"){
        const pr=c.big?15:13, py=baseY-bh-6+bob;
        ctx.strokeStyle="rgba(255,255,255,0.10)"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(x,py,pr,0,7); ctx.stroke();
        ctx.strokeStyle=c.shakeT>0?"#e5453a":canDo?"#9bc06b":c.patience<0.33?"#e5453a":"#ff6a2b"; ctx.lineWidth=canDo?3:2.5;
        ctx.beginPath(); ctx.arc(x,py,pr,-Math.PI/2,-Math.PI/2+c.patience*Math.PI*2); ctx.stroke();
        const parts=LANES.flatMap(k=>Array(Math.max(0,c.need[k])).fill(k));
        if(parts.length){ const bw2=Math.max(22,parts.length*12+8), dy=baseY-bh-34+bob;
          ctx.fillStyle="rgba(0,0,0,0.25)"; rr(x-bw2/2,dy+2,bw2,17,4); ctx.fill();
          ctx.fillStyle=canDo?"rgba(160,197,112,0.97)":"rgba(243,233,214,0.95)";
          ctx.strokeStyle=canDo?"#7ba24d":(c.patience<0.33?"#e5453a":"rgba(0,0,0,0.15)"); ctx.lineWidth=1.5; rr(x-bw2/2,dy,bw2,17,4); ctx.fill(); ctx.stroke();
          ctx.textAlign="left"; ctx.font="10px sans-serif";
          parts.forEach((k,j)=>{ const miss=s.lanes[k].stock<c.need[k]; ctx.globalAlpha=(c.shakeT>0&&miss&&Math.sin(t*22)>0)?0.2:1; ctx.fillText(ITEMS[k].icon,x-bw2/2+10+j*12,dy+13); });
          ctx.globalAlpha=1; ctx.textAlign="center";
          if(c.big){ ctx.fillStyle="#2a1408"; ctx.font="700 8px monospace"; ctx.fillText("$"+c.value,x,dy-3); } }
      }
    });

    // flying food
    s.flyshapes.forEach(p=>{ if(p.t<0) return; const x=p.cx+(p.tx-p.cx)*p.t, y=p.cy+(p.ty-p.cy)*p.t-Math.sin(Math.min(1,p.t)*Math.PI)*42; ctx.font="12px sans-serif"; ctx.fillText(ITEMS[p.k].icon,x,y); });

    // foreground particles (serve bursts)
    s.parts.forEach(p=>{ if(p.col==="steam"||p.col==="ember") return; const a=Math.max(0,p.life/p.max); ctx.globalAlpha=a; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); });
    ctx.globalAlpha=1;

    // floats
    s.floats.forEach(f=>{ const a=1-f.t; ctx.font="700 "+(f.gold?13:11)+"px monospace"; ctx.textAlign="center"; ctx.fillStyle="rgba(0,0,0,"+a*0.4+")"; ctx.fillText(f.txt,f.x+0.6,f.y-f.t*30+0.6); ctx.fillStyle=f.gold?hexA("#ffc65c",a):hexA("#9bc06b",a); ctx.fillText(f.txt,f.x,f.y-f.t*30); });

    // surge + prep markers
    ctx.textAlign="left";
    if(s.surge>0){ ctx.fillStyle=hexA("#ff6a2b",0.85+Math.sin(t*6)*0.15); ctx.font="800 11px monospace"; ctx.fillText("⚡ "+s.surgeLbl+" · "+Math.ceil(s.surge)+"s",10,55); }
    if(s.prep>0){ ctx.textAlign="right"; ctx.fillStyle="#9bc06b"; ctx.font="700 9px monospace"; ctx.fillText("🔪 prep "+s.prep,LW-8,55); }
    ctx.textAlign="left";
  }

  // ============================ INPUT ============================
  canvas.addEventListener("pointerdown",(e)=>{
    if(!S.running) return;
    const r=canvas.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width*LW, y=(e.clientY-r.top)/r.height*LH, s=S;
    for(const c of s.coins){ if(Math.hypot(c.x-x,150-y)<22){ s.cash+=c.val; s.life+=c.val; s.floats.push({x:c.x,y:150,txt:"+$"+c.val,t:0,gold:true}); burst(c.x,150,6,["#ffc65c","#ffffff"],1,80); s.coins=s.coins.filter(k=>k.id!==c.id); A.coin(); if(navigator.vibrate) navigator.vibrate(5); return; } }
    for(const p of s.street){ if(!p.done && Math.hypot(p.x-x,28-y)<22){ p.done=true; if(Math.random()<FLYER && waitingCount()<size().maxQ){ s.customers.push(makeCustomer(false,false)); s.floats.push({x:p.x,y:28,txt:"flyer worked",t:0}); } else s.floats.push({x:p.x,y:28,txt:"nah mate",t:0}); if(navigator.vibrate) navigator.vibrate(4); return; } }
    let best=null,bd=40; s.customers.forEach(c=>{ if(c.state!=="wait") return; const d=Math.hypot(c.x-x,212-y); if(d<bd){ bd=d; best=c; } }); if(best) serve(best);
  },{passive:true});

  const padsEl=document.getElementById("pads"), padRef={};
  LANES.forEach(k=>{ const b=document.createElement("button"); b.className="pad"; b.style.color=ITEMS[k].col;
    b.innerHTML=`<div class="fill"></div><div class="top"><span class="ic">${ITEMS[k].icon}</span><span class="stock"><span class="s">0</span><span class="cap">/0</span></span></div><div class="lbl">${ITEMS[k].lbl}</div><div class="need">need 0</div>`;
    b.addEventListener("pointerdown",()=>boost(k),{passive:true}); padsEl.appendChild(b);
    padRef[k]={b,fill:b.querySelector(".fill"),s:b.querySelector(".s"),cap:b.querySelector(".cap"),need:b.querySelector(".need")}; });
  const lanesEl=document.getElementById("lanes"), laneRef={};
  LANES.forEach(k=>{ const col=document.createElement("div"); col.className="lane"; col.innerHTML=`<div class="slot"></div><button class="up spd"></button><button class="up spc"></button>`; lanesEl.appendChild(col);
    const spd=col.querySelector(".spd"), spc=col.querySelector(".spc"); spd.addEventListener("click",()=>buyUp(k,"speed")); spc.addEventListener("click",()=>buyUp(k,"space"));
    laneRef[k]={slot:col.querySelector(".slot"),spd,spc}; });
  document.getElementById("rnd").addEventListener("pointerdown",tapRnd,{passive:true});
  document.getElementById("prep").addEventListener("pointerdown",tapPrep,{passive:true});
  document.getElementById("ads").addEventListener("click",buyAd);
  document.getElementById("reno").addEventListener("click",renovate);
  const muteBtn=document.getElementById("mute"); muteBtn.addEventListener("click",()=>{ const m=!A.isMuted(); A.setMuted(m); muteBtn.textContent=m?"🔇":"🔊"; });

  // ============================ DECK ============================
  const el=(id)=>document.getElementById(id);
  const cashEl=el("cash"), clockTime=el("clockTime"), clockPart=el("clockPart"), coachEl=el("coach");
  const heatEl=el("heat"), heatBar=el("heatBar"), heatLbl=el("heatLbl");
  let coachMsg="";
  function coach(m,warn){ if(m!==coachMsg){ coachMsg=m; coachEl.innerHTML=m; coachEl.classList.toggle("warn",!!warn); } }
  let toastT=0; const toastEl=el("toast");
  function toast(m){ toastEl.innerHTML=m; toastEl.classList.add("show"); toastT=3.6; }

  function deck(){
    const s=S, sz=size();
    const day=(s.gmin/1440|0)%7, hour=(s.gmin%1440/60|0), min=(s.gmin%60|0);
    cashEl.textContent="$"+fmt(s.dispCash);
    clockTime.textContent=DAYS[day]+" "+String(hour).padStart(2,"0")+":"+String(min).padStart(2,"0");
    clockPart.textContent=daypart(hour).key;
    document.getElementById("stage").classList.toggle("surge",s.surge>0);

    // heat / streak chip
    const on=s.streak>=2; heatEl.classList.toggle("on",on);
    if(on){ heatBar.style.width=Math.min(100,(s.streak%5)/5*100 || (s.streak>0?100:0))+"%"; heatLbl.textContent="×"+s.streak; heatLbl.style.transform=`scale(${1+s.heatFlash*0.25})`; }

    LANES.forEach(k=>{ const L=s.lanes[k], n=cap(k), r=padRef[k];
      const demand=s.customers.filter(c=>c.state==="wait").reduce((a,c)=>a+Math.max(0,c.need[k]),0), short=demand>L.stock;
      if(short){ s.everShort=true; }
      r.b.classList.toggle("short",short);
      r.fill.style.width=Math.min(1,L.prog)*100+"%"; r.fill.style.background=ITEMS[k].col;
      r.s.textContent=L.stock; r.s.style.color=L.stock===0?"var(--sear)":"var(--cream)"; r.cap.textContent="/"+n; r.need.textContent="need "+demand; });

    el("rndFill").style.width=(s.research/RNDV.taps*100)+"%"; el("rndSub").textContent=s.research+"/"+RNDV.taps+" · R&D"; el("rnd").style.transform=`scale(${1+s.rndFlash*0.03})`;
    const pf=s.prep>=sz.prepCap; el("prepFill").style.width=(s.prep/sz.prepCap*100)+"%"; el("prepLbl").textContent=pf?"Prep full":"Prep"; el("prepSub").textContent=s.prep+"/"+sz.prepCap+" · +60% cook";
    const ac=adCost(), adOff=s.adCool>0||s.cash<ac; el("ads").disabled=adOff; el("adsLbl").textContent=s.adCool>0?"Cooldown "+Math.ceil(s.adCool)+"s":"Boost Socials"; el("adsSub").textContent="$"+fmt(ac)+" · 45s rush";

    LANES.forEach(k=>{ const L=s.lanes[k], h=HIRE[k], r=laneRef[k];
      if(!L.hired){ const ok=s.cash>=h.cost; if(r.slot.dataset.state!=="hire"){ r.slot.dataset.state="hire"; r.slot.innerHTML=`<button class="hireBtn">Hire ${h.name}<span class="c">$${fmt(h.cost)}</span></button>`; r.slot.querySelector("button").addEventListener("click",()=>hire(k)); } r.slot.querySelector("button").disabled=!ok; }
      else if(r.slot.dataset.state!=="hired"){ r.slot.dataset.state="hired"; r.slot.innerHTML=`<div class="hired">🧑‍🍳 ${h.name}</div>`; }
      const sMax=L.speedLvl>=sz.speedCap, sCost=upCost(h.speed,L.speedLvl); r.spd.disabled=sMax||s.cash<sCost; r.spd.classList.toggle("max",sMax); r.spd.innerHTML=sMax?"Speed max":`Speed ${L.speedLvl}/${sz.speedCap}<span class="c">$${fmt(sCost)}</span>`;
      const pMax=L.spaceLvl>=sz.spaceCap, pCost=upCost(h.space,L.spaceLvl); r.spc.disabled=pMax||s.cash<pCost; r.spc.classList.toggle("max",pMax); r.spc.innerHTML=pMax?"Pass max":`Pass ${L.spaceLvl}/${sz.spaceCap}<span class="c">$${fmt(pCost)}</span>`; });

    const reno=el("reno"); if(s.size<2){ const nx=SIZES[s.size+1]; reno.hidden=false; reno.disabled=s.cash<nx.cost; reno.textContent=`RENOVATE → ${nx.name.toUpperCase()} · $${fmt(nx.cost)}`; } else reno.hidden=true;

    el("fServed").innerHTML="served <b>"+fmt(s.served)+"</b>"; el("fWalked").innerHTML="walked <b>"+fmt(s.walked)+"</b>"; el("fBest").innerHTML="best streak <b>"+s.bestStreak+"</b>";
  }

  // ============================ LOOP ============================
  let last=0, deckAcc=0;
  function frame(ts){ const now=ts/1000; let dt=last?now-last:0; last=now; if(dt>0.06) dt=0.06; if(S.running&&dt>0) update(dt); draw(now); deckAcc+=dt; if(deckAcc>=0.1){ deckAcc=0; if(S.running) deck(); } if(toastT>0){ toastT-=dt; if(toastT<=0) toastEl.classList.remove("show"); } requestAnimationFrame(frame); }

  // No start gate — the game is already running (S.running=true). A blocking title screen was
  // the thing that could strand you if one tap didn't register. Audio can't autoplay on mobile,
  // so it arms itself on your first touch anywhere; the game never depends on it.
  let audioReady=false;
  function armAudio(){ if(audioReady) return; audioReady=true; try{ A.init(); A.resume(); }catch(e){} }
  ["pointerdown","touchstart","mousedown","keydown"].forEach(ev=>window.addEventListener(ev,armAudio,{capture:true,passive:true}));

  resize(); deck(); requestAnimationFrame(frame);
})();
</script>
