name: Deploy Unicorn Reading to GitHub Pages

# Publishes the unicorn-reading-game/ folder as the site root, so the live URL
# is simply https://<owner>.github.io/<repo>/ (no subfolder in the path).
#
# Manual-only (workflow_dispatch): GitHub Pages must be enabled once by the repo
# owner first (Settings -> Pages -> Source: "GitHub Actions") because a CI token
# cannot enable Pages itself. After that, run this workflow from the Actions tab
# (or re-run it after each push) to publish. Until then, the game is testable via
# jsDelivr with no setup: see unicorn-reading-game/README.md.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages (Actions source) automatically on first run,
          # so no manual Settings change is required.
          enablement: true

      - name: Upload the game folder as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: unicorn-reading-game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
