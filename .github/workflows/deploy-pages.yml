name: Deploy Unicorn Reading to GitHub Pages

# Publishes the unicorn-reading-game/ folder as the site root, so the live URL
# is simply https://<owner>.github.io/<repo>/ (no subfolder in the path).
on:
  push:
    branches: [main]
    paths:
      - 'unicorn-reading-game/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the game folder as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: unicorn-reading-game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
