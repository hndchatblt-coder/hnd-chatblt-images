};

/* ---------- star ceremony (each is a true first — full screen, replayable later) ---------- */
UA.ui.starCeremony = (stageId, nth, then) => {
  if (UA.dev && UA.dev.skipCele) { then && then(); return; }
  const stage = UA.STAGES[stageId];
  const first = !UA.S.firsts.includes('star-1');
  const id = 'star-' + stageId + '-' + nth;
  UA.audio.sfx.fanfare();
  UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 3 }, 'confetti', 30);
  UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2 }, 'spark', 16);
  const line = first
    ? `${UA.S.name}, your VERY FIRST STAR! The kingdom is getting its colour back!`
    : `A new star for ${stage.name}! The kingdom grows brighter, ${UA.S.name}!`;
  if (first) UA.S.firsts.push('star-1');
  UA.memory && UA.memory.keep(id, `${UA.S.name} earned a star in ${stage.name}!`);
  UA.save();
  const inner = `
    <div style="width:120px;height:120px">${UA.starSVG()}</div>
    <div class="ceremony-title">${UA.S.name ? UA.S.name + '!' : 'Superstar!'}</div>
    <div style="font-size:26px;font-weight:800;color:var(--plum);text-align:center">${stage.name} — star ${nth} of 3!</div>
    <div style="width:150px">${UA.unicornSVG({ body: UA.PALETTE.bodies[UA.S.uni.body], mane: UA.PALETTE.manes[UA.S.uni.mane], cls: 'celebrate' })}</div>`;
  UA.audio.speak(line);
  showCard(inner).then(() => then && then());
  setTimeout(() => UA.ui._finishCard && UA.ui._finishCard(), 4600);
};

/* ---------- rainbow-meter party: every tap launches a firework SHE aims ---------- */
UA.ui.meterParty = () => {
  if (UA.dev && UA.dev.skipCele) return;
  const layer = el(`<div class="veil" style="background:rgba(60,40,80,.55);z-index:51;display:flex;align-items:flex-start;justify-content:center">
    <div class="ceremony-title" style="margin-top:12vh;pointer-events:none;color:#fff;text-shadow:0 3px 0 rgba(92,74,102,.6)">TAP TAP TAP!</div>
    <div style="position:absolute;bottom:4vh;left:50%;transform:translateX(-50%);width:200px" id="party-uni">
      ${UA.unicornSVG({ body: UA.PALETTE.bodies[UA.S.uni.body], mane: UA.PALETTE.manes[UA.S.uni.mane], cosmetics: UA.S.equipped })}</div>
  </div>`);
  document.body.appendChild(layer);
  UA.audio.speak(`The rainbow meter is FULL! Tap anywhere — you make the fireworks, ${UA.S.name}!`);
  const dance = () => {
    const u = layer.querySelector('#party-uni .uni-rig');
    if (!u) return;
    u.classList.remove('leap'); void u.getBoundingClientRect(); u.classList.add('leap');
  };
  layer.addEventListener('pointerdown', (e) => { UA.fx.firework({ x: e.clientX, y: e.clientY }); dance(); });
  let closed = false;
  const close = () => { if (closed) return; closed = true; layer.remove(); };
  setTimeout(close, 15000);
  const skip = el(`<button class="round-btn" style="position:absolute;right:24px;top:24px">${UA.tickSVG()}</button>`);
  skip.addEventListener('pointerdown', (e) => { e.stopPropagation(); close(); });
  layer.appendChild(skip);
};

/* ---------- eggs: arrive on the map, tap-tap-tap crack, hatch, NAME the baby ---------- */
UA.ui.eggArrives = (then) => {
  const idx = UA.S.eggsAwarded;                     // 0-based egg being hatched
  const body = UA.BABY_BODIES[idx % UA.BABY_BODIES.length];
  const mane = UA.BABY_MANES[idx % UA.BABY_MANES.length];
  let taps = 0;
  const layer = el(`<div class="veil" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px">
    <div class="ceremony-title" style="color:#fff;text-shadow:0 3px 0 rgba(92,74,102,.6)">An egg!</div>
    <button data-testid="egg" id="egg-btn" style="border:none;background:none;width:220px;cursor:pointer">${UA.eggSVG(body, 0)}</button>
  </div>`);
  document.body.appendChild(layer);
  UA.audio.sfx.fanfare();
  UA.audio.speak(`${UA.S.name}! Your stars magicked up a unicorn egg! Tap it! Tap tap tap!`);
  $('#egg-btn', layer).addEventListener('pointerdown', (e) => {
    taps++;
    UA.audio.sfx.crack();
    UA.fx.burst({ x: e.clientX, y: e.clientY }, 'spark', 6);
    const btn = $('#egg-btn', layer);
    btn.animate([{ transform: 'rotate(-4deg)' }, { transform: 'rotate(4deg)' }, { transform: 'rotate(0)' }], { duration: 200 });
    if (taps < 3) { btn.innerHTML = UA.eggSVG(body, taps); return; }
    // crack! hatch the baby
    UA.fx.burst({ x: e.clientX, y: e.clientY }, 'confetti', 24);
    UA.audio.sfx.fanfare();
    btn.style.pointerEvents = 'none';
    btn.innerHTML = UA.unicornSVG({ body, mane, baby: 1 });
    UA.audio.speak('CRACK! Hello, little one! What shall we name the baby?').then(() => {
      layer.remove();
      nameBaby(body, mane, then);
    });
  });
};
const nameBaby = (body, mane, then) => {
  // reuse the naming widget: spoken list + keyboard (stealth letter practice)
  const layer = el(`<div class="veil" style="display:flex;align-items:center;justify-content:center">
    <div class="ceremony-card" style="max-width:92vw">
      <div style="width:140px">${UA.unicornSVG({ body, mane, baby: 1 })}</div>
      <div class="name-row" id="baby-names">${UA.shuffle(UA.UNI_NAMES.concat(['Clover', 'Sunny'])).slice(0, 4).map(n =>
        `<button class="big-btn" data-testid="unicorn-name-option" data-name="${n}" style="font-size:24px;padding:14px 22px">${n}</button>`).join('')}</div>
      <div class="name-display" id="baby-name-disp" style="min-width:220px;font-size:38px">&nbsp;</div>
      <div class="kbd" style="max-width:700px" id="baby-kbd">
        ${UA.ALPHABET.map(c => `<button data-ch="${c.toUpperCase()}" style="width:62px;height:62px;font-size:30px">${c.toUpperCase()}</button>`).join('')}
      </div>
      <button class="round-btn" data-testid="name-done" id="baby-done">${UA.tickSVG()}</button>
    </div></div>`);
  document.body.appendChild(layer);
  let name = '';
  $$('#baby-names button', layer).forEach(b => b.addEventListener('pointerdown', () => {
    name = b.dataset.name; $('#baby-name-disp', layer).textContent = name;
    UA.audio.speak(name + '!'); UA.audio.sfx.pop();
  }));
  $$('#baby-kbd button', layer).forEach(b => b.addEventListener('pointerdown', () => {
    if (name.length >= 10) return;
    name += b.dataset.ch; $('#baby-name-disp', layer).textContent = name;
    UA.audio.speak(b.dataset.ch, { interrupt: true });
  }));
  $('#baby-done', layer).addEventListener('pointerdown', () => {
    if (!name) name = UA.pick(UA.UNI_NAMES);
    const S = UA.S;
    S.babies.push({ id: 'baby' + S.eggsAwarded, name, body, mane,
      quirk: UA.BABY_QUIRKS[S.eggsAwarded % UA.BABY_QUIRKS.length],
      starsAtHatch: UA.totalStars(), treats: 0, growth: 0 });
    S.eggsAwarded++;
    S.eggPending = false;
    UA.memory && UA.memory.keep('hatch-' + name, `${name} hatched from an egg!`);
    UA.save();
    UA.audio.sfx.fanfare();
    UA.audio.speak(`Welcome to the family, ${name}!`);
    layer.remove();
    UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2 }, 'heart', 12);
    then && then();
  });
};

/* =====================================================================
   HOME / HEAR-AGAIN / DEV PANEL
===================================================================== */
$('#home-btn').addEventListener('pointerdown', (e) => {
  if (current === 'map') return;
  UA.engine.stop();                                  // cancels cleanly, nothing counted
  celebrate.classList.remove('show'); celebrate.innerHTML = '';
  enterMap({ x: e.clientX, y: e.clientY });
});
$('#hear-btn').addEventListener('pointerdown', () => {
  if (UA.engine.active && UA.engine.q) UA.engine.repeat();
  else if (UA.placeSay) UA.audio.speak(UA.placeSay);
});

/* dev panel — hidden unless ?dev=1 */
UA.dev = null;
if (/[?&]dev=1/.test(location.search)) {
  const panel = el(`<div id="dev-panel" data-testid="dev-panel" class="show">
    <header>UA dev</header>
    <div class="dev-body">
      <div id="dev-state">-</div>
      <div class="dev-row">
        <select id="dev-stage">${Object.keys(UA.STAGES).map(s => `<option>${s}</option>`).join('')}</select>
        <input id="dev-level" type="number" value="1" min="1" style="width:44px">
        <button data-testid="dev-jump" id="dev-jump">jump</button>
      </div>
      <div class="dev-row">
        <button data-testid="dev-bot-correct" id="dev-bot-c">bot✓</button>
        <button data-testid="dev-bot-wrong" id="dev-bot-w">bot✗</button>
        <button id="dev-bot-r">bot?</button>
        <button id="dev-bot-stop">stop</button>
        <select id="dev-speed"><option value="1600">1x</option><option value="700">2x</option><option value="300">5x</option></select>
      </div>
      <div class="dev-row">
        <button data-testid="dev-session-boundary" id="dev-session">+session</button>
        <button data-testid="dev-skip-celebrations" id="dev-skipcele">cele:on</button>
        <button data-testid="dev-tts-mute" id="dev-mute">tts:on</button>
        <button id="dev-gems">+50 gems</button>
        <button id="dev-stars">+3 stars</button>
      </div>
      <div id="dev-log"></div>
    </div>
  </div>`);
  document.body.appendChild(panel);
  panel.querySelector('header').addEventListener('pointerdown', () => panel.classList.toggle('collapsed'));
  const log = [];
  UA.dev = {
    skipCele: false, botTimer: null,
    log (m) {
      log.push(new Date().toISOString().slice(11, 19) + ' ' + m);
      if (log.length > 60) log.shift();
      const d = $('#dev-log'); if (d) d.textContent = log.slice(-14).join('\n');
      this.state();
    },
    state () {
      const E = UA.engine, S = UA.S;
      const d = $('#dev-state');
      if (d) d.textContent = `${current} ${E.stage ? E.stage.id + ' L' + E.levelOf(E.stage.id) : ''} ` +
        `streak:${E.streak} gems:${S.gems} stars:${UA.totalStars()} meter:${S.meter} sess:${S.sessions}`;
    },
  };
  $('#dev-jump').addEventListener('pointerdown', () => {
    const st = $('#dev-stage').value, lv = Math.max(1, +$('#dev-level').value || 1);
    UA.S.levels[st] = Math.min(lv, UA.STAGES[st].levels);
    UA.save();
    UA.engine.stop();
    UA.ui.showActivity(UA.zoneById(UA.STAGES[st].zone), UA.STAGES[st]);
    SCREENS[current] && SCREENS[current].classList.remove('show');
    SCREENS.activity.classList.add('show'); current = 'activity';
    UA.engine.start(UA.STAGES[st].zone, st);
    UA.dev.log('jump ' + st + ' L' + lv);
  });
  const bot = (mode) => {
    clearInterval(UA.dev.botTimer);
    UA.dev.botTimer = setInterval(() => {
      const E = UA.engine;
      if (!E.active || !E.q || E.locked) return;
      const wrongPick = mode === 'w' || (mode === 'r' && UA.rand(2) === 0);
      if (wrongPick) {
        const wrongEl = $$('#options-area .answer').find(b => b.dataset.opt !== String(E.q.correct));
        E.answer('__bot_wrong__', wrongEl || null);
      } else {
        const rightEl = $$('#options-area .answer').find(b => b.dataset.opt === String(E.q.correct));
        E.answer(E.q.correct, rightEl || null, { x: innerWidth / 2, y: innerHeight / 2 });
      }
      UA.dev.state();
    }, +$('#dev-speed').value);
  };
  $('#dev-bot-c').addEventListener('pointerdown', () => bot('c'));
  $('#dev-bot-w').addEventListener('pointerdown', () => bot('w'));
  $('#dev-bot-r').addEventListener('pointerdown', () => bot('r'));
  $('#dev-bot-stop').addEventListener('pointerdown', () => clearInterval(UA.dev.botTimer));
  $('#dev-session').addEventListener('pointerdown', () => { UA.S.sessions++; UA.save(); UA.dev.log('session -> ' + UA.S.sessions); });
  $('#dev-skipcele').addEventListener('pointerdown', (e) => {
    UA.dev.skipCele = !UA.dev.skipCele; e.target.textContent = 'cele:' + (UA.dev.skipCele ? 'off' : 'on');
  });
  $('#dev-mute').addEventListener('pointerdown', (e) => {
    UA.S.settings.voice = UA.S.settings.voice ? 0 : 1;
    UA.audio.setToggles(UA.S.settings); UA.save();
    e.target.textContent = 'tts:' + (UA.S.settings.voice ? 'on' : 'off');
  });
  $('#dev-gems').addEventListener('pointerdown', () => { UA.S.gems += 50; UA.save(); UA.ui.updateHUD(); UA.dev.state(); });
  $('#dev-stars').addEventListener('pointerdown', () => {
    // grant the next unmastered stage 3 stars (dev shortcut for unlock testing)
    const st = Object.keys(UA.STAGES).find(s => UA.STAGES[s].stars !== false && (UA.S.stars[s] || 0) < 3);
    if (st) { UA.S.stars[st] = 3; UA.save(); UA.dev.log('stars: ' + st + ' mastered'); UA.dev.state(); }
  });
}

/* ---------- boot entry from main.js ---------- */
UA.ui.begin = () => {
  UA.pacing.reset();
  if (UA.S.created) { enterMap(); return; }
  buildCreate();
  UA.go('create', { colour: '#FFD6E8', onArrive: () =>
    UA.audio.speak(`Hello! I am your unicorn! Tap a colour to paint me — any colour you like!`) });
};
})();

</script>
<script>
/* ================= Unicorn Academy — places =================
   Sparkle Boutique, the toy corners (stable, kitchen, music meadow, dress-up
   mirror), the Memory Book and the grown-ups' corner. Toy corners are always
   open, never issue questions, never award gems (treats are SPENT here). */
'use strict';
(() => {
const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => [...(r || document).querySelectorAll(s)];
const el = (h) => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstElementChild; };
const P = UA.PALETTE;
const myUni = (extra = {}) => UA.unicornSVG(Object.assign({
  body: P.bodies[UA.S.uni.body], mane: P.manes[UA.S.uni.mane], cosmetics: UA.S.equipped }, extra));
/* item thumbnails zoom onto the accessory region so items are tellable apart */
const ANCHOR_VIEW = { head: '125 0 115 115', neck: '125 85 95 95', back: '45 50 115 115',
  horn: '155 0 85 85', tail: '5 125 95 95', feet: '65 175 130 70' };
const itemThumb = (item) => UA.unicornSVG({ body: P.bodies[UA.S.uni.body], mane: P.manes[UA.S.uni.mane],
  cosmetics: [item.id] }).replace('viewBox="0 0 240 250"', `viewBox="${ANCHOR_VIEW[item.anchor] || '0 0 240 250'}"`);

/* a full-screen place with a themed header band and a home-reachable body */
const placeScreen = (id, title, bg) => {
  let s = $('#screen-' + id);
  if (!s) { s = el(`<div class="screen" id="screen-${id}"></div>`); $('#app').appendChild(s); UA.registerScreen(id, s); }
  s.innerHTML = `<div style="position:absolute;inset:0;background:${bg}"></div>
    <div class="place-title">${title}</div>
    <div class="place-body" id="${id}-body"></div>`;
  return $('#' + id + '-body');
};
const openPlace = (id, colour, pt, build, sayLine) => {
  build();
  UA.go(id, { colour, from: pt, onArrive: () => {
    $('#home-btn').classList.add('show');
    $('#hear-btn').classList.add('show');
    $('#hud').classList.add('show');
    const meter = $('#rainbow-meter');
    if (meter) meter.style.display = 'none';   // the meter is a question-time thing
    UA.placeSay = sayLine;                       // hear-again on places repeats the welcome
    UA.audio.speak(sayLine);
  } });
};

/* ---------- boutique tiers ---------- */
const tierOpen = (t) => t === 0
  || (t === 1 && (UA.zoneUnlocked('word-garden') || UA.zoneUnlocked('puzzle-falls')))
  || (t === 2 && UA.zoneUnlocked('crystal-castle'))
  || (t === 3 && UA.S.royale.crowned);

UA.openBoutique = (pt) => {
  const S = UA.S;
  const build = () => {
    const body = placeScreen('boutique', 'Sparkle Boutique', 'linear-gradient(180deg,#FFE9F4,#FFF9F5 60%)');
    body.dataset.testid = '';
    const preview = el(`<div class="btq-preview"><div id="btq-uni">${myUni()}</div>
      <button class="big-btn" id="btq-keep" style="display:none;background:var(--mint)">Keep it!</button></div>`);
    body.appendChild(preview);
    const shelves = el('<div class="btq-shelves"></div>');
    body.appendChild(shelves);
    let trying = null;
    const refresh = () => {
      $('#btq-uni').innerHTML = UA.unicornSVG({ body: P.bodies[S.uni.body], mane: P.manes[S.uni.mane],
        cosmetics: trying ? S.equipped.filter(i => itemOf(i).anchor !== itemOf(trying).anchor).concat([trying]) : S.equipped });
      const kb = $('#btq-keep');
      kb.style.display = trying ? '' : 'none';
      if (trying) kb.innerHTML = `Keep it! &nbsp; ${itemOf(trying).royale ? UA.rainbowGemSVG() : UA.gemSVG()}<b style="font-size:24px">${itemOf(trying).price}</b>`;
    };
    const itemOf = (id) => UA.BOUTIQUE.find(b => b.id === id);
    const tiers = [['Everyday sparkles', 0], ['Fancy things', 1], ['Royal treasures', 2], ['Champion prizes', 3]];
    tiers.forEach(([name, t]) => {
      const open = tierOpen(t);
      const row = el(`<div class="btq-tier ${open ? '' : 'btq-locked'}"><h3>${name}${open ? '' : ' (still locked!)'}</h3><div class="btq-row"></div></div>`);
      UA.BOUTIQUE.filter(b => b.tier === t).forEach(item => {
        const owned = S.owned.includes(item.id);
        const equipped = S.equipped.includes(item.id);
        const card = el(`<button class="btq-item ${owned ? 'owned' : ''} ${equipped ? 'equipped' : ''}" data-item="${item.id}">
          <span style="width:82%;height:66%;display:block">${itemThumb(item)}</span>
          <span class="btq-price">${owned ? (equipped ? 'wearing' : 'owned') :
            `${item.royale ? UA.rainbowGemSVG() : UA.gemSVG()} ${item.price}`}</span></button>`);
        card.addEventListener('pointerdown', () => {
          UA.audio.sfx.pop();
          if (!open) { UA.audio.speak('These treasures unlock later in our adventure!'); return; }
          if (owned) {                                    // owned: toggle equip (one per anchor)
            if (equipped) S.equipped = S.equipped.filter(i => i !== item.id);
            else S.equipped = S.equipped.filter(i => itemOf(i).anchor !== item.anchor).concat([item.id]);
            UA.save(); trying = null; build(); refreshTop();
            UA.audio.speak(equipped ? 'Popped it away!' : `Ooh, the ${item.name}! So stylish!`);
            return;
          }
          trying = item.id;                               // two-step: try on FREE first
          UA.audio.speak(`The ${item.name}! Trying it on... tap Keep It if you love it!`);
          refresh();
        });
        row.querySelector('.btq-row') ? null : null;
        $('.btq-row', row).appendChild(card);
      });
      shelves.appendChild(row);
    });
    const refreshTop = () => refresh();
    $('#btq-keep').addEventListener('pointerdown', () => {
      if (!trying) return;
      const item = itemOf(trying);
      const wallet = item.royale ? 'rainbowGems' : 'gems';
      if (S[wallet] < item.price) {
        UA.audio.speak(`We need ${item.price - S[wallet]} more ${item.royale ? 'rainbow gems' : 'gems'}! Let us play and earn them!`);
        UA.audio.sfx.boop();
        return;
      }
      S[wallet] -= item.price;
      S.owned.push(item.id);
      S.equipped = S.equipped.filter(i => itemOf(i).anchor !== item.anchor).concat([item.id]);
      const firstBuy = !S.firsts.includes('first-purchase');
      if (firstBuy) { S.firsts.push('first-purchase'); UA.memory.keep('first-purchase', `First boutique treasure: the ${item.name}!`); }
      UA.save();                                          // save BEFORE ceremony
      trying = null;
      UA.audio.sfx.fanfare();
      UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 3 }, 'confetti', 20);
      UA.ui.updateHUD();
      UA.audio.speak(firstBuy ? `Your very FIRST treasure, ${UA.S.name}! The ${item.name} is yours forever!`
        : `The ${item.name} is yours! Beautiful!`);
      build();
    });
    // treats & seeds: the bottomless sinks
    const sink = el(`<div class="btq-tier"><h3>Treats &amp; seeds</h3><div class="btq-row" id="btq-sink"></div></div>`);
    shelves.appendChild(sink);
    UA.TREATS.forEach(tr => {
      const card = el(`<button class="btq-item"><span style="width:64%;height:60%">${UA.sprite(tr.id)}</span>
        <span class="btq-price">${UA.gemSVG()} ${tr.price}</span></button>`);
      card.addEventListener('pointerdown', () => {
        if (S.gems < tr.price) { UA.audio.sfx.boop(); UA.audio.speak('Not enough gems yet — let us earn some more!'); return; }
        S.gems -= tr.price; UA.save(); UA.ui.updateHUD();
        UA.audio.sfx.munch();
        const u = $('#btq-uni .uni-rig');
        if (u) { u.classList.remove('leap'); void u.getBoundingClientRect(); u.classList.add('leap'); }
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2.6 }, 'heart', 8);
        UA.audio.speak(UA.pick([`Mmmm! ${tr.name}! My favourite!`, `A ${tr.name}! Nom nom nom!`, `${tr.name}! You spoil me, ${S.name}!`]));
      });
      $('#btq-sink').appendChild(card);
    });
    const seed = el(`<button class="btq-item"><span style="width:64%;height:60%">${UA.sprite('flower')}</span>
      <span class="btq-price">${UA.gemSVG()} ${UA.SEED_PRICE}</span></button>`);
    seed.addEventListener('pointerdown', () => {
      if (S.gems < UA.SEED_PRICE) { UA.audio.sfx.boop(); UA.audio.speak('Seeds cost ten gems — nearly there!'); return; }
      S.gems -= UA.SEED_PRICE;
      S.garden.push({ day: UA.todayStr(), slot: S.garden.length % 8 });
      UA.save(); UA.ui.updateHUD();
      UA.audio.sfx.chime();
      UA.audio.speak('A magic seed! I planted it on our map — watch it bloom next time we play!');
    });
    $('#btq-sink').appendChild(seed);
  };
  openPlace('boutique', '#FFD6E8', pt, build, `Welcome to the Sparkle Boutique! Tap something to try it on — trying is always free!`);
};

/* ---------- the unicorn stable ---------- */
const GROWTH_AT = [8, 20];                       // starsSinceHatch + 2*treats thresholds
const growthOf = (b) => {
  const score = (UA.totalStars() - b.starsAtHatch) + b.treats * 2;
  return score >= GROWTH_AT[1] ? 2 : score >= GROWTH_AT[0] ? 1 : 0;
};
UA.openStable = (pt) => {
  const S = UA.S;
  let selected = null;
  const build = () => {
    const body = placeScreen('stable', 'The Unicorn Stable', 'linear-gradient(180deg,#FFE9D2,#F6E3C2 60%)');
    const barn = el(`<div class="stable-barn">
      <svg viewBox="0 0 800 200" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:34%">
        <path d="M0 200 V70 L400 -40 L800 70 V200Z" fill="#E8B56D" stroke="#5C4A66" stroke-width="4"/>
        <path d="M0 70 L400 -40 L800 70" fill="none" stroke="#C88A4B" stroke-width="12"/></svg>
      <div class="stable-floor"></div></div>`);
    body.appendChild(barn);
    if (!S.babies.length) {
      barn.appendChild(el(`<div class="stable-nest">
        <svg viewBox="0 0 200 120" style="width:220px"><ellipse cx="100" cy="80" rx="86" ry="30" fill="#C89A6B" stroke="#5C4A66" stroke-width="4"/>
        <ellipse cx="100" cy="70" rx="64" ry="20" fill="#F6E3C2" stroke="#5C4A66" stroke-width="3"/>
        <path d="M40 74 Q70 60 100 72 Q130 58 160 74" stroke="#A8763E" stroke-width="5" fill="none"/></svg>
        <div class="stable-note">A cosy nest, all ready and waiting...</div></div>`));
    }
    S.babies.forEach((b, i) => {
      const g = growthOf(b);
      if (g > b.growth) {                         // growth moment: a small ceremony
        b.growth = g; UA.save();
        UA.memory.keep('grow-' + b.name + g, `${b.name} grew ${g === 1 ? 'into a young unicorn' : 'all the way up'}!`);
        UA.audio.sfx.fanfare();
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2 }, 'confetti', 22);
        UA.audio.speak(`Look! All your love made ${b.name} grow ${g === 1 ? 'bigger' : 'ALL the way up'}!`);
      }
      const size = [90, 130, 170][b.growth];
      const n = S.babies.length;   // spread across the barn, centred when few
      const left = n === 1 ? 40 : 6 + i * (74 / Math.max(1, n - 1));
      const pen = el(`<button class="stable-baby" style="left:${left}%;bottom:${8 + (i % 3) * 14}%;width:${size}px" data-baby="${i}">
        <span class="stable-name">${b.name}</span>
        ${UA.unicornSVG({ body: b.body, mane: b.mane, baby: [1, .55, 0][b.growth] })}</button>`);
      let lastPet = 0;
      pen.addEventListener('pointerdown', (e) => {
        const now = Date.now();
        if (now - lastPet < 200) return;
        lastPet = now;
        selected = i;
        $$('.stable-baby', body).forEach(x => x.classList.remove('picked'));
        pen.classList.add('picked');
        const rig = pen.querySelector('.uni-rig');
        rig.classList.remove('nuzzle', 'shiver', 'leap');
        void rig.getBoundingClientRect();
        // one personality quirk each
        const q = b.quirk;
        if (q === 'sleepy') { rig.classList.add('sad-tilt'); UA.audio.speak(`${b.name}... zzz... oh! You woke ${b.name} up!`); }
        else if (q === 'sneezy') { rig.classList.add('shiver'); UA.audio.sfx.crack(); UA.fx.burst({ x: e.clientX, y: e.clientY }, 'spark', 10); UA.audio.speak(`Aaah... aaah... CHOO! Glitter everywhere!`); }
        else if (q === 'chaser') { rig.classList.add('leap'); UA.audio.speak(`${b.name} wants to chase your finger!`); }
        else { rig.classList.add(UA.pick(['nuzzle', 'leap', 'shiver'])); UA.audio.sfx.giggle(); UA.audio.speak(`${b.name}!`); }
        UA.fx.burst({ x: e.clientX, y: e.clientY }, 'heart', 5);
      });
      barn.appendChild(pen);
      // gentle wandering
      setInterval(() => {
        if (UA.currentScreen() !== 'stable' || !pen.isConnected) return;
        pen.style.left = Math.max(4, Math.min(84, parseFloat(pen.style.left) + (UA.rand(17) - 8))) + '%';
      }, 3800 + i * 700);
    });
    // treat tray: feeding HERE grows babies (this is what the sink is for)
    const tray = el(`<div class="stable-tray"><span class="stable-note">Feed a friend:</span><div class="tray-row"></div></div>`);
    UA.TREATS.slice(0, 4).forEach(tr => {
      const btn = el(`<button class="btq-item" style="width:104px;height:118px"><span style="width:60%;height:56%">${UA.sprite(tr.id)}</span>
        <span class="btq-price">${UA.gemSVG()} ${tr.price}</span></button>`);
      btn.addEventListener('pointerdown', () => {
        if (!S.babies.length) { UA.audio.speak('When a baby unicorn hatches, we can feed them here!'); return; }
        if (selected == null) { UA.audio.speak('Tap a unicorn first, then pick their treat!'); return; }
        if (S.gems < tr.price) { UA.audio.sfx.boop(); UA.audio.speak('Not enough gems — let us earn some more first!'); return; }
        const b = S.babies[selected];
        S.gems -= tr.price;
        b.treats++;
        UA.save(); UA.ui.updateHUD();
        UA.audio.sfx.munch();
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2 }, 'heart', 8);
        UA.audio.speak(UA.pick([`${b.name} LOVES ${tr.name}!`, `Nom nom! ${b.name} is so happy!`, `${b.name} munches the ${tr.name} right up!`]));
        const g = growthOf(b);
        if (g > b.growth) setTimeout(build, 900);   // rebuild triggers the growth ceremony
      });
      $('.tray-row', tray).appendChild(btn);
    });
    body.appendChild(tray);
    if (!S.firsts.includes('barn-warming') && S.babies.length) {
      S.firsts.push('barn-warming'); UA.save();
      UA.audio.sfx.fanfare();
      setTimeout(() => UA.audio.speak('A barn-warming party! This stable is HOME now!'), 2600);
    }
  };
  openPlace('stable', '#FFE0CC', pt, build, S.babies.length
    ? `Welcome to the stable! Your unicorn family lives here. Tap someone to say hello!`
    : `This is the stable! One day, baby unicorns will live here. The nest is all ready!`);
};

/* ---------- unicorn kitchen: secretly vocabulary, openly a comedy machine ---------- */
const FOODS = ['apple', 'banana', 'strawberry', 'cupcake', 'watermelon', 'carrot', 'orange', 'icecream', 'pizza', 'egg', 'milk'];
UA.openKitchen = (pt) => {
  const build = () => {
    const body = placeScreen('kitchen', 'Unicorn Kitchen', 'linear-gradient(180deg,#FFE9F4,#FFF3C4 70%)');
    const layers = [];
    body.innerHTML = `
      <div class="fr-banner">Stack a silly cake!</div>
      <div class="kitchen-uni" id="kitchen-uni">${myUni()}</div>
      <div class="kitchen-cake" id="kitchen-cake"><div class="kitchen-plate"></div><div class="kitchen-hint"></div></div>
      <div class="kitchen-row" id="kitchen-row"></div>
      <button class="big-btn" id="kitchen-feed" style="background:var(--mint)">Feed ${UA.S.uni.name}!</button>`;
    const ingredients = UA.shuffle(FOODS).slice(0, 6).concat(UA.shuffle(['sock', 'fish', 'ball', 'drum']).slice(0, 2));
    UA.shuffle(ingredients).forEach(name => {
      const b = el(`<button class="option-card" style="--card-size:110px">${UA.sprite(name)}</button>`);
      b.addEventListener('pointerdown', () => {
        if (layers.length >= 4) { UA.audio.speak('The cake is TALL enough! Feed me!'); return; }
        layers.push(name);
        UA.audio.sfx.pop();
        UA.audio.speak(name, { interrupt: true });
        $('#kitchen-cake').appendChild(el(`<div class="cake-layer" style="bottom:${18 + (layers.length - 1) * 46}px">${UA.sprite(name)}</div>`));
      });
      $('#kitchen-row').appendChild(b);
    });
    $('#kitchen-feed').addEventListener('pointerdown', () => {
      if (!layers.length) { UA.audio.speak('Stack something yummy on the plate first!'); return; }
      const yuck = layers.filter(l => !FOODS.includes(l));
      const rig = $('#kitchen-uni .uni-rig');
      UA.audio.sfx.munch();
      rig.classList.remove('leap', 'shiver', 'sad-tilt');
      void rig.getBoundingClientRect();
      if (yuck.length) {
        rig.classList.add('shiver');
        UA.audio.speak(UA.pickFresh('kyuck', UA.KITCHEN_YUCK).replace('%ITEMS%', yuck.join(' and ')));
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2.4 }, 'confetti', 14);
      } else {
        rig.classList.add('leap');
        UA.audio.speak(UA.pickFresh('kyum', UA.KITCHEN_YUM).replace('%ITEMS%', layers.join(' and ')).replace('%NAME%', UA.S.name));
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 2.4 }, 'heart', 12);
      }
      setTimeout(build, 2200);
    });
  };
  openPlace('kitchen', '#FFF3C4', pt, build, `The kitchen! Stack anything on the plate to make me a cake. ANYTHING. I trust you!`);
};

/* ---------- music meadow: flowers are pentatonic notes ---------- */
UA.openMusic = (pt) => {
  const PENTA = [0, 2, 4, 7, 9, 12, 14, 16];
  let recording = null, recStart = 0;
  const build = () => {
    const body = placeScreen('music', 'Music Meadow', 'linear-gradient(180deg,#D3ECFF,#D2F5DC 60%)');
    body.innerHTML = `<div class="music-row" id="music-row"></div>
      <div style="display:flex;gap:20px;justify-content:center">
        <button class="big-btn" id="music-rec">${UA.gen.butterfly(0, 0, 1.4)} Listen back</button>
      </div>`;
    PENTA.forEach((semi, i) => {
      const f = el(`<button class="music-flower" style="--d:${i * .12}s">${UA.gen ? '' : ''}
        <svg viewBox="0 0 100 120">${UA.gen.flower(50, 70, 26 + (i % 3) * 5, 5 + (i % 3), [P.rainbow[i % 6], '#FFD97A'])}</svg></button>`);
      f.addEventListener('pointerdown', () => {
        UA.audio.note(semi);
        f.classList.remove('music-pop'); void f.getBoundingClientRect(); f.classList.add('music-pop');
        if (recording) recording.push({ semi, t: Date.now() - recStart });
        UA.fx.burst({ x: f.getBoundingClientRect().left + 50, y: f.getBoundingClientRect().top + 30 }, 'spark', 3);
      });
      $('#music-row').appendChild(f);
    });
    recording = []; recStart = Date.now();
    $('#music-rec').addEventListener('pointerdown', () => {
      if (!recording.length) { UA.audio.speak('Tap some flowers first — then the butterfly sings your song back!'); return; }
      UA.audio.speak('Your song!');
      const notes = recording.slice(-24);
      const t0 = notes[0].t;
      notes.forEach(n => setTimeout(() => UA.audio.note(n.semi), 600 + (n.t - t0)));
      recording = []; recStart = Date.now();
    });
  };
  openPlace('music', '#D2F5DC', pt, build, `The music meadow! Every flower sings. Tap them and make a song — the butterfly remembers it!`);
};

/* ---------- dress-up mirror ---------- */
UA.openMirror = (pt) => {
  const S = UA.S;
  const build = () => {
    const body = placeScreen('mirror', 'Dress-up Mirror', 'linear-gradient(180deg,#E9DDFF,#D3ECFF 70%)');
    const poses = ['', 'leap', 'celebrate', 'nuzzle'];
    let pose = 0;
    body.innerHTML = `<div class="mirror-frame"><div id="mirror-uni">${myUni()}</div></div>
      <button class="big-btn" id="mirror-pose" style="background:var(--butter)">Strike a pose!</button>
      <div class="btq-row" id="mirror-items" style="justify-content:center"></div>`;
    const refresh = () => { $('#mirror-uni').innerHTML = myUni({ cls: poses[pose] }); };
    $('#mirror-pose').addEventListener('pointerdown', () => {
      pose = (pose + 1) % poses.length;
      UA.audio.sfx.pop();
      UA.audio.speak(UA.pick(['Ta-daa!', 'So fancy!', 'Ooh la la!', 'Fabulous!']));
      refresh();
    });
    if (!S.owned.length) {
      body.appendChild(el(`<div class="stable-note" style="display:flex;align-items:center;gap:10px">
        <span style="width:30px;height:30px;display:inline-block">${UA.sparkleSVG()}</span>Treasures from the boutique appear here to try on!</div>`));
    }
    S.owned.forEach(id => {
      const item = UA.BOUTIQUE.find(b => b.id === id);
      const card = el(`<button class="btq-item ${S.equipped.includes(id) ? 'equipped' : ''}" style="width:110px;height:110px">
        <span style="width:88%;height:88%;display:block">${itemThumb(item)}</span></button>`);
      card.addEventListener('pointerdown', () => {
        if (S.equipped.includes(id)) S.equipped = S.equipped.filter(i => i !== id);
        else S.equipped = S.equipped.filter(i => UA.BOUTIQUE.find(b => b.id === i).anchor !== item.anchor).concat([id]);
        UA.save();
        UA.audio.sfx.chime();
        build();
      });
      $('#mirror-items').appendChild(card);
    });
  };
  openPlace('mirror', '#E9DDFF', pt, build, `Mirror mirror! Tap your treasures to dress me up, then we strike a pose!`);
};

/* ---------- memory book ---------- */
UA.memory = {
  keep (id, line) {
    if (UA.S.memoryBook.some(k => k.id === id)) return;
    UA.S.memoryBook.push({ id, line, day: UA.todayStr() });
    if (UA.S.memoryBook.length > 60) UA.S.memoryBook.shift();
    UA.save();
  },
};
const PAGE_SIZE = 12;                                       // sticker slots per album page
UA.openBook = (pt, tab) => {
  const build = () => {
    const body = placeScreen('book', 'Memory Book', 'linear-gradient(180deg,#FFF3C4,#FFF9F5 60%)');
    const on = 'background:var(--butter);box-shadow:0 0 0 4px var(--gold),0 8px 0 var(--shadow)';
    const tabs = el(`<div style="display:flex;gap:14px">
      <button class="big-btn" id="tab-mem" style="font-size:22px;padding:12px 22px;${tab !== 'stickers' ? on : ''}">Memories</button>
      <button class="big-btn" id="tab-stk" style="font-size:22px;padding:12px 22px;${tab === 'stickers' ? on : ''}">Stickers</button></div>`);
    body.appendChild(tabs);
    $('#tab-mem', body).addEventListener('pointerdown', () => { tab = 'mem'; build(); });
    $('#tab-stk', body).addEventListener('pointerdown', () => { tab = 'stickers'; build(); UA.audio.speak('Your sticker album! One sticker for every round you finish!'); });
    if (tab === 'stickers') { buildStickers(body); return; }
    if (!UA.S.memoryBook.length) {
      body.appendChild(el(`<div class="stable-note" style="font-size:28px;display:flex;align-items:center;gap:10px">
        <span style="width:34px;height:34px;display:inline-block">${UA.sparkleSVG()}</span>Our adventures will be kept here!</div>`));
      body.appendChild(el(`<div style="width:200px">${myUni()}</div>`));
      return;
    }
    const list = el('<div class="book-list"></div>');
    UA.S.memoryBook.slice().reverse().forEach(k => {
      const row = el(`<button class="book-row"><span style="width:44px;height:44px;flex:none">${UA.sparkleSVG()}</span>
        <span>${k.line}</span></button>`);
      row.addEventListener('pointerdown', () => {           // replayable keepsake
        UA.audio.sfx.fanfare();
        UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 3 }, 'confetti', 18);
        UA.audio.speak(`Remember this? ${k.line}`);
      });
      list.appendChild(row);
    });
    body.appendChild(list);
  };
  openPlace('book', '#FFF3C4', pt, build, `Our memory book! Memories on one page, stickers on the other!`);
};

/* sticker album: a page per zone, silhouette slots for the uncollected */
const STICKER_ART = ['star', 'flower', 'butterfly', 'balloon', 'strawberry', 'shell', 'kite', 'cupcake', 'bee', 'bird', 'gift', 'ball'];
const buildStickers = (body) => {
  UA.ZONES.forEach(z => {
    const got = (UA.S.stickers[z.id] || []);
    const page = got.length ? got.slice(-(got.length % PAGE_SIZE || PAGE_SIZE)) : [];
    const fullPages = Math.floor(got.length / PAGE_SIZE);
    const sect = el(`<div style="width:100%;max-width:760px">
      <h3 style="color:var(--plum);margin:10px 4px">${z.name}${fullPages ? ` — ${fullPages} full page${fullPages > 1 ? 's' : ''}!` : ''}</h3>
      <div class="stk-grid" style="border-color:${z.col}"></div></div>`);
    const grid = $('.stk-grid', sect);
    for (let i = 0; i < PAGE_SIZE; i++) {
      const st = page[i];
      if (st) {
        grid.appendChild(el(`<div class="stk-slot got ${st.rare ? 'rare' : ''}">
          ${UA.sprite(STICKER_ART[(i + fullPages) % STICKER_ART.length])}
          ${st.rare ? `<span class="stk-rare">${UA.sparkleSVG()}</span>` : ''}</div>`));
      } else {
        grid.appendChild(el(`<div class="stk-slot"><span style="opacity:.22;filter:grayscale(1)">${UA.sprite(STICKER_ART[(i + fullPages) % STICKER_ART.length])}</span></div>`));
      }
    }
    body.appendChild(sect);
  });
};
/* page-completion celebration: fired by the engine when a page fills */
UA.stickerPageDone = (zoneId) => {
  const z = UA.zoneById(zoneId);
  UA.audio.sfx.fanfare();
  UA.fx.burst({ x: innerWidth / 2, y: innerHeight / 3 }, 'confetti', 26);
  UA.memory.keep('stkpage-' + zoneId + '-' + (UA.S.stickers[zoneId].length / PAGE_SIZE),
    `A whole sticker page of ${z.name} finished!`);
  UA.audio.speak(`WOW! You filled a whole sticker page for ${z.name}! A brand new page is ready!`);
};

/* ---------- grown-ups' corner: gate + dashboard ---------- */
UA.openParents = () => {
  const S = UA.S;
  const digits = UA.GATE_DIGITS();
  const WORDS = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
  let entered = [];
  const veil = el(`<div class="veil" style="display:flex;align-items:center;justify-content:center;z-index:49">
    <div class="ceremony-card" style="gap:12px">
      <div style="font-size:20px;color:var(--plum);font-weight:700">For grown-ups: tap ${digits.map(d => WORDS[d]).join(', then ')}</div>
      <div class="gate-pad">${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => `<button class="gate-key" data-n="${n}">${n}</button>`).join('')}</div>
      <button class="gate-key" id="gate-cancel" style="width:auto;padding:0 22px">back to the game</button>
    </div></div>`);
  document.body.appendChild(veil);
  $('#gate-cancel', veil).addEventListener('pointerdown', () => veil.remove());
  $$('.gate-key[data-n]', veil).forEach(k => k.addEventListener('pointerdown', () => {
    entered.push(+k.dataset.n);
    if (entered.length < 3) return;
    if (entered.join() === digits.join()) { veil.remove(); showDashboard(); }
    else { entered = []; k.parentElement.animate([{ transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' }, { transform: 'none' }], { duration: 250 }); }
  }));
  const showDashboard = () => {
    const zones = UA.ZONES.map(z => {
      const rows = z.stages.filter(id => UA.STAGES[id]).map(id => {
        const st = UA.STAGES[id];
        const h = (S.history[id] && S.history[id].answers) || [];
        const acc = h.length ? Math.round(100 * h.reduce((a, b) => a + b, 0) / h.length) : null;
        return `<tr><td>${st.skill}</td><td>L${S.levels[id] || 1}/${st.levels}</td>
          <td>${st.stars === false ? '—' : '★'.repeat(S.stars[id] || 0) + '☆'.repeat(3 - (S.stars[id] || 0))}</td>
          <td>${acc == null ? '—' : acc + '%'}</td></tr>`;
      }).join('');
      return `<h4>${z.name}</h4><table class="dash-table"><tr><th>skill</th><th>level</th><th>stars</th><th>recent accuracy</th></tr>${rows}</table>`;
    }).join('');
    const week = Object.entries(S.weekLog).slice(-7).map(([d, m]) => `${d.slice(5)}: ${Math.round(m)} min`).join(' · ') || 'no time logged yet';
    const review = UA.masteredStages().map(id => UA.STAGES[id].skill).join(', ') || 'none mastered yet';
    const d = el(`<div class="veil" style="z-index:49;overflow:auto;display:block;background:rgba(255,249,245,.98)">
      <div style="max-width:760px;margin:30px auto;padding:0 20px 60px;color:var(--plum);font-size:16px" id="dash">
        <h2>For grown-ups</h2>
        <p><b>${S.name || '—'}</b> · playing ${S.daysPlayed} day(s) · ${UA.totalStars()} stars · ${S.gems} gems ·
          lifetime accuracy ${S.answered ? Math.round(100 * S.correct / S.answered) : 0}% (${S.answered} answers)</p>
        <p><b>This week:</b> ${week}</p>
        <p><b>In review rotation (mastered):</b> ${review}</p>
        ${zones}
        <h4>Sound</h4>
        <label><input type="checkbox" id="tg-voice" ${S.settings.voice ? 'checked' : ''}> voice</label>
        <label><input type="checkbox" id="tg-sfx" ${S.settings.sfx ? 'checked' : ''}> effects</label>
        <label><input type="checkbox" id="tg-music" ${S.settings.music ? 'checked' : ''}> music</label>
        <label>volume <input type="range" id="tg-vol" min="0" max="1" step=".05" value="${S.settings.vol}"></label>
        <h4>Backup</h4>
        <p>Copy this code somewhere safe (Notes, email). Paste it back here on any device to restore
        all progress — iOS can clear website data when storage runs low.</p>
        <textarea id="dash-backup" readonly style="width:100%;height:64px;font-size:11px"></textarea>
        <button id="dash-copy" class="gate-key" style="width:auto;padding:0 18px">copy backup code</button>
        <p style="margin-top:10px">Restore: paste a backup code below, then tap restore.</p>
        <textarea id="dash-restore-in" style="width:100%;height:44px;font-size:11px"></textarea>
        <button id="dash-restore" class="gate-key" style="width:auto;padding:0 18px">restore from code</button>
        <h4>Reset</h4>
        <p>Hold the button for 3 seconds to erase ALL progress. This cannot be undone.</p>
        <button id="dash-reset" class="gate-key" style="width:auto;padding:0 18px;background:#FFB3B3">hold to reset everything</button>
        <p style="margin-top:26px;font-size:13px;opacity:.75">Artwork includes OpenMoji sprites (openmoji.org), CC BY-SA 4.0.<br>
        Tip: for fullscreen, use Add to Home Screen. To lock her in, use Guided Access (triple-click the top button).</p>
        <button id="dash-close" class="gate-key" style="width:auto;padding:0 22px;position:fixed;top:14px;right:14px">close</button>
      </div></div>`);
    document.body.appendChild(d);
    $('#dash-close', d).addEventListener('pointerdown', () => d.remove());
    const upd = () => {
      S.settings = { voice: +$('#tg-voice', d).checked, sfx: +$('#tg-sfx', d).checked,
        music: +$('#tg-music', d).checked, vol: +$('#tg-vol', d).value };
      UA.save();
      UA.audio.setToggles(S.settings);
    };
    ['tg-voice', 'tg-sfx', 'tg-music', 'tg-vol'].forEach(id => $('#' + id, d).addEventListener('change', upd));
    try { $('#dash-backup', d).value = btoa(unescape(encodeURIComponent(JSON.stringify(S)))); } catch (e) {}
    $('#dash-copy', d).addEventListener('pointerdown', () => {
      const ta = $('#dash-backup', d);
      ta.select(); ta.setSelectionRange(0, 999999);
      try { document.execCommand('copy'); } catch (e) {}
      try { navigator.clipboard && navigator.clipboard.writeText(ta.value); } catch (e) {}
      $('#dash-copy', d).textContent = 'copied!';
      setTimeout(() => { const b = $('#dash-copy', d); if (b) b.textContent = 'copy backup code'; }, 1500);
    });
    $('#dash-restore', d).addEventListener('pointerdown', () => {
      try {
        const parsed = JSON.parse(decodeURIComponent(escape(atob($('#dash-restore-in', d).value.trim()))));
        if (!parsed || typeof parsed.v !== 'number') throw new Error('bad');
        UA.S = parsed;
        UA.save();
        location.reload();
      } catch (e) {
        $('#dash-restore', d).textContent = 'that code did not work';
        setTimeout(() => { const b = $('#dash-restore', d); if (b) b.textContent = 'restore from code'; }, 2000);
      }
    });
    let holdT = null;
    const rb = $('#dash-reset', d);
    rb.addEventListener('pointerdown', () => {
      rb.textContent = 'keep holding...';
      holdT = setTimeout(() => {
        UA.resetAll();
        location.reload();
      }, 3000);
    });
    ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => rb.addEventListener(ev, () => {
      clearTimeout(holdT); rb.textContent = 'hold to reset everything';
    }));
  };
};
})();

</script>
<script>
/* ================= Unicorn Academy — living world =================
   Map facilities (toy corners + boutique + memory book), daily gift, garden,
   rare surprise events, silly event days, hide-and-seek babies, and the
   Crystal Castle coronation / Rainbow Royale endgame glue. */
'use strict';
(() => {
const $ = (s, r) => (r || document).querySelector(s);
const el = (h) => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstElementChild; };
UA.world = {};

/* ---------- facilities strip on the map (always open, never misted) ---------- */
const FACILITIES = [
  { id: 'toy-stable', icon: 'stable', name: 'Stable', open: (pt) => UA.openStable(pt), x: 10, y: 88 },
  { id: 'boutique', icon: 'boutique', name: 'Boutique', open: (pt) => UA.openBoutique(pt), x: 27, y: 92 },
  { id: 'toy-kitchen', icon: 'kitchen', name: 'Kitchen', open: (pt) => UA.openKitchen(pt), x: 62, y: 92 },
  { id: 'toy-music', icon: 'music', name: 'Music', open: (pt) => UA.openMusic(pt), x: 79, y: 88 },
  { id: 'toy-dressup', icon: 'mirror', name: 'Mirror', open: (pt) => UA.openMirror(pt), x: 93, y: 84 },
  { id: 'memory-book', icon: 'book', name: 'Book', open: (pt) => UA.openBook(pt), x: 93, y: 62 },
];

UA.world.decorateMap = (stage) => {
  const S = UA.S;
  const phone = innerWidth < 700;
  // phones get a tidy dock (scattered 11vw spots collapse below touch size there)
  const dock = phone ? el('<div class="fac-dock"></div>') : null;
  FACILITIES.forEach(f => {
    const b = el(phone
      ? `<button data-testid="${f.id}" aria-label="${f.name}">${UA.landmark(f.icon, '#FFD6E8', '#FFF9F5')}<span class="fac-name">${f.name}</span></button>`
      : `<button class="zone-spot fac-spot" data-testid="${f.id}"
          style="left:${f.x}%;top:${f.y}%;width:min(11vw,96px);height:min(11vw,96px)" aria-label="${f.name}">
          ${UA.landmark(f.icon, '#FFD6E8', '#FFF9F5')}<span class="zone-label">${f.name}</span></button>`);
    b.addEventListener('pointerdown', (e) => f.open({ x: e.clientX, y: e.clientY }));
    (dock || stage).appendChild(b);
  });
  if (dock) stage.appendChild(dock);
  // quiet "for grown-ups" link: deliberately boring, never spoken or hinted
  const pa = el(`<button id="parents-link" aria-label="For grown-ups">For grown-ups</button>`);
  pa.addEventListener('pointerdown', () => UA.openParents());
  stage.appendChild(pa);

  drawGarden(stage);
  dailyGift(stage);
  sillyDay(stage);
  hideAndSeek(stage);
  surprise(stage);
  royaleBadge(stage);
};

/* ---------- garden: seeds visibly grow on the map by the next session ---------- */
const drawGarden = (stage) => {
  UA.S.garden.forEach((g) => {
    const grown = g.day !== UA.todayStr();
    const x = 34 + (g.slot % 8) * 7, y = 78 + (g.slot % 3) * 4;
    const svg = grown
      ? `<svg viewBox="0 0 60 80" style="width:100%">${UA.gen.flower(30, 46, 17 + (g.slot % 3) * 4)}</svg>`
      : `<svg viewBox="0 0 60 80" style="width:100%"><path d="M30 66 Q28 52 30 46 Q38 44 38 36 Q30 36 30 44 Q28 34 20 36 Q22 46 30 46" fill="none" stroke="#4CBB74" stroke-width="4" stroke-linecap="round"/><ellipse cx="30" cy="68" rx="14" ry="5" fill="#B98A5E"/></svg>`;
    stage.appendChild(el(`<div style="position:absolute;left:${x}%;top:${y}%;width:44px;pointer-events:none">${svg}</div>`));
  });
};

/* ---------- daily gift: first launch of the day, on the map ---------- */
const dailyGift = (stage) => {
  const S = UA.S;
  if (S.lastGiftDay === UA.todayStr()) return;
  const giftPos = innerWidth < 700 ? [26, 64] : [44, 60];
  const g = el(`<button class="zone-spot" style="left:${giftPos[0]}%;top:${giftPos[1]}%;width:clamp(72px,12vw,100px);height:clamp(72px,12vw,100px)" aria-label="Present">
    <svg class="zone-art" viewBox="0 0 48 48"><g class="zone-bounce">${UA.giftSVG().replace(/<\/?svg[^>]*>/g, '')}</g></svg></button>`);
  g.addEventListener('pointerdown', (e) => {
    if (S.lastGiftDay === UA.todayStr()) return;      // evaluate once per map load, single claim
    S.lastGiftDay = UA.todayStr();
    const gems = 3 + UA.rand(3);
    S.gems += gems;
    UA.save();
    UA.audio.sfx.fanfare();
    UA.fx.burst({ x: e.clientX, y: e.clientY }, 'confetti', 18);
    UA.ui.gemFly(gems, g);
    UA.audio.speak(`A present! Good morning, ${S.name}! ${gems} gems inside!`);
    g.remove();
  });
  stage.appendChild(g);
};

/* ---------- silly event days (rare, breakfast-table reportable) ---------- */
const sillyDay = (stage) => {
  const S = UA.S;
  const today = UA.todayStr();
  if (S.sillyDay.day !== today) {
    S.sillyDay = { day: today, kind: UA.rand(7) === 0 ? UA.pick(UA.SILLY_DAYS) : '' };
    UA.save();
  }
  const kind = S.sillyDay.kind;
  if (!kind) return;
  if (kind === 'sock-day') {
    const u = $('#map-uni .uni-rig');
    if (u) {
      const wrap = $('#map-uni');
      wrap.innerHTML = UA.unicornSVG({ body: UA.PALETTE.bodies[S.uni.body], mane: UA.PALETTE.manes[S.uni.mane],
        cosmetics: S.equipped.concat(['socks-spotty']) });
      UA.world.pendingSillyLine = 'It is SOCK DAY! Everyone wears socks today. It is the law!';
    }
  } else if (kind === 'upside-down-day') {
    stage.querySelectorAll('.amb-butterfly').forEach(b => b.setAttribute('transform',
      (b.getAttribute('transform') || '') + ' rotate(180)'));
    UA.world.pendingSillyLine = 'It is Upside-Down Day! The butterflies are flying on their heads!';
  } else if (kind === 'echo-day') {
    const n = S.name || 'Superstar';
    UA.world.pendingSillyLine = `It is Echo Day! ${n}! ${n.toLowerCase().split('').join(' ')}! ${n}iddly-${n.slice(0, 2).toLowerCase()}oo!`;
  }
};

/* ---------- hide-and-seek: a hatched baby hides on the map ---------- */
const hideAndSeek = (stage) => {
  const S = UA.S;
  if (!S.babies.length || UA.rand(5) >= 2) return;    // sometimes, not always
  const b = UA.pick(S.babies);
  const spots = [
    { x: 6, y: 51, peek: 'tail' },    // behind the left tree
    { x: 88, y: 46, peek: 'mane' },   // behind the right tree
    { x: 49, y: 20, peek: 'mane' },   // behind the castle
  ];
  const sp = UA.pick(spots);
  const hider = el(`<button class="map-uni" style="left:${sp.x}%;top:${sp.y}%;width:74px;opacity:.96" aria-label="Someone is hiding!">
    <div style="clip-path:inset(0 ${sp.peek === 'tail' ? '58% 0 0' : '0 0 58%'});transform:rotate(${sp.peek === 'tail' ? -18 : 12}deg)">
      ${UA.unicornSVG({ body: b.body, mane: b.mane, baby: 1 })}</div></button>`);
  hider.addEventListener('pointerdown', (e) => {
    hider.querySelector('div').style.clipPath = 'none';
    hider.style.width = '110px';
    UA.audio.sfx.giggle();
    UA.fx.burst({ x: e.clientX, y: e.clientY }, 'heart', 9);
    UA.audio.speak(`You found ${b.name}! ${b.name} was hiding! Hee hee hee!`);
    S.hideSeek = { day: UA.todayStr(), found: (S.hideSeek.found || 0) + 1 };
    UA.save();
    setTimeout(() => hider.remove(), 2400);
  }, { once: true });
  stage.appendChild(hider);
};

/* ---------- rare surprise events: single-use, hard cooldown, unfarmable ---------- */
const surprise = (stage) => {
  const S = UA.S;
  if (UA.rand(6) !== 0) return;                        // rare per map entry
  const today = UA.todayStr();
  const ready = UA.SURPRISES.filter(id => S.surprises[id] !== today);
  if (!ready.length) return;
  const kind = UA.pick(ready);
  const fire = () => { S.surprises[kind] = today; UA.save(); };
  if (kind === 'shooting-star') {
    const star = el(`<button class="map-uni" style="left:-6%;top:12%;width:74px" aria-label="Shooting star">
      <svg viewBox="0 0 100 60"><path d="M10 30 H62" stroke="#FFF3C4" stroke-width="6" stroke-linecap="round"/>
      <polygon points="78,10 84,24 99,25 87,35 91,50 78,41 65,50 69,35 57,25 72,24" fill="#FFD97A" stroke="#5C4A66" stroke-width="3"/></svg></button>`);
    stage.appendChild(star);
    star.animate([{ left: '-6%', top: '10%' }, { left: '86%', top: '30%' }], { duration: 9000, fill: 'forwards' });
    star.style.transition = 'none';
    const timer = setTimeout(() => star.remove(), 9500);
    star.addEventListener('pointerdown', (e) => {
      clearTimeout(timer); fire();
      UA.fx.firework({ x: e.clientX, y: e.clientY });
      UA.reward.gems(3, star);
      UA.audio.speak('A shooting star! Three wish-gems!');
      star.remove();
    }, { once: true });
  } else if (kind === 'glitter-sneeze') {
    setTimeout(() => {
      if (UA.currentScreen() !== 'map') return;
      fire();
      const u = $('#map-uni');
      if (!u) return;
      u.querySelector('.uni-rig').classList.add('shiver');
      UA.audio.speak('Aaah... aaah... AAAH-CHOO!');
      const r = u.getBoundingClientRect();
      UA.fx.burst({ x: r.left + r.width * .8, y: r.top + r.height * .4 }, 'spark', 18);
    }, 6000);
  } else if (kind === 'bunny-peek') {
    const bunny = el(`<button class="map-uni" style="left:83%;top:49%;width:64px" aria-label="A bunny!">
      <span style="display:block;clip-path:inset(0 0 46% 0)">${UA.sprite('rabbit')}</span></button>`);
    stage.appendChild(bunny);
    bunny.addEventListener('pointerdown', (e) => {
      fire();
      bunny.querySelector('span').style.clipPath = 'none';
      UA.audio.sfx.giggle();
      UA.fx.burst({ x: e.clientX, y: e.clientY }, 'heart', 6);
      UA.audio.speak('A little bunny came to visit! Boing boing!');
      setTimeout(() => bunny.remove(), 2200);
    }, { once: true });
    setTimeout(() => bunny.isConnected && bunny.remove(), 12000);
  } else if (kind === 'butterfly-horn') {
    setTimeout(() => {
      if (UA.currentScreen() !== 'map') return;
      fire();
      const u = $('#map-uni');
      if (!u) return;
      const r = u.getBoundingClientRect();
      const bf = el(`<div class="particle" style="width:44px;height:34px"><svg viewBox="0 0 40 30">${UA.gen.butterfly(20, 15, 1)}</svg></div>`);
      document.body.appendChild(bf);
      bf.animate([
        { transform: `translate(${r.left - 120}px,${r.top - 80}px)` },
        { transform: `translate(${r.left + r.width * .78}px,${r.top - 6}px)` },
      ], { duration: 2600, fill: 'forwards', easing: 'ease-in-out' });
      setTimeout(() => {
        UA.audio.speak('Shh... a butterfly landed on my horn! Do not sneeze... do not sneeze...');
        setTimeout(() => bf.remove(), 4200);
      }, 2700);
    }, 5000);
  } else if (kind === 'heart-cloud') {
    setTimeout(() => {
      if (UA.currentScreen() !== 'map') return;
      fire();
      const hc = el(`<div class="particle" style="width:120px;height:90px;opacity:0">
        <svg viewBox="0 0 100 80"><path d="M50 74 C14 50 10 24 28 16 C40 10 50 20 50 28 C50 20 60 10 72 16 C90 24 86 50 50 74Z" fill="#fff" opacity=".95"/></svg></div>`);
      document.body.appendChild(hc);
      hc.animate([
        { transform: 'translate(20vw,16vh)', opacity: 0 },
        { transform: 'translate(24vw,12vh)', opacity: 1, offset: .3 },
        { transform: 'translate(30vw,10vh)', opacity: 1, offset: .8 },
        { transform: 'translate(34vw,8vh)', opacity: 0 },
      ], { duration: 9000, fill: 'forwards' });
      UA.audio.speak('Look up! That cloud is a love heart! It must be for us!');
      setTimeout(() => hc.remove(), 9200);
    }, 4000);
  }
};

/* ---------- Crystal Castle coronation + Rainbow Royale ---------- */
const royaleBadge = (stage) => {
  const S = UA.S;
  if (!S.royale.crowned) return;
  const spot = stage.querySelector('[data-testid="zone-crystal-castle"]');
  if (!spot) return;
  spot.appendChild(el(`<span style="position:absolute;top:-14px;right:-8px;width:44px;height:44px;pointer-events:none">${UA.rainbowGemSVG()}</span>`));
};

UA.world.roundHook = (stageId) => {
  const S = UA.S;
  if (stageId !== 'CC') return;
  // coronation: five royal rounds completed
  if (!S.royale.crowned && (S.rounds.CC || 0) >= 5) {
    S.royale.crowned = true;
    UA.memory.keep('coronation', `${S.name} was crowned Champion of the Rainbow Kingdom!`);
    UA.save();
    UA.engine.stop();
    coronation();
    return true;
  }
  // Rainbow Royale: the daily royal set pays rainbow gems
  if (S.royale.crowned) {
    if (S.royale.day !== UA.todayStr()) { S.royale.day = UA.todayStr(); S.royale.done = 0; }
    S.royale.done++;
    if (S.royale.done === 1) {
      UA.reward.rainbowGems(3);
      UA.audio.speak(`Today's royal challenge is DONE, Champion ${S.name}! Three rainbow gems!`);
      UA.memory.keep('royale-' + UA.todayStr(), `Champion ${S.name} finished the royal challenge!`);
    }
    UA.save();
  }
  return false;
};

const coronation = () => {
  const S = UA.S;
  UA.audio.sfx.fanfare();
  const layer = el(`<div class="veil" style="display:flex;align-items:center;justify-content:center;z-index:51;background:rgba(60,40,90,.6)">
    <div class="ceremony-card">
      <div><svg viewBox="140 0 90 70" style="width:110px;height:80px"><g transform="translate(0,30)">${UA.COSMETICS['crown-gold']()}</g></svg></div>
      <div class="ceremony-title">Queen ${S.name}!</div>
      <div style="font-size:24px;font-weight:800;color:var(--plum);text-align:center;max-width:520px">
        The Rainbow Kingdom has ALL its colours back!</div>
      <div style="width:220px">${UA.unicornSVG({ body: UA.PALETTE.bodies[S.uni.body], mane: UA.PALETTE.manes[S.uni.mane],
        cosmetics: S.equipped.concat(S.owned.includes('crown-gold') ? [] : []), cls: 'celebrate' })}</div>
      <button class="big-btn" style="background:var(--mint)" id="coro-done">Hooray!</button>
    </div></div>`);
  document.body.appendChild(layer);
  for (let i = 0; i < 5; i++) setTimeout(() => UA.fx.firework({ x: 100 + UA.rand(innerWidth - 200), y: 80 + UA.rand(innerHeight / 2) }), i * 700);
  UA.audio.speak(`People of the Rainbow Kingdom! Bow for the hero who painted our world bright again... Queen ${S.name}! ` +
    `From today you are our CHAMPION — and champions get a special royal challenge every single day!`);
  $('#coro-done', layer).addEventListener('pointerdown', () => {
    layer.remove();
    UA.enterMap();
  });
};
})();

</script>
<script>
/* ================= Unicorn Academy — boot & resilience ================= */
'use strict';
(() => {
/* global error handler: never a white screen, never a frozen state */
let recovering = false;
const recover = (msg) => {
  UA.dev && UA.dev.log('ERROR ' + String(msg).slice(0, 120));
  if (recovering) return;
  recovering = true;
  try {
    UA.engine.stop();
    const cel = document.querySelector('#celebrate-layer');
    if (cel) { cel.classList.remove('show'); cel.innerHTML = ''; }
    document.querySelectorAll('.veil').forEach(v => v.parentElement === document.body && v.remove());
    UA.enterMap && UA.enterMap();
    UA.audio.speak('Oops! Let us fly home!');
  } catch (e) { /* last resort: leave whatever is on screen */ }
  setTimeout(() => { recovering = false; }, 1500);
};
window.addEventListener('error', (e) => recover(e.message));
window.addEventListener('unhandledrejection', (e) => recover(e.reason));

/* lock the page: no scroll, no rubber-band, no pinch */
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());

/* iOS: returning from lock/switch leaves speech stuck — resume + re-speak */
UA.audio.onReturn(() => {
  if (UA.engine.active && UA.engine.q) UA.engine.repeat();
});

/* The giant start button: audio unlock + entry.
   iOS grants audio/speech activation on touch RELEASE, never on pointerdown —
   so the unlock and the first utterance must run from `click` (which fires
   after touchend with real user activation). pointerdown gives instant visual
   feedback only. */
const startBtn = document.getElementById('start-btn');
let started = false;
startBtn.addEventListener('pointerdown', () => { startBtn.style.transform = 'scale(.95)'; });
startBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  UA.audio.init();
  UA.audio.setToggles(UA.S.settings);
  UA.beginSession();
  UA.audio.speak(UA.S.created ? `Welcome back!` : `Welcome to Unicorn Academy!`);
  UA.ui.begin();
});
/* safety net: if the context is still locked (or iOS re-suspends it), any
   touch release re-attempts the unlock until it sticks */
document.addEventListener('touchend', () => { if (started) UA.audio.init(); }, { passive: true });
document.addEventListener('click', () => { if (started) UA.audio.init(); });

UA.ui.updateHUD();
})();

</script>
