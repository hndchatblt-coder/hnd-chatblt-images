<style>
/* ============ critical CSS: the start screen is the first pixel painted ============ */
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#FFE9F4;
  position:fixed;inset:0;width:100%;overscroll-behavior:none;
  font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN",Quicksand,Comfortaa,"Comic Sans MS",system-ui,sans-serif;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
#screen-start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#FFE9F4 0%,#E9DDFF 55%,#D3ECFF 100%);z-index:60}
#start-btn{width:min(64vw,420px);height:min(64vw,420px);border:none;border-radius:50%;cursor:pointer;
  background:conic-gradient(#FF9EC7,#FFD97A,#9DE0B0,#8FD0FF,#B79CFF,#FF9EC7);
  box-shadow:0 18px 60px rgba(92,74,102,.35),inset 0 -10px 30px rgba(92,74,102,.15);
  display:flex;align-items:center;justify-content:center}
#start-btn>span{display:flex;align-items:center;justify-content:center;width:78%;height:78%;
  border-radius:50%;background:#FFF9F5;box-shadow:inset 0 4px 14px rgba(92,74,102,.18);
  animation:start-breathe 2.2s ease-in-out infinite}
#start-btn svg{width:62%;height:62%}
@keyframes start-breathe{50%{transform:scale(1.05)}}
</style>

<style>
/* ================= Unicorn Academy — full stylesheet ================= */
:root{
  --plum:#5C4A66; --ink:#4A3B52;
  --pink:#FFD6E8; --pink2:#FF9EC7; --rose:#FF7FB2;
  --lav:#E9DDFF; --purple:#B79CFF; --grape:#9A7BE8;
  --sky:#D3ECFF; --blue:#8FD0FF; --teal:#7FD8D0;
  --mint:#D2F5DC; --green:#9DE0B0; --leaf:#7ACC90;
  --butter:#FFF3C4; --yellow:#FFD97A; --gold:#F5B940;
  --peach:#FFE0CC; --orange:#FFB37A;
  --cream:#FFF9F5;
  --shadow:rgba(92,74,102,.28);
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box}
button{font-family:inherit;color:var(--plum);-webkit-user-select:none;user-select:none}
#app{position:fixed;inset:0;overflow:hidden}

/* ---------- screens & transition wipe ---------- */
.screen{position:fixed;inset:0;display:none;overflow:hidden}
.screen.show{display:block}
#wipe{position:fixed;inset:-20%;z-index:55;pointer-events:none;display:none;
  border-radius:50%;transform:scale(0);display:flex;align-items:center;justify-content:center;visibility:hidden}
#wipe.run{visibility:visible}
#wipe svg{width:120px;height:120px;opacity:0}
#wipe.run svg{opacity:1;transition:opacity .15s ease}

/* ---------- shared chrome ---------- */
.big-btn{border:none;border-radius:32px;padding:20px 34px;font-size:30px;font-weight:800;
  background:var(--cream);box-shadow:0 8px 0 var(--shadow),0 14px 30px var(--shadow);cursor:pointer;
  min-width:88px;min-height:88px;transition:transform .12s ease}
.big-btn:active{transform:translateY(4px) scale(.97)}
.round-btn{border:none;border-radius:50%;width:88px;height:88px;display:flex;align-items:center;
  justify-content:center;background:var(--cream);box-shadow:0 6px 0 var(--shadow),0 12px 26px var(--shadow);
  cursor:pointer;transition:transform .12s ease}
.round-btn:active{transform:translateY(3px) scale(.95)}
.round-btn svg{width:56%;height:56%}
#home-btn{position:fixed;left:calc(24px + var(--sal));top:calc(24px + var(--sat));z-index:40;display:none}
#home-btn.show{display:flex}
#hear-btn{position:fixed;right:calc(24px + var(--sar));top:calc(24px + var(--sat));z-index:40;display:none}
#hear-btn.show{display:flex}
.chrome-quiet{transform:scale(.82);opacity:.55;filter:saturate(.55)}
.chrome-quiet.round-btn:active{transform:scale(.78)}

#hud{position:fixed;top:calc(20px + var(--sat));left:50%;transform:translateX(-50%);z-index:38;
  display:none;align-items:center;gap:18px;pointer-events:none}
#hud.show{display:flex}
#gem-counter{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:999px;
  padding:8px 20px 8px 12px;font-size:26px;font-weight:800;color:var(--plum);
  box-shadow:0 5px 0 var(--shadow);transition:transform .15s ease,opacity .3s ease,filter .3s ease}
#gem-counter svg{width:34px;height:34px}
#gem-counter.pop{animation:gem-pop .4s ease}
@keyframes gem-pop{40%{transform:scale(1.25)}}
#rainbow-meter{width:190px;height:30px;background:var(--cream);border-radius:999px;
  box-shadow:0 5px 0 var(--shadow),inset 0 3px 8px rgba(92,74,102,.15);overflow:hidden;
  transition:transform .15s ease,opacity .3s ease,filter .3s ease}
#rainbow-meter>div{height:100%;width:0%;border-radius:999px;transition:width .5s cubic-bezier(.34,1.56,.64,1);
  background:linear-gradient(90deg,#FF9EC7,#FFD97A,#9DE0B0,#8FD0FF,#B79CFF)}

/* ---------- activity layout ---------- */
.activity-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  padding:calc(120px + var(--sat)) calc(28px + var(--sar)) calc(28px + var(--sab)) calc(28px + var(--sal))}
.prompt-area{display:flex;align-items:center;justify-content:center;gap:20px;min-height:150px;flex:0 0 auto}
.prompt-card{background:var(--cream);border-radius:36px;padding:16px 34px;box-shadow:0 8px 0 var(--shadow);
  display:flex;align-items:center;gap:16px;font-size:52px;font-weight:900;color:var(--plum)}
.prompt-card svg{width:110px;height:110px}
.options-grid{flex:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:min(4vw,34px);width:100%;max-width:1050px;align-content:center}
.option-card{border:none;background:var(--cream);border-radius:38px;cursor:pointer;
  box-shadow:0 9px 0 var(--shadow),0 16px 34px var(--shadow);
  width:var(--card-size,200px);height:var(--card-size,200px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-size:calc(var(--card-size,200px)*.44);font-weight:900;color:var(--plum);
  transition:transform .16s cubic-bezier(.34,1.56,.64,1),opacity .3s ease,box-shadow .16s ease;position:relative}
.option-card svg{width:72%;height:72%;pointer-events:none}
.option-card .cap{font-size:24px;font-weight:800;pointer-events:none}
.option-card:active{transform:scale(.94)}
.option-card.quiet{opacity:.45;transform:scale(.96)}
.option-card.live{animation:opt-pop .35s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes opt-pop{0%{transform:scale(.92)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
.option-card.faded{opacity:.18;pointer-events:none;transform:scale(.9)}
.option-card.wrong-wiggle{animation:wiggle .5s ease}
@keyframes wiggle{20%{transform:translateX(-12px) rotate(-4deg)}45%{transform:translateX(11px) rotate(4deg)}
  70%{transform:translateX(-7px) rotate(-2deg)}90%{transform:translateX(4px)}}
.option-card.correct-glow{animation:correct-bounce .7s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 0 8px var(--yellow),0 9px 0 var(--shadow),0 0 60px var(--yellow)}
@keyframes correct-bounce{30%{transform:scale(1.18)}60%{transform:scale(.96)}100%{transform:scale(1.05)}}
.option-card.reveal-glow{box-shadow:0 0 0 8px var(--blue),0 9px 0 var(--shadow),0 0 50px var(--blue);
  animation:opt-pop .5s ease}
.sparkle-badge{position:absolute;top:-14px;right:-14px;width:52px;height:52px;pointer-events:none;
  animation:spin-slow 3s linear infinite}
@keyframes spin-slow{to{transform:rotate(360deg)}}

/* drag & drop */
.drag-item{position:absolute;touch-action:none;cursor:grab;transition:none;z-index:20}
.drag-item.lifted{z-index:30;filter:drop-shadow(0 18px 16px rgba(92,74,102,.4))}
.drop-slot{position:absolute;border-radius:28px;border:5px dashed rgba(92,74,102,.3);
  background:rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;
  transition:box-shadow .15s ease,background .15s ease,border-color .15s ease}
.drop-slot.magnet{border-color:var(--gold);background:var(--butter);
  box-shadow:0 0 0 6px var(--yellow),0 0 44px var(--yellow)}
.drop-slot.filled{border-style:solid;border-color:var(--green);background:var(--mint)}

/* flip cards */
.flip-card{perspective:900px;border:none;background:none;cursor:pointer;padding:0;
  width:var(--card-size,170px);height:var(--card-size,170px)}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.34,1.3,.64,1)}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 7px 0 var(--shadow)}
.flip-face.front{background:linear-gradient(135deg,var(--purple),var(--pink2))}
.flip-face.front svg{width:52%;height:52%}
.flip-face.back{background:var(--cream);transform:rotateY(180deg)}
.flip-face.back svg{width:70%;height:70%}
.flip-card.matched{animation:matched-pop .6s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.flip-card.matched .flip-face.back{box-shadow:0 0 0 6px var(--green),0 7px 0 var(--shadow)}
@keyframes matched-pop{40%{transform:scale(1.14)}}

/* subitising flash: display-time limit, never answer-time */
.flash-card{transition:opacity .3s ease}
.flash-card.flash-hidden{opacity:0}
/* M8 bunnies hop away */
.hop-away-target{transition:transform .8s cubic-bezier(.34,1,.64,1),opacity .8s ease}
.hop-away{transform:translate(90px,-60px) rotate(20deg);opacity:0}
/* tap-sequence "next" glow (animate the inner art, keep the button box stable) */
.option-card.seq-next{box-shadow:0 0 0 7px var(--yellow),0 9px 0 var(--shadow),0 0 46px var(--yellow)}
.option-card.seq-next svg,.option-card.seq-next>div{animation:seq-pulse 1.2s ease-in-out infinite}
@keyframes seq-pulse{50%{transform:scale(1.12)}}
.count-obj[data-done]{pointer-events:none}

/* ---------- particles ---------- */
.particle{position:fixed;pointer-events:none;z-index:52;will-change:transform,opacity;left:0;top:0}

/* ---------- first-run ---------- */
.fr-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:26px;padding:calc(24px + var(--sat)) 24px calc(24px + var(--sab))}
.fr-title-art{width:min(30vh,240px);height:min(30vh,240px)}
.swatch-row{display:flex;flex-wrap:wrap;gap:26px;justify-content:center;max-width:800px}
.swatch{width:110px;height:110px;border-radius:50%;border:6px solid var(--cream);cursor:pointer;
  box-shadow:0 7px 0 var(--shadow),0 12px 26px var(--shadow);transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.swatch:active{transform:scale(.92)}
.swatch.picked{transform:scale(1.15);border-color:var(--gold);box-shadow:0 0 0 6px var(--yellow),0 7px 0 var(--shadow)}
.name-row{display:flex;flex-wrap:wrap;gap:22px;justify-content:center}
.kbd{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:940px}
.kbd button{width:84px;height:84px;border:none;border-radius:22px;background:var(--cream);
  font-size:42px;font-weight:900;color:var(--plum);box-shadow:0 6px 0 var(--shadow);cursor:pointer;
  transition:transform .1s ease}
.kbd button:active{transform:translateY(3px) scale(.94)}
.kbd button.wide{width:150px;background:var(--peach)}
.kbd button.go{background:var(--mint)}
.name-display{min-height:84px;background:var(--cream);border-radius:26px;padding:12px 34px;font-size:54px;
  font-weight:900;color:var(--plum);letter-spacing:6px;box-shadow:inset 0 4px 12px rgba(92,74,102,.18);
  min-width:320px;text-align:center}

/* ---------- story ---------- */
#screen-story .story-stage{position:absolute;inset:0}
#story-skip{position:fixed;right:calc(26px + var(--sar));bottom:calc(26px + var(--sab));z-index:41}

/* ---------- map ---------- */
#screen-map .map-stage{position:absolute;inset:0}
.zone-spot{position:absolute;border:none;background:none;cursor:pointer;padding:0;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);transform:translate(-50%,-50%)}
.zone-spot:active{transform:translate(-50%,-50%) scale(.93)}
.zone-spot .zone-art{width:100%;height:100%;pointer-events:none}
.zone-spot .zone-bounce{animation:zone-bob 2.6s ease-in-out infinite}
@keyframes zone-bob{50%{transform:translateY(-8px)}}
.zone-spot.locked .zone-bounce{animation:none}
.zone-mist{position:absolute;inset:-10%;pointer-events:none}
.zone-stars{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);display:flex;gap:3px;pointer-events:none}
.zone-stars svg{width:26px;height:26px}
.map-uni{position:absolute;z-index:12;pointer-events:auto;cursor:pointer;border:none;background:none;padding:0;
  transition:left 1.6s ease-in-out,top 1.6s ease-in-out}

/* ---------- dev panel ---------- */
#dev-panel{position:fixed;right:8px;bottom:8px;z-index:70;background:rgba(30,20,40,.92);color:#9DE0B0;
  font-family:ui-monospace,Menlo,monospace;font-size:12px;border-radius:10px;max-width:340px;max-height:70vh;
  display:none;flex-direction:column}
#dev-panel.show{display:flex}
#dev-panel header{padding:6px 10px;cursor:pointer;font-weight:700;color:#FFD97A}
#dev-panel .dev-body{padding:8px 10px;overflow:auto;display:flex;flex-direction:column;gap:6px}
#dev-panel.collapsed .dev-body{display:none}
#dev-panel button{background:#4A3B52;color:#FFF3C4;border:none;border-radius:6px;padding:5px 8px;
  font-size:12px;cursor:pointer;min-width:0;min-height:0}
#dev-panel .dev-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
#dev-panel select,#dev-panel input{font-size:12px;background:#2A2033;color:#D2F5DC;border:1px solid #5C4A66;border-radius:4px}
#dev-log{max-height:130px;overflow:auto;white-space:pre-wrap;word-break:break-all;color:#8FD0FF;font-size:10px}

/* ---------- rig animations ---------- */
.uni-rig .rig-blink{transform-origin:center;animation:blink 4.6s infinite}
@keyframes blink{0%,96.5%,100%{transform:scaleY(1)}97.5%,98.5%{transform:scaleY(.08)}}
.uni-rig .rig-body-group{transform-origin:center 70%;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{50%{transform:scaleY(1.025) scaleX(1.008)}}

<script>
/* ================= Unicorn Academy — art system =================
   Tier 1: bespoke rigged SVG (unicorn, landmarks, UI icons, cosmetics).
   Tier 3: procedural scenery generators.
   House style: flat sticker look, plum #5C4A66 outlines ~3px, rounded joins,
   dot eyes with white highlight, optional blush. No platform emoji, ever. */
'use strict';
(() => {
const P = () => UA.PALETTE;
const O = '#5C4A66'; // plum outline
const OW = 3;
const S = (s, a) => { let o = ''; for (const k in a) o += ` ${k}="${a[k]}"`; return `<${s}${o}/>`; };
const G = (attrs, inner) => { let o = ''; for (const k in attrs) o += ` ${k}="${attrs[k]}"`; return `<g${o}>${inner}</g>`; };
const OL = `stroke="${O}" stroke-width="${OW}" stroke-linejoin="round" stroke-linecap="round"`;

/* ---------- tiny helpers ---------- */
UA.sprite = (name, cls) => `<svg class="pk ${cls || ''}" viewBox="0 0 72 72" aria-hidden="true"><use href="#p-${name}"/></svg>`;
UA.shade = (hex, amt) => {
  const n = parseInt(hex.slice(1), 16);
  const f = (v) => Math.max(0, Math.min(255, Math.round(v + amt)));
  return '#' + ((f(n >> 16) << 16) | (f((n >> 8) & 255) << 8) | f(n & 255)).toString(16).padStart(6, '0');
};

/* ---------- small icons ---------- */
UA.gemSVG = (col = '#B79CFF') => `<svg viewBox="0 0 48 48" aria-hidden="true">

UA.sparkleSVG = (col = '#FFD97A') => `<svg viewBox="0 0 48 48" aria-hidden="true">

/* ---------- learning-content cards ---------- */

  }[kind];
  return `<svg viewBox="0 0 100 100" aria-hidden="true">${inner}<circle cx="38" cy="34" r="4" fill="#fff" opacity=".75"/></svg>`;
};
UA.tenFrame = (count, split) => {
  // 2x5 frame; split = [a,b] colours part-whole, else single colour fill
  let cells = '';
  for (let i = 0; i < 10; i++) {
    const x = 6 + (i % 5) * 30, y = 8 + Math.floor(i / 5) * 30;
    cells += `<rect x="${x}" y="${y}" width="26" height="26" rx="6" fill="#FFF9F5" ${OL} stroke-width="2"/>`;
    if (i < count) {
      const col = split ? (i < split[0] ? '#FF9EC7' : '#8FD0FF') : '#FF9EC7';
      cells += `<circle cx="${x + 13}" cy="${y + 13}" r="9" fill="${col}" ${OL} stroke-width="2"/>`;
    }
  }
  return `<svg viewBox="0 0 162 72" aria-hidden="true">${cells}</svg>`;
};
UA.diceFace = (n, col = '#FFF9F5') => {
  const pos = { 1: [[50, 50]], 2: [[28, 28], [72, 72]], 3: [[26, 26], [50, 50], [74, 74]],
    4: [[30, 30], [70, 30], [30, 70], [70, 70]], 5: [[28, 28], [72, 28], [50, 50], [28, 72], [72, 72]],
    6: [[30, 25], [70, 25], [30, 50], [70, 50], [30, 75], [70, 75]] }[n] || [];
  return `<svg viewBox="0 0 100 100" aria-hidden="true"><rect x="8" y="8" width="84" height="84" rx="18" fill="${col}" ${OL}/>
    ${pos.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="8.5" fill="${O}"/>`).join('')}</svg>`;
};
UA.dotCloud = (n) => {
  let dots = '';
  const placed = [];
  for (let i = 0; i < n; i++) {
    let x, y, ok = 0, tries = 0;
    while (!ok && tries++ < 60) {
      x = 16 + UA.rand(70); y = 16 + UA.rand(70);
      ok = placed.every(p => (p[0] - x) ** 2 + (p[1] - y) ** 2 > 400);
    }
    placed.push([x, y]);
    dots += `<circle cx="${x}" cy="${y}" r="9" fill="${UA.pick(P().rainbow)}" ${OL} stroke-width="2"/>`;
  }
  return `<svg viewBox="0 0 100 100" aria-hidden="true">${dots}</svg>`;
};

/* ---------- the unicorn rig ----------

  const headS = 1 + .3 * t, bodyS = 1 - .12 * t, legS = 1 - .3 * t;

    ${wear('back')} ${wear('feet')}

    ${G({ class: 'rig-mane-back' }, `<path d="M164 34 Q136 44 132 78 Q130 108 118 126 Q142 128 152 104 Q160 82 166 66 Q172 48 164 34Z" fill="${m3}" ${OL}/>`)}
    <circle cx="182" cy="84" r="35" fill="${body}" ${OL}/>
    <ellipse cx="207" cy="97" rx="17" ry="13" fill="${UA.shade(body, 14)}" ${OL}/>
    <circle cx="213" cy="95" r="2.4" fill="${O}"/>

    ${G({ class: 'rig-ear' }, `<path d="M160 52 L150 24 L177 38Z" fill="${body}" ${OL}/><path d="M161 46 L156 32 L169 39Z" fill="${mane}" stroke="none"/>`)}
    ${G({ class: 'rig-horn' }, `<path d="M174 50 L190 44 L194 4 Z" fill="#FFD97A" ${OL}/>
      <path d="M182 36 L190 30 M179 44 L191 38" stroke="#F5B940" stroke-width="2.5" fill="none"/>`)}
    ${G({ class: 'rig-mane-mid' }, `<path d="M170 38 Q146 48 146 78 Q146 100 136 114 Q158 112 160 88 Q162 64 176 52 Q180 44 170 38Z" fill="${mane}" ${OL}/>`)}
    ${G({ class: 'rig-mane-front' }, `<path d="M172 36 Q156 32 154 50 Q164 46 170 52 Q178 40 190 46 Q186 32 172 36Z" fill="${m2}" ${OL}/>`)}

    <ellipse cx="201" cy="86" rx="6.5" ry="4.2" fill="#FF9EC7" opacity="${.5 + .3 * t}"/>
    ${wear('neck')} ${wear('horn')} ${wear('head')}
  `))}
  ${opts.extra || ''}
</svg>`;
};

UA.COSMETICS = {

<script>
/* ================= Unicorn Academy — audio system =================
   Speech (Web Speech API) + procedural music/SFX (WebAudio). One mix bus:
   master -> destination; musicGain + sfxGain -> master. Narration ducks
   musicGain via setTargetAtTime. Everything is a safe no-op before init(). */
'use strict';
window.UA = window.UA || {};
UA.audio = UA.audio || {};

(() => {
/* ---------- state ---------- */
let ctx = null, master = null, musicGain = null, sfxGain = null;
let ducking = false;
const toggles = { voice: 1, sfx: 1, music: 1, vol: 1 };

let voice = null, hasVoices = false;
let voiceReadyResolve;
UA.audio.voiceReady = new Promise((res) => { voiceReadyResolve = res; });

let speakGen = 0;
let activeSession = null;   // current music session (see startMusic)
let currentMusicOffset = null;
let noiseBuf = null;
const returnCbs = [];

const rnd = (n) => (UA.rand ? UA.rand(n) : Math.floor(Math.random() * n));

/* ---------- voice selection ----------
   Poll getVoices() every 150ms up to 2s AND listen for voiceschanged;
   settle exactly once; console.info the result either way. */
function pickVoice(list) {
  const find = (pred) => list.find(pred);
  return find((v) => v.lang === 'en-AU') || find((v) => /^en-au$/i.test(v.lang || '')) ||
    find((v) => v.lang === 'en-GB') || find((v) => /^en-gb$/i.test(v.lang || '')) ||
    find((v) => v.lang === 'en-US') || find((v) => /^en-us$/i.test(v.lang || '')) ||
    find((v) => /^en/i.test(v.lang || '')) || null;
}
function initVoices() {
  const synth = window.speechSynthesis;
  if (!synth) { console.info('UA voice: no voices available'); voiceReadyResolve(); return; }
  let settled = false;
  const settle = (list) => {
    if (settled) return;
    settled = true;
    hasVoices = list.length > 0;
    voice = hasVoices ? pickVoice(list) : null;
    UA.audio.voice = voice;
    console.info('UA voice: ' + (voice ? voice.name + ' (' + voice.lang + ')' : 'no voices available'));
    try { synth.removeEventListener('voiceschanged', onChanged); } catch (e) {}
    clearInterval(poll);
    voiceReadyResolve();
  };
  const onChanged = () => { const l = synth.getVoices() || []; if (l.length) settle(l); };
  try { synth.addEventListener('voiceschanged', onChanged); } catch (e) {}
  let elapsed = 0;
  const poll = setInterval(() => {
    elapsed += 150;
    const l = synth.getVoices() || [];
    if (l.length) settle(l);
    else if (elapsed >= 2000) settle(l);
  }, 150);
  const first = synth.getVoices() || [];
  if (first.length) settle(first);
}
initVoices();

/* ---------- init (call once inside the first user gesture) ---------- */
UA.audio.init = function () {
  if (!ctx) {
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        ctx = new AC();
        master = ctx.createGain(); master.gain.value = toggles.vol; master.connect(ctx.destination);
        musicGain = ctx.createGain(); musicGain.gain.value = 1; musicGain.connect(master);
        sfxGain = ctx.createGain(); sfxGain.gain.value = 1; sfxGain.connect(master);
      }
    } catch (e) { ctx = null; }
  }
  if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
  try {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      window.speechSynthesis.speak(u); // fires inside this gesture to unlock TTS on iOS
    }
  } catch (e) {}
};

/* ---------- mix bus: ducking ---------- */
function applyMusicGain(immediate) {
  if (!musicGain || !ctx) return;
  const target = toggles.music ? (ducking ? 0.35 : 1) : 0;
  const now = ctx.currentTime;
  musicGain.gain.cancelScheduledValues(now);
  musicGain.gain.setValueAtTime(musicGain.gain.value, now);
  if (immediate) musicGain.gain.setValueAtTime(target, now);
  else musicGain.gain.setTargetAtTime(target, now, ducking ? 0.15 : 0.5);
}
UA.audio.duck = function (on) { ducking = !!on; applyMusicGain(false); };

/* ---------- speak: the one speak-helper ---------- */
function chunkText(text) {
  text = (text || '').toString().trim();

<script>
/* ================= Unicorn Academy — persistence =================
   localStorage in try/catch with in-memory fallback; autosave after every
   mutation; schema carries v; corrupt/old saves keep durable progress only. */
'use strict';
(() => {
const KEY = 'unicorn-academy';
let memoryFallback = null;

const fresh = () => ({
  v: 1,
  created: false,                 // first-run finished?
  name: '',                       // her name (uppercase letters)
  uni: { name: 'Sparkle', body: 0, mane: 0 },
  gems: 0,
  rainbowGems: 0,                 // Rainbow Royale currency
  stars: {},                      // stageId -> 0..3 (checkpoints passed)
  levels: {},                     // stageId -> current internal level (1-based)
  floors: {},                     // stageId -> placement floor (level-down never goes below)
  rounds: {},                     // stageId -> completed round count
  stickers: {},                   // zoneId -> [{stage, rare}]
  owned: [],                      // boutique item ids
  equipped: [],                   // subset of owned (one per anchor enforced at equip time)
  babies: [],                     // [{id, name, body, mane, quirk, starsAtHatch, treats, growth:0|1|2}]
  eggsAwarded: 0,                 // how many EGG_MILESTONES reached & eggs granted
  eggPending: false,              // an egg is waiting on the map to be tapped/hatched
  garden: [],                     // planted patches [{day, slot, kind}]
  meter: 0, meterFills: 0,
  sessions: 1,                    // bumped per real session (and by dev button)
  sessionStamp: 0,                // wall-clock of session start
  lastSeenDay: '', lastGiftDay: '',
  daysPlayed: 0,
  firsts: [],                     // ceremony ids already played
  memoryBook: [],                 // [{id, title, line, day}]
  zoneVisits: {},                 // zoneId -> count (favourite-zone memory)
  lastZone: '', lastStage: '',
  history: {},                    // stageId -> {answers:[0/1 recent 20], starSession: n}
  answered: 0, correct: 0,        // lifetime totals (dashboard)
  weekLog: {},                    // dayString -> minutes played (dashboard, pruned to 8 days)
  settings: { voice: 1, sfx: 1, music: 1, vol: 1 },
  sillyDay: { day: '', kind: '' },
  surprises: {},                  // eventId -> lastFiredDay (hard cooldown)
  royale: { day: '', done: 0, crowned: false },
  hideSeek: { day: '', found: 0 },
});

// shape check: durable fields we insist on; anything else falls back to defaults
const load = () => {
  let raw = null;
  try { raw = localStorage.getItem(KEY); } catch (e) { raw = memoryFallback; }
  if (!raw) return fresh();
  let d;
  try { d = JSON.parse(raw); } catch (e) { return fresh(); }
  if (!d || typeof d !== 'object' || typeof d.v !== 'number') return fresh();
  const base = fresh();
  if (d.v !== 1) {
    // unknown/older schema: keep durable progress, reset session position
    const keep = ['name', 'uni', 'gems', 'rainbowGems', 'stars', 'owned', 'equipped', 'babies',
      'eggsAwarded', 'created', 'firsts', 'memoryBook', 'daysPlayed', 'settings'];
    for (const k of keep) if (k in d) base[k] = d[k];
    return base;
  }
  // v1: merge over defaults so missing keys never crash
  for (const k in base) if (k in d) base[k] = d[k];
  // sanity: types of the fields the engine indexes into
  for (const k of ['stars', 'levels', 'floors', 'rounds', 'stickers', 'history', 'zoneVisits', 'weekLog', 'surprises'])
    if (!base[k] || typeof base[k] !== 'object' || Array.isArray(base[k])) base[k] = {};
  for (const k of ['owned', 'equipped', 'babies', 'garden', 'firsts', 'memoryBook'])
    if (!Array.isArray(base[k])) base[k] = [];
  return base;
};

UA.S = load();

UA.save = () => {
  try {
    const json = JSON.stringify(UA.S);
    try { localStorage.setItem(KEY, json); } catch (e) { memoryFallback = json; }
  } catch (e) { /* never let saving crash play */ }
  if (UA.dev) UA.dev.log('save');
};

UA.resetAll = () => {
  UA.S = fresh();
  try { localStorage.removeItem(KEY); } catch (e) { memoryFallback = null; }
  UA.save();
};

/* ---------- derived helpers used across the game ---------- */
UA.totalStars = (S = UA.S) => Object.values(S.stars).reduce((a, b) => a + b, 0);
UA.zoneStars = (S, zoneId) => { if (typeof S === 'string') { zoneId = S; S = UA.S; }
  const z = UA.zoneById(zoneId); if (!z) return 0;
  return z.stages.reduce((a, st) => a + (S.stars[st] || 0), 0); };
UA.zoneUnlocked = (zoneId) => { const z = UA.zoneById(zoneId); return !z.lock || z.lock(UA.S); };
UA.stageMastered = (stageId) => (UA.S.stars[stageId] || 0) >= 3;
UA.masteredStages = () => Object.keys(UA.S.stars).filter(id => UA.S.stars[id] >= 3);
UA.todayStr = () => { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); };

/* session bookkeeping: a new session = new page load OR >45 min gap re-check */
UA.beginSession = () => {
  const S = UA.S;
  S.sessions += 1;
  S.sessionStamp = Date.now();
  const today = UA.todayStr();
  if (S.lastSeenDay !== today) { S.daysPlayed += 1; S.lastSeenDay = today; }
  // prune weekLog to the last 8 entries
  const days = Object.keys(S.weekLog);
  if (days.length > 8) days.slice(0, days.length - 8).forEach(d => delete S.weekLog[d]);
  UA.save();
};
})();

</script>
<script>
/* ================= Unicorn Academy — generic activity engine =================
   One question loop (present -> answer -> feedback -> score/streak/gems -> next)
   drives every stage via a small set of widgets. Stage data lives in stages.js.

   Engine-wide robustness (SPEC <architecture>): answer lock until feedback
   resolves; home stays live and cancels cleanly; save before ceremony;
   level-down floored at placement; reveal pays nothing. */
'use strict';
(() => {
const E = UA.engine = {
  active: false,        // an activity is running
  zone: null, stage: null,
  q: null,              // current question object
  locked: false,        // answer lock during feedback
  roundQ: 0, roundFirstTry: 0, roundLen: 5,
  consecRounds: 0,      // consecutive rounds of the same stage (interleaving nudge)
  warmupLeft: 0,
  streak: 0, misses: 0,
  isReview: false,      // current question is a sparkle review
  reviewStage: null,
  timers: [],           // everything cleared on stop()
  qToken: 0,            // invalidates async continuations after stop()/next
};

const T = (fn, ms) => { const t = setTimeout(fn, ms); E.timers.push(t); return t; };
const clearTimers = () => { E.timers.forEach(clearTimeout); E.timers = []; };

/* ---------- stage state helpers ---------- */
const stageDef = (id) => UA.STAGES[id];
E.levelOf = (id) => UA.S.levels[id] || stageDef(id).start || 1;
const starPins = (def) => def.pins || [Math.ceil(def.levels / 3), Math.ceil(def.levels * 2 / 3), def.levels];
const historyOf = (id) => {
  if (!UA.S.history[id]) UA.S.history[id] = { answers: [], starSession: 0 };
  return UA.S.history[id];
};

/* which stage should this zone run? lowest not-yet-mastered, else rotate all */
E.pickStage = (zoneId) => {
  const z = UA.zoneById(zoneId);
  const open = z.stages.filter(s => UA.STAGES[s]);
  const un = open.filter(s => !UA.stageMastered(s) && UA.STAGES[s].stars !== false);
  return un[0] || UA.pick(open);
};

/* ---------- plateau: no star progress in a stage across 3 sessions ---------- */
const plateauSwap = (stageId) => {
  const h = historyOf(stageId);
  if (!h.starSession) { h.starSession = UA.S.sessions; return stageId; }
  if (UA.S.sessions - h.starSession < 3) return stageId;
  // change the presentation: sibling stage in the same zone (prev if exists, else next)
  const z = UA.zoneById(stageDef(stageId).zone);
  const i = z.stages.indexOf(stageId);
  const sib = z.stages[i - 1] || z.stages[i + 1];
  if (sib && UA.STAGES[sib]) {
    h.starSession = UA.S.sessions; // reset the clock so we alternate, not exile
    UA.dev && UA.dev.log('plateau: ' + stageId + ' -> ' + sib);
    return sib;
  }
  return stageId;
};

/* ---------- start / stop ---------- */
E.start = (zoneId, stageId, opts = {}) => {
  const S = UA.S;
  E.zone = UA.zoneById(zoneId);
  stageId = stageId || E.pickStage(zoneId);
  stageId = plateauSwap(stageId);
  E.stage = stageDef(stageId);
  E.active = true;
  E.roundQ = 0; E.roundFirstTry = 0; E.streak = 0; E.misses = 0;
  E.roundLen = E.stage.roundLen || 5;
  if (S.lastStage === stageId) E.consecRounds++; else E.consecRounds = 0;
  S.lastZone = zoneId; S.lastStage = stageId;
  // session warm-up: 2-3 easy questions from mastered content, once per session
  if (!E.warmedThisSession && UA.masteredStages().length) {
    E.warmupLeft = 2 + UA.rand(2);
    E.warmedThisSession = true;
  }
  UA.save();
  UA.ui.showActivity(E.zone, E.stage);
  E.introSay = opts.hello || '';
  E.next();
};

E.stop = () => {           // home tap mid-anything: cancel cleanly, count nothing
  E.active = false;
  E.qToken++;
  clearTimers();
  UA.audio.stopSpeech();
  E.q = null; E.locked = false;
};

/* worked example the first time a widget type ever appears */
E.demoIfNew = async () => {
  const w = E.stage.widget;
  const seen = UA.S.history['demo-' + w];
  if (seen) return;
  UA.S.history['demo-' + w] = { answers: [1] };
  UA.save();
  await UA.ui.workedExample(w, E.stage);
};

/* ---------- question construction (warm-up + sparkle review injection) ---------- */
const buildQuestion = () => {
  const mastered = UA.masteredStages().filter(id => id !== E.stage.id);
  E.isReview = false; E.reviewStage = null;
  let def = E.stage, level = E.levelOf(def.id);
  if (E.warmupLeft > 0 && mastered.length) {
    E.warmupLeft--;
    E.isReview = 'warmup';
    E.reviewStage = stageDef(UA.pick(mastered));
    def = E.reviewStage; level = Math.max(1, starPins(def)[0]);
  } else if (mastered.length && UA.rand(5) === 0) {
    E.isReview = 'sparkle';
    E.reviewStage = stageDef(UA.pick(mastered));
    def = E.reviewStage; level = E.levelOf(def.id);
  }
  const q = def.gen(level, UA.S);
  q.stage = def; q.level = level;
  q.say = UA.frameFor(def.id, def.zone).replace('%Q', q.core || q.say || '');
  return q;
};

E.next = () => {
  if (!E.active) return;
  clearTimers();
  if (E.roundQ >= E.roundLen) return roundEnd();
  const token = ++E.qToken;
  E.q = buildQuestion();
  E.misses = 0; E.locked = false;
  UA.ui.renderQuestion(E.q, E.isReview === 'sparkle');   // options exist immediately (quiet)
  // the worked-example overlay (first time a widget type appears) plays ABOVE
  // the rendered question, then narration begins
  E.demoIfNew().then(() => { if (token === E.qToken) { narrateQuestion(token); armIdleTimers(token); } });
};

const narrateQuestion = (token) => {
  const q = E.q;
  UA.ui.quietChrome(true);
  UA.ui.setOptionsQuiet(true);
  const prefix = E.introSay ? E.introSay + ' ' : '';
  E.introSay = '';
  UA.audio.speak(prefix + personalise(q.say)).then(() => {
    if (token !== E.qToken) return;
    UA.ui.setOptionsQuiet(false);            // the non-verbal "now" cue
    if (q.afterNarrate) q.afterNarrate();
  });
};
const personalise = (s) => (s || '').replaceAll('%NAME%', UA.S.name || 'superstar')
  .replaceAll('%UNI%', UA.S.uni.name);
E.personalise = personalise;

E.repeat = () => {          // the hear-again button
  if (!E.q) return;
  const token = E.qToken;
  if (E.q.reFlash) E.q.reFlash();
  UA.audio.speak(personalise(E.q.say));
  armIdleTimers(token);
};

/* idle: 10s -> pulse the options; 20s -> unicorn repeats the instruction */
const armIdleTimers = (token) => {
  T(() => { if (token === E.qToken && !E.locked) UA.ui.pulseOptions(); }, 10000);
  T(() => { if (token === E.qToken && !E.locked) E.repeat(); }, 20000);
};

/* ---------- answering ---------- */
E.answer = (id, el, pt) => {
  if (!E.active || E.locked || !E.q) return;
  const q = E.q;
  const correct = Array.isArray(q.correct) ? q.correct.includes(id) : id === q.correct;
  if (correct) return onCorrect(el, pt);
  return onWrong(id, el);
};

const record = (firstTry) => {
  const S = UA.S;
  S.answered++; if (firstTry) S.correct++;
  if (!E.isReview) {
    const h = historyOf(E.stage.id);
    h.answers.push(firstTry ? 1 : 0);
    if (h.answers.length > 20) h.answers.shift();
  }
  const day = UA.todayStr();
  S.weekLog[day] = (S.weekLog[day] || 0) + 0.2; // ~12s per answer, minutes
};

const onCorrect = (el, pt) => {
  E.locked = true;
  clearTimers();
  const firstTry = E.misses === 0;
  record(firstTry);
  E.roundQ++;
  if (firstTry) E.roundFirstTry++;
  UA.ui.feedbackCorrect(el, pt);
  UA.audio.sfx.chime();
  let praised = UA.pickFresh('praise', UA.PRAISE);
  if (E.isReview === 'sparkle') { UA.reward.gems(1, el); praised = 'Sparkle bonus! ' + praised; }
  UA.audio.speak(personalise(praised), { interrupt: true });
  const q = E.q;
  const done = () => { if (!E.active) return; postCorrect(firstTry); };
  T(done, q.slowNext ? 1900 : 1100);
};

const postCorrect = (firstTry) => {
  if (E.isReview) { UA.reward.meterTick(); E.next(); return; }
  const S = UA.S, id = E.stage.id;
  UA.reward.meterTick();
  if (firstTry) E.streak++; else E.streak = 0;
  if (E.streak >= 3) {
    E.streak = 0;
    return levelUp();
  }
  maybeLevelDown();
  E.next();
};

const onWrong = (id, el) => {
  E.misses++;
  E.streak = 0;
  UA.audio.sfx.boop();
  UA.ui.feedbackWrong(el);
  const token = E.qToken;
  if (E.misses === 1) {
    UA.audio.speak(personalise(UA.pickFresh('tryagain', UA.TRY_AGAIN)));
  } else if (E.misses === 2) {
    // gentle hint: fade some wrong options, unicorn re-explains
    UA.ui.hintFade(E.q);
    const hint = E.q.hint || E.q.say;
    UA.audio.speak(personalise(hint));
  } else {
    // warm reveal: no gems, no streak, no star credit; play moves on
    E.locked = true;
    clearTimers();
    record(false);
    E.roundQ++;
    UA.ui.revealCorrect(E.q);
    UA.audio.speak(personalise(UA.pick(UA.REVEAL_LINES)));
    T(() => { if (!E.active) return; maybeLevelDown(true); E.next(); }, 2100);
  }
  if (E.misses < 3) armIdleTimers(token);
};
E.forceReveal = () => { E.misses = 3; onWrong(null, null); }; // widgets with no discrete wrong tap

/* ---------- levels, stars, level-down ---------- */
const levelUp = () => {
  const S = UA.S, id = E.stage.id, def = E.stage;
  const cur = E.levelOf(id);
  const pins = starPins(def);
  const stars = S.stars[id] || 0;
  // crossing a checkpoint?
  let newStars = stars;
  for (let k = stars; k < 3; k++) if (cur >= pins[k]) newStars = k + 1;
  const gained = newStars - stars;
  if (gained > 0) {
    S.stars[id] = newStars;
    historyOf(id).starSession = S.sessions;
    UA.save();                                  // save BEFORE the ceremony
    UA.reward.starEarned(id, newStars, () => afterLevelUp(cur, def));
    return;
  }
  afterLevelUp(cur, def);
};
const afterLevelUp = (cur, def) => {
  if (!E.active) return;
  const S = UA.S;
  if (cur < def.levels) {
    S.levels[def.id] = cur + 1;
    UA.save();
    UA.audio.sfx.flourish();
    UA.audio.speak(personalise('Level up! You are getting stronger, %NAME%!'));
    T(() => E.active && E.next(), 1400);
  } else {
    E.next();
  }
};

const maybeLevelDown = (fromReveal) => {
  const id = E.stage.id;
  const h = historyOf(id).answers;
  const last6 = h.slice(-6);
  if (last6.length >= 6 && last6.reduce((a, b) => a + b, 0) <= 2) {
    const floor = UA.S.floors[id] || stageDef(id).start || 1;
    const cur = E.levelOf(id);
    if (cur > floor) {
      UA.S.levels[id] = cur - 1;               // quiet: never announced
      historyOf(id).answers = [];
      UA.save();
      UA.dev && UA.dev.log('level-down ' + id + ' -> ' + (cur - 1));
    }
  }
};

/* ---------- round end ---------- */
const roundEnd = () => {
  const S = UA.S, id = E.stage.id;
  S.rounds[id] = (S.rounds[id] || 0) + 1;
  const perfect = E.roundFirstTry >= E.roundLen;
  const gems = 2 + UA.rand(3) + (perfect ? 1 : 0);
  // sticker per completed round
  const zid = E.stage.zone;
  if (!S.stickers[zid]) S.stickers[zid] = [];
  const rare = UA.rand(8) === 0;
  S.stickers[zid].push({ stage: id, rare });
  UA.save();                                    // rewards hit storage before celebration
  E.roundQ = 0; E.roundFirstTry = 0;
  if (UA.world && UA.world.roundHook(id)) return;   // coronation takes over the flow
  UA.ui.roundCelebration({ gems, perfect, rare, onDone: () => {
    if (!E.active) return;
    UA.reward.gems(gems);
    UA.pacing.roundDone();
    // interleaving: after ~2 consecutive rounds of one activity, suggest another zone
    if (E.consecRounds >= 2 && UA.rand(2) === 0) {
      E.consecRounds = 0;
      UA.ui.suggestElsewhere();
    } else {
      E.next();
    }
  } });
};

/* ---------- rewards core (gems + meter + stars glue) ---------- */
UA.reward = {
  gems (n, fromEl) {
    UA.S.gems += n;
    UA.save();
    UA.ui.gemFly(n, fromEl);
  },
  rainbowGems (n) { UA.S.rainbowGems += n; UA.save(); UA.ui.updateHUD(); },
  meterTick () {
    UA.S.meter++;
    if (UA.S.meter >= 10) {
      UA.S.meter = 0; UA.S.meterFills++;
      UA.save();
      UA.ui.updateHUD();
      UA.ui.meterParty();                       // hand her the party
    } else { UA.save(); UA.ui.updateHUD(); }
  },
  starEarned (stageId, nth, then) {
    UA.ui.updateHUD();
    const total = UA.totalStars();
    UA.ui.starCeremony(stageId, nth, () => {
      // egg milestones ride on total stars; queue at most one at a time
      if (UA.S.eggsAwarded < UA.EGG_MILESTONES.length && total >= UA.EGG_MILESTONES[UA.S.eggsAwarded] && !UA.S.eggPending) {
        UA.S.eggPending = true;
        UA.save();
        UA.ui.eggArrives(then);
      } else then && then();
    });
  },
};

/* ---------- session pacing (screen time is screen time) ---------- */
UA.pacing = {
  fillsAtStart: 0,
  offered: false,
  roundDone () {
    const mins = (Date.now() - UA.S.sessionStamp) / 60000;
    const fills = UA.S.meterFills - this.fillsAtStart;
    if (!this.offered && (mins >= 20 || fills >= 2)) {
      this.offered = true;
      UA.ui.restOffer();
    }
  },
  reset () { this.fillsAtStart = UA.S.meterFills; this.offered = false; },
};
})();

</script>
<script>
/* ================= Unicorn Academy — interaction widgets =================
   Each widget renders a question into the activity areas and reports answers
   through UA.engine.answer(id, el, point). Non-discrete widgets install
   q.hintFn / q.revealFn so the engine's 2-miss hint and 3-miss reveal work
   everywhere. All touch targets >=80px; drags use pointer capture. */
'use strict';
(() => {
UA.widgets = {};
const $ = (sel, root) => (root || document).querySelector(sel);
const el = (html) => { const d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild; };
const optBtn = (o, size) => {
  const b = document.createElement('button');
  b.className = 'option-card answer';
  b.dataset.testid = 'answer-option';
  b.dataset.opt = o.id;
  if (size) b.style.setProperty('--card-size', size + 'px');
  b.innerHTML = o.html + (o.cap ? `<span class="cap">${o.cap}</span>` : '');
  return b;
};
const tapPoint = (ev) => ({ x: ev.clientX || 0, y: ev.clientY || 0 });
// first pointer wins: one live pointerId at a time per question
let livePointer = null;
document.addEventListener('pointerdown', (e) => { if (livePointer === null) livePointer = e.pointerId; }, true);
document.addEventListener('pointerup', (e) => { if (livePointer === e.pointerId) livePointer = null; }, true);
document.addEventListener('pointercancel', (e) => { if (livePointer === e.pointerId) livePointer = null; }, true);
const firstPointer = (e) => livePointer === null || e.pointerId === livePointer;

/* ---------- tap the right choice ---------- */
UA.widgets.tapChoice = {
  demo: 'tap',
  render (q, area) {
    const grid = el('<div class="options-grid"></div>');
    const size = q.cardSize || (q.options.length > 4 ? 170 : 210);
    q.options.forEach(o => {
      const b = optBtn(o, size);
      b.addEventListener('pointerdown', (e) => {
        if (!firstPointer(e)) return;
        if (o.saySelf && !UA.engine.locked) UA.audio.speak(o.saySelf, { interrupt: true });
        UA.engine.answer(o.id, b, tapPoint(e));
      });
      grid.appendChild(b);
    });
    area.appendChild(grid);
  },
};

/* ---------- tap each object once (one-to-one counting) ----------
   Phase 1: tap every object (no fail possible; each speaks its count).
   Phase 2: number options appear; misses only count there. */
UA.widgets.tapEach = {
  demo: 'tapeach',
  render (q, area) {
    const field = el('<div class="options-grid" style="gap:18px"></div>');
    let tapped = 0;
    const n = q.count;
    for (let i = 0; i < n; i++) {
      const b = optBtn({ id: 'obj' + i, html: UA.sprite(q.spriteName) }, 128);
      b.dataset.testid = 'answer-option';
      b.classList.add('count-obj');
      b.addEventListener('pointerdown', (e) => {
        if (b.dataset.done || UA.engine.locked || !firstPointer(e)) return;
        b.dataset.done = '1';
        tapped++;
        b.classList.add('correct-glow');
        UA.fx.burst(tapPoint(e), 'spark', 6);
        UA.audio.sfx.pop();
        UA.audio.speak(String(tapped), { interrupt: true });
        if (tapped === n) setTimeout(() => phase2(), 900);
      });
      field.appendChild(b);
    }
    area.appendChild(field);
    const phase2 = () => {
      if (!UA.engine.active || UA.engine.q !== q) return;
      UA.audio.speak(UA.engine.personalise(`${n}! How many ${q.plural}? Tap the number!`));
      const numbers = el('<div class="options-grid"></div>');
      q.options.forEach(o => {
        const b = optBtn(o, 150);
        b.addEventListener('pointerdown', (e) => firstPointer(e) && UA.engine.answer(o.id, b, tapPoint(e)));
        numbers.appendChild(b);
      });
      area.appendChild(numbers);
      numbers.querySelectorAll('.answer').forEach((b, i) => { b.classList.add('live'); b.style.animationDelay = (i * 70) + 'ms'; });
    };
  },
};

/* ---------- drag to slot (word building, shape holes, sorting) ---------- */
UA.widgets.dragToSlot = {
  demo: 'drag',
  render (q, area) {
    const field = el('<div class="drag-field" style="position:relative;width:100%;height:100%;min-height:380px"></div>');
    area.appendChild(field);
    const W = field.clientWidth || area.clientWidth || 800;
    const H = Math.max(field.clientHeight, 380);
    const slotW = q.slotSize || 120, gap = 18;
    const slots = [];
    const totalW = q.slots.length * (slotW + gap) - gap;
    q.slots.forEach((s, i) => {
      const d = el(`<div class="drop-slot" data-slot="${s.id}" style="width:${slotW}px;height:${slotW}px;
        left:${(W - totalW) / 2 + i * (slotW + gap)}px;top:${H * 0.12}px">${s.html || ''}</div>`);
      field.appendChild(d);
      slots.push({ def: s, el: d, count: 0, cap: s.cap || 1, get filled () { return this.count >= this.cap; } });
    });
    let remaining = q.pieces.filter(p => !!p.slot).length;
    const shuffled = UA.shuffle(q.pieces);
    const pw = q.pieceSize || 108;
    shuffled.forEach((p, i) => {
      const cols = Math.min(shuffled.length, Math.floor((W - 40) / (pw + 16)) || 1);
      const rowY = H * 0.55 + Math.floor(i / cols) * (pw + 18);
      const x0 = (W - Math.min(shuffled.length, cols) * (pw + 16)) / 2 + (i % cols) * (pw + 16);
      const d = el(`<div class="drag-item" data-piece="${p.id}" style="width:${pw}px;height:${pw}px;left:${x0}px;top:${rowY}px">${p.html}</div>`);
      field.appendChild(d);
      let sx, sy, ox, oy, dragging = false;
      d.addEventListener('pointerdown', (e) => {
        if (UA.engine.locked || d.dataset.placed || !firstPointer(e)) return;
        dragging = true;
        d.setPointerCapture(e.pointerId);
        d.classList.add('lifted');
        sx = e.clientX; sy = e.clientY;
        ox = parseFloat(d.style.left); oy = parseFloat(d.style.top);
        d.style.transform = 'scale(1.15) translateY(-46px)';   // above the fingertip
        if (p.saySelf) UA.audio.speak(p.saySelf, { interrupt: true });
      });
      d.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        d.style.left = (ox + e.clientX - sx) + 'px';
        d.style.top = (oy + e.clientY - sy) + 'px';
        const near = nearestSlot(d);
        slots.forEach(s => s.el.classList.toggle('magnet', s === near && !s.filled));
      });
      const drop = (e) => {
        if (!dragging) return;
        dragging = false;
        d.classList.remove('lifted');
        d.style.transform = '';
        slots.forEach(s => s.el.classList.remove('magnet'));
        const near = nearestSlot(d);
        if (near && !near.filled) {
          const ok = near.def.accept ? near.def.accept === p.id : p.slot === near.def.id;
          if (ok) {
            near.count++;
            d.dataset.placed = '1';
            const r = near.el.getBoundingClientRect(), fr = field.getBoundingClientRect();
            const jig = near.cap > 1 ? (near.count - 1) * 14 - (near.cap - 1) * 7 : 0;
            d.style.left = (r.left - fr.left + (r.width - pw) / 2 + jig) + 'px';
            d.style.top = (r.top - fr.top + (r.height - pw) / 2) + 'px';
            near.el.classList.add('filled');
            UA.audio.sfx.pop();
            if (p.onPlace) p.onPlace();
            remaining--;
            if (remaining === 0) {
              UA.engine.answer(q.correct, near.el, { x: r.left + r.width / 2, y: r.top });
            }
            return;
          }
          // wrong slot: count a miss, glide home
          UA.engine.answer('__wrong__' + p.id, d);
        }
        d.style.transition = 'left .3s ease, top .3s ease';
        d.style.left = ox + 'px'; d.style.top = oy + 'px';
        setTimeout(() => { d.style.transition = ''; }, 320);
      };
      d.addEventListener('pointerup', drop);
      d.addEventListener('pointercancel', drop);
    });
    const nearestSlot = (d) => {
      const r = d.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      let best = null, bd = 1e9;
      slots.forEach(s => {
        if (s.filled) return;
        const sr = s.el.getBoundingClientRect();
        const dx = cx - (sr.left + sr.width / 2), dy = cy - (sr.top + sr.height / 2);
        const dist = Math.hypot(dx, dy);
        if (dist < bd) { bd = dist; best = s; }
      });
      return bd < 95 ? best : null;   // magnetic pre-snap radius; snap ~60px feel
    };
    // hint: glow the next open correct slot & its piece; reveal: auto-place remaining
    q.hintFn = () => {
      const open = slots.find(s => !s.filled);
      if (!open) return;
      open.el.classList.add('magnet');
      setTimeout(() => open.el.classList.remove('magnet'), 2600);
    };
    q.revealFn = () => {
      // glide every unplaced piece home to its target slot
      field.querySelectorAll('.drag-item').forEach((dd) => {
        if (dd.dataset.placed) return;
        const p = q.pieces.find(pp => pp.id === dd.dataset.piece);
        const s = p && slots.find(ss => (ss.def.accept ? ss.def.accept === p.id : p.slot === ss.def.id));
        if (!s) { dd.style.opacity = '.25'; return; }   // distractor: fade out
        const r = s.el.getBoundingClientRect(), fr = field.getBoundingClientRect();
        dd.style.transition = 'left .6s ease, top .6s ease';
        dd.style.left = (r.left - fr.left + (r.width - pw) / 2) + 'px';
        dd.style.top = (r.top - fr.top + (r.height - pw) / 2) + 'px';
        dd.dataset.placed = '1';
        s.count++;
        s.el.classList.add('filled');
      });
    };
  },
};

/* ---------- tap sequence (rebus sentences, mazes, follow-the-order) ----------
   q.sequence: [{id, html, say, x?, y?}] in correct order. Free-position when
   x/y given (maze), otherwise a row. */
UA.widgets.tapSequence = {
  demo: 'tapseq',
  render (q, area) {
    const positioned = q.sequence.some(s => s.x != null);
    const field = el(positioned
      ? '<div style="position:relative;width:100%;height:100%;min-height:400px"></div>'
      : '<div class="options-grid"></div>');
    area.appendChild(field);
    let next = 0;
    q.sequence.forEach((s, i) => {
      const b = optBtn({ id: s.id, html: s.html }, q.cardSize || 140);
      if (positioned) {
        b.style.position = 'absolute';
        b.style.left = s.x + '%'; b.style.top = s.y + '%';
        b.style.transform = 'translate(-50%,-50%)';
      }
      b.addEventListener('pointerdown', (e) => {
        if (UA.engine.locked || b.dataset.done || !firstPointer(e)) return;
        if (i === next) {
          b.dataset.done = '1';
          next++;
          b.classList.add('correct-glow');
          UA.fx.burst(tapPoint(e), 'spark', 5);
          UA.audio.sfx.pop();
          if (s.say) UA.audio.speak(s.say, { interrupt: true });
          markNext();
          if (next === q.sequence.length) {
            setTimeout(() => UA.engine.answer(q.correct, b, tapPoint(e)), s.say ? 700 : 250);
          }
        } else {
          UA.engine.answer('__wrong__' + s.id, b);
        }
      });
      field.appendChild(b);
    });
    const markNext = () => {
      field.querySelectorAll('.seq-next').forEach(x => x.classList.remove('seq-next'));
      const nb = field.querySelectorAll('.answer')[next];
      if (nb && q.glowNext) nb.classList.add('seq-next');
    };
    if (q.glowNext) markNext();
    q.hintFn = () => {
      const nb = field.querySelectorAll('.answer')[next];
      if (nb) { nb.classList.add('seq-next'); setTimeout(() => !q.glowNext && nb.classList.remove('seq-next'), 2600); }
    };
    q.revealFn = () => {
      const rest = [...field.querySelectorAll('.answer')].slice(next);
      rest.forEach((b, j) => setTimeout(() => {
        b.classList.add('reveal-glow');
        const s = q.sequence.find(ss => ss.id === b.dataset.opt);
        if (s && s.say) UA.audio.speak(s.say, { interrupt: true });
      }, j * 650));
    };
  },
};

/* ---------- flip pairs (memory match) — one board per question ---------- */
UA.widgets.flipPairs = {
  demo: 'flip',
  render (q, area) {
    const grid = el('<div class="options-grid" style="max-width:900px"></div>');
    area.appendChild(grid);
    const size = q.pairs.length > 4 ? 150 : 176;
    const faces = UA.shuffle(q.pairs.flatMap(p => [p, p]).map((p, i) => ({ key: p.key, html: p.html, i })));
    let open = [], matched = 0, busy = false;
    faces.forEach(f => {
      const c = el(`<button class="flip-card answer" data-testid="answer-option" data-opt="${f.key}" style="--card-size:${size}px">
        <div class="flip-inner">
          <div class="flip-face front">${UA.sparkleSVG('#FFF9F5')}</div>
          <div class="flip-face back">${f.html}</div>
        </div></button>`);
      c.addEventListener('pointerdown', (e) => {
        if (busy || c.classList.contains('flipped') || UA.engine.locked || !firstPointer(e)) return;
        c.classList.add('flipped');
        UA.audio.sfx.pop();
        open.push({ c, f });
        if (open.length === 2) {
          busy = true;
          const [a, b] = open;
          if (a.f.key === b.f.key) {
            setTimeout(() => {
              a.c.classList.add('matched'); b.c.classList.add('matched');
              UA.audio.sfx.chime();
              UA.fx.burst(tapPoint(e), 'spark', 8);
              matched++;
              open = []; busy = false;
              if (matched === q.pairs.length) UA.engine.answer(q.correct, b.c, tapPoint(e));
            }, 450);
          } else {
            setTimeout(() => {
              a.c.classList.remove('flipped'); b.c.classList.remove('flipped');
              open = []; busy = false;
            }, 850);
          }
        }
      });
      grid.appendChild(c);
    });
    q.hintFn = () => { /* flash one unmatched pair briefly */
      const cards = [...grid.querySelectorAll('.flip-card')].filter(c => !c.classList.contains('matched'));
      const k = cards[0] && cards[0].dataset.opt;
      const pair = cards.filter(c => c.dataset.opt === k).slice(0, 2);
      pair.forEach(c => c.classList.add('flipped'));
      setTimeout(() => pair.forEach(c => !c.classList.contains('matched') && c.classList.remove('flipped')), 1400);
    };
    q.revealFn = () => {
      grid.querySelectorAll('.flip-card').forEach(c => c.classList.add('flipped', 'matched'));
    };
  },
};

/* ---------- jigsaw: tap a piece, then tap its slot ---------- */
UA.widgets.jigsaw = {
  demo: 'jigsaw',
  render (q, area) {
    // q.scene (svg string), q.cols, q.rows
    const wrap = el(`<div style="display:flex;gap:36px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%"></div>`);
    area.appendChild(wrap);
    const W = 360, H = 300;
    const cols = q.cols, rows = q.rows, n = cols * rows;
    const board = el(`<div style="position:relative;width:${W}px;height:${H}px;background:rgba(255,255,255,.5);
      border-radius:18px;box-shadow:inset 0 0 0 4px rgba(92,74,102,.25)"></div>`);
    const tray = el('<div style="display:flex;flex-wrap:wrap;gap:14px;max-width:420px;justify-content:center"></div>');
    wrap.appendChild(board); wrap.appendChild(tray);
    const tile = (i, forTray) => {
      const c = i % cols, r = Math.floor(i / cols);
      const tw = W / cols, th = H / rows;
      return `<svg viewBox="${c * 360 / cols} ${r * 300 / rows} ${360 / cols} ${300 / rows}"
        width="${forTray ? tw * .9 : tw}" height="${forTray ? th * .9 : th}" style="border-radius:10px;pointer-events:none">${q.scene}</svg>`;
    };
    let picked = null, placed = 0;
    for (let i = 0; i < n; i++) {
      const slot = el(`<div class="drop-slot" data-slot="${i}" style="position:absolute;left:${(i % cols) * (100 / cols)}%;
        top:${Math.floor(i / cols) * (100 / rows)}%;width:${100 / cols}%;height:${100 / rows}%;border-radius:10px"></div>`);
      slot.addEventListener('pointerdown', (e) => {
        if (!picked || UA.engine.locked || slot.dataset.done || !firstPointer(e)) return;
        if (+picked.dataset.idx === i) {
          slot.dataset.done = '1';
          slot.innerHTML = tile(i, false);
          slot.classList.add('filled');
          picked.remove(); picked = null;
          placed++;
          UA.audio.sfx.pop();
          UA.fx.burst(tapPoint(e), 'spark', 5);
          if (placed === n) UA.engine.answer(q.correct, slot, tapPoint(e));
        } else {
          UA.engine.answer('__wrong__' + i, slot);
        }
      });
      board.appendChild(slot);
    }
    UA.shuffle([...Array(n).keys()]).forEach(i => {
      const p = el(`<button class="answer" data-testid="answer-option" data-opt="piece${i}" data-idx="${i}"
        style="border:none;background:var(--cream);border-radius:12px;padding:6px;cursor:pointer;
        box-shadow:0 5px 0 var(--shadow)">${tile(i, true)}</button>`);
      p.addEventListener('pointerdown', (e) => {
        if (UA.engine.locked || !firstPointer(e)) return;
        tray.querySelectorAll('.answer').forEach(x => x.style.outline = '');
        picked = p;
        p.style.outline = '6px solid var(--gold)';
        UA.audio.sfx.pop();
      });
      tray.appendChild(p);
    });
    q.hintFn = () => {
      const empty = board.querySelector('.drop-slot:not(.filled)');
      if (empty) { empty.classList.add('magnet'); setTimeout(() => empty.classList.remove('magnet'), 2400); }
    };
    q.revealFn = () => {
      board.querySelectorAll('.drop-slot').forEach((s, i) => {
        if (!s.dataset.done) { s.dataset.done = '1'; s.innerHTML = tile(i, false); s.classList.add('filled'); }
      });
      tray.innerHTML = '';
    };
  },
};
})();

</script>
<script>
/* ================= Unicorn Academy — stage data tables =================
   Every stage picks a widget and supplies content. A stage is data, not code:
   { id, zone, name, widget, levels, start, pins?, roundLen?, stars?:false, gen(level) }
   gen returns { core, hint?, prompt?, options/correct | widget fields, ... }.
   PK (peek-a-boo) and CC (royal challenges) are delight stages: they play the
   same loop but award no stars — the 69-star total is exactly R1-R8 + M1-M9 +
   P1-P6 at 3 stars each (SPEC egg milestones). */
'use strict';
(() => {
const L = (id) => UA.letterCard(id);
const num = (n) => ({ id: 'n' + n, html: UA.numberCard(n), saySelf: String(n) });
const numOpts = (correct, lo, hi, n) => {
  const set = new Set([correct]);
  let guard = 0;
  while (set.size < n && guard++ < 90) {
    const v = lo + UA.rand(hi - lo + 1);
    if (Math.abs(v - correct) <= (hi - lo < 6 ? 9 : 5) || true) set.add(v);
  }
  return UA.shuffle([...set]).map(num);
};
const sndSay = (ch) => { const p = UA.soundOf(ch); return `${p.say}, like the start of ${p.anchor}`; };
const splitUnits = (w) => {
  const out = []; let i = 0;
  while (i < w.length) {
    const two = w.slice(i, i + 2);
    if (['sh', 'ch', 'th', 'ck'].includes(two)) { out.push(two); i += 2; }
    else if (w[i] === w[i + 1]) { out.push(w[i]); i += 2; }   // shell's ll
    else { out.push(w[i]); i += 1; }
  }
  return out;
};
const blendSay = (w) => splitUnits(w).map(u => UA.soundOf(u).stretch).join('... ') + `... ${w}!`;
const PLURALS = { apple: 'apples', strawberry: 'strawberries', star: 'stars', flower: 'flowers',
  balloon: 'balloons', butterfly: 'butterflies', cupcake: 'cupcakes', egg: 'eggs', gift: 'gifts', ball: 'balls' };
const spriteOpt = (w, cap) => ({ id: w, html: UA.sprite(w), saySelf: w, cap: cap ? w : undefined });
const wordOpt = (w) => ({ id: w, html: UA.wordCard(w), saySelf: w });

UA.STAGES = {};
const def = (o) => { UA.STAGES[o.id] = o; };

/* ================= READING LADDER ================= */

def({ id: 'R1', zone: 'letter-meadow', name: 'Find the letter', skill: 'Letter recognition',
  widget: 'tapChoice', levels: 8, start: 1,
  gen (l) {
    const pool = UA.SATPIN.slice(0, Math.min(26, 6 + (l - 1) * 3));
    const nOpts = l < 3 ? 3 : l < 6 ? 4 : 6;
    const lower = l >= 5 && l < 7;         // 1-4 uppercase, 5-6 lowercase, 7-8 both shown
    const both = l >= 7;
    const picks = UA.shuffle(pool).slice(0, nOpts);
    const target = picks[0];
    const options = UA.shuffle(picks.map(ch => ({
      id: ch, html: both ? UA.bigSmallCard(ch) : UA.letterCard(ch, undefined, lower),
    })));
    return { core: `Find the letter ${target.toUpperCase()}!`, options, correct: target,
      hint: `We are looking for ${target.toUpperCase()}!` };
  } });

def({ id: 'R2', zone: 'letter-meadow', name: 'Letter sounds', skill: 'Letter sounds',
  widget: 'tapChoice', levels: 8, start: 1,
  gen (l) {
    const pool = UA.SATPIN.slice(0, Math.min(26, 6 + (l - 1) * 3));
    const nOpts = l < 3 ? 3 : l < 6 ? 4 : 6;
    const picks = UA.shuffle(pool).slice(0, nOpts);
    const target = picks[0];
    return {
      core: `Which letter makes the sound ${sndSay(target)}?`,
      options: UA.shuffle(picks.map(ch => ({ id: ch, html: UA.letterCard(ch, undefined, l >= 5) }))),
      correct: target,
      hint: `Listen: ${UA.soundOf(target).stretch}. ${sndSay(target)}!`,
    };
  } });

def({ id: 'R3', zone: 'letter-meadow', name: 'Beginning sounds', skill: 'Beginning sounds',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const nOpts = l < 4 ? 3 : 4;
    const picks = [];
    const used = new Set();
    for (const w of UA.shuffle(UA.FIRST_SOUND_POOL)) {
      const s = splitUnits(w)[0];
      if (!used.has(s)) { used.add(s); picks.push(w); }
      if (picks.length === nOpts) break;
    }
    const target = picks[0];
    const s = splitUnits(target)[0];
    return {
      core: `Which one starts with ${UA.soundOf(s).stretch}?`,
      options: UA.shuffle(picks.map(w => spriteOpt(w))),
      correct: target,
      hint: `${UA.soundOf(s).stretch}... ${UA.soundOf(s).stretch}... ${target}!`,
    };
  } });

def({ id: 'R4', zone: 'word-garden', name: 'Sound it out', skill: 'CVC blending',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const bank = l < 3 ? UA.CVC.filter(c => c.cont) : UA.CVC;
    const nOpts = l < 5 ? 3 : 4;
    let picks = UA.shuffle(bank).slice(0, 1);
    const target = picks[0].w;
    // distractors: at high levels prefer same-vowel rhymes to make her listen closely
    const others = UA.shuffle(UA.CVC.filter(c => c.w !== target &&
      (l < 5 || c.w[1] === target[1] ? true : UA.rand(2) === 0))).slice(0, nOpts - 1);
    const options = UA.shuffle([spriteOpt(target), ...others.map(o => spriteOpt(o.w))]);
    return {
      core: `Listen! ${blendSay(target)} Tap the ${target}!`,
      options, correct: target,
      hint: blendSay(target),
      slowNext: true,
    };
  } });

def({ id: 'R5', zone: 'word-garden', name: 'Build the word', skill: 'CVC building',
  widget: 'dragToSlot', levels: 6, start: 1,
  gen (l) {
    const bank = l < 3 ? UA.CVC.filter(c => c.cont) : UA.CVC;
    const target = UA.pick(bank).w;
    const letters = target.split('');
    const nDistract = l < 3 ? 0 : l < 5 ? 1 : 2;
    const distract = UA.shuffle(UA.ALPHABET.filter(c => !letters.includes(c))).slice(0, nDistract);
    const pieces = letters.map((ch, i) => ({
      id: 'L' + i + ch, slot: 's' + i, html: UA.letterCard(ch, '#9DE0B0', true),
      saySelf: UA.soundOf(ch).say,
      onPlace: () => UA.audio.speakSound(ch),
    })).concat(distract.map((ch, i) => ({
      id: 'D' + i + ch, slot: null, html: UA.letterCard(ch, '#FFB37A', true), saySelf: UA.soundOf(ch).say,
    })));
    return {
      core: `Can you build the word ${target}? ${blendSay(target)}`,
      prompt: `<div class="prompt-card">${UA.sprite(target)}</div>`,
      slots: letters.map((ch, i) => ({ id: 's' + i })),
      pieces, correct: 'built',
      hint: `The word is ${target}. ${blendSay(target)}`,
      afterCorrect: () => UA.audio.speak(blendSay(target)),
      slowNext: true,
    };
  } });

def({ id: 'R6', zone: 'word-garden', name: 'Sh! Ch! Th!', skill: 'Digraphs',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const item = UA.pick(UA.DIGRAPH_WORDS);
    if (l % 2 === 1) {                        // odd levels: hear it, tap the picture
      const others = UA.shuffle(UA.DIGRAPH_WORDS.filter(d => d.w !== item.w)).slice(0, l < 4 ? 2 : 3);
      return {
        core: `Listen! ${blendSay(item.w)} Tap the ${item.w}!`,
        options: UA.shuffle([spriteOpt(item.w), ...others.map(o => spriteOpt(o.w))]),
        correct: item.w, hint: blendSay(item.w), slowNext: true,
      };
    }
    // even levels: build it — the digraph is ONE tile
    const units = splitUnits(item.w);
    const distract = l >= 4 ? [UA.pick(['sh', 'ch', 'th', 'ck'].filter(d => !units.includes(d)))] : [];
    return {
      widget: 'dragToSlot',
      core: `Build ${item.w}! ${blendSay(item.w)}`,
      prompt: `<div class="prompt-card">${UA.sprite(item.w)}</div>`,
      slots: units.map((u, i) => ({ id: 's' + i })),
      pieces: units.map((u, i) => ({
        id: 'U' + i + u, slot: 's' + i, html: UA.wordCard(u, u.length > 1 ? '#B79CFF' : '#9DE0B0'),
        saySelf: UA.soundOf(u).say, onPlace: () => UA.audio.speakSound(u),
      })).concat(distract.map((u, i) => ({
        id: 'X' + i + u, slot: null, html: UA.wordCard(u, '#FFB37A'), saySelf: UA.soundOf(u).say,
      }))),
      correct: 'built', hint: blendSay(item.w), slotSize: 130, pieceSize: 120, slowNext: true,
    };
  } });

def({ id: 'R7', zone: 'word-garden', name: 'Special words', skill: 'High-frequency words',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const tricky = UA.rand(2) === 0;
    const bank = tricky ? UA.HFW_TRICKY : UA.HFW_DECODE;
    const nOpts = l < 4 ? 3 : 4;
    const picks = UA.shuffle(bank).slice(0, nOpts);
    const target = picks[0];
    const core = tricky
      ? `This is a special word we just remember. It says "${target}". Find "${target}"!`
      : `Sound it out! ${blendSay(target)} Find "${target}"!`;
    return {
      core, options: UA.shuffle(picks.map(wordOpt)), correct: target,
      hint: tricky ? `The word says "${target}". Look for it!` : blendSay(target),
    };
  } });

def({ id: 'R8', zone: 'word-garden', name: 'First sentences', skill: 'Reading sentences',
  widget: 'tapSequence', levels: 4, start: 1, roundLen: 4,
  gen () {
    const s = UA.pickFresh('R8', UA.SENTENCES);
    const sequence = s.t.map((tok, i) => {
      if (Array.isArray(tok)) {
        const word = tok[tok.length - 1];
        const pre = tok.length > 1 ? tok[0] + ' ' : '';
        return { id: 'w' + i, say: pre + word,
          html: `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            ${pre ? `<span style="font-size:26px;font-weight:800">${pre}</span>` : ''}${UA.sprite(word)}</div>` };
      }
      return { id: 'w' + i, say: tok.replace('.', ''), html: UA.wordCard(tok.replace('.', '')) };
    });
    return {
      core: `Let us read together! Tap each word, left to right!`,
      sequence, correct: 'sent', glowNext: true, cardSize: 170,
      hint: 'Start at this side, and tap each one!',
      afterCorrect: () => UA.audio.speak(s.say + ' You read it!'),
      slowNext: true,
    };
  } });

/* ================= MATHS LADDER ================= */

def({ id: 'M1', zone: 'number-mountain', name: 'Quick peek numbers', skill: 'Subitising',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const max = l < 3 ? 3 : 5;
    const n = 1 + UA.rand(max);
    const kind = l < 2 ? 'dots' : l < 4 ? 'dice' : UA.pick(['dots', 'dice', 'frame']);
    const art = kind === 'dots' ? UA.dotCloud(n) : kind === 'dice' ? UA.diceFace(n) : UA.tenFrame(n);
    const q = {
      core: `Quick! Peek at the sparkles, then tap how many you saw!`,
      prompt: `<div class="prompt-card flash-card" style="min-width:220px;min-height:150px">${art}</div>`,
      options: numOpts(n, 1, max + 1, 3), correct: 'n' + n,
      hint: `Have another quick peek!`,
      flashy: true,
    };
    q.afterNarrate = () => {                   // display-time limit, never answer-time
      const c = document.querySelector('.flash-card');
      if (c) setTimeout(() => c.classList.add('flash-hidden'), 1500);
    };
    q.reFlash = () => {
      const c = document.querySelector('.flash-card');
      if (c) { c.classList.remove('flash-hidden'); setTimeout(() => c.classList.add('flash-hidden'), 1500); }
    };
    return q;
  } });

def({ id: 'M2', zone: 'number-mountain', name: 'Count them all', skill: 'Counting 1-10',
  widget: 'tapEach', levels: 6, start: 1, pins: [2, 4, 6],
  gen (l) {
    const count = [3, 5, 6, 8, 9, 10][l - 1];
    const s = UA.pick(UA.COUNT_SPRITES);
    return {
      core: `Tap every ${s} to count them, one at a time!`,
      count, spriteName: s, plural: PLURALS[s],
      options: numOpts(count, Math.max(1, count - 3), count + 3, 3),
      correct: 'n' + count,
      hint: `Tap each one just once, and count out loud with me!`,
    };
  } });

def({ id: 'M3', zone: 'number-mountain', name: 'Find the number', skill: 'Numbers 1-20',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const hi = l < 3 ? 10 : l < 5 ? 15 : 20;
    const n = 1 + UA.rand(hi);
    const nOpts = l < 5 ? 3 : 4;
    return {
      core: `Find the number ${n}!`,
      options: numOpts(n, Math.max(1, n - 5), Math.min(hi, n + 5), nOpts),
      correct: 'n' + n, hint: `We want ${n}!`,
    };
  } });

def({ id: 'M4', zone: 'number-mountain', name: 'More or fewer', skill: 'Comparing',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const kind = l < 3 ? 'more' : UA.pick(['more', 'fewer', 'big', 'long']);
    if (kind === 'big') {
      const s = UA.pick(UA.COUNT_SPRITES);
      const big = UA.rand(2) === 0;
      return {
        core: `Tap the ${big ? 'BIG' : 'little'} ${s}!`,
        options: UA.shuffle([
          { id: 'big', html: `<div style="transform:scale(1.25)">${UA.sprite(s)}</div>` },
          { id: 'small', html: `<div style="transform:scale(.55)">${UA.sprite(s)}</div>` },
        ]),
        correct: big ? 'big' : 'small', hint: big ? 'The really big one!' : 'The tiny little one!',
      };
    }
    if (kind === 'long') {
      const long = UA.rand(2) === 0;
      const ribbon = (w, col) => `<svg viewBox="0 0 160 60"><rect x="${(160 - w) / 2}" y="24" width="${w}" height="14" rx="7" fill="${col}" stroke="#5C4A66" stroke-width="3"/></svg>`;
      return {
        core: `Tap the ${long ? 'LONGER' : 'shorter'} ribbon!`,
        options: UA.shuffle([
          { id: 'long', html: ribbon(140, '#FF9EC7') },
          { id: 'short', html: ribbon(64, '#8FD0FF') },
        ]),
        correct: long ? 'long' : 'short', hint: long ? 'The one that stretches longest!' : 'The little short one!',
      };
    }
    const a = 2 + UA.rand(l < 3 ? 3 : 5), bDelta = 1 + UA.rand(2);
    const b = UA.rand(2) === 0 ? a + bDelta : Math.max(1, a - bDelta);
    const s1 = UA.pick(UA.COUNT_SPRITES), s2 = UA.pick(UA.COUNT_SPRITES.filter(x => x !== s1));
    const group = (n, s) => `<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:170px">
      ${Array(n).fill(0).map(() => `<span style="width:44px;height:44px;display:inline-block">${UA.sprite(s)}</span>`).join('')}</div>`;
    const wantMore = kind === 'more';
    return {
      core: `Which side has ${wantMore ? 'MORE' : 'FEWER'}? Count and tap!`,
      options: UA.shuffle([
        { id: 'a', html: group(a, s1) }, { id: 'b', html: group(b, s2) },
      ]),
      cardSize: 230,
      correct: (wantMore ? (a > b) : (a < b)) ? 'a' : 'b',
      hint: `Count each side with your finger, then tap the side with ${wantMore ? 'more' : 'fewer'}!`,
    };
  } });

def({ id: 'M5', zone: 'number-mountain', name: 'First, second, third', skill: 'Order & position',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    if (l % 2 === 1) {                        // race ordinals
      const animals = UA.shuffle(['rabbit', 'turtle', 'fox', 'mouse', 'frog']).slice(0, 3);
      const ord = UA.pick(l < 3 ? ['first', 'last'] : ['first', 'second', 'third', 'last']);
      const idx = { first: 0, second: 1, third: 2, last: 2 }[ord];
      return {
        core: `The ${animals.join(', the ')} are racing to the flag! Who came ${ord.toUpperCase()}?`,
        prompt: `<div class="prompt-card" style="gap:6px">
          ${animals.map((a, i) => `<span style="width:${86 - i * 10}px;height:${86 - i * 10}px;display:inline-block">${UA.sprite(a)}</span>`).join('')}
          <svg viewBox="0 0 40 80" width="44" height="88"><rect x="16" y="8" width="6" height="66" rx="3" fill="#C89A6B" stroke="#5C4A66" stroke-width="2"/><path d="M22 10 L38 18 L22 26Z" fill="#FF7FB2" stroke="#5C4A66" stroke-width="2.5"/></svg>
        </div>`,
        options: UA.shuffle(animals.map(a => spriteOpt(a))),
        correct: animals[idx],
        hint: `${ord} means ${ord === 'first' ? 'closest to the flag — the front of the line' : ord === 'last' ? 'the very end of the line' : 'count the places: first, second, third'}!`,
      };
    }
    // positions: in / on / under / next to
    const pos = UA.pick(l < 4 ? ['on', 'under'] : ['in', 'on', 'under', 'next to']);
    const animal = UA.pick(['bird', 'cat', 'mouse', 'frog']);
    const posCard = (p) => {
      const box = '<use href="#p-box" x="24" y="48" width="72" height="72"/>';
      const bird = (x, y, s) => `<use href="#p-${animal}" x="${x}" y="${y}" width="${s}" height="${s}"/>`;
      const layers = {
        in: bird(36, 30, 48) + box,
        on: box + bird(36, 6, 48),
        under: `<use href="#p-box" x="24" y="10" width="72" height="72"/>` + bird(36, 74, 44),
        'next to': box + bird(0, 66, 48),
      }[p];
      return `<svg viewBox="0 0 120 124" aria-hidden="true">${layers}</svg>`;
    };
    const opts = UA.shuffle(['in', 'on', 'under', 'next to']).slice(0, 3);
    if (!opts.includes(pos)) opts[0] = pos;
    return {
      core: `Where is the ${animal} ${pos.toUpperCase()} the box? Tap that picture!`,
      options: UA.shuffle(opts.map(p => ({ id: p, html: posCard(p) }))),
      correct: pos,
      hint: `${pos} the box. Look carefully at where the ${animal} is!`,
    };
  } });

def({ id: 'M6', zone: 'number-mountain', name: 'Number bonds', skill: 'Number bonds',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const whole = l < 4 ? 5 : 10;
    const part = 1 + UA.rand(whole - 1);
    const need = whole - part;
    return {
      core: `${whole} is ${part} and... how many more? Count the empty spots!`,
      prompt: `<div class="prompt-card" style="min-width:260px">${UA.tenFrame(part, [part, 0])}</div>`,
      options: numOpts(need, 0, whole, 3),
      correct: 'n' + need,
      hint: `Count the empty holes in the frame: it needs ${need} more to make ${whole}!`,
    };
  } });

def({ id: 'M7', zone: 'number-mountain', name: 'Adding up', skill: 'Addition',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    const max = l < 4 ? 5 : 10;
    const a = 1 + UA.rand(max - 2), b = 1 + UA.rand(Math.max(1, max - a - 1));
    const s = UA.pick(UA.COUNT_SPRITES);
    const group = (n) => Array(n).fill(0).map(() =>
      `<span style="width:46px;height:46px;display:inline-block">${UA.sprite(s)}</span>`).join('');
    return {
      core: `${a} and ${b} more came along! Count them ALL — how many altogether?`,
      prompt: `<div class="prompt-card" style="gap:14px;max-width:640px;flex-wrap:wrap">
        <span style="display:flex;flex-wrap:wrap;gap:3px;max-width:250px">${group(a)}</span>
        <span style="font-size:44px;font-weight:900">+</span>
        <span style="display:flex;flex-wrap:wrap;gap:3px;max-width:250px">${group(b)}</span></div>`,
      options: numOpts(a + b, Math.max(1, a + b - 3), a + b + 3, 3),
      correct: 'n' + (a + b),
      hint: `Count every single one on the screen, then tap that number!`,
    };
  } });

def({ id: 'M8', zone: 'number-mountain', name: 'Hop away', skill: 'Subtraction to 5',
  widget: 'tapChoice', levels: 4, start: 1,
  gen (l) {
    const start = 2 + UA.rand(l < 3 ? 2 : 3) + 1;   // 3..5
    const away = 1 + UA.rand(start - 1);
    const left = start - away;
    const q = {
      core: `${start} bunnies! But ${away} ${away === 1 ? 'hops' : 'hop'} away... how many are left?`,
      prompt: `<div class="prompt-card" style="gap:8px">${Array(start).fill(0).map((_, i) =>
        `<span class="${i < away ? 'hop-away-target' : ''}" style="width:72px;height:72px;display:inline-block">${UA.sprite('rabbit')}</span>`).join('')}</div>`,
      options: numOpts(left, 0, start, 3),
      correct: 'n' + left,
      hint: `Count only the bunnies still here!`,
    };
    q.afterNarrate = () => {                        // a real hop-away moment
      document.querySelectorAll('.hop-away-target').forEach((b, i) =>
        setTimeout(() => b.classList.add('hop-away'), i * 320));
    };
    return q;
  } });

def({ id: 'M9', zone: 'number-mountain', name: 'Patterns & jumps', skill: 'Patterns & skip counting',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    if (l % 2 === 1) {                        // continue the colour pattern
      const kinds = l < 3 ? ['AB'] : l < 5 ? ['AB', 'ABC'] : ['AB', 'ABC', 'AABB'];
      const pat = UA.pick(kinds);
      const cols = UA.shuffle(['#FF9EC7', '#8FD0FF', '#9DE0B0', '#FFD97A', '#B79CFF']).slice(0, 3);
      const seq = { AB: [0, 1, 0, 1, 0], ABC: [0, 1, 2, 0, 1], AABB: [0, 0, 1, 1, 0] }[pat];
      const nextI = { AB: 1, ABC: 2, AABB: 0 }[pat];
      const bead = (ci) => `<svg viewBox="0 0 60 60" width="52" height="52"><circle cx="30" cy="30" r="22" fill="${cols[ci]}" stroke="#5C4A66" stroke-width="3"/><circle cx="23" cy="22" r="5" fill="#fff" opacity=".7"/></svg>`;
      return {
        core: `Look at the bead pattern! Which bead comes NEXT?`,
        prompt: `<div class="prompt-card">${seq.map(bead).join('')}<span style="font-size:44px;font-weight:900">?</span></div>`,
        options: UA.shuffle([0, 1, 2].map(ci => ({ id: 'c' + ci, html: bead(ci) }))),
        correct: 'c' + nextI,
        hint: `Say the colours out loud — the pattern tells you what comes next!`,
      };
    }
    const start = UA.pick([2, 4, 6]);
    return {
      core: `The frog jumps by twos! ${start - 2 >= 0 ? '' : ''}${start}... then... which number comes next?`,
      prompt: `<div class="prompt-card">${UA.sprite('frog')}<span style="font-size:44px;font-weight:900">${start - 2 > 0 ? (start - 2) + ', ' : ''}${start}, ?</span></div>`,
      options: numOpts(start + 2, start, start + 5, 3),
      correct: 'n' + (start + 2),
      hint: `Jump two more: ${start}... ${start + 1} is one... ${start + 2} is two!`,
    };
  } });

/* ================= PUZZLE LADDER ================= */

def({ id: 'P1', zone: 'memory-clouds', name: 'Shape spotting', skill: 'Shapes',
  widget: 'tapChoice', levels: 6, start: 1,
  gen (l) {
    if (l % 2 === 0) {                        // drag-into-hole rounds
      const shapes = UA.shuffle(UA.SHAPES).slice(0, l < 4 ? 2 : 3);
      return {
        widget: 'dragToSlot',
        core: `Pop each shape into its matching hole!`,
        slots: shapes.map(s => ({ id: s, html: `<div style="opacity:.35;filter:grayscale(1)">${UA.shapeSVG(s)}</div>` })),
        pieces: UA.shuffle(shapes.map(s => ({ id: 'p' + s, slot: s, html: UA.shapeSVG(s), saySelf: s }))),
