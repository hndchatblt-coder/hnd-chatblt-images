<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SHADOW LOOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="app"></div>
<script>
// ==== src/rng.js ====
// src/rng.js
// PUBLIC API:
//   Game.createRng(seed: number) -> {
//     next(): float in [0,1),
//     int(min, max): inclusive integer,
//     pick(array): element,
//     seed: number  (the seed it was created with)
//   }
// Single source of randomness for the whole game. Same seed => identical
// sequence => reproducible tests and replays (seed + input log = identical run).
(function (Game) {
  function createRng(seed) {
    let s = seed >>> 0;
    function next() {
      // mulberry32
      s = (s + 0x6d2b79f5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function int(min, max) {
      return min + Math.floor(next() * (max - min + 1));
    }
    function pick(arr) {
      return arr[Math.floor(next() * arr.length)];
    }
    return { next: next, int: int, pick: pick, seed: seed };
  }
  Game.createRng = createRng;
  if (typeof module !== "undefined") module.exports = { createRng: createRng };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/tests.js ====
// src/tests.js
// PUBLIC API:
//   Game.selfTests: Array<{ name: string, fn: () => void }>
//     Shared assertion registry. node test.js runs these headless; boot.js runs
//     the SAME list in-browser before the title screen and blocks start on
//     failure. Register with Game.selfTests.push({name, fn}). fn throws on fail.
// Append-only in spirit: tests here are never weakened to pass (ratchet rule 2).
(function (Game) {
  Game.selfTests = Game.selfTests || [];

  function assert(cond, msg) {
    if (!cond) throw new Error(msg || "assertion failed");
  }

  Game.selfTests.push({
    name: "rng: same seed gives identical sequence",
    fn: function () {
      var a = Game.createRng(1234);
      var b = Game.createRng(1234);
      for (var i = 0; i < 100; i++) {
        assert(a.next() === b.next(), "diverged at draw " + i);
      }
    },
  });

  Game.selfTests.push({
    name: "rng: different seeds diverge",
    fn: function () {
      var a = Game.createRng(1);
      var b = Game.createRng(2);
      var same = true;
      for (var i = 0; i < 10; i++) if (a.next() !== b.next()) same = false;
      assert(!same, "seeds 1 and 2 produced identical first 10 draws");
    },
  });

  Game.selfTests.push({
    name: "rng: int(min,max) stays in inclusive bounds",
    fn: function () {
      var r = Game.createRng(42);
      var sawMin = false, sawMax = false;
      for (var i = 0; i < 1000; i++) {
        var v = r.int(3, 7);
        assert(v >= 3 && v <= 7, "out of bounds: " + v);
        if (v === 3) sawMin = true;
        if (v === 7) sawMax = true;
      }
      assert(sawMin && sawMax, "bounds never hit in 1000 draws");
    },
  });

  if (typeof module !== "undefined") module.exports = { selfTests: Game.selfTests };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/boot.js ====
// src/boot.js
// PUBLIC API:
//   Game.boot(rootEl)  — browser entry: runs the in-browser self-test suite,
//     renders a blocking overlay on failure, otherwise shows the title screen
//     and starts the loop. No-op headless (node never calls boot).
// Browser-only glue. All game truth lives in the logic modules; boot just wires
// the DOM, self-test gate, and the fixed-timestep loop shell.
(function (Game) {
  function runSelfTests() {
    // Game.selfTests is populated by src/tests.js (same assertions node runs).
    var results = [];
    var tests = Game.selfTests || [];
    for (var i = 0; i < tests.length; i++) {
      try {
        tests[i].fn();
        results.push({ name: tests[i].name, ok: true });
      } catch (e) {
        results.push({ name: tests[i].name, ok: false, error: String(e) });
      }
    }
    return results;
  }

  function boot(rootEl) {
    var results = runSelfTests();
    var failures = results.filter(function (r) { return !r.ok; });
    if (failures.length) {
      var pre = document.createElement("pre");
      pre.style.cssText =
        "color:#f33;background:#000;padding:24px;font:14px monospace;" +
        "position:fixed;inset:0;z-index:9999;overflow:auto;margin:0";
      pre.textContent =
        "BOOT SELF-TEST FAILED — start blocked\n\n" +
        failures.map(function (f) { return "FAIL " + f.name + "\n  " + f.error; }).join("\n");
      rootEl.appendChild(pre);
      return;
    }
    // Title screen placeholder — replaced when render module lands (cycle 1+).
    var title = document.createElement("div");
    title.style.cssText =
      "color:#9fb;background:#000;position:fixed;inset:0;display:flex;" +
      "align-items:center;justify-content:center;flex-direction:column;" +
      "font:16px monospace;letter-spacing:0.3em";
    title.innerHTML =
      "<div style='font-size:42px;margin-bottom:16px'>SHADOW LOOP</div>" +
      "<div>self-test: " + results.length + "/" + results.length + " passed</div>" +
      "<div style='margin-top:24px;color:#575'>v0.0 — nothing to play yet</div>";
    rootEl.appendChild(title);
  }

  Game.boot = boot;
  if (typeof module !== "undefined") module.exports = { boot: boot };

  if (typeof window !== "undefined") {
    window.addEventListener("DOMContentLoaded", function () {
      boot(document.getElementById("app"));
    });
  }
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

</script>
</body>
</html>
