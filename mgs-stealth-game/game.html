// ==== src/rng.js ====
// src/rng.js
// PUBLIC API:
//   Game.createRng(seed: number) -> {
//     next(): float in [0,1),
//     int(min, max): inclusive integer,
//     pick(array): element,
//     seed: number  (the seed it was created with)
//   }
// Single source of randomness for the whole game. Same seed => identical
// sequence => reproducible tests and replays (seed + input log = identical run).
(function (Game) {
  function createRng(seed) {
    let s = seed >>> 0;
    function next() {
      // mulberry32
      s = (s + 0x6d2b79f5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function int(min, max) {
      return min + Math.floor(next() * (max - min + 1));
    }
    function pick(arr) {
      return arr[Math.floor(next() * arr.length)];
    }
    return { next: next, int: int, pick: pick, seed: seed };
  }
  Game.createRng = createRng;
  if (typeof module !== "undefined") module.exports = { createRng: createRng };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// src/world.js
// PUBLIC API:
//   Game.ZONES.loadingDock / Game.ZONES.warehouse — facility zones, plain-object
//   level data (SCHEMA — both zones conform to this shape; fields added this
//   cycle are marked NEW):
//     {
//       id, name,
//       bounds: { w, h },                 // meters, origin top-left, +x right, +y down
//       walls: [ { x, y, w, h }, ... ],    // AABBs: perimeter + interior obstacles
//       playerSpawn: { x, y },             // default spawn if this zone is booted directly
//       exit: { x, y, w, h },              // BACK-COMPAT ALIAS: always === exits[0].
//                                          // hud/radar/render/existing scenarios read
//                                          // zone.exit directly — kept working verbatim.
//       exits: [ { x, y, w, h, to, entranceKey }, ... ], // NEW — replaces the old
//                                          // single `exit` prop as the source of truth.
//                                          // `to` is a Game.ZONES key (or a not-yet-built
//                                          // zone id, e.g. "laboratory" — a deliberate stub;
//                                          // engine.js handles an unresolvable `to` by
//                                          // staying put + emitting `zoneBlocked`, never by
//                                          // throwing). `entranceKey` indexes the TARGET
//                                          // zone's `entrances` map (below) to find where the
//                                          // player appears after crossing.
//       entrances: { [fromZoneId]: { x, y }, ... }, // NEW — spawn points keyed by the
//                                          // zone the player is arriving FROM, e.g.
//                                          // warehouse.entrances.fromLoadingDock. Looked up

//                                          // literal source zone id, so a zone can expose

//       waypoints: [ { x, y }, ... ],       // patrol loop #1, open floor
//       waypoints2: [ { x, y }, ... ],       // NEW — patrol loop #2 (a second guard's
//                                          // route, e.g. a cross-aisle sweep); OPTIONAL —
//                                          // only zones with a second patrolling guard

//                                          // rules as `waypoints`: closed loop, every leg
//                                          // must be walkable at r=0.6 (see world.test.js).

//       lockers: [ { x, y, facing }, ... ], // NEW — data only this cycle (no collision/
//                                          // interaction yet; the future items cycle makes
//                                          // these functional hiding spots). `facing`
//                                          // radians, same atan2 convention as
//                                          // player.facing/guard.facing (0 = +x).
//     }
//   Game.createWorld(zoneData) -> {
//     isBlocked(x, y): boolean,
//       // true iff (x,y) lies inside (or exactly on the edge of) any wall AABB.
//       // Containment is CLOSED on all four sides: wx <= x <= wx+w && wy <= y <= wy+h.
//     isBlockedCircle(x, y, r): boolean,
//       // true iff a circle of radius r centered at (x,y) overlaps (or exactly
//       // touches) any wall AABB (closed containment, same convention as above).

//       // sliding along a wall still makes progress on its free axis and a
//       // circle driven into a corner stops cleanly on both. Never returns a

    return (

  function circleOverlapsRect(cx, cy, r, rect) {

    var nearestY = clamp(cy, rect.y, rect.y + rect.h);
    var dx = cx - nearestX;
    var dy = cy - nearestY;

  // Exact segment-vs-AABB intersection via the slab method. Returns the
  // smallest t in [0,1] at which the segment (x1,y1)->(x2,y2) enters `rect`,
  // or null if it never does. t is clamped to 0 if the segment starts inside
  // the box (so "first hit" degenerates to the start point rather than a
  // negative t).
  function segmentVsRect(x1, y1, x2, y2, rect) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var tmin = 0;
    var tmax = 1;

    if (dx === 0) {
      if (x1 < rect.x || x1 > rect.x + rect.w) return null;
    } else {
      var tx1 = (rect.x - x1) / dx;
      var tx2 = (rect.x + rect.w - x1) / dx;
      if (tx1 > tx2) {
        var tmp = tx1;
        tx1 = tx2;
        tx2 = tmp;
      }
      if (tx1 > tmin) tmin = tx1;
      if (tx2 < tmax) tmax = tx2;
      if (tmin > tmax) return null;
    }

    if (dy === 0) {
      if (y1 < rect.y || y1 > rect.y + rect.h) return null;
    } else {
      var ty1 = (rect.y - y1) / dy;
      var ty2 = (rect.y + rect.h - y1) / dy;
      if (ty1 > ty2) {
        var tmp2 = ty1;
        ty1 = ty2;
        ty2 = tmp2;
      }
      if (ty1 > tmin) tmin = ty1;
      if (ty2 < tmax) tmax = ty2;
      if (tmin > tmax) return null;
    }

    if (tmax < 0 || tmin > 1) return null;
    return Math.max(tmin, 0);
  }

  // ---- world factory --------------------------------------------------------

  function createWorld(zoneData) {
    var walls = zoneData.walls;

    function isBlocked(x, y) {
      for (var i = 0; i < walls.length; i++) {
        if (rectContainsPoint(walls[i], x, y)) return true;
      }
      return false;
    }

    function isBlockedCircle(x, y, r) {
      for (var i = 0; i < walls.length; i++) {
        if (circleOverlapsRect(x, y, r, walls[i])) return true;
      }
      return false;
    }

    function raycast(x1, y1, x2, y2) {
      var bestT = null;
      for (var i = 0; i < walls.length; i++) {
        var t = segmentVsRect(x1, y1, x2, y2, walls[i]);
        if (t !== null && (bestT === null || t < bestT)) bestT = t;
      }
      if (bestT === null) return null;
      var hx = x1 + (x2 - x1) * bestT;
      var hy = y1 + (y2 - y1) * bestT;
      var fullDx = x2 - x1;
      var fullDy = y2 - y1;
      var fullLen = Math.sqrt(fullDx * fullDx + fullDy * fullDy);
      return { x: hx, y: hy, dist: bestT * fullLen };
    }

    function moveCircle(x, y, dx, dy, r) {
      var nx = x + dx;
      if (!isBlockedCircle(nx, y, r)) x = nx;
      var ny = y + dy;
      if (!isBlockedCircle(x, ny, r)) y = ny;
      return { x: x, y: y };
    }

    function inRegion(x, y, region) {
      return rectContainsPoint(region, x, y);
    }

    return {
      isBlocked: isBlocked,
      isBlockedCircle: isBlockedCircle,
      raycast: raycast,
      moveCircle: moveCircle,
      inRegion: inRegion,
      zone: zoneData,
    };
  }

  // ---- zone data: LOADING DOCK ----------------------------------------------
  // 40x30m. Perimeter is 4 conceptual walls (top/bottom/left/right, thickness 1);

  // so the straight shot north is blocked and the player must route around it.

  // outer walls (left flank / right flank) plus 4m gaps on either side of the

  // the NW gives a patrolling guard somewhere to be; small crate clusters in the
  // south give the player near-spawn cover.

    id: "loadingDock",
    name: "LOADING DOCK",
    bounds: { w: 40, h: 30 },
    walls: [
      // perimeter (5 segments: top split around the exit gap, bottom, left, right)

      { x: 22, y: 0, w: 18, h: 1 }, // top-right (gap: x 18-22)
      { x: 0, y: 29, w: 40, h: 1 }, // bottom
      { x: 0, y: 0, w: 1, h: 30 }, // left
      { x: 39, y: 0, w: 1, h: 30 }, // right
      // interior obstacles (8)
      { x: 8, y: 9, w: 6, h: 11 }, // shipping container, west
      { x: 26, y: 9, w: 6, h: 11 }, // shipping container, east
      { x: 17, y: 13, w: 6, h: 5 }, // center crate stack (blocks the direct line)
      { x: 9, y: 3, w: 6, h: 5 }, // guard hut, NW
      { x: 4, y: 21, w: 3, h: 3 }, // small crates, SW
      { x: 33, y: 21, w: 3, h: 3 }, // small crates, SE
      { x: 12, y: 23, w: 3, h: 3 }, // small crates, S center-left
      { x: 25, y: 23, w: 3, h: 3 }, // small crates, S center-right
    ],
    playerSpawn: { x: 20, y: 27 },
    // exits/entrances: the only path out of the Loading Dock is north into the

      { x: 37, y: 27 }, // SE corner (south of crate clusters, north of perimeter)
      { x: 3, y: 27 }, // SW corner

  // targets inside the aisles; two dark zones sit at aisle ends (unlit
  // shelving corners), well clear of every wall.
  var warehouse = {
    id: "warehouse",
    name: "WAREHOUSE",
    bounds: { w: 40, h: 30 },
    walls: [
      // perimeter (6 segments: top split around the north stub, bottom split
      // around the south exit, left, right)
      { x: 0, y: 0, w: 18, h: 1 }, // top-left
      { x: 22, y: 0, w: 18, h: 1 }, // top-right (gap: x 18-22, stub to laboratory)
      { x: 0, y: 29, w: 18, h: 1 }, // bottom-left
      { x: 22, y: 29, w: 18, h: 1 }, // bottom-right (gap: x 18-22, exit to loadingDock)
      { x: 0, y: 0, w: 1, h: 30 }, // left
      { x: 39, y: 0, w: 1, h: 30 }, // right
      // shelving row 1 (x 8-9.5), split around the y:14-16 cross-aisle gap
      { x: 8, y: 4, w: 1.5, h: 10 },
      { x: 8, y: 16, w: 1.5, h: 10 },
      // shelving row 2 (x 14-15.5), same gap
      { x: 14, y: 4, w: 1.5, h: 10 },
      { x: 14, y: 16, w: 1.5, h: 10 },
      // shelving row 3 (x 28-29.5), same gap
      { x: 28, y: 4, w: 1.5, h: 10 },
      { x: 28, y: 16, w: 1.5, h: 10 },
      // crate clusters, one per aisle

      { x: 11, y: 20, w: 2, h: 2 }, // row1/row2 aisle, south
      { x: 24, y: 9, w: 2, h: 2 }, // center aisle, north (east side, clear of the spine)

      { x: 22, y: 5 },

      { x: 11, y: 6, facing: Math.PI },

// ==== src/player.js ====
// src/player.js
// PUBLIC API:
//   Game.createPlayer({ world }) -> player, where `world` is a Game.createWorld(...)
//   instance (see src/world.js). Spawns at world.zone.playerSpawn, radius 0.4.
//
//   Player state — plain readable properties, updated in place by update():
//     player.x, player.y     — position (meters, world space)
//     player.facing          — radians; atan2(dy, dx) of the last nonzero
//                               movement input (0 = +x, PI/2 = +y since +y is
//                               down). Retained (unchanged) while idle.
//     player.stance          — "stand" | "crouch" | "crawl"
//     player.running         — boolean; true only on ticks where the player is
//                               actually moving at the "stand" run speed (i.e.
//                               stance === "stand" && input.run && moving).
//     player.moving          — boolean; true iff this tick's input had nonzero
//                               displacement (before the moveCircle collision
//                               resolve — it reflects INTENT to move, not
//                               whether a wall fully absorbed it).
//     player.radius           — 0.4 (constant)
//     player.hp               — 0..1, starts at 1 (full health). Damage
//                               reduces it (see player.damage below); nothing
//                               in this module restores it (a future
//                               items/ration cycle would call damage() with a
//                               negative amount, or add its own setter — hp is
//                               a plain mutable property, not read-only).
//     player.alive            — boolean, player.hp > 0. Kept as a separate
//                               flat prop (rather than making callers compare
//                               hp themselves) so "is the player still in the
//                               fight" is a single obvious read. Recomputed
//                               every time hp changes (i.e. inside damage());
//                               never touched by update().
//
//   player.update(input, dt):
//     input: { moveX: -1..1, moveY: -1..1, run: boolean,
//              stance: "stand" | "crouch" | "crawl" }

//     - DEAD PLAYER: if !player.alive, update() ignores input entirely — no
//       movement, no facing/stance change. player.moving and player.running
//       are forced to false (so noiseRadius()/vision profile callers reading
//       a dead player don't see a stale "was moving" flag) and the function
//       returns immediately. Position, facing, and stance are left exactly as
//       they were at the moment of death (a frozen pose), consistent with
//       engine.js's gameOver freeze (see src/engine.js contract).
//     - The (moveX, moveY) vector is clamped to magnitude 1 (diagonal input is
//       not faster than axis-aligned input).
//     - input.stance sets player.stance for this tick (and is retained if the
//       caller omits it on a later tick).
//     - Speed (m/s) by stance: stand+run 6.0, stand (walk) 3.0, crouch 1.6,
//       crawl 0.8. run only takes effect in "stand"; crouch/crawl ignore
//       input.run and use their own fixed speed.
//     - facing updates only on nonzero input; otherwise unchanged.
//     - Movement is resolved through world.moveCircle — the player can never
//       end up overlapping a wall.
//
//   player.damage(amount) — reduces player.hp by `amount` (same 0..1 unit as
//   hp itself), clamped so hp never goes below 0 (over-damage is silently
//   silently absorbed, not tracked as "overkill"). Recomputes player.alive
//   (hp > 0) immediately after. Amount is expected non-negative (a future
//   ration/heal hook would be its own method, not a negative-amount call to
//   this one — see the hp note above); this function itself does not clamp
//   the upper bound past 1 because it only ever subtracts, never adds. Pure
//   state mutation — no events, no side effects beyond hp/alive; callers
//   (engine.js) are responsible for turning a damage() call into any
//   observable event (e.g. {type:"playerHit"}) and for checking
//   player.alive afterward to drive game-over.
//
//   player.visionProfile() -> number
//     Perception multiplier for the vision module: stand 1.0, crouch 0.6
//     (-40%), crawl 0.3 (-70%). Depends only on current stance.
//
//   player.noiseRadius() -> number
//     Meters of noise radius generated THIS tick, for the soundEvents module:
//     stationary (not moving) 0; else run 8, walk (stand, not running) 3,
//     crouch 1, crawl 0.
//
// Pure logic module: no THREE, no DOM, no browser APIs — runs headless in
// node. No dependency on other modules for math (own local helpers below).
(function (Game) {
  // ---- local math helpers (no dependency on other modules) -----------------

  // Clamps a 2D vector to magnitude <= 1, preserving direction. Vectors
  // already within the unit disc are returned unchanged.
  function clampToUnit(x, y) {
    var mag = Math.sqrt(x * x + y * y);
    if (mag > 1) {
      return { x: x / mag, y: y / mag, mag: 1 };
    }
    return { x: x, y: y, mag: mag };
  }

  var RADIUS = 0.4;

  var SPEED_RUN = 6.0;
  var SPEED_WALK = 3.0;
  var SPEED_CROUCH = 1.6;
  var SPEED_CRAWL = 0.8;

  var VISION_STAND = 1.0;
  var VISION_CROUCH = 0.6;
  var VISION_CRAWL = 0.3;

  var NOISE_RUN = 8;
  var NOISE_WALK = 3;
  var NOISE_CROUCH = 1;
  var NOISE_CRAWL = 0;

  // ---- player factory --------------------------------------------------------

  function createPlayer(deps) {
    var world = deps.world;
    var spawn = world.zone.playerSpawn;

    var player = {
      x: spawn.x,
      y: spawn.y,
      facing: 0,
      stance: "stand",
      running: false,
      moving: false,
      radius: RADIUS,
      hp: 1,
      alive: true,
    };

    function speedFor(stance, run) {

//         alertCount++ only when the prior phase was INFILTRATION or CAUTION

//       updateSighting(x, y) — refresh lastKnown while any guard has live
//         LOS, without touching phase/phaseTime/alertCount. Called by a guard
//         in ALERT that currently sees the player.
//       loseContact() — guard-side signal, callable any time a guard
//         personally loses LOS. Intentionally a NO-OP on squad state: the
//         actual ALERT -> EVASION transition is the job of tick() below,
//         which runs once per tick after ALL guards on the squad have
//         updated and therefore is the only thing that can safely know
//         whether ANY guard still has LOS this tick. A single guard's own
//         loseContact() call cannot decide that (a squadmate may still see
//         the player this very tick) — it exists as an honest, named place
//         for guard code (and future callers, e.g. per-guard combat/chatter
//         hooks) to report "I personally lost them," without racing
//         squad-wide state.
//       tick(dt, anyGuardHasLOS) — THE ENGINE (or, meanwhile, whatever test/
//         sim harness drives the guard loop) calls this ONCE PER TICK, AFTER
//         every guard on the squad has had update() called for that tick,
//         passing whether ANY of those guards currently has confirmed LOS on
//         the player (see guard.hasLOS below — anyGuardHasLOS is typically
//         `guards.some(g => g.hasLOS)`). Handles the timer-driven half of the
//         ladder:
//           ALERT, no LOS this tick     -> EVASION (phaseTime reset to 0)
//           EVASION, phaseTime >= 30s   -> CAUTION (phaseTime reset to 0)
//           CAUTION, phaseTime >= 45s   -> INFILTRATION (phaseTime reset to 0,
//                                          lastKnown cleared to null)
//         A fresh sighting during EVASION/CAUTION does NOT go through tick()
//         at all — a guard calls broadcastAlert() directly the instant its
//         own meter re-confirms the player (see guard behavior below), which
//         jumps straight back to ALERT regardless of what tick() would have
//         done that same tick.
//     For a guard created WITHOUT an explicit `squad` dep (see createGuard
//     below), the guard owns a private, internal squad-of-one and calls
//     tick() on it itself, once, at the end of its own update() — safe
//     specifically BECAUSE with exactly one guard on the squad, that guard's
//     own hasLOS for the tick IS the full anyGuardHasLOS aggregate. Multi-
//     guard squads must never let a guard call tick() itself (double-ticks
//     phaseTime and races on partial information) — the external driver loop
//     owns that call, per the contract above. This is exactly the wiring the
//     future engine module will do; see sim.js's "full alert ladder" scenario
//     for the reference loop.
//
//   Game.createGuard({ world, vision, rng, spawn, waypoints, id, squad }) -> guard
//     world, vision, rng, spawn, waypoints, id — unchanged from part A (see
//       below).
//     squad: optional Game.createSquad() instance shared across every guard
//       in the same zone/encounter. Omit it and the guard creates and owns a
//       private squad-of-one internally (see squad contract above) — this is
//       what keeps every part-A test (none of which pass `squad`) passing
//       unchanged: a lone guard's ALERT/EVASION/CAUTION ladder still runs,
//       it's just invisible to anything that doesn't ask for guard.squad.
//     Exposes guard.squad (the squad instance in use, own or shared) so
//     callers that only hold a guard reference can still inspect/pass around
//     the shared phase state.
//
//   world:     a Game.createWorld(...) instance (src/world.js) — consumed via
//              moveCircle/raycast(indirectly through vision)/inRegion/zone.
//   vision:    a Game.createVision({world}) instance (src/vision.js) —
//              consumed via computeSight/tickMeter.
//   rng:       a Game.createRng(seed) instance (src/rng.js). All FSM
//              timing/sweeps remain deterministic functions of stateTime, not
//              dice rolls — the one consumer of rng.next() in this module is
//              ALERT's fire-accuracy roll (see the ALERT/COMBAT section
//              below). engine.js hands every guard on a squad the SAME rng
//              instance (rng.js's own "single source of randomness for the
//              whole game" rule) — multiple guards' fire rolls draw from one
//              shared sequence, consumed in whatever order their update()
//              calls happen to fire a shot that tick (array order), which is
//              still fully deterministic given a fixed seed and input log.
//   spawn:     { x, y } initial position. Defaults to waypoints[0], or
//              world.zone.playerSpawn if no waypoints are given.
//   waypoints: [{x,y}, ...] patrol loop, walked in array order then wrapped
//              (index 0 follows the last). Defaults to world.zone.waypoints.
//              Consecutive waypoints are assumed to have a clear line (no
//              pathfinding this version — see src/world.js zone layout notes).
//   id:        opaque identifier, stored as guard.id (any value, default
//              null). Also hashed (see EVASION below) to derive this guard's
//              deterministic sweep offset — two guards with distinct ids
//              sweep out of phase with each other without any rng or
//              squad-index bookkeeping.
//
//   guard — flat, readable state (mutated in place by update()/hearNoise()):
//     id, x, y                — position (meters, world space)
//     facing                  — radians, 0 = +x, +y down (atan2 convention,
//                                same as player.facing / vision viewer.facing)
//     radius                  — GUARD.RADIUS (constant)
//     state                   — "PATROL" | "SUSPICIOUS" | "INVESTIGATE" |
//                                "ALERT" | "EVASION" | "CAUTION" | "SLEEPING"
//     meter                   — 0..1 detection meter (vision.tickMeter
//                                output); pinned at 1 while state is ALERT
//                                (perception's fill/drain math is skipped
//                                entirely in ALERT — the detection question
//                                is already settled, see ALERT below).
//     stateTime               — seconds spent in the CURRENT state; reset to
//                                0 whenever the state changes
//     stimulus                — {x,y} | null — the point of interest driving
//                                SUSPICIOUS/INVESTIGATE (last sighting or
//                                noise origin); untouched (and irrelevant) in
//                                PATROL/ALERT/EVASION/CAUTION
//     waypointIndex           — index into `waypoints` of the patrol target
//                                (shared between PATROL and CAUTION — see
//                                CAUTION below — so returning to either from
//                                the other resumes the SAME loop position)
//     hasLOS                  — boolean, NEW in part B: true iff THIS guard,
//                                this tick, has the player both in-cone and
//                                unobstructed (vision.computeSight's inCone
//                                && hasLOS). Computed every tick regardless
//                                of state. This is what an external multi-
//                                guard driver reduces over every guard on a
//                                squad (`guards.some(g => g.hasLOS)`) to get
//                                the anyGuardHasLOS argument squad.tick()
//                                needs — see squad.tick() above.
//     squad                   — the Game.createSquad() instance this guard
//                                reports into (own private one, or the shared
//                                one passed to createGuard()). See squad
//                                contract above.
//     hidden                  — boolean, NEW (CQC/locker cycle): true only
//                                while this guard's body has been STUFFED
//                                INTO A LOCKER by the player (see
//                                guard.stuffInLocker below) — false at every
//                                other time, including while merely
//                                SLEEPING-but-not-stuffed or being DRAGGED
//                                (dragging is an ENGINE-side position
//                                override, see src/engine.js's DRAG VERB —
//                                it never touches this flag). A hidden body
//                                is EXEMPT from COLLEAGUE DISCOVERY (see
//                                below) — tucked out of sight, not just
//                                lying in the open. Defaults false.
//
//   STATE <-> SQUAD.PHASE MAPPING (the invariant referenced throughout): the
//   relationship is guard.state => squad.phase, NOT the reverse.
//     guard.state === "ALERT"   implies squad.phase === "ALERT"   (always).
//     guard.state === "EVASION" implies squad.phase === "EVASION" (always).
//     guard.state === "CAUTION" implies squad.phase === "CAUTION" (always).
//   The reverse does not hold for CAUTION: squad.phase === "CAUTION" allows
//   guard.state to be "CAUTION" (the default: widened-cone patrol) OR
//   "INVESTIGATE" (a guard mid-response to a strong noise heard while on
//   CAUTION patrol — see hearNoise below — is not yanked back into CAUTION
//   early; it finishes its investigation, then reads squad.phase LIVE at
//   that moment to decide whether to resume CAUTION patrol or, if the
//   squad's CAUTION timer has since expired, ordinary PATROL). squad.phase
//   ALERT/EVASION have no such carve-out: every guard on the squad is forced
//   into the matching state the very next tick regardless of what it was
//   doing (that forcing IS the "radio call" — see ALERT below).
//
//   guard.update(dt, ctx) — ctx = { player, onGuardFire?, sleepingGuards? },
//   player satisfying the target/player contract ({x, y, visionProfile(),
//   moving, stance} — the last two are read only by ALERT's fire-accuracy
//   roll, see below).
//   onGuardFire(guard, hit) is an OPTIONAL callback: this module calls it the
//   instant this guard fires a shot (see ALERT below), passing itself and the
//   boolean hit/miss outcome — it does NOT apply any damage itself ("engine
//   owns consequences", per the file's combat design). Omitting onGuardFire
//   (e.g. every part-A/part-B test, sim.js scenario predating combat) is
//   silently fine: a fired shot with no callback simply produces no
//   observable side effect outside this guard's own internal fire-timer
//   bookkeeping.
//   sleepingGuards is an OPTIONAL array of currently-SLEEPING guards' public
//   position, [{ id, x, y }, ...] — the engine (or a test/sim harness, see
//   the colleague-discovery scenarios in tests/tranq.test.js) is expected to
//   pass every guard on the roster with state === "SLEEPING" here, EVERY
//   tick, for EVERY (awake) guard's update() call — see COLLEAGUE DISCOVERY
//   below for what this guard does with it. Omitting it (every pre-tranq
//   test/sim call) is silently fine: no list means nothing to spot, a no-op.
//   Call once per tick (engine uses dt = 1/60). Per tick:
//     0. stateTime += dt, up front (unchanged from part A).
//     0.5. SLEEPING SHORT-CIRCUIT (new — see SLEEPING below): if guard.state
//        is "SLEEPING", none of steps 1-5 below run at all this tick — no
//        radio-call sync, no perception, no FSM dispatch, no colleague
//        discovery, no combat. Only the SLEEPING per-state behavior (sleep
//        timer + wake check) and this guard's own SLEEPING MAX_STATE_S
//        invariant run, then (for a lone-squad guard) squad.tick(dt, false)
//        exactly as step 5 would, and update() returns. A radio call
//        (squad.phase flipping to ALERT/EVASION/CAUTION) does NOT wake a
//        sleeping guard early — they are unconscious, not merely distracted —
//        so this short-circuit runs BEFORE step 1's sync, not after it.
//     1. RADIO CALL / SQUAD-PHASE SYNC (new in part B, runs before
//        perception): if squad.phase is ALERT/EVASION/CAUTION and this
//        guard's own state doesn't already match (subject to the CAUTION/
//        INVESTIGATE carve-out above), force it to match, effective THIS
//        tick (so a freshly-radioed-in guard starts moving immediately
//        rather than losing a tick). If squad.phase has returned to
//        INFILTRATION and this guard is stale in CAUTION/EVASION, force it
//        back to PATROL. This is how guards who never personally saw the
//        player still join the chase the instant a squadmate confirms sight.
//     2. PERCEPTION: viewer = {x: guard.x, y: guard.y, facing: guard.facing},
//        with fovDeg/range overridden to VISION.FOV_DEG*CAUTION_FOV_MULT /
//        VISION.RANGE*CAUTION_RANGE_MULT whenever squad.phase === "CAUTION"
//        (regardless of this guard's own state — including the INVESTIGATE
//        carve-out case above: the whole squad is extra alert while CAUTION
//        holds). sight = vision.computeSight(viewer, ctx.player).
//        guard.hasLOS = sight.inCone && sight.hasLOS (always computed).
//        guard.meter: pinned at 1 if state is ALERT, else
//        vision.tickMeter(guard.meter, sight.factor, dt) as before.
//     2.5. COLLEAGUE DISCOVERY (new — see SLEEPING/COLLEAGUE DISCOVERY below):
//        runs only while guard.state (post-sync) is PATROL, SUSPICIOUS,
//        INVESTIGATE, or CAUTION — never ALERT/EVASION (those states already
//        have the player's live contact as their sole focus, per the file
//        header's existing hearNoise note on ALERT/EVASION ignoring
//        anything but their own confirmed target). Checks this guard's sight
//        against every entry in ctx.sleepingGuards; a confirmed body-spot
//        calls squad.broadcastAlert AT THE BODY and jumps this guard straight
//        to ALERT, same shape as a confirmed player sighting.
//     3. FSM dispatch on (possibly just-synced, possibly just-alerted-by-
//        colleague-discovery) guard.state — see per-state behavior below.
//     4. INVARIANT: after dispatch, if guard.state is SUSPICIOUS or
//        INVESTIGATE and guard.stateTime > GUARD.MAX_STATE_S[guard.state],
//        throws an Error (ALERT's ceiling is Infinity, so it never trips;
//        EVASION/CAUTION aren't in the map at all, per the GUARD.MAX_STATE_S
//        note above).
//     5. If this guard owns a private squad-of-one (no `squad` dep given),
//        it calls squad.tick(dt, guard.hasLOS) on itself here, once, as the
//        very last thing update() does (see squad contract above for why
//        that's safe only in the lone-guard case).
//     6. STAGGERED DART CHECK (new — see guard.tranq/SLEEPING below): if a
//        non-headshot dart previously staggered this guard, its private
//        stagger clock advances by dt here, AFTER everything above (this
//        guard fully perceives/moves/dispatches/fires as normal this tick —
//        "keeps acting" per the dart's own contract). Once the clock reaches
//        GUARD.STAGGER_SLEEP_S (3s), this guard is forced into SLEEPING
//        immediately, overriding whatever state steps 1-5 just left it in.
//
//   Per-state behavior:
//     PATROL — unchanged from part A: walks the waypoint loop at
//       GUARD.PATROL_SPEED, pauses GUARD.WAYPOINT_PAUSE seconds at each with
//       a head sweep, and — this only runs while squad.phase is
//       INFILTRATION, since the sync step above forces any other phase's
//       state before PATROL's own dispatch ever sees the wheel — escalates
//       to SUSPICIOUS the instant meter >= VISION.SUSPICIOUS_AT.
//     SUSPICIOUS — unchanged from part A (turns to face `stimulus`, holds
//       GUARD.SUSPICIOUS_STARE seconds, de-escalates to PATROL or advances to
//       INVESTIGATE at the end), EXCEPT: reaching VISION.ALERT_AT now also
//       calls squad.broadcastAlert(ctx.player.x, ctx.player.y) — every path
//       into ALERT goes through a broadcast, not just this one, see below.
//     INVESTIGATE — walks to `stimulus` and searches, same shape as part A,
//       with two part-B additions: (a) reaching VISION.ALERT_AT still
//       escalates straight to ALERT (with a broadcast) UNLESS squad.phase is
//       CAUTION, in which case the escalation threshold is the lower
//       VISION.SUSPICIOUS_AT instead — a guard investigating a noise while
//       the whole squad is already jumpy doesn't need a fully-confirmed
//       sight to call it in, matching the CAUTION escalation rule described
//       under CAUTION below; (b) travel/search speed is GUARD.CAUTION_SPEED
//       instead of GUARD.INVESTIGATE_SPEED, and completing the search
//       returns to state "CAUTION" instead of "PATROL" — in BOTH cases only
//       when squad.phase reads as "CAUTION" AT THAT MOMENT (checked live,
//       every tick / at completion — not latched at entry — so a squad
//       timer expiring mid-investigation is honored immediately/at
//       completion rather than stale). Otherwise (squad.phase
//       INFILTRATION — the only other phase INVESTIGATE can run under, see
//       the state<->phase mapping above) it's identical to part A.
//     ALERT — real pursuit (replaces the part-A placeholder). On entry (via
//       broadcastAlert, called from any of SUSPICIOUS/INVESTIGATE/EVASION/
//       CAUTION the instant this guard's own meter confirms sight): squad
//       phase is now ALERT and every guard on the squad — including ones
//       that never personally saw anything — is forced into state ALERT the
//       next tick (the "radio call", step 1 above). While ALERT:
//         - if this guard currently hasLOS: squad.updateSighting(player.x,
//           player.y) (keeping the shared lastKnown fresh), and it moves
//           toward the player's LIVE position at GUARD.ALERT_SPEED, but
//           never closer than GUARD.ARREST_DIST (the per-tick step is capped
//           to `max(0, dist - ARREST_DIST)` so it can slow to a stop right at
//           the line and — because it re-reads the player's current position
//           every tick — track a moving player while holding that gap; it
//           NEVER overlaps the player by construction). Facing tracks the
//           player continuously — this is also what a fire attempt (below)
//           relies on to guarantee "facing toward the player" for free.
//         - if this guard does NOT currently hasLOS: it calls
//           squad.loseContact() (see squad contract — a documented no-op on
//           squad state) and instead converges on squad.lastKnown (the
//           shared last-known point, no ARREST_DIST braking — it's just a
//           location, not the player), at GUARD.ALERT_SPEED, closing all the
//           way to it.
//       guard.meter is pinned at 1 throughout (perception's fill/drain math
//       doesn't run — see step 2 above); ALERT has NO stateTime ceiling
//       (GUARD.MAX_STATE_S.ALERT === Infinity) — it persists for exactly as
//       long as squad.phase says ALERT, which is governed by squad.tick(),
//       not by this guard alone (see EVASION below for how it ends).
//       COMBAT (fire behavior — exclusive to ALERT; EVASION/CAUTION never
//       fire, by definition they have no confirmed LOS to fire on): each
//       guard keeps a private fire-timer, reset to 0 the instant it
//       (re-)enters ALERT (via setState — so re-broadcasting while ALREADY
//       ALERT does not reset it, per broadcastAlert's own no-op-if-already-
//       ALERT rule, but an EVASION -> ALERT re-engagement DOES, since that's
//       a fresh setState("ALERT", ...) call — a freshly re-acquired contact
//       earns a fresh grace period). The timer advances by dt every ALERT
//       tick regardless of hasLOS (a per-guard clock, not a LOS-gated one).
//       The first shot is eligible once the timer reaches
//       GUARD.FIRE_FIRST_DELAY_S (0.6s — a beat for the player to react
//       before combat starts); every shot after a successful one is eligible
//       GUARD.FIRE_INTERVAL_S (1.5s) later. An eligible tick actually fires
//       only if guard.hasLOS is true AND the straight-line distance to
//       ctx.player is <= GUARD.FIRE_RANGE (10m) — an eligible tick that fails
//       this check is NOT consumed (the interval is not advanced), so the
//       guard keeps re-checking every subsequent tick and fires the instant
//       LOS/range is regained, rather than waiting out a fresh interval.
//       "Facing must be toward the player to fire" needs no separate check:
//       tickAlert always sets guard.facing = atan2(target - guard) at the end
//       of its pursuit step above, with target === the player's live
//       position whenever hasLOS is true — exactly the condition gating a
//       fire attempt — so facing is toward the player by construction on
//       every tick a shot is even considered. On a firing tick: rolls hit
//       chance — base 0.75, halved (x0.5) if ctx.player.moving is true, and
//       halved again (a further x0.5, i.e. x0.25 combined) if
//       ctx.player.stance is "crouch" or "crawl" — via this guard's own
//       rng.next() < chance, then calls ctx.onGuardFire(guard, hit) if the
//       caller provided it (see ctx's contract above) — this module never
//       applies damage itself, only reports the outcome ("engine owns
//       consequences").
//     EVASION — entered only via the radio-call sync (step 1) when
//       squad.phase becomes EVASION (squad.tick() flips ALERT -> EVASION the
//       tick NO guard on the squad has LOS) — never entered directly by a
//       guard's own FSM. While EVASION: converges on squad.lastKnown at
//       GUARD.ALERT_SPEED (no separate "hunting speed" constant is defined
//       for part B, so pursuit speed is reused here — guards rushing the
//       last-known point are just as urgent as an active chase); once within
//       GUARD.ARRIVE_DIST, holds position and does a COORDINATED sweep: each
//       guard's facing oscillates +/-90 degrees around the facing it arrived
//       with, but the oscillation's PHASE is offset by a value derived
//       deterministically from guard.id (a simple string hash mapped to
//       [0, 2*PI) — no rng, no squad-index bookkeeping needed), so two
//       guards converging on the same point look different directions at any
//       given moment instead of mirroring each other. Meanwhile sighting
//       still runs (normal, un-widened vision math — NOT the CAUTION cone),
//       but SUSPICIOUS is skipped entirely: the instant meter reaches the
//       LOWER VISION.SUSPICIOUS_AT threshold (not the usual VISION.ALERT_AT),
//       the guard calls squad.broadcastAlert(player.x, player.y) and jumps
//       straight to ALERT — guards actively hunting don't need to "stare and
//       confirm" the way a routine patrol does. squad.tick() advances
//       squad.phase EVASION -> CAUTION after GUARD.EVASION_S (30s) of no
//       re-sighting.
//     CAUTION — entered only via the radio-call sync (step 1) when
//       squad.phase becomes CAUTION (squad.tick() advances EVASION ->
//       CAUTION after GUARD.EVASION_S). Resumes the waypoint patrol loop —
//       literally the same walk/pause/head-sweep logic as PATROL, sharing
//       waypointIndex so switching between the two never loses the guard's
//       place in the loop — but at GUARD.CAUTION_SPEED (2.0 m/s, brisker
//       than PATROL_SPEED's 1.5: still wary, moving with purpose) and with
//       the WIDENED cone from step 2 (CAUTION_FOV_MULT/CAUTION_RANGE_MULT).
//       Same low-threshold escalation rule as EVASION: meter >=
//       VISION.SUSPICIOUS_AT calls squad.broadcastAlert and jumps straight
//       to ALERT (no SUSPICIOUS detour). A strong noise heard while CAUTION
//       sends the guard to INVESTIGATE (see hearNoise below and the
//       INVESTIGATE note above for how it resumes CAUTION vs PATROL).
//       squad.tick() advances squad.phase CAUTION -> INFILTRATION after
//       GUARD.CAUTION_S (45s) of no re-sighting, at which point this guard's
//       NEXT tick sync (step 1) forces it back to state PATROL at
//       PATROL_SPEED with the normal (un-widened) cone.
//     SLEEPING — entered ONLY via guard.tranq() or guard.cqc() (see below),
//       never through the normal FSM dispatch/radio-call sync (a SLEEPING
//       guard's update() short-circuits at step 0.5, before step 1's sync
//       even runs — see above — so a squad-wide ALERT does not wake it).
//       While SLEEPING: guard.meter is pinned at 0 (perception doesn't run at
//       all — a sleeping guard notices nothing, including the player standing
//       right in front of it), guard.hasLOS is forced false, no movement, no
//       firing (its x/y ARE still externally mutable, though — see
//       src/engine.js's DRAG VERB, which repositions a dragged SLEEPING
//       guard's x/y directly every tick without going through this guard's
//       own update() at all). A private sleep clock advances by dt every
//       tick; once it reaches GUARD.SLEEP_S (60s) the guard wakes into
//       INVESTIGATE with stimulus = its OWN current position (it just
//       groggily "notices something's off" where it's lying, not any stale
//       player-sighting info) — from there it's the ordinary INVESTIGATE
//       search-then-resume machinery already documented above (searches
//       GUARD.INVESTIGATE_SEARCH seconds, then resumes CAUTION or PATROL
//       depending on squad.phase AT THAT MOMENT, same live-checked rule as
//       every other INVESTIGATE exit).
//       WAKING INSIDE A LOCKER (new — CQC/locker cycle): if guard.hidden is
//       true at the moment the sleep clock expires (i.e. this guard was
//       guard.stuffInLocker()'d and never manually let out — see that method
//       above), the guard first steps 1m out of the locker along the
//       REMEMBERED locker facing (via world.moveCircle, same collision-safe
//       primitive every other guard movement in this file uses) before its
//       INVESTIGATE stimulus is set to that stepped-out position — a groggy
//       guard visibly exits the locker rather than materializing next to it.
//       guard.hidden is cleared back to false at the same moment (it is, by
//       definition, no longer stuffed anywhere once it's standing outside).
//       A guard that was merely SLEEPING in the open (never stuffed —
//       guard.hidden already false) wakes exactly as before, no stepping.
//
//   guard.tranq(headshot) — external stimulus API, called by the ENGINE (see
//   src/items.js/src/engine.js) the instant a fired dart HITS this guard.
//   `headshot` (boolean) is computed by the CALLER, not this guard (see
//   src/items.js's HEADSHOT RULE: true when this guard's squad.phase was NOT
//   ALERT at the moment of the hit — an unaware target):
//     - Already SLEEPING: no-op (a second dart can't re-sleep a sleeping
//       guard; items.js's own hit test already excludes SLEEPING guards from
//       being hit at all, so this is a defensive no-op, not a reachable path
//       in practice).
//     - headshot === true: this guard is forced into SLEEPING IMMEDIATELY,
//       this same tick, overriding whatever state/FSM step it was mid-way
//       through — an unaware target drops instantly, no matter what.
//     - headshot === false: this guard is NOT put to sleep immediately —
//       instead its private stagger clock starts (see update() step 6 above)
//       and it keeps fully acting (perceiving, moving, dispatching, and — if
//       ALERT — still firing) for GUARD.STAGGER_SLEEP_S (3s) before finally
//       collapsing into SLEEPING on whatever tick that clock expires. This is
//       the "tranq an alert, hostile guard" case: the dart still works, but
//       an already-fighting guard doesn't just vanish mid-firefight — it
//       staggers first, exactly like the real games' tranq animation delay.
//
//   guard.cqc() — external stimulus API (new — CQC/locker cycle), called by
//   the ENGINE the instant a CQC takedown connects (see src/engine.js's CQC
//   VERB — conditions like distance/behind-check/squad.phase are ALL decided
//   by the engine before calling this; this method is the same one-shot
//   "make it SLEEPING" effect as a headshot, nothing more). v1 semantics:
//   CHOKE === SLEEP — reuses enterSleep() verbatim (same GUARD.SLEEP_S timer,
//   same wake-into-INVESTIGATE path below). A lethal/throw variant (permanent

//

    SUSPICIOUS_STARE: 3.0,

//     player      = Game.createPlayer({ world: world })
//     guards      = guardConfigs.map(cfg => Game.createGuard({
//                world: world, vision: vision, rng: rng, squad: squad,
//                spawn: cfg.spawn, waypoints: cfg.waypoints, id: cfg.id,
//              }))
//
//   engine — flat, readable props (mutated in place by tick()):
//     world, player, guards (array), squad, vision, rng, soundEvents, zone —
//       the wired instances/data above (zone === zoneData, the plain-object
//       level data; soundEvents is the Game.createSoundEvents({world})
//       instance — see src/soundEvents.js contract).
//     DT        — 1/60 (constant fixed timestep, seconds). Every tick() call
//                 advances the simulation by exactly this much regardless of
//                 wall-clock time — the engine has NO notion of real time; the
//                 caller (render loop, test, sim) decides when/how often to
//                 call tick().
//     tickCount — integer, number of tick() calls so far (starts at 0).
//     time      — tickCount * DT, seconds of simulated time elapsed.
//     dragging  — NEW (CQC/locker cycle): guardId | null. The id of the
//                 guard currently being dragged (see DRAG VERB below), or
//                 null when nothing is in tow. Reset to null on a zone
//                 transition (see switchZone).
//     playerHidden — NEW (CQC/locker cycle): boolean, true while the player
//                 is tucked inside a locker (see LOCKER VERB below). Reset to
//                 false on a zone transition (see switchZone).
//     events    — array of event objects emitted by the MOST RECENT tick()
//                 only; cleared at the start of every tick() (i.e. it is NOT
//                 a running log — read it right after calling tick() if you
//                 want that tick's events). Current shapes:
//                   { type: "phaseChange", from, to } — squad.phase changed
//                     this tick (from/to are phase strings).
//                   { type: "alert", x, y } — squad.alertCount increased this
//                     tick (a NEW incident, per squad.broadcastAlert's
//                     alertCount rule — see guardAI.js contract); x,y are
//                     squad.lastKnown at the moment the alert fired.
//                   { type: "knock", x, y } — input.knock had a false->true
//                     edge THIS tick AND the player was adjacent to a wall
//                     (see KNOCK VERB below); x,y are the player's position
//                     at the moment of the knock. Fires at most once per
//                     edge, regardless of whether any guard heard it.
//                   { type: "tranqFired", hit, headshot, guardId, impact } —
//                     input.fire had a false->true edge THIS tick AND the
//                     inventory had a dart to spend (see FIRE VERB below).
//                     hit/headshot/guardId mirror inventory.fireTranq()'s
//                     return (headshot/guardId are undefined on a miss);
//                     impact is { x, y }, the dart's final resting point —
//                     included (beyond items.js's own return shape) because
//                     src/render.js's dart-tracer effect needs somewhere to
//                     read it from (see FIRE VERB below and render.js's own
//                     contract for how it consumes this same-tick event).
//                     Does NOT fire if the inventory was already empty (no
//                     dart spent, nothing to report).
//                   { type: "noiseHeard", guardId, x, y, strength } — one per
//                     guard that heard ANY sound this tick (movement noise
//                     and/or a knock), per soundEvents.emit/emitRadius's
//                     return value (see src/soundEvents.js contract); x,y are
//                     the sound's ORIGIN (not the guard's position), strength
//                     is "faint" or "strong". If a guard hears more than one
//                     sound in the same tick, one event is pushed per sound.
//                   { type: "zoneChange", from, to } — the player crossed a
//                     resolvable zone.exits[] trigger this tick while
//                     squad.phase was INFILTRATION (see ZONE TRANSITIONS
//                     below); from/to are zone id strings.
//                   { type: "zoneBlocked", to } — the player stood in a
//                     zone.exits[] trigger whose `to` does not resolve to a
//                     built Game.ZONES entry (e.g. the warehouse's laboratory
//                     stub). Edge-triggered like "knock": fires once when the
//                     player ENTERS the trigger region, not once per tick
//                     spent standing in it (see ZONE TRANSITIONS below).
//                   { type: "guardFire", guardId, hit } — a guard in ALERT
//                     took a shot this tick (see COMBAT below); hit is the
//                     boolean outcome of guardAI.js's own accuracy roll.
//                     Fired regardless of hit/miss — a miss is still an
//                     observable shot (muzzle flash/sound cue material for a
//                     future render/audio hookup).
//                   { type: "playerHit", hp } — a guardFire this tick was a
//                     HIT and player.damage() was applied; hp is
//                     player.hp AFTER the damage (so consecutive playerHit
//                     events across a firefight read as a strictly
//                     decreasing sequence while the player survives).
//                   { type: "cqc", guardId } — a CQC takedown connected this
//                     tick (see CQC VERB above); the named guard is now
//                     SLEEPING.
//                   { type: "cqcMiss" } — a CQC edge fired but conditions
//                     weren't met, AND some guard was within 2.5m of the
//                     player (see CQC VERB above for the exact eligibility
//                     rule and the reason for the 2.5m feedback-without-spam
//                     gate).
//                   { type: "busy" } — a fire edge occurred while
//                     engine.dragging was set (see DRAG VERB above); no dart
//                     spent, no tranqFired.
//                   { type: "gameOver" } — player.hp reached 0 this tick (see
//                     GAME OVER below). Fires exactly once, the tick hp hits
//                     0; never again afterward (engine.gameOver latches, and
//                     a latched engine stops ticking altogether — see below).
//                 More event types (item pickups, ...) will be appended by
//                 later modules — treat `type` as an open set and always
//                 branch on it, never assume this is the full list.
//
//   CQC VERB — Q key, input.cqc (boolean), EDGE-TRIGGERED exactly like knock/
//   fire (private prevCqc closure state, false->true only): on that edge,
//   this module (not guardAI.js) decides eligibility by finding the
//   NEAREST guard to the player satisfying ALL of:
//     - distance(player, guard) <= 1.4m,
//     - guard.state !== "SLEEPING" (an awake target — you can't CQC a body
//       that's already down),
//     - the guard is BEHIND: the absolute angular difference between
//       guard.facing and the guard->player direction is > 100 degrees, and
//     - squad.phase !== "ALERT" (can't grab someone actively shooting at
//       you — see the file's own "no zone-changing mid-alert"-style design
//       preference for gating stealth verbs behind squad state).
//   A qualifying guard: calls guard.cqc() (see src/guardAI.js contract — v1
//   is CHOKE === SLEEP, same enterSleep() path/timer as a headshot dart),
//   pushes { type: "cqc", guardId }, and emits a SOFT ("faint") thud at the
//   guard's own position: soundEvents.emitRadius(guard.x, guard.y, 3, false,
//   guards) — deliberately NOT one of soundEvents.js's named RADII kinds (no
//   "cqc" entry exists there), since 3m/faint is specific to this one verb;
//   any listener that heard it pushes the usual
//   { type: "noiseHeard", guardId, x, y, strength: "faint" }. No qualifying
//   guard: pushes { type: "cqcMiss" } ONLY if some guard (any state, any
//   angle) was within 2.5m of the player — feedback that the button press
//   registered without spamming an event on every empty-handed Q press
//   halfway across the zone. CQC is also silently inert (no cqc, no
//   cqcMiss) while engine.playerHidden or engine.dragging — see LOCKER
//   VERB / DRAG VERB below; both hands are full/occupied in either state,
//   an intentional, documented restriction beyond the three conditions
//   above.
//
//   DRAG VERB / LOCKER VERB — G key, input.drag (boolean), EDGE-TRIGGERED
//   exactly like knock/fire/cqc (private prevDrag closure state). Unlike
//   every other verb, a single G edge means a DIFFERENT thing depending on
//   engine.playerHidden/engine.dragging/proximity-to-a-locker — see
//   handleDragKey()'s own inline comments for the exact priority order (this
//   header gives the shape; the code is the source of truth for edge cases):
//     1. engine.playerHidden === true: this press always means EXIT the
//        locker, regardless of anything else (see LOCKER below).
//     2. Else, if the player is within LOCKER_INTERACT_DIST (1.0m) of ANY
//        zone.lockers[] entry (nearest one wins): LOCKER context —
//          - engine.dragging set (a body in tow): STUFF that guard into the
//            locker (guard.stuffInLocker(locker) — see guardAI.js contract),
//            clear engine.dragging.
//          - engine.dragging not set: HIDE the player — engine.playerHidden
//            = true, remembering the locker (private, for the exit step).
//     3. Else (no locker in range): DRAG context —
//          - engine.dragging set: RELEASE (engine.dragging = null; the
//            guard is left exactly where its last drag-follow tick put it —
//            see below).
//          - engine.dragging not set: ATTACH to the NEAREST SLEEPING,
//            not-already-hidden guard within DRAG_ATTACH_DIST (1.2m), if
//            any (engine.dragging = that guard's id). A guard already
//            guard.hidden (mid-locker-stuff — should never actually be
//            reachable via the player, since a hidden body's position IS
//            the locker's, but excluded defensively) is not a valid attach
//            target.
//   DRAG FOLLOW (every tick engine.dragging is set, AFTER player.update so
//   it uses this tick's fresh position/facing): the dragged guard's x/y are
//   set directly to 0.9m behind the player along the player's OWN facing
//   (guard.x = player.x - cos(player.facing)*0.9, same for y) — a plain
//   position overwrite, not a guard.update()-mediated move (the guard is
//   SLEEPING throughout a drag; its own update() still runs every tick per
//   the normal guard loop below, short-circuiting at guardAI.js's SLEEPING
//   step 0.5 exactly as it would if nobody were dragging it — see
//   guardAI.js's own note on x/y being externally mutable while SLEEPING).
//   HONEST GAP: GUARD.SLEEP_S is 60s, so a sufficiently long drag (a real
//   playthrough is very unlikely to hold a drag that long, but nothing
//   PREVENTS it) can let the dragged guard's own sleep clock expire mid-drag
//   — it would wake into INVESTIGATE at whatever position this tick's drag-
//   follow last wrote, while engine.dragging remains set and continues
//   overwriting that now-awake guard's position every subsequent tick. This
//   is not handled specially this cycle (same "documented, not hacked in"
//   posture as engine.js's own VISION STAGGERING gap below) — a future cycle
//   could auto-release the drag the instant the dragged guard's state
//   leaves SLEEPING.
//   DRAG SPEED CAP: player.js has no speed-cap hook (see its own contract —
//   speed is a pure function of stance/run), so rather than modify it, this
//   module scales the ALREADY-normalized input.moveX/moveY by 0.55 whenever
//   engine.dragging is set, BEFORE calling player.update() — the player
//   still walks/runs/crouches through its own normal state machine, just
//   covering 55% of the distance per tick it otherwise would.
//   NO FIRING WHILE DRAGGING: a fire edge (see FIRE VERB below) that occurs
//   while engine.dragging is set does not call inventory.fireTranq() at all
//   — it pushes { type: "busy" } instead (both hands are full) and still
//   consumes the edge (no event spam if the key is held).
//   LOCKER — HIDE / EXIT: entering sets engine.playerHidden = true (frozen
//   input while hidden — see FROZEN INPUT below) and remembers the locker
//   privately; the matching EXIT (priority 1 above) steps the player 1m out
//   along the LOCKER's own `facing` (via world.moveCircle, collision-safe)
//   and restores normal input immediately, same tick. GUARD PERCEPTION GATE
//   (this is the "least invasive" approach flagged as a design choice — see
//   BACKLOG-adjacent notes in this cycle's design brief): rather than
//   threading a visibility flag through guardAI.js/vision.js, this module
//   simply hands every guard.update() call a DECOY player object (same
//   shape as the real player — x, y, facing, visionProfile(), moving,
//   stance — but parked at x=-9999,y=-9999, permanently out of any zone's
//   vision RANGE) instead of the real `player`, for as long as
//   engine.playerHidden is true. guardAI.js/vision.js are completely
//   unaware this ever happens — from their side it's an ordinary target
//   that's simply always out of range, which is exactly "invisible to guard
//   vision" without a single line of change to either module. This also
//   means a guard cannot fire on a hidden player (hasLOS on the decoy is
//   always false) as a natural side effect, not a separately-coded rule.
//   FROZEN INPUT while playerHidden: input.moveX/moveY/run are zeroed (so
//   player.moving/noiseRadius() both read false/0 — a hidden player is
//   silent and stationary) and the fire/cqc verbs are skipped entirely for
//   that tick (checked AFTER this same tick's G-edge processing, so a G
//   press that JUST exited the locker this tick restores full control
//   immediately, same "acts immediately" convention as every other edge verb
//   in this file). Only the G key itself (the exit path) ever reads while
//   hidden.
//   ZONE-SCOPED: engine.dragging/engine.playerHidden (and the private
//   remembered locker) are reset on every switchZone() call, same v1
//   semantics as the guard roster itself being discarded rather than
//   carried across a transition — a dragged guard belongs to the departing
//   zone's roster and a hidden-in-a-locker player has no locker to return to
//   in the new zone.
//
//   FIRE VERB — tranq pistol (new this cycle): input.fire (boolean) is
//   EDGE-TRIGGERED exactly like input.knock (see KNOCK VERB below) — engine
//   tracks the previous tick's input.fire internally and only acts on a
//   false->true transition. On that edge: calls engine.inventory.fireTranq
//   (engine) (see src/items.js contract — reads player/world/guards, spends
//   a dart, returns { fired, hit, guardId?, headshot?, impact }). If
//   !result.fired (inventory was already empty), nothing else happens — no
//   event, no noise, per items.js's own contract. Otherwise:
//     1. Pushes { type: "tranqFired", hit, headshot, guardId, impact } (see
//        the tranqFired event shape above).
//     2. Emits dart-impact NOISE at the impact point — a SHARP ("strong")
//        stimulus regardless of hit/miss, same convention as the knock verb
//        and guard-fire's own gunshot noise: soundEvents.emit(impact.x,
//        impact.y, "dartImpact", guards) (SOUND.RADII.dartImpact = 5m
//        unattenuated, SOUND.SHARP.dartImpact = true — both already defined
//        in src/soundEvents.js). Any listener that heard it pushes
//        { type: "noiseHeard", guardId, x, y, strength: "strong" }, same
//        shape/x-y-is-the-sound's-origin convention as every other noiseHeard
//        push in this file. This is what lets a miss (or even a hit) pull an
//        uninvolved third guard elsewhere in the zone into INVESTIGATE — the
//        SAME hearNoise("strong") pathway a knock or gunshot uses.
//     3. If result.hit: finds the hit guard in the CURRENT guards array by
//        result.guardId and calls guard.tranq(result.headshot) on it (see
//        src/guardAI.js's guard.tranq contract for the headshot-vs-stagger
//        behavior). items.js itself never calls guard.tranq or emits noise
//        — see its own ENGINE-AGNOSTIC note — this is the engine doing both,
//        exactly like it turns guardAI's onGuardFire callback into
//        damage/events below.
//   Runs in the same NOISE STEP position as the knock verb (step 2, after
//   player.update, before any guard.update), so a dart fired this tick is
//   already reflected in guard.state (the hit guard's SLEEPING/staggering,
//   any bystander's hearNoise-driven INVESTIGATE) by the time step 3's
//   guard.update() runs this same tick.
//
//   BOX VERB — cardboard box (new this cycle): B key, input.box (boolean),
//   EDGE-TRIGGERED exactly like drag/cqc (private prevBox closure state,
//   false->true only) — but unlike every other edge verb, this one is a
//   TOGGLE of engine.inventory.boxOn rather than a one-shot action. On that
//   edge: if engine.dragging or engine.playerHidden is set, the press is
//   silently swallowed (no toggle — see src/items.js's BOX / DRAG / LOCKER
//   INTERACTION MATRIX: you can't pull the box on mid-drag or while hidden
//   in a locker). Otherwise: inventory.boxOn = !inventory.boxOn. This is
//   processed in the same CQC/DRAG/LOCKER block as those verbs, BEFORE
//   player.update, so a same-tick toggle is reflected in this tick's speed
//   cap / vision-wrap below.
//   THE OTHER HALF OF THE MATRIX (see items.js): a dragEdge is only acted
//   on (handleDragKey() called) while !inventory.boxOn — G is entirely dead
//   while boxed, covering both its attach/hide AND release/exit branches in
//   one gate (there is no live "boxed + dragging/hidden" state to carve
//   exceptions out of, since neither can start while the other holds).
//   BOX SPEED CAP: identical mechanism/rationale to DRAG SPEED CAP above —
//   player.js has no speed-cap hook, so this module scales the
//   ALREADY-normalized input.moveX/moveY by BOX_SPEED_MULT (0.55) whenever
//   inventory.boxOn is true, before player.update() ever sees it. Mutually
//   exclusive with the drag cap (boxOn and dragging can never both hold —
//   see above), so this is a plain else-if, not a stacking multiplier.
//   BOX PERCEPTION — "visible but discounted" (the box is NOT the same
//   mechanism as the LOCKER's GUARD PERCEPTION GATE above: a hidden player
//   is swapped for a decoy at an impossible position, out of every guard's
//   range entirely; a boxed player's REAL x/y/facing/stance are still
//   handed to every guard.update() call — a guard can walk right up and
//   look at the box, it just doesn't read as a person unless it moves).
//   guardAI.js calls vision.computeSight(viewer, ctx.player) with NO third
//   `opts` argument (see its own contract) — so vision.js's opts.extraMult
//   hook (designed with exactly this box in mind, per its own file header)
//   is UNREACHABLE from here without editing guardAI.js, which is out of
//   scope for this module. The only lever this module actually has on
//   guardAI's per-tick sight computation is ctx.player.visionProfile()
//   itself (target.visionProfile() is what vision.computeSight falls back
//   to for `profile` when the caller passes no opts.profile — see
//   src/vision.js contract), so — same "wrap ctx.player" technique the
//   LOCKER decoy above already uses, just with the REAL x/y instead of an
//   impossible one — whenever inventory.boxOn is true, every guard.update()
//   call this tick gets a player object whose visionProfile() is OVERRIDDEN
//   to ignore player.stance entirely and return a flat constant instead:
//     Game.ITEMS.BOX_FACTOR (0.05) if !player.moving (stationary — the box
//       reads as a near-invisible inert prop; SUSPICIOUS_AT (0.35) would
//       take ~7s of continuous point-blank (2m) sight to reach at this
//       factor, and proportionally longer at range — see src/vision.js's
//       FILL FORMULA),
//     1.0 if player.moving (SPEC: "blown if seen moving" — a moving box is
//       exactly as visible as a standing, undisguised player; no partial
//       credit for still wearing the box while walking around in it).
//   player.moving/facing/stance/x/y on this wrapper are the REAL player's,
//   unchanged (only visionProfile() is swapped) — so guardAI's OWN combat-
//   accuracy read of ctx.player.moving/ctx.player.stance (see its ALERT/
//   COMBAT contract) and squad.updateSighting(ctx.player.x, ctx.player.y)
//   are completely unaffected by boxing; only the SIGHT FACTOR computation
//   is discounted. This wrapper only applies while !engine.playerHidden
//   (hidden already fully replaces ctx.player with the locker decoy above —
//   the two states can never overlap per the interaction matrix anyway, so
//   this is a defensive ordering, not a real runtime branch point).
//   RENDER/HUD: src/render.js swaps the player's mesh for a larger, nose-
//   less cardboard-brown box while boxOn (see its own file header); hudModel
//   status is additive "BOX" (see src/hud.js contract) alongside DRAGGING/
//   HIDDEN. Neither affects the perception math above — cosmetic only.
//
//   RATION VERB (new this cycle): R key, input.ration (boolean), EDGE-
//   TRIGGERED exactly like knock/fire (private prevRation closure state).
//   On that edge: calls inventory.useRation(player) (see src/items.js
//   contract — a pure "would this help" calculator that never touches
//   player.hp itself). If !result.used (no rations left, or hp already at
//   1), nothing else happens — no event, same "empty inventory is silent"
//   convention as the fire verb. Otherwise: this module (not items.js) is
//   what actually applies the heal — player.hp = Math.min(1, player.hp +
//   result.healAmount) — then pushes { type: "ration", hp: player.hp } (hp
//   read AFTER the heal, same "report the post-mutation value" convention
//   as playerHit above). RATION HOOK NOTE: src/engine.js's own file header
//   used to flag this exact hp-restoration arithmetic as "expected to live
//   on src/player.js, not engine.js" (a future-cycle aspiration written
//   before player.js was off-limits for this cycle's task packet) — since
//   player.js cannot be touched this cycle, the plain
//   `player.hp = Math.min(1, player.hp + amount)` mutation is done directly
//   here instead, exactly mirroring player.damage()'s own clamp shape but
//   in the opposite direction. A future cycle with player.js in scope could
//   still move this into a real player.heal() method with no change to this
//   verb's own event/edge behavior. No noise, no speed cap, no interaction
//   with box/drag/locker — eating a ration is always available.
//
//   CHAFF VERB (new this cycle): X key, input.chaff (boolean), EDGE-
//   TRIGGERED exactly like knock/fire/ration (private prevChaff closure
//   state). On that edge: calls inventory.useChaff() (see src/items.js
//   contract). If !result.used (no chaff grenades left), nothing else
//   happens. Otherwise:
//     1. engine.chaffUntil = engine.time + Game.ITEMS.CHAFF_S (15) — an
//        absolute sim-time deadline, not a countdown counter, same
//        "compare against engine.time" convention as every other
//        deterministic timer in this codebase (no setTimeout, no Date).
//        Mission-scoped like darts/rations/chaff itself — NOT reset by
//        switchZone (a thrown chaff grenade's jam outlasts a door).
//     2. Pushes { type: "chaff" }.
//     3. Emits a SHARP ("strong") pop at the player's OWN position: it's a
//        bang, not a stealth tool — soundEvents.emitRadius(player.x,
//        player.y, 4, true, guards) (4m unattenuated; not one of
//        soundEvents.js's named RADII kinds, same "bespoke one-off radius"
//        precedent as the CQC thud's emitRadius(...,3,...) call above).
//        Any listener that heard it pushes the usual { type: "noiseHeard",
//        ..., strength: "strong" }. THE TRADEOFF IS THE POINT: jamming the
//        radar/blinding cameras costs you a guard converging on where you
//        just stood (INVESTIGATE), exactly the same hearNoise("strong")
//        pathway a knock or dart impact uses — documented here, not hacked
//        around, because a chaff pop that was silent would make it strictly
//        better than a knock with no downside.
//   RADAR: src/radar.js's radarModel ORs a live engine.chaffUntil > engine.
//   time signal into its existing phase-based `jammed` check (see its own
//   CHAFF HOOK comment, written for exactly this) and exposes which kind of
//   jam is live so the view can render chaff static differently (a bluish
//   tint + "CHAFF" label) from a phase-driven ALERT/EVASION blackout (red
//   "ALERT" label) — see src/radar.js contract. CAMERA HOOK (honest gap,
//   not a silent one — same posture as this file's own VISION STAGGERING
//   note below): the Laboratory zone's cameras don't exist yet (SPEC.md's
//   own zone list has them arriving with keycards later), so "cameras die
//   under chaff" has nothing to wire up to this cycle; whenever a camera
//   entity exists, it is expected to gate its own perception off this same
//   engine.chaffUntil > engine.time signal, not a second parallel timer.
//   Runs in the same NOISE STEP position as fire/knock (step 2), same
//   same-tick-visible-to-guards rationale as the fire verb above.
//
//   COMBAT — guard fire / player damage / game over (new this cycle):
//     Step 3 (guard update loop) below passes each guard.update() a THIRD ctx
//     field beyond `player`: onGuardFire(guard, hit), guardAI.js's hook for
//     "this guard just fired" (see its own ALERT/COMBAT contract — it never
//     applies damage itself, only reports the outcome). This callback, per
//     shot:
//       1. Pushes { type: "guardFire", guardId: guard.id, hit: hit }.
//       2. Emits gunshot NOISE — a genuinely loud, SHARP stimulus regardless
//          of hit/miss: soundEvents.emitRadius(guard.x, guard.y, 10, true,
//          guards) (10m unattenuated radius, matching GUARD.FIRE_RANGE; sharp
//          -> "strong", same semantics as the knock verb — see soundEvents.js
//          contract). Listeners = every guard on the CURRENT guards array,
//          same convention as the movement-noise/knock steps in step 2 below
//          (this necessarily includes the shooter itself as a listener — its
//          own hearNoise() is a harmless no-op while ALERT/EVASION, per
//          guardAI.js's hearNoise contract, so no special-casing is needed to
//          exclude it). Any listener that heard it pushes the same
//          { type: "noiseHeard", guardId, x, y, strength: "strong" } shape
//          step 2 uses, x/y being the GUNSHOT's origin (the firing guard's
//          position at the moment of the shot). This is what lets an
//          uninvolved squadmate elsewhere in the zone converge on a firefight
//          it didn't personally see — "gunshot -> ALERT" support fire, using
//          the SAME hearNoise("strong") pathway a knock uses (a guard already
//          ALERT/EVASION ignores it per hearNoise's contract; a PATROL/
//          SUSPICIOUS/CAUTION guard investigates it exactly like any other
//          strong stimulus, escalating to ALERT itself only through its OWN
//          confirmed sighting later, same as ever).
//       3. If hit: calls player.damage(Game.GUARD.FIRE_DAMAGE), then pushes
//          { type: "playerHit", hp: player.hp } (hp read AFTER damage()).
//     GAME OVER: after the guard update loop (so it sees any damage a shot
//     just applied this same tick) — if player.hp has reached 0 and
//     engine.gameOver isn't already true: sets engine.gameOver = true and
//     pushes { type: "gameOver" }. Deliberately generic (checks
//     player.alive, not "was this tick's damage source a guardFire") so ANY
//     future damage source (traps, a boss, ...) drives game over through the
//     same single check rather than needing its own copy of this logic.
//     FROZEN ENGINE: once engine.gameOver is true, tick() returns
//     IMMEDIATELY as its very first statement on every SUBSEQUENT call — no

        if (squad.phase === "ALERT") continue;
        var dirToPlayer = Math.atan2(player.y - g.y, player.x - g.x);
        var behindDeg = (absAngleDiff(g.facing, dirToPlayer) * 180) / Math.PI;

        if (d < bestDist) {
          bestDist = d;

              y: bestGuard.y,
              strength: thudResults[ti].strength,

    // COMBAT (see file header) — passed as ctx.onGuardFire to every
    // guard.update() call in the tick() guard loop below. References the
    // OUTER `player`/`guards`/`soundEvents`/`engine` closure vars directly
    // (not local copies), so it stays correct across a zone transition's
    // reassignment of those vars (see switchZone below) without needing to be
    // rebuilt itself.

      for (var ni = 0; ni < noiseResults.length; ni++) {
        if (noiseResults[ni].heard) {
          engine.events.push({
            type: "noiseHeard",
            guardId: noiseResults[ni].listenerId,
            x: guard.x,
            y: guard.y,
            strength: noiseResults[ni].strength,
          });
        }

        engine.events.push({ type: "playerHit", hp: player.hp });
      }
    }

    // ZONE TRANSITIONS (see file header, tick() step 6). Rebuilds the entire
    // world/soundEvents/vision/squad/guards stack for `targetZone`, and a
    // fresh player positioned at targetZone.entrances[entranceKey] (falling
    // back to targetZone.playerSpawn if that entrance is somehow missing —
    // defensive only, every shipped zone defines the entrances its own exits
    // point at). rng is deliberately NOT rebuilt — the single seeded stream
    // continues across the switch. Reassigns every closure var AND the
    // matching `engine.*` prop so both tick()/snapshot() (which close over
    // the vars directly) and external readers (engine.player, etc.) see the
    // new zone immediately.

      var newWorld = Game.createWorld(targetZone);
      var newSoundEvents = Game.createSoundEvents({ world: newWorld });
      var newVision = Game.createVision({ world: newWorld });
      var newSquad = Game.createSquad();
      var newGuards = buildGuards(guardConfigsForZone(targetZone), newWorld, newVision, rng, newSquad);

      var entrance = (targetZone.entrances && targetZone.entrances[entranceKey]) || targetZone.playerSpawn;
      var newPlayer = Game.createPlayer({ world: newWorld });
      newPlayer.x = entrance.x;
      newPlayer.y = entrance.y;
      newPlayer.stance = player.stance;
      newPlayer.facing = player.facing;
      // hp/alive carry across the switch too (a fresh Game.createPlayer
      // defaults to full hp — copying these over is what keeps "walked
      // through a door" from doubling as a free heal; see src/player.js hp
      // contract). A dead player can't be standing in an exit trigger in the
      // first place (tryZoneTransition only runs while squad.phase is
      // INFILTRATION, and player.update ignores input once !alive, but
      // neither of those actually forbids this path on paper) — copied
      // defensively regardless.
      newPlayer.hp = player.hp;
      newPlayer.alive = player.alive;

      zone = targetZone;
      world = newWorld;
      soundEvents = newSoundEvents;
      vision = newVision;
      squad = newSquad;
      guards = newGuards;
      player = newPlayer;
      inBlockedExitRegion = false;

      // LOCKER VERB) — a dragged guard belongs to the departing zone's now-
      // discarded roster, and a hidden-in-a-locker player has no locker to
      // return to in the new zone, so both reset on every transition, same
      // v1 semantics as the guard roster itself not persisting.
      engine.dragging = null;
      engine.playerHidden = false;
      hiddenLocker = null;

      engine.zone = zone;
      engine.world = world;
      engine.soundEvents = soundEvents;
      engine.vision = vision;
      engine.squad = squad;
      engine.guards = guards;

        }
      }

      // Chaff verb: edge-triggered (false->true only), same shape as knock/
      // fire above (see file header CHAFF VERB). The pop is a SHARP noise at
      // the player's OWN position — same noiseHeard fan-out loop shape as
      // the knock/fire verbs above.
      var chaffEdge = normalized.chaff && !prevChaff;
      prevChaff = normalized.chaff;

        if (chaffResult.used) {

          engine.events.push({ type: "chaff" });

          var chaffResults = soundEvents.emitRadius(player.x, player.y, CHAFF_NOISE_RADIUS, true, guards);
          for (var chi = 0; chi < chaffResults.length; chi++) {
            if (chaffResults[chi].heard) {
              engine.events.push({
                type: "noiseHeard",
                guardId: chaffResults[chi].listenerId,
                x: player.x,
                y: player.y,
                strength: chaffResults[chi].strength,
              });
            }
          }
        }
      }
      // ---- END NOISE STEP ---------------------------------------------------

      // sleepingGuards snapshot (see file header, tick() step 3) — computed
      // once per tick, from the CURRENT guards array (already reflecting any
      // guard.tranq()/guard.cqc() call above just made this same tick, and
      // any guard.stuffInLocker() a same-tick G-edge just made), and handed
      // unchanged to every guard's update() call below. `hidden` (new — see

      // checkColleagueDiscovery can skip stuffed bodies.

            x: guards[sgi].x,
            y: guards[sgi].y,
            hidden: !!guards[sgi].hidden,
          });
        }
      }
