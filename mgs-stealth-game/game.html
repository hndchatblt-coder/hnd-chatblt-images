<script>
// ==== src/rng.js ====
// src/rng.js
// PUBLIC API:
//   Game.createRng(seed: number) -> {
//     next(): float in [0,1),
//     int(min, max): inclusive integer,
//     pick(array): element,
//     seed: number  (the seed it was created with)
//   }
// Single source of randomness for the whole game. Same seed => identical
// sequence => reproducible tests and replays (seed + input log = identical run).
(function (Game) {
  function createRng(seed) {
    let s = seed >>> 0;
    function next() {
      // mulberry32
      s = (s + 0x6d2b79f5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function int(min, max) {
      return min + Math.floor(next() * (max - min + 1));
    }
    function pick(arr) {
      return arr[Math.floor(next() * arr.length)];
    }
    return { next: next, int: int, pick: pick, seed: seed };
  }
  Game.createRng = createRng;
  if (typeof module !== "undefined") module.exports = { createRng: createRng };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/world.js ====
// src/world.js
// PUBLIC API:
//   Game.ZONES.loadingDock / Game.ZONES.warehouse — facility zones, plain-object
//   level data (SCHEMA — both zones conform to this shape; fields added this
//   cycle are marked NEW):
//     {
//       id, name,
//       bounds: { w, h },                 // meters, origin top-left, +x right, +y down
//       walls: [ { x, y, w, h }, ... ],    // AABBs: perimeter + interior obstacles
//       playerSpawn: { x, y },             // default spawn if this zone is booted directly
//       exit: { x, y, w, h },              // BACK-COMPAT ALIAS: always === exits[0].
//                                          // hud/radar/render/existing scenarios read
//                                          // zone.exit directly — kept working verbatim.
//       exits: [ { x, y, w, h, to, entranceKey }, ... ], // NEW — replaces the old
//                                          // single `exit` prop as the source of truth.
//                                          // `to` is a Game.ZONES key (or a not-yet-built
//                                          // zone id, e.g. "laboratory" — a deliberate stub;
//                                          // engine.js handles an unresolvable `to` by
//                                          // staying put + emitting `zoneBlocked`, never by
//                                          // throwing). `entranceKey` indexes the TARGET
//                                          // zone's `entrances` map (below) to find where the
//                                          // player appears after crossing.
//       entrances: { [fromZoneId]: { x, y }, ... }, // NEW — spawn points keyed by the
//                                          // zone the player is arriving FROM, e.g.
//                                          // warehouse.entrances.fromLoadingDock. Looked up
//                                          // via the crossed exit's `entranceKey`, not the
//                                          // literal source zone id, so a zone can expose
//                                          // more than one path in from the same neighbor.
//       waypoints: [ { x, y }, ... ],       // patrol loop #1, open floor
//       waypoints2: [ { x, y }, ... ],       // NEW — patrol loop #2 (a second guard's
//                                          // route, e.g. a cross-aisle sweep); OPTIONAL —
//                                          // only zones with a second patrolling guard
//                                          // define it (see warehouse below). Same shape/
//                                          // rules as `waypoints`: closed loop, every leg
//                                          // must be walkable at r=0.6 (see world.test.js).
//       darkZones: [ { x, y, w, h }, ... ], // shadowed regions (vision uses these)
//       lockers: [ { x, y, facing }, ... ], // NEW — data only this cycle (no collision/
//                                          // interaction yet; the future items cycle makes
//                                          // these functional hiding spots). `facing`
//                                          // radians, same atan2 convention as
//                                          // player.facing/guard.facing (0 = +x).
//     }
//   Game.createWorld(zoneData) -> {
//     isBlocked(x, y): boolean,
//       // true iff (x,y) lies inside (or exactly on the edge of) any wall AABB.
//       // Containment is CLOSED on all four sides: wx <= x <= wx+w && wy <= y <= wy+h.
//     isBlockedCircle(x, y, r): boolean,
//       // true iff a circle of radius r centered at (x,y) overlaps (or exactly
//       // touches) any wall AABB (closed containment, same convention as above).
//     raycast(x1, y1, x2, y2): { x, y, dist } | null,
//       // exact segment-vs-AABB (slab method) test against every wall; returns
//       // the FIRST intersection point (smallest t along the segment, t in
//       // [0,1]) and its distance from (x1,y1), or null if the segment is clear.
//     moveCircle(x, y, dx, dy, r): { x, y },
//       // attempts to move a circle of radius r by (dx, dy); resolves per axis
//       // (x first, then y) — a blocked axis is simply not applied, so a circle
//       // sliding along a wall still makes progress on its free axis and a
//       // circle driven into a corner stops cleanly on both. Never returns a
//       // position where isBlockedCircle(result.x, result.y, r) is true,
//       // provided the input position was itself not overlapping a wall.
//     inRegion(x, y, region): boolean,
//       // point-in-{x,y,w,h} test (closed containment), used for exit/darkZone
//       // checks.
//     zone: the zoneData object this world was created from.
//   }
// Pure data + geometry. No THREE, no DOM, no browser APIs — runs headless in
// node (vision cones, radar, and guardAI pathing all build on this module).
(function (Game) {
  // ---- local math helpers (no dependency on other modules) ----------------

  function clamp(v, lo, hi) {
    return v < lo ? lo : v > hi ? hi : v;
  }

  function rectContainsPoint(rect, x, y) {
    return (
      x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h
    );
  }

  function circleOverlapsRect(cx, cy, r, rect) {
    var nearestX = clamp(cx, rect.x, rect.x + rect.w);
    var nearestY = clamp(cy, rect.y, rect.y + rect.h);
    var dx = cx - nearestX;
    var dy = cy - nearestY;
    return dx * dx + dy * dy <= r * r;
  }

  // Exact segment-vs-AABB intersection via the slab method. Returns the
  // smallest t in [0,1] at which the segment (x1,y1)->(x2,y2) enters `rect`,
  // or null if it never does. t is clamped to 0 if the segment starts inside
  // the box (so "first hit" degenerates to the start point rather than a
  // negative t).
  function segmentVsRect(x1, y1, x2, y2, rect) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var tmin = 0;
    var tmax = 1;

    if (dx === 0) {
      if (x1 < rect.x || x1 > rect.x + rect.w) return null;
    } else {
      var tx1 = (rect.x - x1) / dx;
      var tx2 = (rect.x + rect.w - x1) / dx;
      if (tx1 > tx2) {
        var tmp = tx1;
        tx1 = tx2;
        tx2 = tmp;
      }
      if (tx1 > tmin) tmin = tx1;
      if (tx2 < tmax) tmax = tx2;
      if (tmin > tmax) return null;
    }

    if (dy === 0) {
      if (y1 < rect.y || y1 > rect.y + rect.h) return null;
    } else {
      var ty1 = (rect.y - y1) / dy;
      var ty2 = (rect.y + rect.h - y1) / dy;
      if (ty1 > ty2) {
        var tmp2 = ty1;
        ty1 = ty2;
        ty2 = tmp2;
      }
      if (ty1 > tmin) tmin = ty1;
      if (ty2 < tmax) tmax = ty2;
      if (tmin > tmax) return null;
    }

    if (tmax < 0 || tmin > 1) return null;
    return Math.max(tmin, 0);
  }

  // ---- world factory --------------------------------------------------------

  function createWorld(zoneData) {
    var walls = zoneData.walls;

    function isBlocked(x, y) {
      for (var i = 0; i < walls.length; i++) {
        if (rectContainsPoint(walls[i], x, y)) return true;
      }
      return false;
    }

    function isBlockedCircle(x, y, r) {
      for (var i = 0; i < walls.length; i++) {
        if (circleOverlapsRect(x, y, r, walls[i])) return true;
      }
      return false;
    }

    function raycast(x1, y1, x2, y2) {
      var bestT = null;
      for (var i = 0; i < walls.length; i++) {
        var t = segmentVsRect(x1, y1, x2, y2, walls[i]);
        if (t !== null && (bestT === null || t < bestT)) bestT = t;
      }
      if (bestT === null) return null;
      var hx = x1 + (x2 - x1) * bestT;
      var hy = y1 + (y2 - y1) * bestT;
      var fullDx = x2 - x1;
      var fullDy = y2 - y1;
      var fullLen = Math.sqrt(fullDx * fullDx + fullDy * fullDy);
      return { x: hx, y: hy, dist: bestT * fullLen };
    }

    function moveCircle(x, y, dx, dy, r) {
      var nx = x + dx;
      if (!isBlockedCircle(nx, y, r)) x = nx;
      var ny = y + dy;
      if (!isBlockedCircle(x, ny, r)) y = ny;
      return { x: x, y: y };
    }

    function inRegion(x, y, region) {
      return rectContainsPoint(region, x, y);
    }

    return {
      isBlocked: isBlocked,
      isBlockedCircle: isBlockedCircle,
      raycast: raycast,
      moveCircle: moveCircle,
      inRegion: inRegion,
      zone: zoneData,
    };
  }

  // ---- zone data: LOADING DOCK ----------------------------------------------
  // 40x30m. Perimeter is 4 conceptual walls (top/bottom/left/right, thickness 1);
  // the top wall is split into two AABBs (walls[0], walls[1]) to leave a 4m gap
  // at x:18-22 — the exit into the Warehouse — so the array holds 5 perimeter
  // segments (walls[0..4]) followed by 8 interior obstacles (walls[5..12]).
  //
  // Layout: a center crate stack sits directly between playerSpawn and the exit,
  // so the straight shot north is blocked and the player must route around it.
  // Two shipping containers flank the center, each leaving a corridor to the
  // outer walls (left flank / right flank) plus 4m gaps on either side of the
  // center stack (center weave) — three plausible routes north. A guard hut in
  // the NW gives a patrolling guard somewhere to be; small crate clusters in the
  // south give the player near-spawn cover.
  var loadingDock = {
    id: "loadingDock",
    name: "LOADING DOCK",
    bounds: { w: 40, h: 30 },
    walls: [
      // perimeter (5 segments: top split around the exit gap, bottom, left, right)
      { x: 0, y: 0, w: 18, h: 1 }, // top-left
      { x: 22, y: 0, w: 18, h: 1 }, // top-right (gap: x 18-22)
      { x: 0, y: 29, w: 40, h: 1 }, // bottom
      { x: 0, y: 0, w: 1, h: 30 }, // left
      { x: 39, y: 0, w: 1, h: 30 }, // right
      // interior obstacles (8)
      { x: 8, y: 9, w: 6, h: 11 }, // shipping container, west
      { x: 26, y: 9, w: 6, h: 11 }, // shipping container, east
      { x: 17, y: 13, w: 6, h: 5 }, // center crate stack (blocks the direct line)
      { x: 9, y: 3, w: 6, h: 5 }, // guard hut, NW
      { x: 4, y: 21, w: 3, h: 3 }, // small crates, SW
      { x: 33, y: 21, w: 3, h: 3 }, // small crates, SE
      { x: 12, y: 23, w: 3, h: 3 }, // small crates, S center-left
      { x: 25, y: 23, w: 3, h: 3 }, // small crates, S center-right
    ],
    playerSpawn: { x: 20, y: 27 },
    // exits/entrances: the only path out of the Loading Dock is north into the
    // Warehouse through the perimeter gap at x:18-22. entrances.fromWarehouse
    // sits just south of that gap (y:4, one meter clear of the y:0-3 trigger
    // AABB) so a player crossing back in from the Warehouse doesn't spawn
    // standing on top of the trigger and immediately re-cross.
    exits: [{ x: 18, y: 0, w: 4, h: 3, to: "warehouse", entranceKey: "fromLoadingDock" }],
    entrances: { fromWarehouse: { x: 20, y: 4 } },
    waypoints: [
      { x: 3, y: 2 }, // NW corner (above all obstacles for clear north leg)
      { x: 37, y: 2 }, // NE corner
      { x: 37, y: 27 }, // SE corner (south of crate clusters, north of perimeter)
      { x: 3, y: 27 }, // SW corner
    ],
    darkZones: [
      { x: 2, y: 9, w: 5, h: 11 }, // shadow west of the container, along the left flank
      { x: 23, y: 13, w: 3, h: 5 }, // shadow between the crate stack and the east container
    ],
    // Data only this cycle (see schema note above) — placed in the west dark
    // zone, plausible near-term hiding spots for the future items cycle.
    lockers: [
      { x: 2, y: 9, facing: 0 },
      { x: 2, y: 20, facing: 0 },
    ],
  };
  loadingDock.exit = loadingDock.exits[0]; // back-compat alias, see schema note above

  // ---- zone data: WAREHOUSE --------------------------------------------------
  // 40x30m, industrial interior. Perimeter is the same 4-conceptual-wall
  // pattern as the Loading Dock, but BOTH the top and bottom walls are split
  // around a 4m gap at x:18-22: south leads back to the Loading Dock, north is
  // a stub toward the (not yet built) Laboratory zone — engine.js resolves
  // unknown `to` targets by staying put and emitting `zoneBlocked` rather than
  // throwing, so this stub is safe to ship ahead of the zone it points to.
  // That shared x:18-22 column is kept deliberately free of shelving, so it
  // reads as the main north-south spine connecting both exits; three shelving
  // rows (six long thin AABBs, each split top/bottom around a shared y:14-16
  // gap so the aisles are still crossable) sit on either side of that spine,
  // forming four aisles west-to-east: the far-west aisle (x:1-8), between rows
  // 1/2 (x:9.5-14), the wide center aisle (x:15.5-28, containing the spine),
  // and the far-east aisle (x:29.5-39). Crate clusters give cover/patrol
  // targets inside the aisles; two dark zones sit at aisle ends (unlit
  // shelving corners), well clear of every wall.
  var warehouse = {
    id: "warehouse",
    name: "WAREHOUSE",
    bounds: { w: 40, h: 30 },
    walls: [
      // perimeter (6 segments: top split around the north stub, bottom split
      // around the south exit, left, right)
      { x: 0, y: 0, w: 18, h: 1 }, // top-left
      { x: 22, y: 0, w: 18, h: 1 }, // top-right (gap: x 18-22, stub to laboratory)
      { x: 0, y: 29, w: 18, h: 1 }, // bottom-left
      { x: 22, y: 29, w: 18, h: 1 }, // bottom-right (gap: x 18-22, exit to loadingDock)
      { x: 0, y: 0, w: 1, h: 30 }, // left
      { x: 39, y: 0, w: 1, h: 30 }, // right
      // shelving row 1 (x 8-9.5), split around the y:14-16 cross-aisle gap
      { x: 8, y: 4, w: 1.5, h: 10 },
      { x: 8, y: 16, w: 1.5, h: 10 },
      // shelving row 2 (x 14-15.5), same gap
      { x: 14, y: 4, w: 1.5, h: 10 },
      { x: 14, y: 16, w: 1.5, h: 10 },
      // shelving row 3 (x 28-29.5), same gap
      { x: 28, y: 4, w: 1.5, h: 10 },
      { x: 28, y: 16, w: 1.5, h: 10 },
      // crate clusters, one per aisle
      { x: 4, y: 10, w: 2, h: 2 }, // far-west aisle, north
      { x: 11, y: 20, w: 2, h: 2 }, // row1/row2 aisle, south
      { x: 24, y: 9, w: 2, h: 2 }, // center aisle, north (east side, clear of the spine)
      { x: 33, y: 19, w: 2, h: 2 }, // far-east aisle, south
    ],
    // Booting directly into the Warehouse (e.g. a headless test with no
    // transition) spawns at the same spot a player arrives at via the south
    // exit from the Loading Dock.
    playerSpawn: { x: 20, y: 25 },
    exits: [
      // South: back to the Loading Dock. Trigger sits against the bottom
      // perimeter gap (y:26-29); entrances.fromLoadingDock (below) is 1m
      // clear north of it so arriving players don't stand on the trigger.
      { x: 18, y: 26, w: 4, h: 3, to: "loadingDock", entranceKey: "fromWarehouse" },
      // North: stub toward the Laboratory. Not yet a real zone — see file
      // header note above. entranceKey names the entry the Laboratory would
      // expose for arrivals FROM the Warehouse, once it exists.
      { x: 18, y: 0, w: 4, h: 3, to: "laboratory", entranceKey: "fromWarehouse" },
    ],
    entrances: { fromLoadingDock: { x: 20, y: 25 } },
    // Primary loop: the same clear perimeter-corridor shape as loadingDock's
    // waypoints (y~2 north / y~27 south bands sit above/below every shelving
    // row, and x~3 / x~37 columns run clear down each flank) — guard w1 walks
    // the outer ring.
    waypoints: [
      { x: 3, y: 2 },
      { x: 37, y: 2 },
      { x: 37, y: 27 },
      { x: 3, y: 27 },
    ],
    // Second loop: guard w2's cross-aisle sweep, a rectangle confined to the
    // wide center aisle (x:15.5-28) — clear of every shelving row and both
    // crate clusters that flank it, giving a patrol that reads as genuinely
    // different ground from the perimeter loop above.
    waypoints2: [
      { x: 17, y: 5 },
      { x: 22, y: 5 },
      { x: 22, y: 25 },
      { x: 17, y: 25 },
    ],
    darkZones: [
      { x: 2, y: 4, w: 4, h: 8 }, // far-west aisle, unlit north corner
      { x: 31, y: 20, w: 6, h: 6 }, // far-east aisle, unlit south corner
    ],
    // Data only this cycle (see schema note above) — tucked along shelving
    // ends and aisle margins, clear of every wall/crate.
    lockers: [
      { x: 2, y: 6, facing: 0 },
      { x: 11, y: 6, facing: Math.PI },
      { x: 30, y: 22, facing: 0 },
      { x: 37, y: 22, facing: Math.PI },
      { x: 2, y: 24, facing: 0 },
    ],
  };
  warehouse.exit = warehouse.exits[0]; // back-compat alias, see schema note above

  Game.createWorld = createWorld;
  Game.ZONES = { loadingDock: loadingDock, warehouse: warehouse };
  if (typeof module !== "undefined")
    module.exports = { createWorld: createWorld, ZONES: Game.ZONES };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/player.js ====
// src/player.js
// PUBLIC API:
//   Game.createPlayer({ world }) -> player, where `world` is a Game.createWorld(...)
//   instance (see src/world.js). Spawns at world.zone.playerSpawn, radius 0.4.
//
//   Player state — plain readable properties, updated in place by update():
//     player.x, player.y     — position (meters, world space)
//     player.facing          — radians; atan2(dy, dx) of the last nonzero
//                               movement input (0 = +x, PI/2 = +y since +y is
//                               down). Retained (unchanged) while idle.
//     player.stance          — "stand" | "crouch" | "crawl"
//     player.running         — boolean; true only on ticks where the player is
//                               actually moving at the "stand" run speed (i.e.
//                               stance === "stand" && input.run && moving).
//     player.moving          — boolean; true iff this tick's input had nonzero
//                               displacement (before the moveCircle collision
//                               resolve — it reflects INTENT to move, not
//                               whether a wall fully absorbed it).
//     player.radius           — 0.4 (constant)
//
//   player.update(input, dt):
//     input: { moveX: -1..1, moveY: -1..1, run: boolean,
//              stance: "stand" | "crouch" | "crawl" }
//     dt: fixed timestep in seconds (engine uses 1/60).
//     - The (moveX, moveY) vector is clamped to magnitude 1 (diagonal input is
//       not faster than axis-aligned input).
//     - input.stance sets player.stance for this tick (and is retained if the
//       caller omits it on a later tick).
//     - Speed (m/s) by stance: stand+run 6.0, stand (walk) 3.0, crouch 1.6,
//       crawl 0.8. run only takes effect in "stand"; crouch/crawl ignore
//       input.run and use their own fixed speed.
//     - facing updates only on nonzero input; otherwise unchanged.
//     - Movement is resolved through world.moveCircle — the player can never
//       end up overlapping a wall.
//
//   player.visionProfile() -> number
//     Perception multiplier for the vision module: stand 1.0, crouch 0.6
//     (-40%), crawl 0.3 (-70%). Depends only on current stance.
//
//   player.noiseRadius() -> number
//     Meters of noise radius generated THIS tick, for the soundEvents module:
//     stationary (not moving) 0; else run 8, walk (stand, not running) 3,
//     crouch 1, crawl 0.
//
// Pure logic module: no THREE, no DOM, no browser APIs — runs headless in
// node. No dependency on other modules for math (own local helpers below).
(function (Game) {
  // ---- local math helpers (no dependency on other modules) -----------------

  // Clamps a 2D vector to magnitude <= 1, preserving direction. Vectors
  // already within the unit disc are returned unchanged.
  function clampToUnit(x, y) {
    var mag = Math.sqrt(x * x + y * y);
    if (mag > 1) {
      return { x: x / mag, y: y / mag, mag: 1 };
    }
    return { x: x, y: y, mag: mag };
  }

  var RADIUS = 0.4;

  var SPEED_RUN = 6.0;
  var SPEED_WALK = 3.0;
  var SPEED_CROUCH = 1.6;
  var SPEED_CRAWL = 0.8;

  var VISION_STAND = 1.0;
  var VISION_CROUCH = 0.6;
  var VISION_CRAWL = 0.3;

  var NOISE_RUN = 8;
  var NOISE_WALK = 3;
  var NOISE_CROUCH = 1;
  var NOISE_CRAWL = 0;

  // ---- player factory --------------------------------------------------------

  function createPlayer(deps) {
    var world = deps.world;
    var spawn = world.zone.playerSpawn;

    var player = {
      x: spawn.x,
      y: spawn.y,
      facing: 0,
      stance: "stand",
      running: false,
      moving: false,
      radius: RADIUS,
    };

    function speedFor(stance, run) {
      if (stance === "crouch") return SPEED_CROUCH;
      if (stance === "crawl") return SPEED_CRAWL;
      // "stand" (and any unrecognized stance falls back to stand's rules)
      return run ? SPEED_RUN : SPEED_WALK;
    }

    function update(input, dt) {
      input = input || {};
      if (input.stance !== undefined) player.stance = input.stance;

      var rawX = input.moveX || 0;
      var rawY = input.moveY || 0;
      var v = clampToUnit(rawX, rawY);

      var moving = v.mag > 0;
      player.moving = moving;

      if (moving) {
        player.facing = Math.atan2(v.y, v.x);
      }

      var runRequested = !!input.run && player.stance === "stand";
      player.running = moving && runRequested;

      var speed = speedFor(player.stance, runRequested);
      var dx = v.x * speed * dt;
      var dy = v.y * speed * dt;

      var res = world.moveCircle(player.x, player.y, dx, dy, player.radius);
      player.x = res.x;
      player.y = res.y;
    }

    function visionProfile() {
      if (player.stance === "crouch") return VISION_CROUCH;
      if (player.stance === "crawl") return VISION_CRAWL;
      return VISION_STAND;
    }

    function noiseRadius() {
      if (!player.moving) return 0;
      if (player.running) return NOISE_RUN;
      if (player.stance === "crouch") return NOISE_CROUCH;
      if (player.stance === "crawl") return NOISE_CRAWL;
      return NOISE_WALK;
    }

    player.update = update;
    player.visionProfile = visionProfile;
    player.noiseRadius = noiseRadius;

    return player;
  }

  Game.createPlayer = createPlayer;
  if (typeof module !== "undefined")
    module.exports = { createPlayer: createPlayer };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/soundEvents.js ====
// src/soundEvents.js
// PUBLIC API:

//                // sharp -> "strong" stimulus (deliberate/alarming); anything
//                // NOT in this map (movement kinds: run/walk/crouch) is soft
//                // -> "faint".
//       KNOCK_WALL_DIST: 1.2,    // player must be this close to a wall to knock
//     }

//       obvious approach — cast, step an epsilon past the hit, cast again,

//       comment: "t is clamped to 0 if the segment starts inside the box").
//       So the moment a marching cast lands even slightly inside a wall (which
//       it must, to get past the entry surface), the NEXT cast from that point
//       reports dist ~0 forever — an infinite-loop hazard, not a corner case.
//       Instead this module keeps a LOCAL copy of the slab math (wallEntryT
//       below) that returns the UNCLAMPED entry parameter t for the segment
//       against the INFINITE line through it, so "segment starts inside/past
//       this wall" (t <= 0) is distinguishable from "segment actually enters
//       this wall somewhere in the middle" (0 < t < 1). wallsBetween then just
//       iterates world.zone.walls ONCE and counts entries with 0 < t < 1 — no
//       marching, no epsilon stepping, no iteration cap needed, and each wall
//       is counted at most once (its single entry crossing), which is exactly
//       "how many distinct walls does this line cross".

//       listener has no .id, so every result is addressable even for

//       outcome) — useful for tests/debug UI wanting to know "how loud would
//       this have been."

//

        tx1 = tx2;
        tx2 = tmpx;

          heard: heard,
          effRadius: effRadius,

    }

      return emitRadius(x, y, baseRadiusFor(kind), !!SOUND.SHARP[kind], listeners);

// src/vision.js
// PUBLIC API:
//   Game.VISION — tunable constants:
//     {
//       FOV_DEG: 70,          // full cone angle (degrees)
//       RANGE: 14,            // meters
//       SUSPICIOUS_AT: 0.35,  // meter threshold -> guard FSM SUSPICIOUS
//       ALERT_AT: 1.0,        // meter full -> confirmed sight -> ALERT
//       DARKNESS_MULT: 0.5,   // target inside a darkZone
//       DRAIN_PER_SEC: 0.5,   // meter drain per second when factor === 0
//       FILL_BASE: 1.25,      // fill rate (per second) for a standing target
//                             // at FILL_NEAR_DIST, in light, extraMult 1
//       FILL_NEAR_DIST: 2,    // meters — "close range" reference distance
//       FILL_FAR_SCALE: 0.3,  // proximity scale at RANGE, relative to NEAR
//     }

//     factor = FILL_BASE * proximityScale(dist, range) * profile * darkness * extraMult
//   This is a RATE MULTIPLIER (meter units per second), not clamped to 1 — it is
//   fed into tickMeter's meter += factor*dt integration. Tuned so a STANDING
//   target (profile 1.0) in open light (darkness 1) at close range (dist ==
//   FILL_NEAR_DIST == 2m) fills the meter 0 -> 1 in exactly FILL_BASE's
//   reciprocal: 1/1.25 = 0.8s, matching the SPEC "confirmed sight >= 0.8s ->
//   ALERT" threshold. At RANGE (14m) the same target's factor is scaled by
//   FILL_FAR_SCALE (0.3), i.e. ~3.33x slower — inside the required 2.5-4x
//   band. proximityScale is linear in distance and is NOT clamped to [0,1]:
//   targets closer than FILL_NEAR_DIST get a (slightly) faster-than-base fill,
//   which is intentional (nothing hides better than point-blank).
//
//   Game.createVision({ world }) -> vision, where `world` is a
//   Game.createWorld(...) instance (see src/world.js).

//                 <= fovDeg/2. Angle difference is computed via a wrapped
//                 normalization (result in (-PI, PI]) so a viewer facing PI

//                 The cone edge is INCLUSIVE (<=): a target at exactly
//                 fovDeg/2 off-center counts as seen.

    SUSPICIOUS_AT: 0.35,

    DARKNESS_MULT: 0.5,
    DRAIN_PER_SEC: 0.5,

    FILL_NEAR_DIST: 2,

      scene.add(obj);
      staticObjects.push(obj);
      return obj;
    }

    function buildStatic() {
      var floorMat = new THREE.MeshLambertMaterial({ color: FLOOR_COLOR });
      addStatic(buildFlatQuad(0, 0, zone.bounds.w, zone.bounds.h, 0, floorMat));

      var darkMat = new THREE.MeshLambertMaterial({ color: DARKZONE_COLOR });
      (zone.darkZones || []).forEach(function (dz) {
        addStatic(buildFlatQuad(dz.x, dz.y, dz.w, dz.h, 0.01, darkMat));
      });

      (zone.walls || []).forEach(function (wall) {
        var perimeter = isPerimeterWall(wall);
        var h = perimeter ? PERIMETER_H : INTERIOR_H;
        var geo = new THREE.BoxGeometry(wall.w, h, wall.h);
        var mat = new THREE.MeshLambertMaterial({
          color: perimeter ? WALL_PERIMETER_COLOR : WALL_INTERIOR_COLOR,
        });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(wall.x + wall.w / 2, h / 2, wall.y + wall.h / 2);
        addStatic(mesh);

        var edges = new THREE.EdgesGeometry(geo);
        var line = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({ color: WALL_EDGE_COLOR })

      // ("?"/"!") and dots stay legible at 720p against the tilted camera.
      marker.scale.set(1.8, 1.8, 1);

      scene.add(marker);

      var coneMesh = new THREE.Mesh(new THREE.BufferGeometry(), CONE_MATERIALS.PATROL);
      scene.add(coneMesh);

      var coneEdge = new THREE.LineLoop(new THREE.BufferGeometry(), EDGE_MATERIALS.PATROL);
      scene.add(coneEdge);

      var actor = {
        group: base.group,
        body: base.body,
        nose: base.nose,
        marker: marker,
        cone: coneMesh,
        coneEdge: coneEdge,
      };

      return actor;
    }

    // Removes + disposes every live guard actor (see ZONE CHANGES in the file
    // header — a zone change means a brand-new guard roster with different
    // ids, e.g. loadingDock's "g1" vs warehouse's "w1"/"w2", so the old
    // actors would otherwise sit around invisible-but-never-freed forever).
    // body/nose geometry+material and cone/coneEdge geometry are each owned
    // exclusively by their actor (fresh THREE.Material/Geometry per
    // makeActor()/updateVisionCone() call) and are disposed here; cone/
    // coneEdge MATERIALS and the marker's material come from the shared
    // CONE_MATERIALS/EDGE_MATERIALS/MARKER_MATERIALS maps (keyed by guard
    // state, reused across every guard and every zone) and must NOT be
    // disposed, or the next zone's guards would render with dead materials.
    function disposeGuardActors() {
      Object.keys(guardActors).forEach(function (id) {
        var actor = guardActors[id];
        scene.remove(actor.group, actor.marker, actor.cone, actor.coneEdge);
        actor.body.geometry.dispose();
        actor.body.material.dispose();
        actor.nose.geometry.dispose();
        actor.nose.material.dispose();
        actor.cone.geometry.dispose();
        actor.coneEdge.geometry.dispose();

      guardActors = {};
    }

    // Rebuilds a guard's vision-cone geometry this frame, clipped by
    // world.raycast so the fan never draws through a wall (the fan must show
    // what the guard can actually see — see file header / render contract).
    function updateVisionCone(actor, guard, world, squad) {
      var style = CONE_STYLE[guard.state] || CONE_STYLE.PATROL;
      actor.cone.material = CONE_MATERIALS[guard.state] || CONE_MATERIALS.PATROL;
      actor.coneEdge.material = EDGE_MATERIALS[guard.state] || EDGE_MATERIALS.PATROL;

      var caution = squad.phase === "CAUTION";
      var fovDeg = Game.VISION.FOV_DEG * (caution ? Game.GUARD.CAUTION_FOV_MULT : 1);
      var range = Game.VISION.RANGE * (caution ? Game.GUARD.CAUTION_RANGE_MULT : 1);
      var halfFov = (fovDeg * Math.PI) / 180 / 2;

      var segments = CONE_SEGMENTS;
      var positions = new Float32Array((segments + 2) * 3);
      positions[0] = guard.x;
      positions[1] = CONE_Y;
      positions[2] = guard.y;

      for (var i = 0; i <= segments; i++) {
        var angle = guard.facing - halfFov + (i * (2 * halfFov)) / segments;
        var farX = guard.x + Math.cos(angle) * range;
        var farY = guard.y + Math.sin(angle) * range;

        var py = hit ? hit.y : farY;

      geo.setIndex(indices);
      actor.cone.geometry = geo;

      // exactly the same vertex sequence already computed above; a LineLoop
      // over it closes N -> apex, tracing both straight edges plus the arc
      // in one pass — a crisp outline even where the additive fill is faint.
      actor.coneEdge.geometry.dispose();
      var edgePositions = positions.slice();
      // Nudge the outline a hair above the fill plane so it never z-fights
      // with it (both are depthWrite:false, but this keeps draw order moot).
      for (var e = 1; e < edgePositions.length; e += 3) edgePositions[e] = CONE_Y + 0.005;
      var edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
      actor.coneEdge.geometry = edgeGeo;

      // for future tuning (e.g. per-state fov override); currently unused
      // beyond material selection.
      void style;
    }

    function updateGuardMarker(actor, guard) {
      var mat = MARKER_MATERIALS[guard.state];
      if (!mat) {
        actor.marker.visible = false;
        return;
      }
      actor.marker.visible = true;
      actor.marker.material = mat;
      var h = STAND_H; // guards have no stance; body is always "stand" height
      // The camera's tilt compresses vertical elevation on screen (only the
      // component of world-Y along the camera's up axis shows up as
      // screen-up), so the marker needs more world-space clearance above the
      // guard's head than a straight top-down camera would — otherwise it
      // reads as sitting on top of the guard rather than floating above it.
      // (Raised slightly further than the pre-polish 1.3 to keep clearance
      // now that the marker itself is twice as large.)
      actor.marker.position.set(guard.x, h + 1.5, guard.y);
    }

    // ---- detection meter (two quads above the player) --------------------------

    var meterBg = null;
    var meterFill = null;

    function ensureMeter() {
      if (meterBg) return;
      meterBg = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x111111, transparent: true, opacity: 0.6, depthTest: false })
      );
      meterBg.scale.set(METER_MAX_W, METER_H, 1);
      meterFill = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x2e7d32, transparent: true, depthTest: false })
      );
      meterFill.scale.set(0.001, METER_H * 0.75, 1);
      scene.add(meterBg, meterFill);
    }

    function meterColor(v) {
      // green -> yellow (0..0.5), yellow -> red (0.5..1)
      var c1, c2, t;
      if (v <= 0.5) {
        c1 = { r: 0x2e, g: 0x7d, b: 0x32 };
        c2 = { r: 0xf9, g: 0xa8, b: 0x25 };
        t = v / 0.5;
      } else {
        c1 = { r: 0xf9, g: 0xa8, b: 0x25 };
        c2 = { r: 0xc6, g: 0x28, b: 0x28 };
        t = (v - 0.5) / 0.5;
      }
      var r = Math.round(c1.r + (c2.r - c1.r) * t);
      var g = Math.round(c1.g + (c2.g - c1.g) * t);
      var b = Math.round(c1.b + (c2.b - c1.b) * t);
      return (r << 16) | (g << 8) | b;
    }

    function updateMeter(engine) {
      var value = 0;
      for (var i = 0; i < engine.guards.length; i++) {
        if (engine.guards[i].meter > value) value = engine.guards[i].meter;
      }
      if (value <= 0.001) {
        if (meterBg) {
          meterBg.visible = false;
          meterFill.visible = false;
        }
        return;
      }
      ensureMeter();
      meterBg.visible = true;
      meterFill.visible = true;

      var player = engine.player;
      var y = stanceHeight(player.stance) + 0.55;
      meterBg.position.set(player.x, y, player.y);
      meterFill.position.set(player.x, y, player.y);
      meterFill.scale.set(Math.max(0.001, METER_MAX_W * value), METER_H * 0.75, 1);
      meterFill.material.color.setHex(meterColor(value));
    }

    // ---- per-frame sync ---------------------------------------------------------

    // Tracks the zone id the static scene was last built for (see ZONE
    // CHANGES in the file header). null until the first syncScene() call.
    var currentZoneId = null;

    function syncScene(engine) {
      if (engine.zone && engine.zone.id !== currentZoneId) {
        if (built) {
          disposeStatic();
          disposeGuardActors();
          built = false;
        }
        zone = engine.zone;
        zoneCenter = { x: zone.bounds.w / 2, y: zone.bounds.h / 2 };
        camera.position.set(zoneCenter.x, 26, zoneCenter.y + 14);
        camera.lookAt(zoneCenter.x, 0, zoneCenter.y);
        resize(); // refit the orthographic frustum to the new zone's bounds
        currentZoneId = zone.id;
      }

      if (!built) {
        buildStatic();
        built = true;
      }

      if (!playerActor) {
        playerActor = makeActor(PLAYER_COLOR, NOSE_COLOR);
      }
      var player = engine.player;
      placeActor(playerActor, player.x, player.y, player.facing, stanceHeight(player.stance));

      for (var i = 0; i < engine.guards.length; i++) {
        var guard = engine.guards[i];
        var actor = ensureGuardActor(guard);
        placeActor(actor, guard.x, guard.y, guard.facing, STAND_H);
        updateVisionCone(actor, guard, engine.world, engine.squad);
        updateGuardMarker(actor, guard);
      }

      updateMeter(engine);
    }

    function render(engine) {
      syncScene(engine);
      webgl.render(scene, camera);
    }

    function resize() {
      var w = (container && container.clientWidth) || 1;
      var h = (container && container.clientHeight) || 1;
      webgl.setSize(w, h);

      var aspect = w / h;
      var marginScale = 1.15;
      var neededHalfW = (zone.bounds.w / 2) * marginScale;
      var neededHalfH = (zone.bounds.h / 2) * marginScale;
      var halfH = Math.max(neededHalfH, neededHalfW / aspect);
      var halfW = halfH * aspect;

      camera.right = halfW;
      camera.top = halfH;
      camera.bottom = -halfH;

      resize: resize,

(function (global) {
// tests/engine.test.js — headless assertions for src/engine.js.
// Same registry pattern as tests/world.test.js: push onto the shared
// Game.selfTests list; test.js runs every entry headless, and boot.js runs
// the SAME list in-browser before the title screen — so every test here must
// be environment-portable (no Date.now/Math.random reliance on node-only
// APIs; timing uses the performance.now()-or-hrtime shim, same as the perf
// test below).
const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

var DT = 1 / 60;
var VALID_STATES = ["PATROL", "SUSPICIOUS", "INVESTIGATE", "ALERT", "EVASION", "CAUTION"];

function scriptedInput(tick) {
  return {
    moveX: Math.sin(tick * 0.037),
    moveY: Math.cos(tick * 0.051),
    run: tick % 7 === 0,
    stance: tick % 200 < 60 ? "crouch" : tick % 200 < 120 ? "crawl" : "stand",
  };
}

// 1. SMOKE — the binding definition of "playable": boot, spawn, 60 ticks of
// movement, zero errors.
Game.selfTests.push({
  name: "engine smoke: boot, spawn, 60 ticks of movement, zero errors",
  fn: function () {
    var engine = Game.createEngine();
    var spawn = engine.zone.playerSpawn;
    assert(engine.player.x === spawn.x && engine.player.y === spawn.y, "player should spawn at zone.playerSpawn");

    for (var i = 0; i < 60; i++) {
      engine.tick({ moveX: 0, moveY: -1, run: false, stance: "stand" });
    }

    assert(engine.tickCount === 60, "expected tickCount 60, got " + engine.tickCount);
    assert(
      Math.abs(engine.time - 60 * DT) < 1e-9,
      "expected time to track tickCount*DT, got " + engine.time
    );
    // +y is down, so moveY:-1 walks north (decreasing y).
    assert(
      engine.player.y < spawn.y,
      "expected player to move north (y decreasing) from spawn.y=" + spawn.y + ", got " + engine.player.y
    );
    engine.guards.forEach(function (g) {
      assert(VALID_STATES.indexOf(g.state) !== -1, "guard " + g.id + " in invalid state: " + g.state);
    });
  },
});

// 2. Determinism: two engines, same seed, same scripted 600-tick input
// sequence -> identical snapshot() JSON at the end.
Game.selfTests.push({
  name: "engine determinism: same seed + same scripted input -> identical final snapshot",
  fn: function () {
    var engineA = Game.createEngine({ seed: 555 });
    var engineB = Game.createEngine({ seed: 555 });

    for (var tick = 0; tick < 600; tick++) {
      var input = scriptedInput(tick);
      engineA.tick(input);
      engineB.tick(input);
    }

    var snapA = JSON.stringify(engineA.snapshot());
    var snapB = JSON.stringify(engineB.snapshot());
    assert(snapA === snapB, "expected identical snapshots for identical seed+input, got:\n" + snapA + "\nvs\n" + snapB);
  },
});

// 3. Different seeds -> traces may differ but both stay valid throughout.
Game.selfTests.push({
  name: "engine different seeds: both traces stay valid (states, in-bounds positions)",
  fn: function () {
    var engineA = Game.createEngine({ seed: 1 });
    var engineB = Game.createEngine({ seed: 2 });
    var bounds = engineA.zone.bounds;

    function checkValid(engine, label) {
      assert(
        engine.player.x >= 0 && engine.player.x <= bounds.w && engine.player.y >= 0 && engine.player.y <= bounds.h,
        label + ": player out of bounds " + JSON.stringify({ x: engine.player.x, y: engine.player.y })
      );
      engine.guards.forEach(function (g) {
        assert(VALID_STATES.indexOf(g.state) !== -1, label + ": guard " + g.id + " invalid state " + g.state);
        assert(
          g.x >= 0 && g.x <= bounds.w && g.y >= 0 && g.y <= bounds.h,
          label + ": guard " + g.id + " out of bounds " + JSON.stringify({ x: g.x, y: g.y })
        );
      });
    }

    for (var tick = 0; tick < 300; tick++) {
      var input = scriptedInput(tick);
      engineA.tick(input);
      engineB.tick(input);
      checkValid(engineA, "seed1");
      checkValid(engineB, "seed2");
    }
  },
});

// 4. Null input ticks work: player stationary, guards patrol.

// 5. Event emission: teleport the player in front of a guard and hold it
// there until ALERT fires — expect exactly one phaseChange
// INFILTRATION->ALERT and exactly one alert event across the whole run.
Game.selfTests.push({
  name: "engine events: phaseChange INFILTRATION->ALERT and alert fire exactly once",
  fn: function () {
    // Straight, clear east-west corridor (same geometry sim.js's part-A/B
    // scenarios rely on) so the guard's facing stays perfectly stable at 0
    // while it "patrols" toward a target it will never reach in this window.
    var engine = Game.createEngine({
      guardConfigs: [{ id: "evt-g1", spawn: { x: 20, y: 5 }, waypoints: [{ x: 1020, y: 5 }] }],
    });

    // engine.player.x/y are writable flat props (see src/player.js contract);
    // teleport 2m directly ahead of the guard's facing (close range -> fast fill).
    engine.player.x = 22;
    engine.player.y = 5;

    var phaseChangeToAlertCount = 0;
    var alertEventCount = 0;
    var TOTAL_TICKS = Math.round(6 / DT); // 6s: plenty vs. ~0.8s expected fill time

    for (var tick = 0; tick < TOTAL_TICKS; tick++) {
      engine.tick(); // null input: player must stay put via direct teleport, not movement
      // Re-pin the player's position every tick since a null-input tick is a
      // true no-op on player.x/y anyway (moveX/moveY are 0) — this just
      // guards against any future default-input change breaking the setup.
      engine.player.x = 22;
      engine.player.y = 5;

      engine.events.forEach(function (ev) {
        if (ev.type === "phaseChange" && ev.from === "INFILTRATION" && ev.to === "ALERT") {
          phaseChangeToAlertCount++;
        }
        if (ev.type === "alert") {
          alertEventCount++;
        }
      });
    }

    assert(
      phaseChangeToAlertCount === 1,
      "expected exactly one INFILTRATION->ALERT phaseChange, got " + phaseChangeToAlertCount
    );
    assert(alertEventCount === 1, "expected exactly one alert event, got " + alertEventCount);
    assert(engine.squad.phase === "ALERT", "expected squad to still be ALERT (player never left LOS), got " + engine.squad.phase);
  },
});

// 6. Squad wiring: after ALERT, hide the player far away for long enough and
// the phase ladder advances EVASION -> CAUTION -> INFILTRATION with no
// manual squad calls — the engine owns the loop end to end.
Game.selfTests.push({
  name: "engine squad wiring: ALERT -> EVASION -> CAUTION -> INFILTRATION with no manual squad calls",
  fn: function () {
    var engine = Game.createEngine({
      guardConfigs: [{ id: "ladder-g1", spawn: { x: 20, y: 5 }, waypoints: [{ x: 1020, y: 5 }] }],
    });

    engine.player.x = 22;
    engine.player.y = 5;

    // Drive to ALERT first (reuse the same close-range setup as test 5).
    var reachedAlert = false;
    for (var t = 0; t < Math.round(6 / DT) && !reachedAlert; t++) {
      engine.tick();
      engine.player.x = 22;
      engine.player.y = 5;
      if (engine.squad.phase === "ALERT") reachedAlert = true;
    }
    assert(reachedAlert, "setup failed: squad never reached ALERT");

    // Hide the player for good and let the engine's own tick loop run the
    // rest of the ladder — no direct squad.tick()/broadcastAlert() calls here.
    engine.player.x = -1000;
    engine.player.y = -1000;

    var evasionAt = null;
    var cautionAt = null;
    var infiltrationAt = null;
    var TOTAL_TICKS = Math.round(100 / DT); // EVASION_S(30) + CAUTION_S(45) + buffer

    for (var tick = 0; tick < TOTAL_TICKS; tick++) {
      engine.tick();
      engine.player.x = -1000;
      engine.player.y = -1000;
      if (evasionAt === null && engine.squad.phase === "EVASION") evasionAt = tick;
      if (cautionAt === null && engine.squad.phase === "CAUTION") cautionAt = tick;
      if (infiltrationAt === null && engine.squad.phase === "INFILTRATION") infiltrationAt = tick;
    }

    assert(evasionAt !== null, "squad never reached EVASION after losing the player");
    assert(cautionAt !== null && cautionAt > evasionAt, "squad never reached CAUTION after EVASION");
    assert(
      infiltrationAt !== null && infiltrationAt > cautionAt,
      "squad never returned to INFILTRATION after CAUTION"
    );
  },
});

    return results;
  }

  // Keys the game cares about (both for held-state movement and one-shot
  // toggles/verbs) — preventDefault is applied to all of these so the page
  // never scrolls/does browser default things while playing.
  var GAME_KEYS = {
    KeyW: true, KeyA: true, KeyS: true, KeyD: true,
    ArrowUp: true, ArrowDown: true, ArrowLeft: true, ArrowRight: true,
    ShiftLeft: true, ShiftRight: true,
    KeyC: true, KeyZ: true, KeyE: true,
    Enter: true,
  };

  function startGame(rootEl, titleEl) {
    rootEl.removeChild(titleEl);

    var engine = Game.createEngine();
    var renderer = Game.createRenderer({ container: rootEl, zone: engine.zone });
    var radar = Game.createRadar({ container: rootEl });
    var hud = Game.createHud({ container: rootEl });
    var music = Game.createMusic();

    // AUDIO GESTURE: WebAudio requires a user gesture to construct/resume an
    // AudioContext. startGame() is only ever invoked synchronously from the
    // Enter-keydown handler (see onEnter in showTitle below) — so calling
    // music.update() once right here, still inside that keydown event's call
    // stack, lazily constructs music's AudioContext (and starts fading in the
    // "sneak" bed) WHILE the gesture is live, instead of waiting for the
    // first requestAnimationFrame callback (which runs async, after the
    // gesture's call stack has already unwound). Every later call from the
    // frame loop below just reuses this same context — see src/music.js's
    // own AUDIO ISOLATION note for the try/catch-forever wrapping that makes
    // this safe even if WebAudio is unavailable/locked.
    music.update(engine);

    // Debug/screenshot hook ONLY — not read by any gameplay code. screenshot.js
    // uses this to teleport the player and inspect guard state for its scenes.
    window.Game._debug = { engine: engine, renderer: renderer };

    // ---- input state -----------------------------------------------------
    var held = {}; // physical key -> boolean, level-triggered (movement/run)
    var stance = "stand"; // toggled edge-triggered by C/Z
    var pendingKnock = false; // set true on an E keydown edge, consumed once

    function onKeyDown(e) {
      if (GAME_KEYS[e.code]) e.preventDefault();
      held[e.code] = true;
      if (e.repeat) return; // toggles/verbs below are edge-triggered only
      if (e.code === "KeyC") {
        stance = stance === "crouch" ? "stand" : "crouch";
      } else if (e.code === "KeyZ") {
        stance = stance === "crawl" ? "stand" : "crawl";
      } else if (e.code === "KeyE") {
        pendingKnock = true;
      }
    }

    function onKeyUp(e) {
      if (GAME_KEYS[e.code]) e.preventDefault();
      held[e.code] = false;
    }

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    window.addEventListener("resize", function () {
      renderer.resize();
    });

    function buildInput() {
      var moveX = 0;
      var moveY = 0;
      if (held.KeyA || held.ArrowLeft) moveX -= 1;
      if (held.KeyD || held.ArrowRight) moveX += 1;
      if (held.KeyW || held.ArrowUp) moveY -= 1;
      if (held.KeyS || held.ArrowDown) moveY += 1;

      return {
        moveX: moveX,
        moveY: moveY,
        run: !!(held.ShiftLeft || held.ShiftRight),
        stance: stance,
        knock: pendingKnock,
      };
    }

    // ---- fixed-timestep accumulator loop -----------------------------------
    var DT = engine.DT;
    var MAX_ACC = 0.25; // caps the catch-up burst after e.g. a suspended tab
    var acc = 0;
    var lastNow = null;

    function frame(now) {
      if (lastNow === null) lastNow = now;
      var frameDt = (now - lastNow) / 1000;
      lastNow = now;
      acc += frameDt;
      if (acc > MAX_ACC) acc = MAX_ACC;

      while (acc >= DT) {
        engine.tick(buildInput());
        pendingKnock = false; // consumed — only true for the tick right after the edge
        acc -= DT;
      }

      renderer.render(engine);
      radar.render(engine);
      hud.render(engine);
      music.update(engine);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  function showTitle(rootEl, results) {
    var title = document.createElement("div");
    title.style.cssText =
      "color:#9fb;background:#000;position:fixed;inset:0;display:flex;" +
      "align-items:center;justify-content:center;flex-direction:column;" +
      "font:16px monospace;letter-spacing:0.3em";
    title.innerHTML =
      "<div style='font-size:42px;margin-bottom:16px'>SHADOW LOOP</div>" +
      "<div>self-test: " + results.length + "/" + results.length + " passed</div>" +
      "<div style='margin-top:28px;font-size:22px;letter-spacing:0.2em'>PRESS ENTER</div>" +
      "<div style='margin-top:14px;color:#5a7;font-size:12px;letter-spacing:0.15em'>" +
      "WASD move &middot; SHIFT run &middot; C crouch &middot; Z crawl &middot; E knock</div>";
    rootEl.appendChild(title);

    function onEnter(e) {
      if (e.code !== "Enter") return;
      e.preventDefault();
      window.removeEventListener("keydown", onEnter);
      startGame(rootEl, title);
    }
    window.addEventListener("keydown", onEnter);
  }

  function boot(rootEl) {
    var results = runSelfTests();
    var failures = results.filter(function (r) { return !r.ok; });
    if (failures.length) {
      var pre = document.createElement("pre");
      pre.style.cssText =
        "color:#f33;background:#000;padding:24px;font:14px monospace;" +
        "position:fixed;inset:0;z-index:9999;overflow:auto;margin:0";
      pre.textContent =
        "BOOT SELF-TEST FAILED — start blocked\n\n" +
        failures.map(function (f) { return "FAIL " + f.name + "\n  " + f.error; }).join("\n");
      rootEl.appendChild(pre);
      return;
    }
    showTitle(rootEl, results);
  }

  Game.boot = boot;
  if (typeof module !== "undefined") module.exports = { boot: boot };

  if (typeof window !== "undefined") {
    window.addEventListener("DOMContentLoaded", function () {
      boot(document.getElementById("app"));
    });
  }
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

</script>
</body>
</html>
