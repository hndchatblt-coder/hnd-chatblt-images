    var dy = y2 - y1;
    var tmin = 0;

    if (dx === 0) {
      if (x1 < rect.x || x1 > rect.x + rect.w) return null;
    } else {
      var tx1 = (rect.x - x1) / dx;
      var tx2 = (rect.x + rect.w - x1) / dx;
      if (tx1 > tx2) {
        var tmp = tx1;
        tx1 = tx2;
        tx2 = tmp;
      }
      if (tx1 > tmin) tmin = tx1;
      if (tx2 < tmax) tmax = tx2;
      if (tmin > tmax) return null;
    }

    if (dy === 0) {
      if (y1 < rect.y || y1 > rect.y + rect.h) return null;
    } else {
      var ty1 = (rect.y - y1) / dy;
      var ty2 = (rect.y + rect.h - y1) / dy;

(function (Game) {

  var VISION_STAND = 1.0;
  var VISION_CROUCH = 0.6;
  var VISION_CRAWL = 0.3;

  var NOISE_RUN = 8;
  var NOISE_WALK = 3;
  var NOISE_CROUCH = 1;
  var NOISE_CRAWL = 0;

  function createPlayer(deps) {
    var world = deps.world;
    var spawn = world.zone.playerSpawn;

    var player = {
      x: spawn.x,
      y: spawn.y,
      facing: 0,
      stance: "stand",
      running: false,
      moving: false,
      radius: RADIUS,
      hp: 1,
      alive: true,
    };

    function speedFor(stance, run) {
      if (stance === "crouch") return SPEED_CROUCH;
      if (stance === "crawl") return SPEED_CRAWL;
      return run ? SPEED_RUN : SPEED_WALK;
    }

    function update(input, dt) {
      input = input || {};

      if (!player.alive) {
        player.moving = false;
        player.running = false;
        return;
      }

      if (input.stance !== undefined) player.stance = input.stance;

      var rawX = input.moveX || 0;
      var rawY = input.moveY || 0;
      var v = clampToUnit(rawX, rawY);

      var moving = v.mag > 0;
      player.moving = moving;

      if (moving) {
        player.facing = Math.atan2(v.y, v.x);
      }

      var runRequested = !!input.run && player.stance === "stand";
      player.running = moving && runRequested;

      var speed = speedFor(player.stance, runRequested);
      var dx = v.x * speed * dt;
      var dy = v.y * speed * dt;

      var res = world.moveCircle(player.x, player.y, dx, dy, player.radius);
      player.x = res.x;
      player.y = res.y;
    }

    function visionProfile() {
      if (player.stance === "crouch") return VISION_CROUCH;
      if (player.stance === "crawl") return VISION_CRAWL;
      return VISION_STAND;
    }

      if (!player.moving) return 0;
      if (player.running) return NOISE_RUN;

      if (player.stance === "crawl") return NOISE_CRAWL;
      return NOISE_WALK;

      player.hp = Math.max(0, player.hp - amount);
      player.alive = player.hp > 0;

        r: Math.max(0, Math.min(255, rgb.r + delta)),

      var canvas = document.createElement("canvas");
      canvas.width = TEXTURE_SIZE;
      canvas.height = TEXTURE_SIZE;

      var tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.needsUpdate = true;
      textureCache[key] = tex;

    function concreteTexture(baseColor, seed) {
      return cachedTexture("concrete", baseColor, seed, function (ctx, size, rng) {
        var base = hexToRgb(baseColor);
        ctx.fillStyle = rgbCss(base);
        ctx.fillRect(0, 0, size, size);

        var grains = 2200;
        for (var i = 0; i < grains; i++) {
          var gx = rng.next() * size;
          var gy = rng.next() * size;
          var shade = (rng.next() - 0.5) * 34;
          ctx.fillStyle = rgbCss(shadeRgb(base, shade), 0.5);
          ctx.fillRect(gx, gy, 1.4, 1.4);
        }

        var blotches = 5;
        for (var b = 0; b < blotches; b++) {
          var bx = rng.next() * size;
          var by = rng.next() * size;
          var br = 14 + rng.next() * 26;
          var grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
          grad.addColorStop(0, "rgba(0,0,0,0.22)");
          grad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(bx, by, br, 0, Math.PI * 2);
          ctx.fill();
        }

        var cracks = 4;
        for (var c = 0; c < cracks; c++) {
          ctx.strokeStyle = "rgba(0,0,0,0.28)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          var cx = rng.next() * size;
          var cy = rng.next() * size;
          ctx.moveTo(cx, cy);
          var segs = 3 + Math.floor(rng.next() * 3);
          for (var s = 0; s < segs; s++) {
            cx += (rng.next() - 0.5) * 46;
            cy += (rng.next() - 0.5) * 46;
            ctx.lineTo(cx, cy);
          }
          ctx.stroke();
        }
      });
    }

    function metalTexture(baseColor, seed) {
      return cachedTexture("metal", baseColor, seed, function (ctx, size, rng) {
        var base = hexToRgb(baseColor);
        ctx.fillStyle = rgbCss(base);
        ctx.fillRect(0, 0, size, size);

        var ridgeGap = size / 10;
        for (var x = ridgeGap * 0.5; x < size; x += ridgeGap) {
          var jitter = (rng.next() - 0.5) * 3;
          ctx.strokeStyle = rgbCss(shadeRgb(base, 26), 0.55);
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(x + jitter, 0);
          ctx.lineTo(x + jitter, size);
          ctx.stroke();
          ctx.strokeStyle = rgbCss(shadeRgb(base, -28), 0.5);
          ctx.beginPath();
          ctx.moveTo(x + jitter + 1.5, 0);
          ctx.lineTo(x + jitter + 1.5, size);
          ctx.stroke();
        }

        var scratches = 10;
        for (var i = 0; i < scratches; i++) {
          var sx = rng.next() * size;
          var sy = rng.next() * size;
          var len = 10 + rng.next() * 24;
          var ang = (rng.next() - 0.5) * 0.9;
          ctx.strokeStyle = rgbCss(shadeRgb(base, 45), 0.3);
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx + Math.cos(ang) * len, sy + Math.sin(ang) * len);
          ctx.stroke();
        }
      });
    }

    function hazardStripes(colorA, colorB) {
      return cachedTexture("hazard", colorA + "_" + colorB, 0, function (ctx, size) {
        ctx.fillStyle = rgbCss(hexToRgb(colorB));
        ctx.fillRect(0, 0, size, size);
        ctx.save();
        ctx.translate(size / 2, size / 2);
        ctx.rotate(Math.PI / 4);
        ctx.translate(-size, -size);
        ctx.fillStyle = rgbCss(hexToRgb(colorA));
        var stripeW = size / 8;
        for (var x = -size; x < size * 3; x += stripeW * 2) {
          ctx.fillRect(x, -size, stripeW, size * 4);
        }
        ctx.restore();

    }

    function cloneTiled(baseTex, worldW, worldH) {

    function makeDizzyTexture(color) {
      var size = 128;
      var canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = color;
      var cx = size / 2;
      var cy = size / 2;
      var ringR = size * 0.32;
      var dotR = size * 0.1;
      var dots = 5;
      for (var i = 0; i < dots; i++) {
        var angle = (i / dots) * Math.PI * 2;
        var dx = cx + Math.cos(angle) * ringR;
        var dy = cy + Math.sin(angle) * ringR;
        ctx.beginPath();
        ctx.arc(dx, dy, dotR, 0, Math.PI * 2);

      tex.needsUpdate = true;
      return tex;

    function lightenTowardWhite(rgb, amount) {

    var built = false;

    function buildFlatQuad(x, y, w, h, yOffset, material) {

    function addStatic(obj) {

    function buildStatic() {
      var palette = ZONE_PALETTES[zone.id] || DEFAULT_PALETTE;
      var seed = hashSeed(zone.id || "default");

      var floorTex = trackTexture(
        cloneTiled(concreteTexture(palette.floor, seed), zone.bounds.w, zone.bounds.h)
      );
      var floorMat = new THREE.MeshLambertMaterial({ color: 0xffffff, map: floorTex });
      addStatic(buildFlatQuad(0, 0, zone.bounds.w, zone.bounds.h, 0, floorMat));

      var darkMat = new THREE.MeshLambertMaterial({ color: DARKZONE_COLOR });
      (zone.darkZones || []).forEach(function (dz) {
        addStatic(buildFlatQuad(dz.x, dz.y, dz.w, dz.h, 0.01, darkMat));
      });

      var interiorWalls = (zone.walls || []).filter(function (w) {
        return !isPerimeterWall(w);
      });
      var hazardSet = interiorWalls
        .slice()
        .sort(function (a, b) {
          return a.w * a.h - b.w * b.h;
        })
        .slice(0, 2)
        .filter(function (w) {
          return w.w * w.h <= 12;
        });

      (zone.walls || []).forEach(function (wall) {
        var perimeter = isPerimeterWall(wall);
        var h = perimeter ? PERIMETER_H : INTERIOR_H;
        var geo = new THREE.BoxGeometry(wall.w, h, wall.h);

        var wallTex;
        if (perimeter) {

        } else {
          wallTex = metalTexture(palette.wallInterior, seed + 2);

          color: 0xffffff,
          map: trackTexture(cloneTiled(wallTex, wall.w, wall.h)),

        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(wall.x + wall.w / 2, h / 2, wall.y + wall.h / 2);

        );

      });

    function makeActor(bodyColor, visorColor) {
      var group = new THREE.Group();
      var figureGroup = new THREE.Group();
      group.add(figureGroup);

      var bodyMat = new THREE.MeshLambertMaterial({ color: bodyColor });
      var visorMat = new THREE.MeshLambertMaterial({ color: visorColor });

      var torso = new THREE.Mesh(new THREE.BoxGeometry(TORSO_D, 1, TORSO_W), bodyMat);
      var head = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R, 10, 8), bodyMat);
      var visor = new THREE.Mesh(
        new THREE.BoxGeometry(HEAD_R * 0.9, HEAD_R * 0.55, HEAD_R * 1.25),
        visorMat
      );
      figureGroup.add(torso, head, visor);

      function makeLimb(w) {
        var pivot = new THREE.Group();
        var mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 1, w), bodyMat);
        pivot.add(mesh);
        figureGroup.add(pivot);
        return { pivot: pivot, mesh: mesh };

      var rightLeg = makeLimb(LEG_W);
      var leftArm = makeLimb(ARM_W);
      var rightArm = makeLimb(ARM_W);

      scene.add(group);

      return {
        group: group,
        figureGroup: figureGroup,
        bodyMat: bodyMat,
        visorMat: visorMat,
        torso: torso,
        head: head,
        visor: visor,
        leftLeg: leftLeg,
        rightLeg: rightLeg,
        leftArm: leftArm,
        rightArm: rightArm,
        parts: [torso, head, visor, leftLeg.mesh, rightLeg.mesh, leftArm.mesh, rightArm.mesh],
        lastX: null,
        lastY: null,
        phase: 0,
        boxMesh: null,

    function updateWalkCycle(actor, x, y, baseSwingRad, running) {
      var dx = actor.lastX === null ? 0 : x - actor.lastX;
      var dy = actor.lastY === null ? 0 : y - actor.lastY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      actor.lastX = x;
      actor.lastY = y;
      if (dist <= STILL_EPS) return 0;
      actor.phase += dist * WALK_PHASE_PER_METER;
      return baseSwingRad * (running ? RUN_SWING_MULT : 1);
    }

    function poseUpright(actor, x, y, facing, totalH, tilt, phase, swingRad) {
      actor.group.position.set(x, 0, y);
      actor.group.rotation.y = -facing;
      actor.figureGroup.position.set(0, 0, 0);
      actor.figureGroup.rotation.set(0, 0, 0);
      actor.figureGroup.visible = true;

      var legLen = totalH * LEG_FRAC;
      var torsoH = totalH * TORSO_FRAC;
      var hipY = legLen;
      var shoulderY = hipY + torsoH;
      var headY = shoulderY + NECK_GAP + HEAD_R;

      actor.torso.scale.set(1, torsoH, 1);
      actor.torso.position.set(0, hipY + torsoH / 2, 0);
      actor.torso.rotation.set(0, 0, tilt);

      actor.head.position.set(Math.sin(tilt) * torsoH * 0.6, headY, 0);
      actor.visor.position.set(
        actor.head.position.x + HEAD_R * VISOR_FWD,
        actor.head.position.y - HEAD_R * 0.05,
        actor.head.position.z
      );
      actor.visor.rotation.set(0, 0, 0);
      actor.visor.visible = true;

      var legSwing = Math.sin(phase) * swingRad;
      var armSwing = Math.sin(phase) * swingRad * ARM_SWING_RATIO;

      actor.leftLeg.pivot.position.set(0, hipY, HIP_W / 2);
      actor.leftLeg.pivot.rotation.set(0, 0, legSwing);
      actor.leftLeg.mesh.scale.set(1, legLen, 1);
      actor.leftLeg.mesh.position.set(0, -legLen / 2, 0);
      actor.leftLeg.pivot.visible = true;

      actor.rightLeg.pivot.position.set(0, hipY, -HIP_W / 2);
      actor.rightLeg.pivot.rotation.set(0, 0, -legSwing);
      actor.rightLeg.mesh.scale.set(1, legLen, 1);
      actor.rightLeg.mesh.position.set(0, -legLen / 2, 0);
      actor.rightLeg.pivot.visible = true;

      var armLen = legLen * 0.92;
      actor.leftArm.pivot.position.set(0, shoulderY, TORSO_W / 2 + ARM_W * 0.6);
      actor.leftArm.pivot.rotation.set(0, 0, -armSwing);
      actor.leftArm.mesh.scale.set(1, armLen, 1);
      actor.leftArm.mesh.position.set(0, -armLen / 2, 0);
      actor.leftArm.pivot.visible = true;

      actor.rightArm.pivot.position.set(0, shoulderY, -(TORSO_W / 2 + ARM_W * 0.6));
      actor.rightArm.pivot.rotation.set(0, 0, armSwing);
      actor.rightArm.mesh.scale.set(1, armLen, 1);
      actor.rightArm.mesh.position.set(0, -armLen / 2, 0);
      actor.rightArm.pivot.visible = true;
    }

    function poseProne(actor, x, y, facing, phase, swingRad, armsForward) {
      actor.group.position.set(x, 0, y);
      actor.group.rotation.y = -facing;

      var totalH = STAND_H;
      var legLen = totalH * LEG_FRAC;
      var torsoH = totalH * TORSO_FRAC;
      var hipY = legLen - totalH / 2; // shifted so hip sits relative to the figure's own mid-height
      var shoulderY = hipY + torsoH;
      var headY = shoulderY + NECK_GAP + HEAD_R;

      actor.torso.scale.set(1, torsoH, 1);
      actor.torso.position.set(0, hipY + torsoH / 2, 0);
      actor.torso.rotation.set(0, 0, 0);

      actor.head.position.set(0, headY, 0);
      actor.visor.position.set(HEAD_R * VISOR_FWD, headY - HEAD_R * 0.05, 0);
      actor.visor.rotation.set(0, 0, 0);
      actor.visor.visible = true;

      var legSwing = Math.sin(phase) * swingRad;
      actor.leftLeg.pivot.position.set(0, hipY, HIP_W / 2);
      actor.leftLeg.pivot.rotation.set(0, 0, legSwing);
      actor.leftLeg.mesh.scale.set(1, legLen, 1);
      actor.leftLeg.mesh.position.set(0, -legLen / 2, 0);
      actor.leftLeg.pivot.visible = true;

      actor.rightLeg.pivot.position.set(0, hipY, -HIP_W / 2);
      actor.rightLeg.pivot.rotation.set(0, 0, -legSwing);
      actor.rightLeg.mesh.scale.set(1, legLen, 1);
      actor.rightLeg.mesh.position.set(0, -legLen / 2, 0);
      actor.rightLeg.pivot.visible = true;

      var armLen = legLen * 0.92;
      var armRest = armsForward ? PRONE_ARM_ROTATION : 0;
      var armSwing = armsForward ? legSwing * 0.5 : 0;
      actor.leftArm.pivot.position.set(0, shoulderY, TORSO_W / 2 + ARM_W * 0.6);
      actor.leftArm.pivot.rotation.set(0, 0, armRest - armSwing);
      actor.leftArm.mesh.scale.set(1, armLen, 1);
      actor.leftArm.mesh.position.set(0, -armLen / 2, 0);
      actor.leftArm.pivot.visible = true;

      actor.rightArm.pivot.position.set(0, shoulderY, -(TORSO_W / 2 + ARM_W * 0.6));
      actor.rightArm.pivot.rotation.set(0, 0, armRest + armSwing);
      actor.rightArm.mesh.scale.set(1, armLen, 1);
      actor.rightArm.mesh.position.set(0, -armLen / 2, 0);
      actor.rightArm.pivot.visible = true;

      actor.figureGroup.position.set(0, PRONE_LIFT, 0);
      actor.figureGroup.rotation.set(0, 0, -Math.PI / 2);

    var playerActor = null;

    function ensureGuardActor(guard) {

      var actor = makeActor(GUARD_COLOR, GUARD_VISOR_COLOR);

      var dizzy = new THREE.Sprite(DIZZY_MATERIAL);
      dizzy.scale.set(1.4, 1.4, 1);
      dizzy.visible = false;
      scene.add(dizzy);

      actor.marker = marker;
      actor.cone = coneMesh;
      actor.coneEdge = coneEdge;
      actor.zzz = zzz;
      actor.dizzy = dizzy;
      guardActors[guard.id] = actor;
      return actor;
    }

    function disposeGuardActors() {
      Object.keys(guardActors).forEach(function (id) {
        var actor = guardActors[id];
        scene.remove(actor.group, actor.marker, actor.cone, actor.coneEdge, actor.zzz, actor.dizzy);
        actor.parts.forEach(function (part) {
          part.geometry.dispose();
        });
        actor.bodyMat.dispose();
        actor.visorMat.dispose();
        actor.cone.geometry.dispose();
        actor.coneEdge.geometry.dispose();
      });
      guardActors = {};
    }

    function updateVisionCone(actor, guard, world, squad) {
      var style = CONE_STYLE[guard.state] || CONE_STYLE.PATROL;
      actor.cone.material = CONE_MATERIALS[guard.state] || CONE_MATERIALS.PATROL;
      actor.coneEdge.material = EDGE_MATERIALS[guard.state] || EDGE_MATERIALS.PATROL;

      var caution = squad.phase === "CAUTION";
      var fovDeg = Game.VISION.FOV_DEG * (caution ? Game.GUARD.CAUTION_FOV_MULT : 1);
      var range = Game.VISION.RANGE * (caution ? Game.GUARD.CAUTION_RANGE_MULT : 1);
      var halfFov = (fovDeg * Math.PI) / 180 / 2;

      var segments = CONE_SEGMENTS;
      var positions = new Float32Array((segments + 2) * 3);
      positions[0] = guard.x;
      positions[1] = CONE_Y;
      positions[2] = guard.y;

      for (var i = 0; i <= segments; i++) {
        var angle = guard.facing - halfFov + (i * (2 * halfFov)) / segments;
        var farX = guard.x + Math.cos(angle) * range;
        var farY = guard.y + Math.sin(angle) * range;
        var hit = world.raycast(guard.x, guard.y, farX, farY);
        var px = hit ? hit.x : farX;
        var py = hit ? hit.y : farY;
        var idx = (i + 1) * 3;
        positions[idx] = px;
        positions[idx + 1] = CONE_Y;
        positions[idx + 2] = py;
      }

      var indices = [];
      for (var k = 0; k < segments; k++) {
        indices.push(0, k + 1, k + 2);
      }

      actor.cone.geometry.dispose();
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setIndex(indices);
      actor.cone.geometry = geo;

      actor.coneEdge.geometry.dispose();
      var edgePositions = positions.slice();
      for (var e = 1; e < edgePositions.length; e += 3) edgePositions[e] = CONE_Y + 0.005;
      var edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
      actor.coneEdge.geometry = edgeGeo;
      void style;
    }

    function updateGuardMarker(actor, guard) {
      var mat = MARKER_MATERIALS[guard.state];
      if (!mat) {
        actor.marker.visible = false;
        return;
      }
      actor.marker.visible = true;
      actor.marker.material = mat;
      var h = STAND_H; // guards have no stance; body is always "stand" height
      actor.marker.position.set(guard.x, h + 1.5, guard.y);
    }

    var cameraActors = {}; // index -> { housing, cone, coneEdge }

    function ensureCameraActor(index, cam) {
      var existing = cameraActors[index];
      if (existing) return existing;

      var housingGeo = new THREE.BoxGeometry(CAMERA_HOUSING_W, CAMERA_HOUSING_H, CAMERA_HOUSING_W);
      var housingMat = new THREE.MeshLambertMaterial({ color: CAMERA_HOUSING_COLOR });
      var housing = new THREE.Mesh(housingGeo, housingMat);
      housing.position.set(cam.x, CAMERA_MOUNT_Y, cam.y);
      housing.rotation.y = -cam.panAngle;
      scene.add(housing);

      var coneMesh = new THREE.Mesh(new THREE.BufferGeometry(), makeCameraConeMaterial());
      scene.add(coneMesh);

      var coneEdge = new THREE.LineLoop(new THREE.BufferGeometry(), makeCameraEdgeMaterial());
      scene.add(coneEdge);

      var actor = { housing: housing, cone: coneMesh, coneEdge: coneEdge };
      cameraActors[index] = actor;
      return actor;
    }

    function disposeCameraActors() {
      Object.keys(cameraActors).forEach(function (index) {
        var actor = cameraActors[index];
        scene.remove(actor.housing, actor.cone, actor.coneEdge);
        actor.housing.geometry.dispose();
        actor.housing.material.dispose();
        actor.cone.geometry.dispose();
        actor.cone.material.dispose();
        actor.coneEdge.geometry.dispose();
        actor.coneEdge.material.dispose();
      });
      cameraActors = {};
    }

    function updateCameraCone(actor, camState, world) {
      if (camState.disabled) {
        actor.cone.material.color.setHex(CAMERA_CONE_DISABLED.color);
        actor.cone.material.opacity = CAMERA_CONE_DISABLED.opacity;
        actor.coneEdge.material.color.setHex(CAMERA_EDGE_DISABLED.color);
        actor.coneEdge.material.opacity = CAMERA_EDGE_DISABLED.opacity;
      } else {
        var rgb = Game.radarCameraColor(camState.meter);
        actor.cone.material.color.setRGB(rgb.r / 255, rgb.g / 255, rgb.b / 255);
        actor.cone.material.opacity = CAMERA_CONE_OPACITY;
        var edgeRgb = lightenTowardWhite(rgb, CAMERA_EDGE_LIGHTEN);
        actor.coneEdge.material.color.setRGB(edgeRgb.r / 255, edgeRgb.g / 255, edgeRgb.b / 255);
        actor.coneEdge.material.opacity = CAMERA_EDGE_OPACITY;
      }

      var halfFov = (camState.fovDeg * Math.PI) / 180 / 2;
      var range = camState.range;

      var segments = CONE_SEGMENTS;
      var positions = new Float32Array((segments + 2) * 3);
      positions[0] = camState.x;
      positions[1] = CONE_Y;
      positions[2] = camState.y;

      for (var i = 0; i <= segments; i++) {
        var angle = camState.panAngle - halfFov + (i * (2 * halfFov)) / segments;
        var farX = camState.x + Math.cos(angle) * range;
        var farY = camState.y + Math.sin(angle) * range;
        var hit = world.raycast(camState.x, camState.y, farX, farY);
        var px = hit ? hit.x : farX;
        var py = hit ? hit.y : farY;
        var idx = (i + 1) * 3;
        positions[idx] = px;
        positions[idx + 1] = CONE_Y;
        positions[idx + 2] = py;
      }

      var indices = [];
      for (var k = 0; k < segments; k++) {
        indices.push(0, k + 1, k + 2);
      }

      actor.cone.geometry.dispose();
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setIndex(indices);
      actor.cone.geometry = geo;

      actor.coneEdge.geometry.dispose();
      var edgePositions = positions.slice();
      for (var e = 1; e < edgePositions.length; e += 3) edgePositions[e] = CONE_Y + 0.005;
      var edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
      actor.coneEdge.geometry = edgeGeo;
    }

    var doorActors = {}; // door.id -> { mesh }
    var laserActors = {}; // index -> { line }
    var pickupActors = {}; // index -> { mesh }

    function ensureDoorActor(door) {
      var existing = doorActors[door.id];
      if (existing) return existing;
      var geo = new THREE.BoxGeometry(door.w, DOOR_HEIGHT, door.h);
      var mat = new THREE.MeshLambertMaterial({
        color: door.lock ? DOOR_LOCK_COLOR[door.lock] : DOOR_UNLOCKED_COLOR,
        transparent: true,
        opacity: 0.95,
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(door.x + door.w / 2, DOOR_HEIGHT / 2, door.y + door.h / 2);
      scene.add(mesh);
      var actor = { mesh: mesh };
      doorActors[door.id] = actor;
      return actor;
    }

    function disposeDoorActors() {
      Object.keys(doorActors).forEach(function (id) {
        var actor = doorActors[id];
        scene.remove(actor.mesh);
        actor.mesh.geometry.dispose();
        actor.mesh.material.dispose();
      });
      doorActors = {};
    }

    function ensureLaserActor(index, laser) {
      var existing = laserActors[index];
      if (existing) return existing;
      var positions = new Float32Array([laser.x1, LASER_Y, laser.y1, laser.x2, LASER_Y, laser.y2]);
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      var mat = new THREE.LineBasicMaterial({ color: LASER_COLOR, transparent: true, opacity: 0.95 });
      var line = new THREE.Line(geo, mat);
      scene.add(line);
      var actor = { line: line };
      laserActors[index] = actor;
      return actor;
    }

    function disposeLaserActors() {
      Object.keys(laserActors).forEach(function (index) {
        var actor = laserActors[index];
        scene.remove(actor.line);
        actor.line.geometry.dispose();
        actor.line.material.dispose();
      });
      laserActors = {};
    }

    function ensurePickupActor(index, pickup) {
      var existing = pickupActors[index];
      if (existing) return existing;
      var geo = new THREE.BoxGeometry(PICKUP_SIZE, PICKUP_SIZE, PICKUP_SIZE * 0.15);
      var mat = new THREE.MeshLambertMaterial({
        color: PICKUP_COLOR,
        emissive: PICKUP_COLOR,
        emissiveIntensity: 0.6,
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(pickup.x, PICKUP_Y, pickup.y);
      scene.add(mesh);
      var actor = { mesh: mesh };
      pickupActors[index] = actor;
      return actor;
    }

    function disposePickupActors() {
      Object.keys(pickupActors).forEach(function (index) {
        var actor = pickupActors[index];
        scene.remove(actor.mesh);
        actor.mesh.geometry.dispose();
        actor.mesh.material.dispose();
      });
      pickupActors = {};
    }

    function pickupCollected(item, engine) {
      var kc = engine.inventory && engine.inventory.keycards;
      if (!kc) return false;
      if (item === "keycardL1") return !!kc.L1;
      if (item === "keycardL2") return !!kc.L2;
      if (item === "keycardL3") return !!kc.L3;
      return false;
    }

    var meterBg = null;
    var meterFill = null;

    function ensureMeter() {
      if (meterBg) return;
      meterBg = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x111111, transparent: true, opacity: 0.6, depthTest: false })
      );
      meterBg.scale.set(METER_MAX_W, METER_H, 1);
      meterFill = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x2e7d32, transparent: true, depthTest: false })
      );
      meterFill.scale.set(0.001, METER_H * 0.75, 1);
      scene.add(meterBg, meterFill);
    }

    var tracers = []; // { from:{x,y}, to:{x,y}, startTime } — pure data
    var tracerLines = []; // parallel THREE.Line objects currently in the scene

    function clearTracers() {
      tracerLines.forEach(function (line) {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      });
      tracerLines = [];
      tracers = [];
    }

    function updateTracers(engine) {
      for (var i = 0; i < engine.events.length; i++) {
        var ev = engine.events[i];
        if (ev.type === "tranqFired" && ev.impact) {
          tracers.push({
            from: { x: engine.player.x, y: engine.player.y },
            to: { x: ev.impact.x, y: ev.impact.y },
            startTime: engine.time,
          });
        }
      }

      tracers = tracers.filter(function (t) {
        return engine.time - t.startTime < TRACER_DURATION_S;
      });

      tracerLines.forEach(function (line) {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      });
      tracerLines = tracers.map(function (t) {
        var age = engine.time - t.startTime;
        var alpha = Math.max(0, 1 - age / TRACER_DURATION_S);
        var positions = new Float32Array([t.from.x, TRACER_Y, t.from.y, t.to.x, TRACER_Y, t.to.y]);
        var geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        var mat = new THREE.LineBasicMaterial({
          color: 0xbfffea,
          transparent: true,
          opacity: alpha,
          depthWrite: false,
        });
        var line = new THREE.Line(geo, mat);
        scene.add(line);
        return line;
      });
    }

    function lerpHexColor(from, to, t) {
      var fr = (from >> 16) & 0xff,
        fg = (from >> 8) & 0xff,
        fb = from & 0xff;
      var tr = (to >> 16) & 0xff,
        tg = (to >> 8) & 0xff,
        tb = to & 0xff;
      var r = Math.round(fr + (tr - fr) * t);
      var g = Math.round(fg + (tg - fg) * t);
      var b = Math.round(fb + (tb - fb) * t);
      return (r << 16) | (g << 8) | b;
    }

    var hitFlashMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: HIT_FLASH_COLOR,
        transparent: true,
        opacity: 0,
        depthTest: false,
        depthWrite: false,
        side: THREE.DoubleSide,
      })
    );
    hitFlashMesh.position.set(0, 0, HIT_FLASH_Z);
    hitFlashMesh.renderOrder = 999; // belt-and-braces on top of every other transparent draw
    hitFlashMesh.visible = false;
    camera.add(hitFlashMesh); // camera-local child — see "scene.add(camera)" above

    var hitFlashStart = null; // engine.time of the most recent playerHit event, null = never hit

    function computeHitFlashAlpha(engine) {
      for (var i = 0; i < engine.events.length; i++) {
        if (engine.events[i].type === "playerHit") {
          hitFlashStart = engine.time;
          break;
        }
      }
      if (hitFlashStart === null) return 0;
      var age = engine.time - hitFlashStart;
      if (age >= HIT_FLASH_DURATION_S) return 0;
      return HIT_FLASH_ALPHA_MAX * (1 - age / HIT_FLASH_DURATION_S);
    }

    function updateHitFlashMesh(alpha) {
      hitFlashMesh.material.opacity = alpha;
      hitFlashMesh.visible = alpha > 0.0005;
      hitFlashMesh.scale.set(
        Math.max(0.001, camera.right - camera.left),
        Math.max(0.001, camera.top - camera.bottom),
        1
      );
    }

    var ripples = []; // pure data: { x, y, startTime, duration, maxR, kind } — up to RIPPLE_MAX_LIVE alive
    var ripplePool = []; // fixed-size pool of THREE.LineLoop, built once, reused (see file header POOLING)
    var lastRunRippleAt = -Infinity;
    var lastWalkRippleAt = -Infinity;

    function ensureRipplePool() {
      while (ripplePool.length < RIPPLE_MAX_LIVE) {
        var positions = new Float32Array(RIPPLE_SEGMENTS * 3);
        var geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        var mat = new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0,
          depthWrite: false,
        });
        var line = new THREE.LineLoop(geo, mat);
        line.visible = false;
        scene.add(line);
        ripplePool.push(line);
      }
    }

    function clearRipples() {
      ripples = [];
    }

    function spawnRipple(x, y, startTime, kind, maxR) {
      ripples.push({
        x: x,
        y: y,
        startTime: startTime,
        duration: RIPPLE_STYLE[kind].duration,
        maxR: maxR,
        kind: kind,
      });
    }

    function writeRingPositions(line, x, y, r) {
      var arr = line.geometry.attributes.position.array;
      for (var i = 0; i < RIPPLE_SEGMENTS; i++) {
        var a = (i / RIPPLE_SEGMENTS) * TWO_PI_R;
        arr[i * 3] = x + Math.cos(a) * r;
        arr[i * 3 + 1] = RIPPLE_Y;
        arr[i * 3 + 2] = y + Math.sin(a) * r;
      }
      line.geometry.attributes.position.needsUpdate = true;
    }

    function updateRipples(engine) {
      ensureRipplePool();

      for (var i = 0; i < engine.events.length; i++) {
        var ev = engine.events[i];
        if (ev.type === "knock") {
          spawnRipple(ev.x, ev.y, engine.time, "knock", Game.SOUND.RADII.knock);
        }
      }

      if (!engine.gameOver) {
        var nr = engine.player.noiseRadius();
        if (nr >= RUN_NOISE_THRESHOLD) {
          if (engine.time - lastRunRippleAt >= RUN_RIPPLE_INTERVAL_S) {
            spawnRipple(engine.player.x, engine.player.y, engine.time, "run", Game.SOUND.RADII.run);
            lastRunRippleAt = engine.time;
          }
        } else if (nr >= WALK_NOISE_THRESHOLD) {
          if (engine.time - lastWalkRippleAt >= WALK_RIPPLE_INTERVAL_S) {
            spawnRipple(engine.player.x, engine.player.y, engine.time, "walk", Game.SOUND.RADII.walk);
            lastWalkRippleAt = engine.time;
          }
        }
      }

      ripples = ripples.filter(function (r) {
        return engine.time - r.startTime < r.duration;
      });
      if (ripples.length > RIPPLE_MAX_LIVE) {
        ripples = ripples.slice(ripples.length - RIPPLE_MAX_LIVE);
      }

      for (var p = 0; p < ripplePool.length; p++) {
        var line = ripplePool[p];
        var ripple = ripples[p];
        if (!ripple) {
          line.visible = false;
          continue;
        }
        var age = engine.time - ripple.startTime;
        var t = age / ripple.duration; // 0..1
        var style = RIPPLE_STYLE[ripple.kind];
        var r = Math.max(0.05, t * ripple.maxR); // 0 -> maxR, linear in time (deterministic)
        writeRingPositions(line, ripple.x, ripple.y, r);
        line.material.color.setHex(style.color);
        line.material.opacity = style.opacity * (1 - t); // fades out as it expands
        line.visible = true;
      }
    }

    function meterColor(v) {
      var c1, c2, t;
      if (v <= 0.5) {
        c1 = { r: 0x2e, g: 0x7d, b: 0x32 };
        c2 = { r: 0xf9, g: 0xa8, b: 0x25 };
        t = v / 0.5;
      } else {
        c1 = { r: 0xf9, g: 0xa8, b: 0x25 };
        c2 = { r: 0xc6, g: 0x28, b: 0x28 };
        t = (v - 0.5) / 0.5;
      }
      var r = Math.round(c1.r + (c2.r - c1.r) * t);
      var g = Math.round(c1.g + (c2.g - c1.g) * t);
      var b = Math.round(c1.b + (c2.b - c1.b) * t);
      return (r << 16) | (g << 8) | b;
    }

    function updateMeter(engine) {
      var value = 0;
      for (var i = 0; i < engine.guards.length; i++) {
        if (engine.guards[i].meter > value) value = engine.guards[i].meter;
      }
      if (value <= 0.001) {
        if (meterBg) {
          meterBg.visible = false;
          meterFill.visible = false;
        }
        return;
      }
      ensureMeter();
      meterBg.visible = true;
      meterFill.visible = true;

      var player = engine.player;
      var y = stanceHeight(player.stance) + 0.55;
      meterBg.position.set(player.x, y, player.y);
      meterFill.position.set(player.x, y, player.y);
      meterFill.scale.set(Math.max(0.001, METER_MAX_W * value), METER_H * 0.75, 1);
      meterFill.material.color.setHex(meterColor(value));
    }

    var currentZoneId = null;

    function syncScene(engine) {
      if (engine.zone && engine.zone.id !== currentZoneId) {
        if (built) {
          disposeStatic();
          disposeGuardActors();
          disposeCameraActors();
          disposeDoorActors();
          disposeLaserActors();
          disposePickupActors();
          built = false;
        }
        clearTracers(); // old zone's coordinates are meaningless in the new one
        clearRipples(); // same reasoning — see file header RIPPLES note
        if (playerActor) {
          playerActor.lastX = null;
          playerActor.lastY = null;
        }
        zone = engine.zone;
        zoneCenter = { x: zone.bounds.w / 2, y: zone.bounds.h / 2 };
        camera.position.set(zoneCenter.x, 26, zoneCenter.y + 14);
        camera.lookAt(zoneCenter.x, 0, zoneCenter.y);
        resize(); // refit the orthographic frustum to the new zone's bounds
        currentZoneId = zone.id;
      }

      if (!built) {
        buildStatic();
        built = true;
      }

      if (!playerActor) {
        playerActor = makeActor(PLAYER_COLOR, PLAYER_VISOR_COLOR);
        playerActor.bodyMat.transparent = true;
        playerActor.visorMat.transparent = true;
        playerActor.boxMesh = new THREE.Mesh(
          new THREE.BoxGeometry(BODY_W, 1, BODY_W),
          new THREE.MeshLambertMaterial({ color: BOX_COLOR, transparent: true })
        );
        playerActor.boxMesh.visible = false;
        playerActor.group.add(playerActor.boxMesh);
      }
      var player = engine.player;
      if (player.stance === "crawl") {
        var proneSwing = updateWalkCycle(playerActor, player.x, player.y, PRONE_SWING_RAD, player.running);
        poseProne(playerActor, player.x, player.y, player.facing, playerActor.phase, proneSwing, true);
      } else {
        var totalH = stanceHeight(player.stance);
        var tilt = player.stance === "crouch" ? CROUCH_TILT : 0;
        var swingRad = updateWalkCycle(playerActor, player.x, player.y, WALK_SWING_RAD, player.running);
        poseUpright(playerActor, player.x, player.y, player.facing, totalH, tilt, playerActor.phase, swingRad);
      }

      var hitFlashAlpha = computeHitFlashAlpha(engine);

      var boxOn = !!(engine.inventory && engine.inventory.boxOn);
      if (boxOn) {
        playerActor.figureGroup.visible = false;
        playerActor.boxMesh.visible = true;
        playerActor.boxMesh.scale.set(BOX_FOOTPRINT_SCALE, BOX_HEIGHT, BOX_FOOTPRINT_SCALE);
        playerActor.boxMesh.position.set(0, BOX_HEIGHT / 2, 0);
        playerActor.boxMesh.material.color.setHex(BOX_COLOR);
      } else {
        playerActor.boxMesh.visible = false;
        playerActor.bodyMat.color.setHex(PLAYER_COLOR);
      }

      if (hitFlashAlpha > 0) {
        var tintT = hitFlashAlpha / HIT_FLASH_ALPHA_MAX;
        var tintMat = boxOn ? playerActor.boxMesh.material : playerActor.bodyMat;
        tintMat.color.setHex(lerpHexColor(tintMat.color.getHex(), PLAYER_HIT_TINT_COLOR, tintT));
      }

      var playerOpacity = engine.playerHidden
        ? 0.42 + 0.18 * Math.sin(engine.time * HIDDEN_BLINK_HZ * TWO_PI_R)
        : 1;
      playerActor.bodyMat.opacity = playerOpacity;
      playerActor.visorMat.opacity = playerOpacity;
      playerActor.boxMesh.material.opacity = playerOpacity;

      for (var i = 0; i < engine.guards.length; i++) {
        var guard = engine.guards[i];
        var actor = ensureGuardActor(guard);
        if (guard.state === "SLEEPING") {
          actor.lastX = guard.x;
          actor.lastY = guard.y;
          poseProne(actor, guard.x, guard.y, guard.facing, actor.phase, 0, false);
          actor.cone.visible = false;
          actor.coneEdge.visible = false;
          actor.marker.visible = false;
          actor.zzz.visible = true;
          actor.dizzy.visible = false;
          var bob = Math.sin(engine.time * 2.2) * 0.12;
          actor.zzz.position.set(guard.x, PRONE_LIFT + 1.2 + bob, guard.y);
        } else if (guard.state === "STUNNED") {
          actor.lastX = guard.x;
          actor.lastY = guard.y;
          poseUpright(actor, guard.x, guard.y, guard.facing, STAND_H, 0, actor.phase, 0);
          actor.figureGroup.rotation.z = STUN_WOBBLE_AMPLITUDE * Math.sin(engine.time * STUN_WOBBLE_HZ * TWO_PI_R);

          poseUpright(actor, guard.x, guard.y, guard.facing, STAND_H, 0, actor.phase, guardSwing);
          actor.cone.visible = true;
          actor.coneEdge.visible = true;
          actor.zzz.visible = false;
          actor.dizzy.visible = false;

      for (var ci = 0; ci < cameraStates.length; ci++) {

      updateMeter(engine);
      updateHitFlashMesh(hitFlashAlpha);

      camera.right = halfW;
      camera.top = halfH;

(function (global) {
const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

const DT = 1 / 60;

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function farTarget() {
  return {
    x: -9999,
    y: -9999,
    visionProfile: function () {
      return 1.0;
    },
  };
}

Game.selfTests.push({
  name: "director: camera pan angle is a deterministic, bounded function of ctx.time",
  fn: function () {
    const zone = Game.ZONES.warehouse;
    const world = Game.createWorld(zone);
    const vision = Game.createVision({ world: world });
    const squad = Game.createSquad();
    const director = Game.createDirector({ world: world, vision: vision, squad: squad });

    const cam = zone.cameras[0];
    const halfSweepRad = (cam.sweepDeg * Math.PI) / 180 / 2;
    const player = farTarget();

    let seenMin = Infinity;
    let seenMax = -Infinity;
    const STEPS = 600; // 10s of sim time at DT=1/60, well over one 6s sweepPeriodS

    for (let i = 0; i < STEPS; i++) {
      const t = i * DT;
      director.tickCameras(DT, { time: t, chaffUntil: 0, player: player });
      const panAngle = director.cameraStates()[0].panAngle;

      const expected = cam.facing + Math.sin((2 * Math.PI * t) / cam.sweepPeriodS) * halfSweepRad;
      assert(
        Math.abs(panAngle - expected) < 1e-9,
        "pan angle not a pure/deterministic function of ctx.time at t=" + t.toFixed(3)
      );

      const delta = panAngle - cam.facing;
      if (delta < seenMin) seenMin = delta;
      if (delta > seenMax) seenMax = delta;
    }

    assert(
      seenMax <= halfSweepRad + 1e-9 && seenMin >= -halfSweepRad - 1e-9,
      "pan swing exceeded +/- sweepDeg/2: min=" + seenMin.toFixed(4) + " max=" + seenMax.toFixed(4)
    );
    assert(seenMax > halfSweepRad * 0.9, "pan angle never swung near the +sweepDeg/2 extreme");
    assert(seenMin < -halfSweepRad * 0.9, "pan angle never swung near the -sweepDeg/2 extreme");
  },
});

  name: "director: player held in a camera cone at 5m triggers cameraAlert + squad ALERT, guards converge",
  fn: function () {

    engine.player.x = cam.x + 5;
    engine.player.y = cam.y;
    engine.player.stance = "stand";

    let sawCameraAlert = false;
    const SEARCH_TICKS = Math.round(8 / DT); // generous: the sweep periodically
    for (let i = 0; i < SEARCH_TICKS && !sawCameraAlert; i++) {
      engine.tick({ moveX: 0, moveY: 0 });
      for (let e = 0; e < engine.events.length; e++) {
        if (engine.events[e].type === "cameraAlert") sawCameraAlert = true;
      }
    }
    assert(sawCameraAlert, "expected a cameraAlert event within 8s of standing 5m dead-center in a camera's cone");
    assert(
      engine.squad.phase === "ALERT" || engine.squad.phase === "EVASION",
      "expected squad.phase ALERT or EVASION after the camera alert, got " + engine.squad.phase
    );
    assert(engine.squad.alertCount >= 1, "expected the camera alert to have counted as a real alert incident");

    const lastKnown = engine.squad.lastKnown;
    assert(
      Math.abs(lastKnown.x - engine.player.x) < 1e-6 && Math.abs(lastKnown.y - engine.player.y) < 1e-6,
      "expected squad.lastKnown to be the camera-reported player position"
    );

    const target = { x: lastKnown.x, y: lastKnown.y };
    const initialMin = Math.min.apply(
      null,
      engine.guards.map(function (g) {
        return dist(g.x, g.y, target.x, target.y);
      })
    );

    let anyGuardWentHostile = false;
    const FOLLOWUP_TICKS = Math.round(6 / DT);
    for (let j = 0; j < FOLLOWUP_TICKS; j++) {
      engine.tick({ moveX: 0, moveY: 0 });
      if (engine.guards.some((g) => g.state === "ALERT" || g.state === "EVASION")) anyGuardWentHostile = true;
    }
    assert(anyGuardWentHostile, "expected at least one guard to go hostile (ALERT/EVASION) after the camera-triggered squad alert");

    const finalMin = Math.min.apply(
      null,
      engine.guards.map(function (g) {
        return dist(g.x, g.y, target.x, target.y);
      })
    );
    assert(
      finalMin < initialMin - 2,
      "expected the nearest guard to have closed real distance toward the camera-reported position: initial=" +
        initialMin.toFixed(2) +
        " final=" +
        finalMin.toFixed(2)
    );
  },
});

(function (global) {

const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

function assertNoFunctionsOrUndefined(value, path) {
  path = path || "root";
  if (value === undefined) throw new Error("found undefined at " + path);
  if (typeof value === "function") throw new Error("found a function at " + path);
  if (value === null || typeof value !== "object") return;
  if (Array.isArray(value)) {
    for (var i = 0; i < value.length; i++) {
      assertNoFunctionsOrUndefined(value[i], path + "[" + i + "]");
    }
    return;
  }
  for (var k in value) {
    if (Object.prototype.hasOwnProperty.call(value, k)) {
      assertNoFunctionsOrUndefined(value[k], path + "." + k);
    }
  }
}

function assertValidCall(call, expectedId) {
  assert(call !== null && typeof call === "object", "call should be an object");
  assert(call.id === expectedId, "expected id " + expectedId + ", got " + call.id);
  assert(
    call.speaker === "COMMANDER" || call.speaker === "MEI",
    "speaker should be COMMANDER or MEI, got " + call.speaker
  );
  assert(
    call.freq === Game.CODEC.FREQ[call.speaker],
    "freq should match Game.CODEC.FREQ[speaker]"
  );
  assert(Array.isArray(call.lines), "lines should be an array");
  assert(call.lines.length >= 4, "expected >=4 lines, got " + call.lines.length);
  call.lines.forEach(function (line, i) {
    assert(typeof line.who === "string" && line.who.length > 0, "line " + i + " missing who");
    assert(typeof line.text === "string" && line.text.length > 0, "line " + i + " missing text");
  });
  assertNoFunctionsOrUndefined(call, "call");
  var roundTripped = JSON.parse(JSON.stringify(call));
  assert(roundTripped.id === call.id, "call should survive a JSON round-trip");
}

(function (global) {

const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

const DT = 1 / 60;

function dist(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

function firefightEngine(seed, ahead) {
  const engine = Game.createEngine({ seed: seed });
  const guard = engine.guards[0];
  engine.player.x = guard.x + Math.cos(guard.facing) * ahead;
  engine.player.y = guard.y + Math.sin(guard.facing) * ahead;
  return engine;
}

function driveFirefight(engine, maxTicks, stopWhen) {
  const fireEvents = []; // { tick, hit }
  const hitEvents = []; // { tick, hp }
  let alertTick = null;

  for (let i = 0; i < maxTicks; i++) {
    engine.tick();
    if (alertTick === null && engine.squad.phase === "ALERT") alertTick = i;
    for (const ev of engine.events) {
      if (ev.type === "guardFire") fireEvents.push({ tick: i, hit: ev.hit });
      if (ev.type === "playerHit") hitEvents.push({ tick: i, hp: ev.hp });
    }
    if (engine.gameOver) break;
    if (stopWhen && stopWhen({ tick: i, alertTick: alertTick, fireEvents: fireEvents, hitEvents: hitEvents })) {
      break;
    }
  }
  return { alertTick: alertTick, fireEvents: fireEvents, hitEvents: hitEvents };
}

function assertLoopClear(world, loopName, waypoints) {
  assert(Array.isArray(waypoints) && waypoints.length >= 3, loopName + ": expected at least 3 waypoints for a loop");

  for (let i = 0; i < waypoints.length; i++) {
    const a = waypoints[i];
    const b = waypoints[(i + 1) % waypoints.length];
    const legLabel = loopName + " leg " + i + " (" + i + "->" + ((i + 1) % waypoints.length) + ")";

    const legLen = Math.sqrt(dx * dx + dy * dy);
    const samples = Math.ceil(legLen / 0.25);

    for (let s = 0; s <= samples; s++) {
      const t = samples > 0 ? s / samples : 0;
      const px = a.x + dx * t;
      const py = a.y + dy * t;
      assert(
        !world.isBlockedCircle(px, py, 0.6),
        legLabel + " blocked at sample (" + px.toFixed(2) + "," + py.toFixed(2) + ")"
      );
    }

    const hit = world.raycast(a.x, a.y, b.x, b.y);
    assert(hit === null, legLabel + " raycast hit at (" + (hit ? hit.x.toFixed(2) : "?") + "," + (hit ? hit.y.toFixed(2) : "?") + ")");
  }
}

(function (global) {

function assert(cond, msg) {

  var dy = y2 - y1;

}

function deepEqual(a, b) {
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a === null || b === null) return a === b;
  if (typeof a !== "object") return a === b;
  if (Array.isArray(a) !== Array.isArray(b)) return false;
  var keysA = Object.keys(a);
  var keysB = Object.keys(b);
  if (keysA.length !== keysB.length) return false;
  for (var i = 0; i < keysA.length; i++) {
    var k = keysA[i];
    if (!Object.prototype.hasOwnProperty.call(b, k)) return false;
    if (!deepEqual(a[k], b[k])) return false;
  }
  return true;
}

function assertNoFunctionsOrUndefined(value, path) {
  path = path || "root";
  if (value === undefined) throw new Error("found undefined at " + path);
  if (typeof value === "function") throw new Error("found a function at " + path);
  if (value === null || typeof value !== "object") return;
  Object.keys(value).forEach(function (k) {
    assertNoFunctionsOrUndefined(value[k], path + "." + k);
  });
}

function assertAllFinite(value, path) {
  path = path || "root";
  if (typeof value === "number") {
    if (!isFinite(value)) throw new Error("found non-finite number at " + path + ": " + value);
    return;
  }
  if (value === null || typeof value !== "object") return;
  Object.keys(value).forEach(function (k) {
    assertAllFinite(value[k], path + "." + k);
  });
}

    if (engine.squad.phase === "ALERT") return i;
  }
  return null;
}

  for (var i = 0; i < maxTicks; i++) {

  name: "laboratory: neither guard's patrol loop ever crosses a locked door's AABB",
  fn: function () {
    const zone = Game.ZONES.laboratory;
    const loops = [
      { name: "waypoints (lab-g1)", points: zone.waypoints },
      { name: "waypoints2 (lab-g2)", points: zone.waypoints2 },
    ];

    function pointInRect(px, py, rect) {
      return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    loops.forEach(function (loop) {
      for (let i = 0; i < loop.points.length; i++) {
        const a = loop.points[i];
        const b = loop.points[(i + 1) % loop.points.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.hypot(dx, dy);
        const samples = Math.ceil(len / 0.25);
        for (let s = 0; s <= samples; s++) {
          const t = samples > 0 ? s / samples : 0;
          const px = a.x + dx * t;
          const py = a.y + dy * t;
          zone.doors.forEach(function (door) {
            if (!door.lock) return; // unlocked doors are fine to (theoretically) cross
            assert(
              !pointInRect(px, py, door),
              loop.name + " leg " + i + " passes through locked door " + door.id + "'s AABB at (" + px.toFixed(2) + "," + py.toFixed(2) + ")"

          });
        }
      }
    });
  },
});

(function (global) {

const Game = global.Game;
const DT = 1 / 60;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

function freshEngine() {
  return Game.createEngine();
}

function driveToAlert(engine, director, counts, maxTicks) {
  for (var i = 0; i < maxTicks; i++) {
    var g = engine.guards[0];
    var ahead = 2;
    engine.player.x = g.x + Math.cos(g.facing) * ahead;
    engine.player.y = g.y + Math.sin(g.facing) * ahead;
    engine.tick();
    tallyDirector(director, engine, counts);
    if (engine.squad.phase === "ALERT") return i;
  }
  return null;
}

function tickHiddenUntil(engine, director, counts, predicate, maxTicks) {
  for (var i = 0; i < maxTicks; i++) {
    engine.player.x = -1000;
    engine.player.y = -1000;
    engine.tick();
    tallyDirector(director, engine, counts);
    if (predicate(engine)) return i;
  }
  return null;
}

function tallyDirector(director, engine, counts) {
  var r = director.update(engine.squad.phase);
  if (r.sting) counts.stings++;
  if (r.resolve) counts.resolves++;
  return r;
}

}

  };
}

(function (global) {

function assert(cond, msg) {

function approx(a, b, tol) {

}

var DEG = Math.PI / 180;

var customZone = {
  bounds: { w: 100, h: 100 },
  walls: [
    { x: 49, y: 5, w: 2, h: 10 }, // occlusion wall for the LOS tests

  fn: function () {
    var viewer = { x: 5, y: 5, facing: 0 };
    var target = { x: 10, y: 5 };

    assert(approx(sight.dist, 5, 1e-9), "expected dist 5, got " + sight.dist);
    assert(sight.inCone, "expected target dead ahead to be inCone");

    var sight = vision.computeSight(viewer, target, { profile: 1.0 });

    var crawl = vision.computeSight(viewer, target, { profile: 0.3 }).factor;
    assert(approx(crawl, base * 0.3, 1e-9), "expected crawl factor === base * 0.3, got " + crawl + " vs " + base * 0.3);

    var extra = vision.computeSight(viewer, target, { profile: 1.0, extraMult: 0.05 }).factor;
    assert(approx(extra, base * 0.05, 1e-9), "expected extraMult 0.05 to scale factor by 0.05, got " + extra + " vs " + base * 0.05);

Game.selfTests.push({
  name: "vision: tickMeter timing matches SPEC (0.35 by ~0.3s, 1.0 by 0.8s+/-15%, crawl >=3x, drain ~2s+/-10%)",
  fn: function () {
    var dt = 1 / 60;
    var viewer = { x: 5, y: 5, facing: 0 };
    var target = { x: 7, y: 5 }; // dist 2 === FILL_NEAR_DIST

    var standFactor = vision.computeSight(viewer, target, { profile: 1.0 }).factor;
    assert(approx(standFactor, VISION.FILL_BASE, 1e-9), "expected factor === FILL_BASE at NEAR_DIST, got " + standFactor);

    function fillTime(factor, threshold) {
      var meter = 0;
      var t = 0;
      var crossed = null;
      for (var i = 0; i < 100000; i++) {
        meter = vision.tickMeter(meter, factor, dt);
        assert(meter >= 0 && meter <= 1, "meter left [0,1]: " + meter);
        t += dt;
        if (crossed === null && meter >= threshold) {
          crossed = t;
          if (threshold >= 1) break;
        }
        if (crossed !== null) break;
      }
      assert(crossed !== null, "meter never reached threshold " + threshold);
      return crossed;
    }

    var tSuspicious = fillTime(standFactor, VISION.SUSPICIOUS_AT);
    assert(tSuspicious <= 0.35, "expected SUSPICIOUS_AT within ~0.3s, took " + tSuspicious + "s");
    assert(tSuspicious >= 0.2, "SUSPICIOUS_AT crossed suspiciously fast: " + tSuspicious + "s");

    var tAlertStand = fillTime(standFactor, VISION.ALERT_AT);
    assert(
      tAlertStand >= 0.8 * 0.85 && tAlertStand <= 0.8 * 1.15,
      "expected ALERT_AT in 0.8s +/-15%, took " + tAlertStand + "s"
    );

    var crawlFactor = vision.computeSight(viewer, target, { profile: 0.3 }).factor;
    var tAlertCrawl = fillTime(crawlFactor, VISION.ALERT_AT);
    assert(
      tAlertCrawl >= 3 * tAlertStand * 0.95,
      "expected crawl fill to take >=3x as long as standing: crawl=" + tAlertCrawl + " stand=" + tAlertStand
    );

    var meter = 1.0;
    var t = 0;
    var drainedAt = null;
    for (var i = 0; i < 100000; i++) {
      meter = vision.tickMeter(meter, 0, dt);
      assert(meter >= 0 && meter <= 1, "meter left [0,1] during drain: " + meter);
      t += dt;
      if (meter <= 0) {
        drainedAt = t;
        break;
      }
    }
    assert(drainedAt !== null, "meter never drained to 0");
    assert(
      drainedAt >= 2 * 0.9 && drainedAt <= 2 * 1.1,
      "expected full drain in ~2s +/-10%, took " + drainedAt + "s"
    );

    assert(vision.tickMeter(0.99, 100, 1) === 1, "expected meter to clamp at 1");
    assert(vision.tickMeter(0.01, 0, 100) === 0, "expected meter to clamp at 0");
  },
});

(function (global) {
const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

var DT = 1 / 60;

function assertLoopClear(world, loopName, waypoints) {
  assert(waypoints.length >= 3, loopName + ": expected at least 3 waypoints for a loop, got " + waypoints.length);

  for (var i = 0; i < waypoints.length; i++) {
    var a = waypoints[i];
    var b = waypoints[(i + 1) % waypoints.length];
    var legLabel = loopName + " leg " + i + " (" + i + "->" + ((i + 1) % waypoints.length) + ")";

    var dx = b.x - a.x;
    var dy = b.y - a.y;
    var legLen = Math.sqrt(dx * dx + dy * dy);
    var samples = Math.ceil(legLen / 0.25);

    for (var s = 0; s <= samples; s++) {
      var t = samples > 0 ? s / samples : 0;
      var px = a.x + dx * t;
      var py = a.y + dy * t;
      assert(
        !world.isBlockedCircle(px, py, 0.6),
        legLabel + " blocked at sample (" + px.toFixed(2) + "," + py.toFixed(2) + ")"
      );
    }

    var hit = world.raycast(a.x, a.y, b.x, b.y);
    assert(
      hit === null,
      legLabel + " raycast hit at (" + (hit ? hit.x.toFixed(2) : "?") + "," + (hit ? hit.y.toFixed(2) : "?") + ")"
    );
  }
}

Game.selfTests.push({
  name: "engine zone transition: determinism holds across a real zone crossing",
  fn: function () {
    function scriptedInput(tick) {
      return {
        moveX: Math.sin(tick * 0.041),
        moveY: Math.cos(tick * 0.029),
        run: tick % 11 === 0,
        stance: tick % 150 < 50 ? "crouch" : "stand",
      };
    }

    function runCrossing(seed) {
      var engine = Game.createEngine({ seed: seed });
      var dock = Game.ZONES.loadingDock;
      for (var t = 0; t < 200; t++) {
        engine.tick(scriptedInput(t));
      }
      engine.player.x = dock.exit.x + dock.exit.w / 2;
      engine.player.y = dock.exit.y + dock.exit.h / 2;
      engine.tick({ moveX: 0, moveY: 0, run: false, stance: "stand" });
      if (engine.zone.id !== "warehouse") {
        throw new Error("setup failed: expected engine to have crossed into warehouse right after the crossing tick");
      }
      for (var t2 = 201; t2 < 400; t2++) {
        engine.tick(scriptedInput(t2));
      }
      return engine;
    }

    var a = runCrossing(999);
    var b = runCrossing(999);

    var snapA = JSON.stringify(a.snapshot());
    var snapB = JSON.stringify(b.snapshot());
    assert(snapA === snapB, "expected identical snapshots across a transition for identical seed+input, got:\n" + snapA + "\nvs\n" + snapB);
  },
});

// ==== src/boot.js ====
(function (Game) {
  var SAVE_KEY = "shadowloop-save";

  var storageBroken = false;
  var storageWarned = false;

  function warnStorageOnce(err) {
    if (storageWarned) return;
    storageWarned = true;
    try {
      console.warn(
        "[saveState] localStorage unavailable -- save/load disabled for this session:",
        err && err.message ? err.message : err
      );
    } catch (e2) {
    }
  }

  function safeStorageSet(key, value) {
    if (storageBroken) return false;
    try {
      window.localStorage.setItem(key, value);
      return true;
    } catch (e) {
      storageBroken = true;
      warnStorageOnce(e);
      return false;
    }
  }

  function safeStorageGet(key) {
    if (storageBroken) return null;
    try {
      return window.localStorage.getItem(key);
    } catch (e) {
      storageBroken = true;
      warnStorageOnce(e);
      return null;
    }
  }

  function showToast(rootEl, text) {
    try {
      var toast = document.createElement("div");
      toast.style.cssText =
        "position:fixed;right:18px;bottom:18px;background:rgba(0,0,0,0.82);" +
        "color:#9fb;font:13px monospace;letter-spacing:0.15em;padding:10px 16px;" +
        "border:1px solid #5a7;z-index:9998;pointer-events:none";
      toast.textContent = text;
      rootEl.appendChild(toast);
      setTimeout(function () {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 2000);
    } catch (e) {
    }
  }
  function runSelfTests() {
    var results = [];
    var tests = Game.selfTests || [];
    for (var i = 0; i < tests.length; i++) {
      try {
        tests[i].fn();
        results.push({ name: tests[i].name, ok: true });
      } catch (e) {
        results.push({ name: tests[i].name, ok: false, error: String(e) });
      }
    }
    return results;
  }

  var GAME_KEYS = {
    KeyW: true, KeyA: true, KeyS: true, KeyD: true,
    ArrowUp: true, ArrowDown: true, ArrowLeft: true, ArrowRight: true,
    ShiftLeft: true, ShiftRight: true,
    KeyC: true, KeyZ: true, KeyE: true, KeyF: true,
    KeyQ: true, KeyG: true,
    KeyB: true, KeyR: true, KeyX: true,
    Enter: true,
    F5: true, F9: true,
  };

  var currentGame = null;

  function runGame(rootEl, opts) {
    if (currentGame) {
      currentGame.stop();
      currentGame = null;
    }
    rootEl.innerHTML = "";

    var engine = (opts && opts.engine) || Game.createEngine();
    var renderer = Game.createRenderer({ container: rootEl, zone: engine.zone });
    var radar = Game.createRadar({ container: rootEl });
    var hud = Game.createHud({ container: rootEl });
    var music = Game.createMusic();
    var codecDirector = Game.createCodecDirector();
    var codec = Game.createCodec({ container: rootEl });

    music.update(engine);

    window.Game._debug = { engine: engine, renderer: renderer, codec: codec };

    var held = {}; // physical key -> boolean, level-triggered (movement/run)
    var stance = "stand"; // toggled edge-triggered by C/Z
    var pendingKnock = false; // set true on an E keydown edge, consumed once
    var pendingFire = false; // set true on an F keydown edge, consumed once
    var pendingCqc = false; // set true on a Q TAP release, consumed once
    var pendingCqcThrow = false; // set true on a Q HOLD release (or safety cap), consumed once
    var pendingDrag = false; // set true on a G keydown edge, consumed once
    var pendingBox = false; // set true on a B keydown edge, consumed once
    var pendingRation = false; // set true on an R keydown edge, consumed once
    var pendingChaff = false; // set true on an X keydown edge, consumed once

    var Q_TAP_MAX_MS = 350; // held < this on release -> tap (choke)
    var Q_THROW_SAFETY_CAP_MS = 1500; // held this long WITHOUT a release -> auto-fire the throw
    var qDownAt = null;
    var qThrowSafetyFired = false;

    function onKeyDown(e) {
      if (codec.isOpen()) {
        if ((e.code === "Space" || e.code === "Enter") && !e.repeat) {
          e.preventDefault();
          codec.advance();
        }
        return;
      }
      if (GAME_KEYS[e.code]) e.preventDefault();
      held[e.code] = true;
      if (e.repeat) return; // toggles/verbs below are edge-triggered only
      if (e.code === "KeyC") {
        stance = stance === "crouch" ? "stand" : "crouch";
      } else if (e.code === "KeyZ") {
        stance = stance === "crawl" ? "stand" : "crawl";
      } else if (e.code === "KeyE") {
        pendingKnock = true;
      } else if (e.code === "KeyF") {
        pendingFire = true;
      } else if (e.code === "KeyQ") {
        qDownAt = performance.now();
        qThrowSafetyFired = false;
      } else if (e.code === "KeyG") {
        pendingDrag = true;
      } else if (e.code === "KeyB") {
        pendingBox = true;
      } else if (e.code === "KeyR") {
        pendingRation = true;
      } else if (e.code === "KeyX") {
        pendingChaff = true;
      } else if (e.code === "F5") {
        saveGame();
      } else if (e.code === "F9") {
        loadGame();
      }
    }

    function onKeyUp(e) {
      if (GAME_KEYS[e.code]) e.preventDefault();
      held[e.code] = false;
      if (e.code === "KeyQ" && qDownAt !== null) {
        var heldMs = performance.now() - qDownAt;
        qDownAt = null;
        if (!codec.isOpen()) {
          if (heldMs < Q_TAP_MAX_MS) {
            pendingCqc = true;
          } else {
            pendingCqcThrow = true;
          }
        }
      }
    }

    function onResize() {
      renderer.resize();
    }

    var saveStateApi = Game.createSaveState();

    function saveGame() {
      var save;
      try {
        save = saveStateApi.capture(engine);
      } catch (e) {
        warnStorageOnce(e);
        return;
      }
      var ok = safeStorageSet(SAVE_KEY, JSON.stringify(save));
      if (ok) showToast(rootEl, "SAVED");
    }

    function loadGame() {
      var raw = safeStorageGet(SAVE_KEY);
      if (!raw) {
        showToast(rootEl, "NO SAVE");
        return;
      }
      var save;
      var restored;
      try {
        save = JSON.parse(raw);
        restored = saveStateApi.restore(save);
      } catch (e) {
        showToast(rootEl, "NO SAVE");
        return;
      }
      restored.stats.savesUsed++;
      runGame(rootEl, { engine: restored });
      showToast(rootEl, "LOADED");
    }

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    window.addEventListener("resize", onResize);

    function buildInput() {
      var moveX = 0;
      var moveY = 0;
      if (held.KeyA || held.ArrowLeft) moveX -= 1;
      if (held.KeyD || held.ArrowRight) moveX += 1;
      if (held.KeyW || held.ArrowUp) moveY -= 1;
      if (held.KeyS || held.ArrowDown) moveY += 1;

      return {
        moveX: moveX,
        moveY: moveY,
        run: !!(held.ShiftLeft || held.ShiftRight),
        stance: stance,
        knock: pendingKnock,
        fire: pendingFire,
        cqc: pendingCqc,
        cqcThrow: pendingCqcThrow,
        drag: pendingDrag,
        box: pendingBox,
        ration: pendingRation,
        chaff: pendingChaff,
      };
    }

    var DT = engine.DT;
    var MAX_ACC = 0.25; // caps the catch-up burst after e.g. a suspended tab
    var acc = 0;
    var lastNow = null;
    var stopped = false; // set true by stop(), below — makes frame() a no-op
    var gameOverShown = false; // latches once the overlay has been shown
    var missionCompleteShown = false; // latches once the rank screen has been shown

    function frame(now) {
      if (stopped) return;
      if (lastNow === null) lastNow = now;
      var frameDt = (now - lastNow) / 1000;
      lastNow = now;
      if (codec.isOpen()) {
        acc = 0;
      } else {
        if (qDownAt !== null && !qThrowSafetyFired && now - qDownAt >= Q_THROW_SAFETY_CAP_MS) {
          qThrowSafetyFired = true;
          pendingCqcThrow = true;
        }

        acc += frameDt;
        if (acc > MAX_ACC) acc = MAX_ACC;

        while (acc >= DT) {
          engine.tick(buildInput());
          pendingKnock = false; // consumed — only true for the tick right after the edge
          pendingFire = false; // consumed — only true for the tick right after the edge
          pendingCqc = false; // consumed — only true for the tick right after the edge
          pendingCqcThrow = false; // consumed — only true for the tick right after the edge
          pendingDrag = false; // consumed — only true for the tick right after the edge
          pendingBox = false; // consumed — only true for the tick right after the edge
          pendingRation = false; // consumed — only true for the tick right after the edge
          pendingChaff = false; // consumed — only true for the tick right after the edge
          acc -= DT;
        }

        var codecCall = codecDirector.update(engine.events, { darts: engine.inventory.darts }, engine.squad.phase);
        if (codecCall) codec.open(codecCall);
      }

      if (!gameOverShown) {
        for (var i = 0; i < engine.events.length; i++) {
          if (engine.events[i].type === "gameOver") {
            gameOverShown = true;
            if (codec.isOpen()) codec.dismiss();
            showGameOver(rootEl, function onRetry() {
              runGame(rootEl);
            });
            break;
          }
        }
      }

      if (!missionCompleteShown) {
        for (var mi = 0; mi < engine.events.length; mi++) {
          if (engine.events[mi].type === "missionComplete") {
            missionCompleteShown = true;
            if (codec.isOpen()) codec.dismiss();
            showMissionComplete(rootEl, engine.events[mi].stats, engine.events[mi].rank, function onDone() {
              stop();
              rootEl.innerHTML = "";
              showTitle(rootEl, runSelfTests());
            });
            break;
          }
        }
      }

      renderer.render(engine);
      radar.render(engine);
      hud.render(engine);
      music.update(engine);
      codec.render(now);
      requestAnimationFrame(frame);
    }

    function stop() {
      stopped = true;
      window.removeEventListener("keydown", onKeyDown);
      window.removeEventListener("keyup", onKeyUp);
      window.removeEventListener("resize", onResize);
    }

    currentGame = { stop: stop };

    requestAnimationFrame(frame);
  }

  function showGameOver(rootEl, onRetry) {
    var overlay = document.createElement("div");
    overlay.style.cssText =
      "position:fixed;inset:0;background:rgba(0,0,0,0.86);color:#f33;" +
      "display:flex;align-items:center;justify-content:center;" +
      "flex-direction:column;font:16px monospace;letter-spacing:0.2em;" +
      "z-index:9999";
    overlay.innerHTML =
      "<div style='font-size:44px'>MISSION FAILED</div>" +
      "<div style='margin-top:26px;font-size:18px;letter-spacing:0.15em;color:#fff'>" +
      "PRESS ENTER TO RETRY</div>";
    rootEl.appendChild(overlay);

    function onEnter(e) {
      if (e.code !== "Enter") return;
      e.preventDefault();
      window.removeEventListener("keydown", onEnter);
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      onRetry();
    }
    window.addEventListener("keydown", onEnter);
  }

  function formatMmSs(seconds) {
    var s = Math.max(0, Math.floor(seconds || 0));
    var mm = Math.floor(s / 60);
    var ss = s % 60;
    return (mm < 10 ? "0" + mm : "" + mm) + ":" + (ss < 10 ? "0" + ss : "" + ss);
  }

  function showMissionComplete(rootEl, stats, rank, onDone) {
    stats = stats || {};
    var overlay = document.createElement("div");
    overlay.style.cssText =
      "position:fixed;inset:0;background:rgba(2,10,6,0.93);color:#9fffb8;" +
      "display:flex;align-items:center;justify-content:center;" +
      "flex-direction:column;font:16px monospace;letter-spacing:0.2em;" +
      "z-index:9999";

    var rows = [
      ["TIME", formatMmSs(stats.missionTimeS)],
      ["ALERTS", String(stats.alertsTotal || 0)],
      ["KILLS", String(stats.kills || 0)],
      ["DARTS FIRED", String(stats.dartsFired || 0)],
      ["CQC", String(stats.cqcTakedowns || 0)],
      ["RATIONS", String(stats.rationsUsed || 0)],
      ["CONTINUES", String(stats.savesUsed || 0)],
    ];
    var tableHtml = rows
      .map(function (r) {
        return (
          "<div style='display:flex;justify-content:space-between;width:280px;padding:3px 0;font-size:14px'>" +
          "<span style='color:#5a7'>" + r[0] + "</span><span style='color:#dfe'>" + r[1] + "</span></div>"
        );
      })
      .join("");

    var rankColor = rank === "BIG BOSS" ? "#ffd75e" : "#39ff6a";

    overlay.innerHTML =
      "<div style='font-size:34px;color:#39ff6a'>MISSION COMPLETE</div>" +
      "<div style='margin:20px 0;border-top:1px solid #234;border-bottom:1px solid #234;padding:14px 0'>" +
      tableHtml +
      "</div>" +
      "<div id='rankReveal' style='font-size:56px;letter-spacing:0.15em;color:" +
      rankColor +
      ";min-height:64px'></div>" +
      "<div style='margin-top:28px;font-size:18px;letter-spacing:0.15em;color:#fff'>PRESS ENTER FOR TITLE</div>";
    rootEl.appendChild(overlay);

    var rankName = rank || "";
    var rankEl = overlay.querySelector("#rankReveal");
    var revealed = 0;
    var typer = setInterval(function () {
      revealed++;
      if (rankEl) rankEl.textContent = rankName.slice(0, revealed);
      if (revealed >= rankName.length) clearInterval(typer);
    }, 90);

    function onEnter(e) {
      if (e.code !== "Enter") return;
      e.preventDefault();
      clearInterval(typer);
      window.removeEventListener("keydown", onEnter);
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      onDone();
    }
    window.addEventListener("keydown", onEnter);
  }

  function showTitle(rootEl, results) {
    var title = document.createElement("div");
    title.style.cssText =
      "color:#9fb;background:#000;position:fixed;inset:0;display:flex;" +
      "align-items:center;justify-content:center;flex-direction:column;" +
      "font:16px monospace;letter-spacing:0.3em";
    title.innerHTML =
      "<div style='font-size:42px;margin-bottom:16px'>SHADOW LOOP</div>" +
      "<div>self-test: " + results.length + "/" + results.length + " passed</div>" +
      "<div style='margin-top:28px;font-size:22px;letter-spacing:0.2em'>PRESS ENTER</div>" +
      "<div style='margin-top:14px;color:#5a7;font-size:12px;letter-spacing:0.15em'>" +
      "WASD move &middot; SHIFT run &middot; C crouch &middot; Z crawl &middot; E knock &middot; F tranq &middot; Q choke &middot; hold Q throw &middot; G drag/locker &middot; B box &middot; R ration &middot; X chaff &middot; F5 save &middot; F9 load</div>";
    rootEl.appendChild(title);

    function onEnter(e) {
      if (e.code !== "Enter") return;
      e.preventDefault();
      window.removeEventListener("keydown", onEnter);
      runGame(rootEl);
    }
    window.addEventListener("keydown", onEnter);
  }

  function boot(rootEl) {
    var results = runSelfTests();
    var failures = results.filter(function (r) { return !r.ok; });
    if (failures.length) {
      var pre = document.createElement("pre");
      pre.style.cssText =
        "color:#f33;background:#000;padding:24px;font:14px monospace;" +
        "position:fixed;inset:0;z-index:9999;overflow:auto;margin:0";
      pre.textContent =
        "BOOT SELF-TEST FAILED — start blocked\n\n" +
        failures.map(function (f) { return "FAIL " + f.name + "\n  " + f.error; }).join("\n");
      rootEl.appendChild(pre);
      return;
    }
    showTitle(rootEl, results);
  }

  Game.boot = boot;
  if (typeof module !== "undefined") module.exports = { boot: boot };

  if (typeof window !== "undefined") {
    window.addEventListener("DOMContentLoaded", function () {
      boot(document.getElementById("app"));
    });
  }
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));
