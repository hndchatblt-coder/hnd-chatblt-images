//                 STATIC scene (floor/walls/darkzones/exit) and size the
//                 camera frustum. Defaults to Game.ZONES.loadingDock.
//
//   renderer.syncScene(engine) — builds the static scene once (floor, walls,
//     darkZone overlays, exit quad) on first call, then updates every DYNAMIC
//     object (player, guards, vision cones, marker sprites, detection meter)
//     from the live engine state. Safe to call every frame; the "build once"
//     part is idempotent (guarded by an internal flag), the "update" part is
//     not (it always re-reads engine.player/engine.guards/engine.squad).
//
//   SLEEPING GUARDS (new — see src/guardAI.js's SLEEPING contract): a guard
//   with state === "SLEEPING" is posed lying flat (a scale trick on the same
//   body mesh every other guard uses — no separate geometry/model), its nose
//   cone and vision cone/cone-edge hidden (a sleeping guard perceives
//   nothing, so nothing to draw), and a bobbing "Zzz" sprite (a CanvasTexture
//   glyph, same technique as the existing "?"/"!" state markers) floats above
//   it — the bob is driven by engine.time (deterministic, no Date.now, same
//   rule as every other animation in this file).
//
//   DART TRACER (new — see src/items.js/src/engine.js's fire-verb contract):
//   a thin bright line from the player's muzzle to the dart's impact point,
//   fading out over TRACER_DURATION_S (~0.25s). CONTRACT NOTE: this is
//   spawned by reading engine.events for a "tranqFired" event (which carries
//   `impact`, see src/engine.js's tranqFired event shape) INSIDE syncScene —
//   engine.events holds only the MOST RECENT tick()'s events (cleared at the
//   top of every tick(), per src/engine.js's own contract), and boot.js's
//   frame loop calls renderer.render() (which calls syncScene) once per
//   ANIMATION FRAME, AFTER draining however many fixed-timestep ticks that
//   frame's accumulator called for — so this only sees a tranqFired event
//   that happened on the LAST tick of a given frame's catch-up loop. A player
//   mashing fire fast enough to trigger it more than once inside a single
//   animation frame (input is edge-triggered to begin with, so this requires
//   an extreme frame hitch) could miss a tracer spawn; an honest, documented
//   gap, not a silent one, same shape as this file's own zone-change/actor-
//   rebuild contract notes elsewhere.
//
//   PLAYER HIDDEN (new — CQC/locker cycle, see src/engine.js's LOCKER VERB
//   contract): while engine.playerHidden is true, the player's own body/nose
//   meshes are dimmed and made to blink — opacity driven by a deterministic
//   sine of engine.time (same "no Date.now" rule as every other animation in
//   this file), oscillating roughly 0.25-0.6 alpha rather than snapping to a
//   single fixed dim value, so it visibly reads as "blinking," not just
//   "dimmer." Both materials are marked transparent:true once, at actor
//   creation, so this per-frame opacity write is the only cost — no new
//   geometry/material churn. RADAR NOTE: src/radar.js is NOT touched this
//   cycle (out of scope for this file's own change set — see this cycle's
//   design brief) — the radar view keeps drawing the player triangle at full
//   brightness while hidden; only THIS (the 3D scene) reflects playerHidden.
//   A dragged (SLEEPING) guard's actor needs no special-casing here at all:
//   it already renders every frame from guard.x/guard.y via the normal
//   SLEEPING pose path below, and src/engine.js's DRAG VERB overwrites those
//   same x/y every tick to trail the player — so a dragged body is already
//   drawn "following the player" for free, with zero render.js changes.
//
//   BOX DISGUISE (new — box/chaff/ration cycle, see src/engine.js's BOX VERB
//   contract): while engine.inventory.boxOn is true, the player's actor is
//   drawn as a cardboard-brown crate instead of its normal steel-blue body —
//   a pure cosmetic re-skin of the SAME body mesh every other pose already
//   uses (no new geometry, same trick as the SLEEPING pose's scale-and-
//   reposition above): scaled up slightly on X/Z (BOX_FOOTPRINT_SCALE,
//   "slightly larger than the player") and to a fixed BOX_HEIGHT regardless
//   of stance (a box has no crouch/crawl pose), body.material.color swapped
//   to BOX_COLOR, and the nose (facing wedge) HIDDEN — a box gives no
//   external hint which way the player inside it is actually facing. This
//   override runs AFTER placeActor() every frame (placeActor's own
//   stance-driven scale/nose-visible writes are for the un-boxed case) and
//   is unconditionally reset to the normal PLAYER_COLOR/nose-visible
//   whenever boxOn is false, so a single frame right after taking the box
//   off never shows a stale brown tint. Purely cosmetic — see
//   src/engine.js's BOX VERB contract for the actual perception-discount
//   mechanics this has no bearing on.
//
//   SECURITY CAMERAS (new — director cycle, see src/director.js contract):
//   each engine.director.cameraStates() entry gets a small dark wall-mounted
//   housing (never re-posed — cameras are fixed hardware) plus a pivoting
//   cone fan, same raycast-clipped-fan technique as a guard's own vision
//   cone (see updateCameraCone below), recolored every frame: pale cyan
//   normally, red once meter >= Game.VISION.SUSPICIOUS_AT, grey/dim while
//   camState.disabled (chaff) — see cameraStyleKey. Rebuilt/disposed on a
//   zone change exactly like guard actors (disposeCameraActors, called
//   alongside disposeGuardActors — see ZONE CHANGES below).
//
//   DOORS / LASERS / PICKUPS (new — Laboratory cycle, see src/world.js's
//   doors/lasers/pickups schema notes and src/engine.js's own DOORS/PICKUPS
//   contract):
//     - DOORS: one lock-color-coded slab per zone.doors entry (L1 blue, L2
//       amber, L3 red, unlocked a neutral grey-green — same palette family
//       src/radar.js uses), rebuilt/disposed on a zone change exactly like
//       guard/camera actors. Re-colored (dimmed) every frame once
//       engine.world.isDoorOpen(id) reads true — the slab stays in the
//       scene (so its footprint/lock-color history is still legible) but
//       reads as "open" rather than physically vanishing, matching the
//       same "structural, not momentary" posture src/radar.js's own door
//       styling note explains.
//     - LASERS: a bright red THREE.Line per zone.lasers entry, visibility
//       toggled straight off director.laserStates()[i].active every frame —
//       since `active` itself already flips on/off with the duty cycle,
//       this simple visibility toggle IS the "blinking with duty cycle"
//       the spec calls for, no separate blink timer needed.
//     - PICKUPS: a small glowing gold box per zone.pickups entry, visibility
//       toggled off once collected (keycard pickups only — inferred from
//       engine.inventory.keycards[level], same HONEST GAP as
//       src/radar.js's own pickups field: a "chaff" pickup has no
//       persistent per-index collected flag exposed outside engine.js's
//       private bookkeeping, so its actor keeps glowing after collection;
//       cosmetic only, tracked in BACKLOG.md).
//
//   ZONE CHANGES (new): syncScene tracks engine.zone.id in a closure var. When
//   it differs from the last-seen id (an engine.js zone transition happened —
//   see src/engine.js's "ZONE TRANSITIONS" tick step), the OLD static scene
//   (floor/walls/wall-edges/darkzones/exit quad) and every guard actor
//   (body/nose/marker/vision-cone/cone-edge — the old zone's guard roster,
//   e.g. loadingDock's "g1", is a different set of ids than warehouse's
//   "w1"/"w2") are removed from the scene and their owned geometries AND
//   materials disposed (see disposeStatic/disposeGuardActors below — nothing
//   from the old zone is kept around leaking GPU resources), the camera is
//   re-centered on the new zone's bounds, and the static scene is rebuilt
//   fresh for the new zone before any dynamic sync happens this call. The
//   player actor is NOT rebuilt (its mesh isn't zone-specific, only its
//   position/stance are) — it's simply repositioned like any other frame.
//   renderer.render(engine) — syncScene(engine) then draws exactly one frame.
//   renderer.resize() — re-reads container.clientWidth/clientHeight, resizes
//     the WebGL canvas and recomputes the orthographic frustum so the whole
//     zone keeps fitting with margin regardless of aspect ratio. Boot is
//     responsible for calling this from a window "resize" listener; this
//     module does not add one itself (it only touches the container it was
//     given).
//
//   COORDINATE MAPPING: world (x, y) meters (+x right, +y down, per
//   src/world.js) -> THREE (x, 0, y) — i.e. world y becomes THREE z directly
//   (no sign flip). A world facing angle f (0 = +x, PI/2 = +y, same atan2
//   convention as player.facing/guard.facing) maps to a THREE Y-axis rotation
//   of -f (verify: THREE's rotation-about-Y maps local +X to
//   (cos(-f), 0, -sin(-f)) = (cos f, 0, sin f), i.e. exactly the world
//   direction (cos f, sin f) carried into (x, 0, y) — so mesh.rotation.y =
//   -facing turns an actor to visually face the same way its world facing
//   angle says it does).
//
//   CAMERA: fixed, locked, orthographic isometric-ish top-down. Positioned at
//   (zoneCenter.x, 26, zoneCenter.y + 14) looking at (zoneCenter.x, 0,
//   zoneCenter.y) — i.e. directly above the zone center, offset south
//   (+z/+world-y) and tilted down, giving a classic MGS-style tilted top-down
//   read without any perspective distortion (no controls this cycle; picking
//   THIS particular offset over a more diagonal iso angle because the zone is
//   wide (40x30) and a purely-vertical-with-slight-tilt view keeps every wall
//   AABB's footprint legible without a 45-degree rotation making near/far
//   walls overlap each other on screen).
//
//   THREE IS REFERENCED ONLY IN THIS FILE, and only from inside
//   createRenderer (never at module load / top-level scope) — node's test
//   loader never requires render.js, but if it ever did, or if this file is
//   evaluated before the THREE <script> tag runs, calling createRenderer
//   without THREE defined throws a clear Error instead of a bare
//   ReferenceError.
//
// Zero external assets: every mesh is a THREE primitive; the only "texture"
// assets (guard state glyphs/dots) are 2D-canvas-generated CanvasTextures
// built once at renderer creation, not loaded from disk/network.
(function (Game) {
  function createRenderer(opts) {
    if (typeof THREE === "undefined") {
      throw new Error(
        "Game.createRenderer: THREE is not defined (render.js must run in a " +
          "browser page that has loaded the Three.js <script> before boot " +
          "runs) — cannot create the renderer."
      );
    }

    opts = opts || {};
    var container = opts.container;
    var zone = opts.zone || (Game.ZONES && Game.ZONES.loadingDock);

    // ---- tunables ------------------------------------------------------------

    var STAND_H = 1.7;
    var CROUCH_H = 1.0;
    var CRAWL_H = 0.5;
    var BODY_W = 0.8; // box footprint, x and z

    var PERIMETER_H = 2.2;
    var INTERIOR_H = 1.6;

    var FLOOR_COLOR = 0x1a2028;
    var DARKZONE_COLOR = 0x0c1218;
    var WALL_PERIMETER_COLOR = 0x3a4a3f;
    var WALL_INTERIOR_COLOR = 0x4d6152;
    var WALL_EDGE_COLOR = 0x11150f;
    var EXIT_COLOR = 0x00ff66;
    var PLAYER_COLOR = 0x4682b4; // steel blue
    var GUARD_COLOR = 0x6b8e23; // olive drab
    // CARDBOARD BOX (new — box/chaff/ration cycle, see file header BOX
    // DISGUISE note below): cardboard-brown, matching src/hud.js's BOX
    // status-pill color family.
    var BOX_COLOR = 0x8b5a2b;
    var BOX_HEIGHT = 1.0; // world units — a fixed crate height, stance-independent
    var BOX_FOOTPRINT_SCALE = 1.45; // "slightly larger than the player" (BODY_W * this)
    var NOSE_COLOR = 0xf2f2f2;
    var BG_COLOR = 0x05070a;

    var CONE_SEGMENTS = 24;
    var CONE_Y = 0.02;
    // Fill uses additive blending (fine against the dark floor), each state's
    // color/opacity tuned so the green -> yellow -> orange -> red progression
    // reads as an obvious escalation instead of a wash of similar green-ish
    // blobs. The crisp edge outline (see EDGE_STYLE below) is what makes the
    // cone boundary legible even where the fill itself stays subtle.
    var CONE_STYLE = {
      PATROL: { color: 0x43a047, opacity: 0.32 },
      SUSPICIOUS: { color: 0xffca28, opacity: 0.4 },
      INVESTIGATE: { color: 0xff7043, opacity: 0.34 },
      ALERT: { color: 0xe53935, opacity: 0.48 },
      EVASION: { color: 0xab47bc, opacity: 0.34 },
      CAUTION: { color: 0xffa726, opacity: 0.3 },
    };
    // Bright, near-opaque outline drawn along the cone's two straight edges +
    // arc (a LineLoop over the exact same raycast-clipped fan points), so the
    // boundary stays crisp regardless of how subtle the additive fill reads
    // against a given patch of floor.
    var EDGE_STYLE = {
      PATROL: { color: 0x81c784, opacity: 0.85 },
      SUSPICIOUS: { color: 0xffe082, opacity: 0.9 },
      INVESTIGATE: { color: 0xffab91, opacity: 0.9 },
      ALERT: { color: 0xff8a80, opacity: 1.0 },
      EVASION: { color: 0xce93d8, opacity: 0.85 },
      CAUTION: { color: 0xffd180, opacity: 0.85 },
    };

    // CAMERAS (new — director cycle, see src/director.js contract): small
    // dark wall-mounted housing + a pivoting cone fan, same raycast-clipped
    // fan TECHNIQUE as the guard cones above (see buildCameraConeFan below)
    // but its own geometry/materials — cameras are a distinct entity type,
    // not guards, so they get their own actor bookkeeping (see
    // ensureCameraActor/disposeCameraActors below).
    var CAMERA_HOUSING_COLOR = 0x20262b; // small dark box, reads as hardware not a guard
    var CAMERA_HOUSING_W = 0.35;
    var CAMERA_HOUSING_H = 0.28;
    var CAMERA_MOUNT_Y = 2.0; // world units — wall-mounted height, above head height
    // Palette per SPEC: pale cyan normally, red once meter >= SUSPICIOUS_AT,
    // grey/off while disabled (chaff) — three states, keyed by a small
    // camState string this file derives per-camera each frame (see
    // cameraStyleKey below), NOT guard.state (cameras have no FSM).
    var CAMERA_CONE_STYLE = {
      NORMAL: { color: 0x80deea, opacity: 0.26 },
      ALERT: { color: 0xff5252, opacity: 0.42 },
      DISABLED: { color: 0x666666, opacity: 0.1 },
    };
    var CAMERA_EDGE_STYLE = {
      NORMAL: { color: 0xb2ebf2, opacity: 0.8 },
      ALERT: { color: 0xff8a80, opacity: 0.95 },
      DISABLED: { color: 0x888888, opacity: 0.35 },
    };

    // DOORS / LASERS / PICKUPS (new — Laboratory cycle, see file header).
    var DOOR_HEIGHT = 2.0; // world units — reads as a full slab, distinct from a low wall
    var DOOR_LOCK_COLOR = {
      L1: 0x508cff,
      L2: 0xffb03c,
      L3: 0xff4646,
    };
    var DOOR_UNLOCKED_COLOR = 0x96bea0;
    var LASER_COLOR = 0xff2828;
    var LASER_Y = 0.9; // roughly waist height — a real tripwire beam
    var PICKUP_COLOR = 0xfff096;
    var PICKUP_SIZE = 0.4;
    var PICKUP_Y = 0.5;

    var METER_MAX_W = 2.0;
    var METER_H = 0.32;

    // SLEEPING pose (scale trick — see file header): the standing body mesh
    // (BoxGeometry(BODY_W, 1, BODY_W), normally scaled to (1, height, 1) and
    // sat at y = height/2 by placeActor) is instead scaled to lie flat along
    // local +X (the direction the group's rotation.y already points it, so a
    // sleeping body reads as lying in the direction it was facing when it
    // went down) at a low, floor-hugging profile.
    var SLEEP_LENGTH = STAND_H; // lying "length" ~= a standing guard's height
    var SLEEP_THICKNESS = 0.4; // low profile, floor-hugging
    var SLEEP_Y = SLEEP_THICKNESS / 2;

    var TRACER_DURATION_S = 0.25;
    var TRACER_Y = 0.6; // roughly muzzle height

    // PLAYER HIDDEN dim/blink (see file header) — cycles/sec-ish for the
    // opacity sine while engine.playerHidden is true.
    var HIDDEN_BLINK_HZ = 1.4;
    var TWO_PI_R = Math.PI * 2;

    // ---- renderer / scene / camera --------------------------------------------

    var webgl = new THREE.WebGLRenderer({ antialias: true });
    webgl.setPixelRatio(
      typeof window !== "undefined" && window.devicePixelRatio ? window.devicePixelRatio : 1
    );
    container.appendChild(webgl.domElement);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    var sun = new THREE.DirectionalLight(0xffffff, 0.7);
    sun.position.set(10, 24, 8);
    scene.add(sun);

    var zoneCenter = { x: zone.bounds.w / 2, y: zone.bounds.h / 2 };

    var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 200);
    camera.position.set(zoneCenter.x, 26, zoneCenter.y + 14);
    camera.lookAt(zoneCenter.x, 0, zoneCenter.y);

    // ---- small local helpers ---------------------------------------------------

    function isPerimeterWall(wall) {
      return (
        wall.x <= 0 ||
        wall.y <= 0 ||
        wall.x + wall.w >= zone.bounds.w ||
        wall.y + wall.h >= zone.bounds.h
      );
    }

    function stanceHeight(stance) {
      if (stance === "crouch") return CROUCH_H;
      if (stance === "crawl") return CRAWL_H;
      return STAND_H;
    }

    // Canvas-generated glyph/dot textures for guard state markers — built
    // once, reused across every guard and every frame.
    function makeGlyphTexture(text, color) {
      var size = 128;
      var canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, size, size);
      ctx.font = "bold 92px sans-serif";
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, size / 2, size / 2 + 6);
      var tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    function makeDotTexture(color) {
      var size = 64;
      var canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, size, size);
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.34, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      var tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    var MARKER_TEXTURES = {
      SUSPICIOUS: makeGlyphTexture("?", "#f9a825"),
      ALERT: makeGlyphTexture("!", "#e53935"),
      INVESTIGATE: makeDotTexture("#ef6c00"),
      EVASION: makeDotTexture("#8e24aa"),
      CAUTION: makeDotTexture("#ff8f00"),
    };

    var MARKER_MATERIALS = {};
    Object.keys(MARKER_TEXTURES).forEach(function (state) {
      MARKER_MATERIALS[state] = new THREE.SpriteMaterial({
        map: MARKER_TEXTURES[state],
        transparent: true,
        depthTest: false,
      });
    });

    // "Zzz" sprite for SLEEPING guards (see file header) — built once, shared
    // (like MARKER_MATERIALS) across every guard actor and every zone; never
    // disposed by a zone change, only individual actors' USE of it toggles.
    var ZZZ_TEXTURE = makeGlyphTexture("Zzz", "#9fd8ff");
    var ZZZ_MATERIAL = new THREE.SpriteMaterial({
      map: ZZZ_TEXTURE,
      transparent: true,
      depthTest: false,
    });

    var CONE_MATERIALS = {};
    Object.keys(CONE_STYLE).forEach(function (state) {
      var s = CONE_STYLE[state];
      CONE_MATERIALS[state] = new THREE.MeshBasicMaterial({
        color: s.color,
        transparent: true,
        opacity: s.opacity,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
    });

    var EDGE_MATERIALS = {};
    Object.keys(EDGE_STYLE).forEach(function (state) {
      var s = EDGE_STYLE[state];
      EDGE_MATERIALS[state] = new THREE.LineBasicMaterial({
        color: s.color,
        transparent: true,
        opacity: s.opacity,
        depthWrite: false,
      });
    });

    // CAMERA cone/edge materials (see file header CAMERAS note) — same
    // additive-blend / crisp-outline recipe as CONE_MATERIALS/EDGE_MATERIALS
    // above, keyed by CAMERA_CONE_STYLE/CAMERA_EDGE_STYLE's NORMAL/ALERT/
    // DISABLED states instead of a guard's FSM state.
    var CAMERA_CONE_MATERIALS = {};
    Object.keys(CAMERA_CONE_STYLE).forEach(function (key) {
      var s = CAMERA_CONE_STYLE[key];
      CAMERA_CONE_MATERIALS[key] = new THREE.MeshBasicMaterial({
        color: s.color,
        transparent: true,
        opacity: s.opacity,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
    });

    var CAMERA_EDGE_MATERIALS = {};
    Object.keys(CAMERA_EDGE_STYLE).forEach(function (key) {
      var s = CAMERA_EDGE_STYLE[key];
      CAMERA_EDGE_MATERIALS[key] = new THREE.LineBasicMaterial({
        color: s.color,
        transparent: true,
        opacity: s.opacity,
        depthWrite: false,
      });
    });

    // ---- static scene (built once per zone) -------------------------------------

    var built = false;
    // Every THREE.Object3D added by buildStatic(), so a zone change can remove
    // + dispose them all without hunting through `scene.children` (see
    // disposeStatic below and the ZONE CHANGES note in the file header).
    var staticObjects = [];

    function buildFlatQuad(x, y, w, h, yOffset, material) {
      var geo = new THREE.PlaneGeometry(w, h);
      var mesh = new THREE.Mesh(geo, material);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x + w / 2, yOffset, y + h / 2);
      return mesh;
    }

    function addStatic(obj) {
      scene.add(obj);
      staticObjects.push(obj);
      return obj;
    }

    function buildStatic() {
      var floorMat = new THREE.MeshLambertMaterial({ color: FLOOR_COLOR });
      addStatic(buildFlatQuad(0, 0, zone.bounds.w, zone.bounds.h, 0, floorMat));

      var darkMat = new THREE.MeshLambertMaterial({ color: DARKZONE_COLOR });
      (zone.darkZones || []).forEach(function (dz) {
        addStatic(buildFlatQuad(dz.x, dz.y, dz.w, dz.h, 0.01, darkMat));
      });

      (zone.walls || []).forEach(function (wall) {
        var perimeter = isPerimeterWall(wall);
        var h = perimeter ? PERIMETER_H : INTERIOR_H;
        var geo = new THREE.BoxGeometry(wall.w, h, wall.h);
        var mat = new THREE.MeshLambertMaterial({
          color: perimeter ? WALL_PERIMETER_COLOR : WALL_INTERIOR_COLOR,
        });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(wall.x + wall.w / 2, h / 2, wall.y + wall.h / 2);
        addStatic(mesh);

        var edges = new THREE.EdgesGeometry(geo);
        var line = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({ color: WALL_EDGE_COLOR })
        );
        line.position.copy(mesh.position);
        addStatic(line);
      });

      if (zone.exit) {
        var exitMat = new THREE.MeshLambertMaterial({
          color: 0x003318,
          emissive: EXIT_COLOR,
        });
        addStatic(
          buildFlatQuad(zone.exit.x, zone.exit.y, zone.exit.w, zone.exit.h, 0.03, exitMat)
        );
      }
    }

    // Removes + disposes every object buildStatic() created (geometry AND
    // material — none of these are shared with anything else, unlike the
    // guard actor materials handled by disposeGuardActors below).
    function disposeStatic() {
      staticObjects.forEach(function (obj) {
        scene.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
      staticObjects = [];
    }

    // ---- dynamic actors (player, guards) ---------------------------------------

    function makeNose(color) {
      var geo = new THREE.ConeGeometry(0.16, 0.5, 8);
      geo.rotateZ(-Math.PI / 2); // point along local +X
      var mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: color }));
      return mesh;
    }

    function makeActor(bodyColor, noseColor) {
      var group = new THREE.Group();
      var bodyGeo = new THREE.BoxGeometry(BODY_W, 1, BODY_W);
      var body = new THREE.Mesh(bodyGeo, new THREE.MeshLambertMaterial({ color: bodyColor }));
      group.add(body);
      var nose = makeNose(noseColor);
      group.add(nose);
      scene.add(group);
      return { group: group, body: body, nose: nose };
    }

    function placeActor(actor, x, y, facing, height) {
      actor.group.position.set(x, 0, y);
      actor.group.rotation.y = -facing;
      // Explicit full reset (not just scale.y) so an actor that was posed
      // SLEEPING (see placeSleepingActor below) on a previous frame doesn't
      // carry over its lying-flat scale/rotation once it's awake again.
      actor.body.scale.set(1, height, 1);
      actor.body.rotation.set(0, 0, 0);
      actor.body.position.set(0, height / 2, 0);
      actor.nose.visible = true;
      actor.nose.position.set(BODY_W / 2 + 0.1, height * 0.55, 0);
    }

    // SLEEPING pose (see file header) — guards only, never the player. Lies
    // the body mesh flat along local +X via a scale trick (no rotation
    // needed): the mesh's own local X axis already points the direction the
    // group's rotation.y turns it, so a sleeping body reads as lying in the
    // direction it was facing when it went down.
    function placeSleepingActor(actor, guard) {
      actor.group.position.set(guard.x, 0, guard.y);
      actor.group.rotation.y = -guard.facing;
      actor.body.scale.set(SLEEP_LENGTH / BODY_W, SLEEP_THICKNESS, 1);
      actor.body.rotation.set(0, 0, 0);
      actor.body.position.set(0, SLEEP_Y, 0);
      actor.nose.visible = false;
    }

    var playerActor = null;

    var guardActors = {}; // id -> { group, body, nose, marker (Sprite), cone (Mesh) }

    function ensureGuardActor(guard) {
      var existing = guardActors[guard.id];
      if (existing) return existing;

      var base = makeActor(GUARD_COLOR, NOSE_COLOR);

      var marker = new THREE.Sprite(MARKER_MATERIALS.SUSPICIOUS);
      // Roughly doubled from the original 0.85 world-units so state glyphs
      // ("?"/"!") and dots stay legible at 720p against the tilted camera.
      marker.scale.set(1.8, 1.8, 1);
      marker.visible = false;
      scene.add(marker);

      var coneMesh = new THREE.Mesh(new THREE.BufferGeometry(), CONE_MATERIALS.PATROL);
      scene.add(coneMesh);

      var coneEdge = new THREE.LineLoop(new THREE.BufferGeometry(), EDGE_MATERIALS.PATROL);
      scene.add(coneEdge);

      var zzz = new THREE.Sprite(ZZZ_MATERIAL);
      zzz.scale.set(1.4, 1.4, 1);
      zzz.visible = false;
      scene.add(zzz);

      var actor = {
        group: base.group,
        body: base.body,
        nose: base.nose,
        marker: marker,
        cone: coneMesh,
        coneEdge: coneEdge,
        zzz: zzz,
      };
      guardActors[guard.id] = actor;
      return actor;
    }

    // Removes + disposes every live guard actor (see ZONE CHANGES in the file
    // header — a zone change means a brand-new guard roster with different
    // ids, e.g. loadingDock's "g1" vs warehouse's "w1"/"w2", so the old
    // actors would otherwise sit around invisible-but-never-freed forever).
    // body/nose geometry+material and cone/coneEdge geometry are each owned
    // exclusively by their actor (fresh THREE.Material/Geometry per
    // makeActor()/updateVisionCone() call) and are disposed here; cone/
    // coneEdge MATERIALS and the marker's material come from the shared
    // CONE_MATERIALS/EDGE_MATERIALS/MARKER_MATERIALS maps (keyed by guard
    // state, reused across every guard and every zone) and must NOT be
    // disposed, or the next zone's guards would render with dead materials.
    // zzz likewise shares ZZZ_MATERIAL (see file header) — only removed from
    // the scene here, never disposed.
    function disposeGuardActors() {
      Object.keys(guardActors).forEach(function (id) {
        var actor = guardActors[id];
        scene.remove(actor.group, actor.marker, actor.cone, actor.coneEdge, actor.zzz);
        actor.body.geometry.dispose();
        actor.body.material.dispose();
        actor.nose.geometry.dispose();
        actor.nose.material.dispose();
        actor.cone.geometry.dispose();
        actor.coneEdge.geometry.dispose();
      });
      guardActors = {};
    }

    // Rebuilds a guard's vision-cone geometry this frame, clipped by
    // world.raycast so the fan never draws through a wall (the fan must show
    // what the guard can actually see — see file header / render contract).
    function updateVisionCone(actor, guard, world, squad) {
      var style = CONE_STYLE[guard.state] || CONE_STYLE.PATROL;
      actor.cone.material = CONE_MATERIALS[guard.state] || CONE_MATERIALS.PATROL;
      actor.coneEdge.material = EDGE_MATERIALS[guard.state] || EDGE_MATERIALS.PATROL;

      var caution = squad.phase === "CAUTION";
      var fovDeg = Game.VISION.FOV_DEG * (caution ? Game.GUARD.CAUTION_FOV_MULT : 1);
      var range = Game.VISION.RANGE * (caution ? Game.GUARD.CAUTION_RANGE_MULT : 1);
      var halfFov = (fovDeg * Math.PI) / 180 / 2;

      var segments = CONE_SEGMENTS;
      var positions = new Float32Array((segments + 2) * 3);
      positions[0] = guard.x;
      positions[1] = CONE_Y;
      positions[2] = guard.y;

      for (var i = 0; i <= segments; i++) {
        var angle = guard.facing - halfFov + (i * (2 * halfFov)) / segments;
        var farX = guard.x + Math.cos(angle) * range;
        var farY = guard.y + Math.sin(angle) * range;
        var hit = world.raycast(guard.x, guard.y, farX, farY);
        var px = hit ? hit.x : farX;
        var py = hit ? hit.y : farY;
        var idx = (i + 1) * 3;
        positions[idx] = px;
        positions[idx + 1] = CONE_Y;
        positions[idx + 2] = py;
      }

      var indices = [];
      for (var k = 0; k < segments; k++) {
        indices.push(0, k + 1, k + 2);
      }

      actor.cone.geometry.dispose();
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setIndex(indices);
      actor.cone.geometry = geo;

      // The fan boundary (apex -> arc point 0 -> ... -> arc point N) is
      // exactly the same vertex sequence already computed above; a LineLoop
      // over it closes N -> apex, tracing both straight edges plus the arc
      // in one pass — a crisp outline even where the additive fill is faint.
      actor.coneEdge.geometry.dispose();
      var edgePositions = positions.slice();
      // Nudge the outline a hair above the fill plane so it never z-fights
      // with it (both are depthWrite:false, but this keeps draw order moot).
      for (var e = 1; e < edgePositions.length; e += 3) edgePositions[e] = CONE_Y + 0.005;
      var edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
      actor.coneEdge.geometry = edgeGeo;
      // style read above only to keep the CONE_STYLE lookup obviously alive
      // for future tuning (e.g. per-state fov override); currently unused
      // beyond material selection.
      void style;
    }

    function updateGuardMarker(actor, guard) {
      var mat = MARKER_MATERIALS[guard.state];
      if (!mat) {
        actor.marker.visible = false;
        return;
      }
      actor.marker.visible = true;
      actor.marker.material = mat;
      var h = STAND_H; // guards have no stance; body is always "stand" height
      // The camera's tilt compresses vertical elevation on screen (only the
      // component of world-Y along the camera's up axis shows up as
      // screen-up), so the marker needs more world-space clearance above the
      // guard's head than a straight top-down camera would — otherwise it
      // reads as sitting on top of the guard rather than floating above it.
      // (Raised slightly further than the pre-polish 1.3 to keep clearance
      // now that the marker itself is twice as large.)
      actor.marker.position.set(guard.x, h + 1.5, guard.y);
    }

    // ---- security cameras (see file header CAMERAS note) -----------------------
    // Static wall-mounted housing (position/facing fixed at construction,
    // matching src/director.js's schema — cameras never move) + a pivoting
    // cone fan that DOES change every frame (panAngle sweeps, color reacts to
    // meter/disabled). One actor per index into engine.director.cameraStates()
    // — cameras have no persistent id the way guards do, so index IS the key
    // (stable for a zone's lifetime; a zone change discards the whole roster
    // and rebuilds fresh, same as disposeGuardActors below).

    var cameraActors = {}; // index -> { housing, cone, coneEdge }

    function ensureCameraActor(index, cam) {
      var existing = cameraActors[index];
      if (existing) return existing;

      var housingGeo = new THREE.BoxGeometry(CAMERA_HOUSING_W, CAMERA_HOUSING_H, CAMERA_HOUSING_W);
      var housingMat = new THREE.MeshLambertMaterial({ color: CAMERA_HOUSING_COLOR });
      var housing = new THREE.Mesh(housingGeo, housingMat);
      // The housing itself never re-poses after this (cameras are fixed,
      // wall-mounted hardware, unlike a guard's body) — position/orientation
      // set once here, at the camera's own static x/y and its FIRST-FRAME
      // panAngle (director.cameraStates() exposes panAngle, not the static
      // `facing` center — close enough for a cosmetic housing that only
      // needs to look roughly aimed the right way; the cone fan below is
      // what actually tracks the live pan every frame).
      housing.position.set(cam.x, CAMERA_MOUNT_Y, cam.y);
      housing.rotation.y = -cam.panAngle;
      scene.add(housing);

      var coneMesh = new THREE.Mesh(new THREE.BufferGeometry(), CAMERA_CONE_MATERIALS.NORMAL);
      scene.add(coneMesh);

      var coneEdge = new THREE.LineLoop(new THREE.BufferGeometry(), CAMERA_EDGE_MATERIALS.NORMAL);
      scene.add(coneEdge);

      var actor = { housing: housing, cone: coneMesh, coneEdge: coneEdge };
      cameraActors[index] = actor;
      return actor;
    }

    // Removes + disposes every live camera actor (see ZONE CHANGES in the
    // file header) — same rationale as disposeGuardActors above: a zone
    // change means a different (possibly empty) camera roster, so nothing
    // from the old zone should linger. Housing geometry/material and cone/
    // coneEdge geometry are each owned exclusively by their actor; cone/
    // coneEdge MATERIALS come from the shared CAMERA_CONE_MATERIALS/
    // CAMERA_EDGE_MATERIALS maps (reused across every camera/zone) and must
    // NOT be disposed here.
    function disposeCameraActors() {
      Object.keys(cameraActors).forEach(function (index) {
        var actor = cameraActors[index];
        scene.remove(actor.housing, actor.cone, actor.coneEdge);
        actor.housing.geometry.dispose();
        actor.housing.material.dispose();
        actor.cone.geometry.dispose();
        actor.coneEdge.geometry.dispose();
      });
      cameraActors = {};
    }

    // Which of CAMERA_CONE_STYLE/CAMERA_EDGE_STYLE's three keys a camera
    // reads as this frame — SPEC palette: pale cyan normally, red once the
    // meter reaches SUSPICIOUS_AT (an early "it's noticing you" cue, not
    // just at full ALERT), grey/off while disabled (chaff) — disabled wins
    // over everything else (a jammed camera reads as dead hardware
    // regardless of whatever stale meter value it's frozen at).
    function cameraStyleKey(camState) {
      if (camState.disabled) return "DISABLED";
      if (camState.meter >= Game.VISION.SUSPICIOUS_AT) return "ALERT";
      return "NORMAL";
    }

    // Rebuilds a camera's vision-cone geometry this frame, same
    // raycast-clipped-fan TECHNIQUE as updateVisionCone above (apex at the
    // camera's fixed position, arc points clipped to the first wall each ray
    // hits) but reading the camera's own CURRENT panAngle/fovDeg/range from
    // director.cameraStates() instead of a guard's live facing/CAUTION
    // widening.
    function updateCameraCone(actor, camState, world) {
      var key = cameraStyleKey(camState);
      actor.cone.material = CAMERA_CONE_MATERIALS[key];
      actor.coneEdge.material = CAMERA_EDGE_MATERIALS[key];

      var halfFov = (camState.fovDeg * Math.PI) / 180 / 2;
      var range = camState.range;

      var segments = CONE_SEGMENTS;
      var positions = new Float32Array((segments + 2) * 3);
      positions[0] = camState.x;
      positions[1] = CONE_Y;
      positions[2] = camState.y;

      for (var i = 0; i <= segments; i++) {
        var angle = camState.panAngle - halfFov + (i * (2 * halfFov)) / segments;
        var farX = camState.x + Math.cos(angle) * range;
        var farY = camState.y + Math.sin(angle) * range;
        var hit = world.raycast(camState.x, camState.y, farX, farY);
        var px = hit ? hit.x : farX;
        var py = hit ? hit.y : farY;
        var idx = (i + 1) * 3;
        positions[idx] = px;
        positions[idx + 1] = CONE_Y;
        positions[idx + 2] = py;
      }

      var indices = [];
      for (var k = 0; k < segments; k++) {
        indices.push(0, k + 1, k + 2);
      }

      actor.cone.geometry.dispose();
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setIndex(indices);
      actor.cone.geometry = geo;

      actor.coneEdge.geometry.dispose();
      var edgePositions = positions.slice();
      for (var e = 1; e < edgePositions.length; e += 3) edgePositions[e] = CONE_Y + 0.005;
      var edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
      actor.coneEdge.geometry = edgeGeo;
    }

    // ---- doors / lasers / pickups (see file header) ---------------------------

    var doorActors = {}; // door.id -> { mesh }
    var laserActors = {}; // index -> { line }
    var pickupActors = {}; // index -> { mesh }

    function ensureDoorActor(door) {
      var existing = doorActors[door.id];
      if (existing) return existing;
      var geo = new THREE.BoxGeometry(door.w, DOOR_HEIGHT, door.h);
      var mat = new THREE.MeshLambertMaterial({
        color: door.lock ? DOOR_LOCK_COLOR[door.lock] : DOOR_UNLOCKED_COLOR,
        transparent: true,
        opacity: 0.95,
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(door.x + door.w / 2, DOOR_HEIGHT / 2, door.y + door.h / 2);
      scene.add(mesh);
      var actor = { mesh: mesh };
      doorActors[door.id] = actor;
      return actor;
    }

    function disposeDoorActors() {
      Object.keys(doorActors).forEach(function (id) {
        var actor = doorActors[id];
        scene.remove(actor.mesh);
        actor.mesh.geometry.dispose();
        actor.mesh.material.dispose();
      });
      doorActors = {};
    }

    function ensureLaserActor(index, laser) {
      var existing = laserActors[index];
      if (existing) return existing;
      var positions = new Float32Array([laser.x1, LASER_Y, laser.y1, laser.x2, LASER_Y, laser.y2]);
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      var mat = new THREE.LineBasicMaterial({ color: LASER_COLOR, transparent: true, opacity: 0.95 });
      var line = new THREE.Line(geo, mat);
      scene.add(line);
      var actor = { line: line };
      laserActors[index] = actor;
      return actor;
    }

    function disposeLaserActors() {
      Object.keys(laserActors).forEach(function (index) {
        var actor = laserActors[index];
        scene.remove(actor.line);
        actor.line.geometry.dispose();
        actor.line.material.dispose();
      });
      laserActors = {};
    }

    function ensurePickupActor(index, pickup) {
      var existing = pickupActors[index];
      if (existing) return existing;
      var geo = new THREE.BoxGeometry(PICKUP_SIZE, PICKUP_SIZE, PICKUP_SIZE * 0.15);
      var mat = new THREE.MeshLambertMaterial({
        color: PICKUP_COLOR,
        emissive: PICKUP_COLOR,
        emissiveIntensity: 0.6,
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(pickup.x, PICKUP_Y, pickup.y);
      scene.add(mesh);
      var actor = { mesh: mesh };
      pickupActors[index] = actor;
      return actor;
    }

    function disposePickupActors() {
      Object.keys(pickupActors).forEach(function (index) {
        var actor = pickupActors[index];
        scene.remove(actor.mesh);
        actor.mesh.geometry.dispose();
        actor.mesh.material.dispose();
      });
      pickupActors = {};
    }

    // Keycard already collected? Same HONEST GAP as src/radar.js's own
    // pickups field (chaff has no exposed collected flag) — see file header.
    function pickupCollected(item, engine) {
      var kc = engine.inventory && engine.inventory.keycards;
      if (!kc) return false;
      if (item === "keycardL1") return !!kc.L1;
      if (item === "keycardL2") return !!kc.L2;
      if (item === "keycardL3") return !!kc.L3;
      return false;
    }

    // ---- detection meter (two quads above the player) --------------------------

    var meterBg = null;
    var meterFill = null;

    function ensureMeter() {
      if (meterBg) return;
      meterBg = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x111111, transparent: true, opacity: 0.6, depthTest: false })
      );
      meterBg.scale.set(METER_MAX_W, METER_H, 1);
      meterFill = new THREE.Sprite(
        new THREE.SpriteMaterial({ color: 0x2e7d32, transparent: true, depthTest: false })
      );
      meterFill.scale.set(0.001, METER_H * 0.75, 1);
      scene.add(meterBg, meterFill);
    }

    // ---- dart tracer (see file header DART TRACER note) ------------------------

    var tracers = []; // { from:{x,y}, to:{x,y}, startTime } — pure data
    var tracerLines = []; // parallel THREE.Line objects currently in the scene

    function clearTracers() {
      tracerLines.forEach(function (line) {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      });
      tracerLines = [];
      tracers = [];
    }

    function updateTracers(engine) {
      for (var i = 0; i < engine.events.length; i++) {
        var ev = engine.events[i];
        if (ev.type === "tranqFired" && ev.impact) {
          tracers.push({
            from: { x: engine.player.x, y: engine.player.y },
            to: { x: ev.impact.x, y: ev.impact.y },
            startTime: engine.time,
          });
        }
      }

      tracers = tracers.filter(function (t) {
        return engine.time - t.startTime < TRACER_DURATION_S;
      });

      // Rebuilt fresh every frame — the list is always tiny (a handful of
      // tracers alive at once, each lasting a quarter second), so this is
      // simpler and cheap enough versus reusing/pooling THREE.Line objects.
      tracerLines.forEach(function (line) {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      });
      tracerLines = tracers.map(function (t) {
        var age = engine.time - t.startTime;
        var alpha = Math.max(0, 1 - age / TRACER_DURATION_S);
        var positions = new Float32Array([t.from.x, TRACER_Y, t.from.y, t.to.x, TRACER_Y, t.to.y]);
        var geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        var mat = new THREE.LineBasicMaterial({
          color: 0xbfffea,
          transparent: true,
          opacity: alpha,
          depthWrite: false,
        });
        var line = new THREE.Line(geo, mat);
        scene.add(line);
        return line;
      });
    }

    function meterColor(v) {
      // green -> yellow (0..0.5), yellow -> red (0.5..1)
      var c1, c2, t;
      if (v <= 0.5) {
        c1 = { r: 0x2e, g: 0x7d, b: 0x32 };
        c2 = { r: 0xf9, g: 0xa8, b: 0x25 };
        t = v / 0.5;
      } else {
        c1 = { r: 0xf9, g: 0xa8, b: 0x25 };
        c2 = { r: 0xc6, g: 0x28, b: 0x28 };
        t = (v - 0.5) / 0.5;
      }
      var r = Math.round(c1.r + (c2.r - c1.r) * t);
      var g = Math.round(c1.g + (c2.g - c1.g) * t);
      var b = Math.round(c1.b + (c2.b - c1.b) * t);
      return (r << 16) | (g << 8) | b;
    }

    function updateMeter(engine) {
      var value = 0;
      for (var i = 0; i < engine.guards.length; i++) {
        if (engine.guards[i].meter > value) value = engine.guards[i].meter;
      }
      if (value <= 0.001) {
        if (meterBg) {
          meterBg.visible = false;
          meterFill.visible = false;
        }
        return;
      }
      ensureMeter();
      meterBg.visible = true;
      meterFill.visible = true;

      var player = engine.player;
      var y = stanceHeight(player.stance) + 0.55;
      meterBg.position.set(player.x, y, player.y);
      meterFill.position.set(player.x, y, player.y);
      meterFill.scale.set(Math.max(0.001, METER_MAX_W * value), METER_H * 0.75, 1);
      meterFill.material.color.setHex(meterColor(value));
    }

    // ---- per-frame sync ---------------------------------------------------------

    // Tracks the zone id the static scene was last built for (see ZONE
    // CHANGES in the file header). null until the first syncScene() call.
    var currentZoneId = null;

    function syncScene(engine) {
      if (engine.zone && engine.zone.id !== currentZoneId) {
        if (built) {
          disposeStatic();
          disposeGuardActors();
          disposeCameraActors();
          disposeDoorActors();
          disposeLaserActors();
          disposePickupActors();
          built = false;
        }
        clearTracers(); // old zone's coordinates are meaningless in the new one
        zone = engine.zone;
        zoneCenter = { x: zone.bounds.w / 2, y: zone.bounds.h / 2 };
        camera.position.set(zoneCenter.x, 26, zoneCenter.y + 14);
        camera.lookAt(zoneCenter.x, 0, zoneCenter.y);
        resize(); // refit the orthographic frustum to the new zone's bounds
        currentZoneId = zone.id;
      }

      if (!built) {
        buildStatic();
        built = true;
      }

      if (!playerActor) {
        playerActor = makeActor(PLAYER_COLOR, NOSE_COLOR);
        // Marked transparent up front (see file header PLAYER HIDDEN note)
        // so the per-frame opacity write below never has to toggle
        // .transparent itself — a one-time cost, not per-frame churn.
        playerActor.body.material.transparent = true;
        playerActor.nose.material.transparent = true;
      }
      var player = engine.player;
      placeActor(playerActor, player.x, player.y, player.facing, stanceHeight(player.stance));

      // BOX DISGUISE (see file header) — re-skins the SAME body/nose meshes
      // placeActor just posed above; runs every frame so taking the box off
      // reliably reverts to the normal color/scale/nose-visible, not just a
      // one-time swap when boxOn first flips true.
      var boxOn = !!(engine.inventory && engine.inventory.boxOn);
      if (boxOn) {
        // BOX_FOOTPRINT_SCALE scales BODY_W directly (the body mesh's own
        // scale is relative to its unscaled BODY_W x 1 x BODY_W geometry,
        // same convention placeActor's `1` X/Z scale already relies on).
        playerActor.body.scale.set(BOX_FOOTPRINT_SCALE, BOX_HEIGHT, BOX_FOOTPRINT_SCALE);
        playerActor.body.position.set(0, BOX_HEIGHT / 2, 0);
        playerActor.body.material.color.setHex(BOX_COLOR);
        playerActor.nose.visible = false; // a box gives no external facing hint
      } else {
        playerActor.body.material.color.setHex(PLAYER_COLOR);
      }

      // PLAYER HIDDEN dim/blink (see file header) — deterministic sine of
      // engine.time, never Date.now. Full opacity (1) whenever not hidden.
      var playerOpacity = engine.playerHidden
        ? 0.42 + 0.18 * Math.sin(engine.time * HIDDEN_BLINK_HZ * TWO_PI_R)
        : 1;
      playerActor.body.material.opacity = playerOpacity;
      playerActor.nose.material.opacity = playerOpacity;

      for (var i = 0; i < engine.guards.length; i++) {
        var guard = engine.guards[i];
        var actor = ensureGuardActor(guard);
        if (guard.state === "SLEEPING") {
          placeSleepingActor(actor, guard);
          actor.cone.visible = false;
          actor.coneEdge.visible = false;
          actor.marker.visible = false;
          actor.zzz.visible = true;
          var bob = Math.sin(engine.time * 2.2) * 0.12;
          actor.zzz.position.set(guard.x, SLEEP_Y + 1.1 + bob, guard.y);
        } else {
          placeActor(actor, guard.x, guard.y, guard.facing, STAND_H);
          actor.cone.visible = true;
          actor.coneEdge.visible = true;
          actor.zzz.visible = false;
          updateVisionCone(actor, guard, engine.world, engine.squad);
          updateGuardMarker(actor, guard);
        }
      }

      // SECURITY CAMERAS (see file header CAMERAS note) — pure snapshot read
      // off engine.director.cameraStates() (see src/director.js contract);
      // engine.director is empty-safe (undefined check only matters for a
      // bespoke pre-cycle test engine that predates this module — every real
      // engine always has one, even on a zone with zero cameras).
      var cameraStates = (engine.director && engine.director.cameraStates()) || [];
      for (var ci = 0; ci < cameraStates.length; ci++) {
        var camState = cameraStates[ci];
        var camActor = ensureCameraActor(ci, camState);
        updateCameraCone(camActor, camState, engine.world);
      }

// ---------------------------------------------------------------------------
// 1. Pan angle: deterministic given ctx.time, bounded to +/- sweepDeg/2
//    around `facing` over a full sweepPeriodS.
// ---------------------------------------------------------------------------
Game.selfTests.push({
  name: "director: camera pan angle is a deterministic, bounded function of ctx.time",
  fn: function () {
    const zone = Game.ZONES.warehouse;
    const world = Game.createWorld(zone);
    const vision = Game.createVision({ world: world });
    const squad = Game.createSquad();
    const director = Game.createDirector({ world: world, vision: vision, squad: squad });

    const cam = zone.cameras[0];
    const halfSweepRad = (cam.sweepDeg * Math.PI) / 180 / 2;
    const player = farTarget();

    let seenMin = Infinity;
    let seenMax = -Infinity;
    const STEPS = 600; // 10s of sim time at DT=1/60, well over one 6s sweepPeriodS

    for (let i = 0; i < STEPS; i++) {
      const t = i * DT;
      director.tickCameras(DT, { time: t, chaffUntil: 0, player: player });
      const panAngle = director.cameraStates()[0].panAngle;

      const expected = cam.facing + Math.sin((2 * Math.PI * t) / cam.sweepPeriodS) * halfSweepRad;
      assert(
        Math.abs(panAngle - expected) < 1e-9,
        "pan angle not a pure/deterministic function of ctx.time at t=" + t.toFixed(3)
      );

      const delta = panAngle - cam.facing;
      if (delta < seenMin) seenMin = delta;
      if (delta > seenMax) seenMax = delta;
    }

    assert(
      seenMax <= halfSweepRad + 1e-9 && seenMin >= -halfSweepRad - 1e-9,
      "pan swing exceeded +/- sweepDeg/2: min=" + seenMin.toFixed(4) + " max=" + seenMax.toFixed(4)
    );
    // With a full 10s window (> one 6s period) the sweep should have actually
    // approached both extremes, not just stayed near zero.
    assert(seenMax > halfSweepRad * 0.9, "pan angle never swung near the +sweepDeg/2 extreme");
    assert(seenMin < -halfSweepRad * 0.9, "pan angle never swung near the -sweepDeg/2 extreme");
  },
});

    const cam = Game.ZONES.warehouse.cameras[1]; // east-facing camera, faces 0 rad

    // Dead-center of the camera's base facing, 5m out — clear open floor
    // (verified against the warehouse's real walls when these positions were
    // chosen, see src/world.js's camera placement comments).
    engine.player.x = cam.x + 5;
    engine.player.y = cam.y;
    engine.player.stance = "stand";

    let sawCameraAlert = false;
    const SEARCH_TICKS = Math.round(8 / DT); // generous: the sweep periodically
    // carries the player out of the narrow FOV, so the meter fills across
    // several in-cone/out-of-cone arcs rather than in one smooth ramp — see
    // src/director.js's tickCameras contract.
    for (let i = 0; i < SEARCH_TICKS && !sawCameraAlert; i++) {
      engine.tick({ moveX: 0, moveY: 0 });
      for (let e = 0; e < engine.events.length; e++) {
        if (engine.events[e].type === "cameraAlert") sawCameraAlert = true;
      }
    }
    assert(sawCameraAlert, "expected a cameraAlert event within 8s of standing 5m dead-center in a camera's cone");
    // The camera's broadcastAlert() flips squad.phase to ALERT the instant
    // the meter crosses ALERT_AT (src/guardAI.js's own no-op-if-already-ALERT
    // rule), but since NO GUARD has real LOS on the player in this scenario
    // (see src/engine.js's DESIGN RULE: cameras don't feed anyLOS), the very
    // same squad.tick() call that runs later THIS SAME engine tick sees
    // anyGuardHasLOS === false and immediately advances ALERT -> EVASION —
    // so by the time tick() returns, phase may already read EVASION rather
    // than a lingering ALERT. Either is the "went hostile because of the
    // camera" outcome this test cares about.
    assert(
      engine.squad.phase === "ALERT" || engine.squad.phase === "EVASION",
      "expected squad.phase ALERT or EVASION after the camera alert, got " + engine.squad.phase
    );
    assert(engine.squad.alertCount >= 1, "expected the camera alert to have counted as a real alert incident");

    const lastKnown = engine.squad.lastKnown;
    assert(
      Math.abs(lastKnown.x - engine.player.x) < 1e-6 && Math.abs(lastKnown.y - engine.player.y) < 1e-6,
      "expected squad.lastKnown to be the camera-reported player position"
    );

    const target = { x: lastKnown.x, y: lastKnown.y };
    const initialMin = Math.min.apply(
      null,
      engine.guards.map(function (g) {
        return dist(g.x, g.y, target.x, target.y);
      })
    );

    // Guards converge on the reported position (ALERT pursuit, or EVASION's
    // own convergence-on-lastKnown sweep once the squad has decayed off the
    // camera-only ALERT — see src/guardAI.js's EVASION contract and
    // engine.js's DESIGN RULE above) — give it several seconds of travel and
    // confirm at least one guard was actually forced hostile.
    let anyGuardWentHostile = false;
    const FOLLOWUP_TICKS = Math.round(6 / DT);
    for (let j = 0; j < FOLLOWUP_TICKS; j++) {
      engine.tick({ moveX: 0, moveY: 0 });
      if (engine.guards.some((g) => g.state === "ALERT" || g.state === "EVASION")) anyGuardWentHostile = true;

    assert(anyGuardWentHostile, "expected at least one guard to go hostile (ALERT/EVASION) after the camera-triggered squad alert");

    const finalMin = Math.min.apply(
      null,
      engine.guards.map(function (g) {
        return dist(g.x, g.y, target.x, target.y);
      })
    );
    assert(
      finalMin < initialMin - 2,
      "expected the nearest guard to have closed real distance toward the camera-reported position: initial=" +
        initialMin.toFixed(2) +
        " final=" +
        finalMin.toFixed(2)
    );
  },
});

    for (const ev of engine.events) {
      if (ev.type === "guardFire") fireEvents.push({ tick: i, hit: ev.hit });
      if (ev.type === "playerHit") hitEvents.push({ tick: i, hp: ev.hp });
    }
    if (engine.gameOver) break;
    if (stopWhen && stopWhen({ tick: i, alertTick: alertTick, fireEvents: fireEvents, hitEvents: hitEvents })) {
      break;
    }
  }
  return { alertTick: alertTick, fireEvents: fireEvents, hitEvents: hitEvents };
}

// ---- 5. Crouching takes strictly fewer hits than standing, under otherwise identical conditions ----
// DESIGN NOTE ON THE TWO ARMS COMPARED: the accuracy formula is base 0.75,
// HALVED if player.moving, HALVED AGAIN (independently) if stance is
// crouch/crawl — i.e. moving and crouch/crawl are two SEPARATE, EQUALLY-
// WEIGHTED (x0.5 each) penalties applied to the SAME base, not a ladder where
// crouching "beats" moving. That means "crouched+stationary" (only the
// crouch halving applies: 0.75*0.5=0.375) and "standing+moving" (only the
// moving halving applies: 0.75*0.5=0.375) land on the EXACT SAME chance —
// verified empirically while authoring this test: driving both arms from the
// SAME seed with the SAME guard geometry (necessary so both draw from the
// SAME rng.next() sequence at the SAME shot indices, see below) produced
// IDENTICAL hit counts for every one of 2000 seeds tried, because the two
// arms are, by the formula, indistinguishable single-penalty cases — there
// is no seed that makes one "robustly fewer" than the other, since they are
// not actually different distributions. So this test instead holds `moving`
// CONSTANT (true in both arms — a player actively repositioning during a
// firefight, the realistic combat case) and varies ONLY stance, isolating
// the crouch/crawl halving on its own: crouched+moving (0.75*0.5*0.5=0.1875)
// vs standing+moving (0.75*0.5=0.375). This is a real, unequal comparison —
// crouching provably helps on top of already moving — and is what "crouching
// reduces hits taken" cashes out to under the specified formula.
//
// LOCKSTEP + SEED CHOICE: both runs force squad.phase = "ALERT" (with
// lastKnown already at the player's position) BEFORE the very first tick, so
// guard.state syncs to ALERT on tick 0 in both runs regardless of the
// target's visionProfile() (crouch vs stand would otherwise change how long
// PRE-alert perception takes to fill the meter, shifting the two runs' fire
// cadence out of lockstep). Both runs keep the player at the SAME position
// for the whole window, fed via an identical tiny moveX (0.0001) every tick
// in BOTH arms — per src/player.js's contract, player.moving reflects
// movement INTENT ("before the moveCircle collision resolve"), so this
// genuinely sets moving=true via the real mechanism while the actual
// resulting displacement (speed * dt * 0.0001) is many orders of magnitude
// below anything that could change distance/LOS. With guard geometry and
// fire cadence therefore IDENTICAL between the two runs, both consume the
// SAME rng.next() draw at each shot (rng.js: one seed => one deterministic
// draw sequence, and guardAI.js's fire roll is the only rng consumer wired
// up this cycle), evaluated against a stricter threshold in the crouch run
// (0.1875) than the stand run (0.375). Since 0.1875 < 0.375, "draw < 0.1875"
// implies "draw < 0.375" for every single draw, so
// crouchMovingHits <= standMovingHits holds BY CONSTRUCTION for ANY seed —
// seed 29 was picked (searched 1..500) purely to pin a concrete, comfortably
// robust margin for the second assertion below (not because the <= itself
// needed a special seed).
Game.selfTests.push({
  name: "combat: crouching takes fewer hits than standing, both while moving, over identical 20s windows",
  fn: function () {
    const SEED = 29;
    const AHEAD = 5;
    const TICKS_20S = Math.round(20 / DT);

    function runFirefight(stance) {
      const engine = firefightEngine(SEED, AHEAD);
      engine.squad.phase = "ALERT";
      engine.squad.phaseTime = 0;
      engine.squad.lastKnown = { x: engine.player.x, y: engine.player.y };
      engine.player.stance = stance;
      const input = { moveX: 0.0001, moveY: 0, run: false, stance: stance };

      let hits = 0;
      for (let i = 0; i < TICKS_20S; i++) {
        engine.tick(input);
        for (const ev of engine.events) {
          if (ev.type === "guardFire" && ev.hit) hits++;
        }
        // This test measures HIT-CHANCE behavior over a fixed 20s window, not
        // the death/game-over system (that's tests 4/6) — so a player who
        // would otherwise die partway through (ending the firefight early,
        // see src/engine.js's FROZEN ENGINE contract) is healed back to full
        // and un-frozen immediately, keeping both runs comparable over the
        // SAME full window instead of one truncating early.
        if (engine.gameOver) {
          engine.player.hp = 1;
          engine.player.alive = true;
          engine.gameOver = false;
        }
      }
      return hits;
    }

    const crouchMovingHits = runFirefight("crouch");
    const standMovingHits = runFirefight("stand");

    assert(
      crouchMovingHits <= standMovingHits,
      "expected crouching to take <= hits vs standing (both moving), got " + crouchMovingHits + " vs " + standMovingHits
    );
    assert(
      standMovingHits - crouchMovingHits >= 4,
      "expected a robust margin (>=4) between standing+moving (" + standMovingHits +
        ") and crouched+moving (" + crouchMovingHits + ") hits over 20s"
    );
  },
});

// tests/commsTower.test.js — headless assertions for the Comms Tower zone,
// the finale (pillar: Tension): registration/schema sanity, the
// Laboratory -> Comms Tower transition, explicit r=0.6 leg-clearance for all
// FOUR patrol loops (tests/zones.test.js's own generalized loop test only
// ever iterates `waypoints`/`waypoints2` — a fixed pair, not a `waypoints*`
// wildcard scan — so waypoints3/waypoints4 get no coverage there at all),
// the "extraction" stub, the heavy-zone perf budget (4 guards + 2 cameras +

// cameras' actual 100deg sweep width. Same registry pattern as every other
// tests/*.test.js file: push onto the shared Game.selfTests list; test.js
// runs every entry and reports ok/FAIL with real exit codes.
const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

const DT = 1 / 60;

// Same leg-clearance technique as tests/zones.test.js's own assertLoopClear
// (and tests/world.test.js before it) — duplicated locally rather than
// imported, same self-contained-test-file convention every other
// tests/*.test.js in this codebase already follows.
function assertLoopClear(world, loopName, waypoints) {
  assert(Array.isArray(waypoints) && waypoints.length >= 3, loopName + ": expected at least 3 waypoints for a loop");

  for (let i = 0; i < waypoints.length; i++) {
    const a = waypoints[i];
    const b = waypoints[(i + 1) % waypoints.length];
    const legLabel = loopName + " leg " + i + " (" + i + "->" + ((i + 1) % waypoints.length) + ")";

    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const legLen = Math.sqrt(dx * dx + dy * dy);
    const samples = Math.ceil(legLen / 0.25);

    for (let s = 0; s <= samples; s++) {
      const t = samples > 0 ? s / samples : 0;
      const px = a.x + dx * t;
      const py = a.y + dy * t;
      assert(
        !world.isBlockedCircle(px, py, 0.6),
        legLabel + " blocked at sample (" + px.toFixed(2) + "," + py.toFixed(2) + ")"
      );
    }

    const hit = world.raycast(a.x, a.y, b.x, b.y);
    assert(hit === null, legLabel + " raycast hit at (" + (hit ? hit.x.toFixed(2) : "?") + "," + (hit ? hit.y.toFixed(2) : "?") + ")");
  }
}

// 8. Both cameras actually sweep the full 100deg width (bounded pan check,
// same technique as tests/cameras.test.js's own pan-angle test).
// ---------------------------------------------------------------------------
Game.selfTests.push({
  name: "commsTower cameras: both cameras' pan angle is bounded to +/- 50deg (sweepDeg 100) and actually reaches it",
  fn: function () {
    const zone = Game.ZONES.commsTower;
    const world = Game.createWorld(zone);
    const vision = Game.createVision({ world: world });
    const squad = Game.createSquad();
    const director = Game.createDirector({ world: world, vision: vision, squad: squad });

    const farTarget = {
      x: -9999,
      y: -9999,
      visionProfile: function () { return 1.0; },
    };

    zone.cameras.forEach(function (cam, camIndex) {
      const halfSweepRad = (cam.sweepDeg * Math.PI) / 180 / 2;
      let seenMin = Infinity;
      let seenMax = -Infinity;
      const STEPS = 600; // 10s at DT=1/60, well over one 6s sweepPeriodS

      for (let i = 0; i < STEPS; i++) {
        const t = i * DT;
        director.tickCameras(DT, { time: t, chaffUntil: 0, player: farTarget });
        const panAngle = director.cameraStates()[camIndex].panAngle;

        const expected = cam.facing + Math.sin((2 * Math.PI * t) / cam.sweepPeriodS) * halfSweepRad;
        assert(
          Math.abs(panAngle - expected) < 1e-9,
          "camera " + camIndex + ": pan angle not a pure/deterministic function of ctx.time at t=" + t.toFixed(3)
        );

        const delta = panAngle - cam.facing;
        if (delta < seenMin) seenMin = delta;
        if (delta > seenMax) seenMax = delta;
      }

      assert(
        seenMax <= halfSweepRad + 1e-9 && seenMin >= -halfSweepRad - 1e-9,
        "camera " + camIndex + ": pan swing exceeded +/- sweepDeg/2: min=" + seenMin.toFixed(4) + " max=" + seenMax.toFixed(4)
      );
      assert(seenMax > halfSweepRad * 0.9, "camera " + camIndex + ": pan angle never swung near the +50deg extreme");
      assert(seenMin < -halfSweepRad * 0.9, "camera " + camIndex + ": pan angle never swung near the -50deg extreme");
    });
  },
});

  fn: function () {

      { name: "waypoints2 (lab-g2)", points: zone.waypoints2 },
    ];

    function pointInRect(px, py, rect) {
      return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    loops.forEach(function (loop) {
      for (let i = 0; i < loop.points.length; i++) {
        const a = loop.points[i];
        const b = loop.points[(i + 1) % loop.points.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.hypot(dx, dy);
        const samples = Math.ceil(len / 0.25);
        for (let s = 0; s <= samples; s++) {
          const t = samples > 0 ? s / samples : 0;
          const px = a.x + dx * t;
          const py = a.y + dy * t;
          zone.doors.forEach(function (door) {
            if (!door.lock) return; // unlocked doors are fine to (theoretically) cross
            assert(
              !pointInRect(px, py, door),
              loop.name + " leg " + i + " passes through locked door " + door.id + "'s AABB at (" + px.toFixed(2) + "," + py.toFixed(2) + ")"

Game.selfTests.push({
  name: "laboratory: determinism holds for door/laser/keycard state across identical scripted runs",
  fn: function () {
    function scriptedInput(tick) {
      return {
        moveX: Math.sin(tick * 0.037),
        moveY: Math.cos(tick * 0.023),
        run: tick % 13 === 0,
        stance: tick % 180 < 60 ? "crouch" : "stand",
        chaff: tick === 90,
      };
    }

    function run(seed) {
      const engine = Game.createEngine({ zoneData: Game.ZONES.laboratory, seed: seed });
      // Force the L1 door open partway through via a direct key grant +
      // proximity walk, identically on both runs (deterministic script, not
      // randomness) so the doors/keycards snapshot fields actually differ
      // from their all-closed/all-false defaults.
      for (let t = 0; t < 300; t++) {
        if (t === 100) engine.inventory.keycards.L1 = true;
        if (t >= 150 && t < 160) {
          const door = laboratoryDoor(Game.ZONES.laboratory, "doorL1");
          engine.player.x = door.x + door.w / 2;
          engine.player.y = door.y + door.h / 2;
        }
        engine.tick(scriptedInput(t));
      }
      return engine;
    }

    const a = run(778899);
    const b = run(778899);

    const snapA = JSON.stringify(a.snapshot());
    const snapB = JSON.stringify(b.snapshot());
    assert(snapA === snapB, "expected identical snapshots (incl. doors/lasers/keycards) for identical seed+input, got:\n" + snapA + "\nvs\n" + snapB);

    // door/keycard state, otherwise this test would trivially pass by
    // comparing two engines that never left their defaults.
    const snap = a.snapshot();

    assert(snap.doors.some(function (d) { return d.id === "doorL1" && d.open; }), "setup failed: expected doorL1 to have opened during the scripted run");
  },
});

// Ticks `engine`, each tick re-teleporting the player to a fixed distance
// directly in front of guards[0]'s CURRENT facing (recomputed live every
// tick, since a patrolling/sweeping guard's facing keeps changing) -- close
// enough (2m, inside VISION.FILL_NEAR_DIST) and dead-center in its cone so
// the meter fills to ALERT_AT quickly. Mirrors tests/radar.test.js's and
// tests/hud.test.js's own driveToAlert helper exactly, except it also drives
// a music director alongside every tick so sting/resolve edges are never
// missed between ticks.
function driveToAlert(engine, director, counts, maxTicks) {
  for (var i = 0; i < maxTicks; i++) {
    var g = engine.guards[0];
    var ahead = 2;
    engine.player.x = g.x + Math.cos(g.facing) * ahead;
    engine.player.y = g.y + Math.sin(g.facing) * ahead;
    engine.tick();
    tallyDirector(director, engine, counts);
    if (engine.squad.phase === "ALERT") return i;
  }
  return null;
}

// possibly retain LOS) until `predicate(engine)` is true or maxTicks elapse,
// tallying director output every tick. Returns the tick index it became true
// at, or null. Mirrors tests/radar.test.js's tickHiddenUntil helper exactly.
function tickHiddenUntil(engine, director, counts, predicate, maxTicks) {
  for (var i = 0; i < maxTicks; i++) {
    engine.player.x = -1000;
    engine.player.y = -1000;
    engine.tick();
    tallyDirector(director, engine, counts);
    if (predicate(engine)) return i;
  }
  return null;
}

function tallyDirector(director, engine, counts) {
  var r = director.update(engine.squad.phase);
  if (r.sting) counts.stings++;
  if (r.resolve) counts.resolves++;
  return r;
}

(function (global) {
// tests/saveState.test.js — headless assertions for src/saveState.js's
// capture()/restore() cycle. Same registry pattern as every other tests/*.js
// file: push onto the shared Game.selfTests list; test.js runs every entry
// headless, and boot.js runs the SAME list in-browser before the title
// screen — so every test here must be environment-portable (no Date.now/
// Math.random reliance, deterministic seeds/scripted input only).
//
// THE REPLAY GATE (tests 2/3 below) is the actual point of this whole
// module: a save is only correct if resuming it is byte-identical to never
// having saved at all. See src/saveState.js's own file header for the full
// write-up of what that means and why every module's getState()/setState()
// pair was iterated against exactly this proof.
const Game = global.Game;

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

var DT = 1 / 60;

function scriptedInput(tick) {
  return {
    moveX: Math.sin(tick * 0.037),
    moveY: Math.cos(tick * 0.051),
    run: tick % 7 === 0,
    stance: tick % 200 < 60 ? "crouch" : tick % 200 < 120 ? "crawl" : "stand",
  };
}

// A busier scripted log than scriptedInput() above — also presses knock/cqc
// on scattered edges, so the REPLAY GATE exercises the edge-triggered verb
// bookkeeping (prevKnock/prevCqc/etc — see src/engine.js's getState() note)
// as well as plain movement.
function mixedInput(tick) {
  return {
    moveX: Math.sin(tick * 0.021),
    moveY: Math.cos(tick * 0.013),
    run: tick % 11 === 0,
    stance: tick % 150 < 50 ? "crouch" : tick % 150 < 90 ? "crawl" : "stand",
    knock: tick % 97 === 0,
    cqc: tick % 133 === 0,
  };

// no ticking at all (proves the save itself is JSON-safe AND that restore()
// alone, with zero further simulation, reconstructs an equivalent engine).

Game.selfTests.push({
  name: "saveState: capture -> JSON round-trip -> restore -> snapshot() equals original immediately",
  fn: function () {
    var engine = Game.createEngine({ seed: 42 });
    for (var i = 0; i < 90; i++) engine.tick(scriptedInput(i));

    var saveState = Game.createSaveState();
    var save = saveState.capture(engine);

    // JSON round-trip: prove the captured object is plain-data safe (no
    // functions, no NaN/Infinity, no circular refs) by actually serializing
    // and re-parsing it, same as src/boot.js's localStorage save will do.
    var reparsed = JSON.parse(JSON.stringify(save));

    var restored = saveState.restore(reparsed);

    var beforeSnap = JSON.stringify(engine.snapshot());
    var afterSnap = JSON.stringify(restored.snapshot());
    assert(
      beforeSnap === afterSnap,
      "expected restored engine's snapshot to equal the original's immediately after restore:\n" +
        beforeSnap +
        "\nvs\n" +
        afterSnap
    );
  },
});

// scripted inputs driving the player across a real zone crossing ->
// identical snapshot() at the end.
Game.selfTests.push({
  name: "engine zone transition: determinism holds across a real zone crossing",
  fn: function () {
    function scriptedInput(tick) {
      return {
        moveX: Math.sin(tick * 0.041),
        moveY: Math.cos(tick * 0.029),
        run: tick % 11 === 0,
        stance: tick % 150 < 50 ? "crouch" : "stand",
      };
    }

    function runCrossing(seed) {
      var engine = Game.createEngine({ seed: seed });
      var dock = Game.ZONES.loadingDock;
      for (var t = 0; t < 200; t++) {
        engine.tick(scriptedInput(t));
      }
      // Force the crossing deterministically (identical direct teleport on
      // both engines) rather than relying on the scripted walk to find the
      // gap, then let a further identical scripted run play out post-switch.
      // The crossing tick itself uses zero movement input so player.update()
      // doesn't walk the teleported position off the exit trigger before
      // engine.js's end-of-tick zone-transition check reads it.
      engine.player.x = dock.exit.x + dock.exit.w / 2;
      engine.player.y = dock.exit.y + dock.exit.h / 2;
      engine.tick({ moveX: 0, moveY: 0, run: false, stance: "stand" });
      // Confirm the crossing actually happened (setup validity) BEFORE the
      // further scripted ticks below, which may wander the player back and
      // forth across the (nearby) warehouse south exit one or more times --
      // that's fine and expected for a small random walk landing 1m from its
      // own return trigger; it's exactly the kind of churn this test wants
      // to prove stays deterministic, not something to prevent.
      if (engine.zone.id !== "warehouse") {
        throw new Error("setup failed: expected engine to have crossed into warehouse right after the crossing tick");
      }
      for (var t2 = 201; t2 < 400; t2++) {
        engine.tick(scriptedInput(t2));
      }
      return engine;
    }

    var a = runCrossing(999);
    var b = runCrossing(999);

    var snapA = JSON.stringify(a.snapshot());
    var snapB = JSON.stringify(b.snapshot());
    assert(snapA === snapB, "expected identical snapshots across a transition for identical seed+input, got:\n" + snapA + "\nvs\n" + snapB);
  },
});
