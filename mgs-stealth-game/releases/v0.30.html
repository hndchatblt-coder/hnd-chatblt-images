// ==== src/rng.js ====
// src/rng.js
// PUBLIC API:
//   Game.createRng(seed: number) -> {
//     next(): float in [0,1),
//     int(min, max): inclusive integer,
//     pick(array): element,
//     seed: number,  (the seed it was created with)
//     getState(): { s: number }  (NEW — save/restore cycle, see below),
//     setState(state: { s: number }): void  (NEW — see below),
//   }
// Single source of randomness for the whole game. Same seed => identical
// sequence => reproducible tests and replays (seed + input log = identical run).
//
// getState()/setState() (NEW — additive, no behavior change to next/int/pick):
// the mulberry32 generator's ENTIRE mutable state is the single internal
// counter `s` (seeded from `seed` at construction, then advanced by every
// next() call) — getState() returns a plain JSON-safe { s } snapshot of it;
// setState({s}) overwrites it, after which next()/int()/pick() continue
// exactly as if this rng instance had been advanced to that point from its
// original seed (the counter, not the constructor's `seed` value, is what
// setState() restores — `seed`/the closure var it was read from stays
// whatever this instance was originally constructed with, same as before;
// only the live cursor moves). This is what src/saveState.js's capture/
// restore cycle uses to make a restored engine's rng draw the EXACT SAME
// future sequence a live engine would have drawn from that point on.
(function (Game) {
  function createRng(seed) {
    let s = seed >>> 0;
    function next() {
      // mulberry32
      s = (s + 0x6d2b79f5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    function int(min, max) {
      return min + Math.floor(next() * (max - min + 1));
    }
    function pick(arr) {
      return arr[Math.floor(next() * arr.length)];
    }
    function getState() {
      return { s: s };
    }
    function setState(state) {
      s = state.s >>> 0;
    }
    return { next: next, int: int, pick: pick, seed: seed, getState: getState, setState: setState };
  }
  Game.createRng = createRng;
  if (typeof module !== "undefined") module.exports = { createRng: createRng };
})(typeof window !== "undefined"
  ? (window.Game = window.Game || {})
  : (global.Game = global.Game || {}));

// ==== src/world.js ====
// src/world.js
// PUBLIC API:
//   Game.ZONES.loadingDock / Game.ZONES.warehouse — facility zones, plain-object
//   level data (SCHEMA — both zones conform to this shape; fields added this
//   cycle are marked NEW):
//     {
//       id, name,
//       bounds: { w, h },                 // meters, origin top-left, +x right, +y down
//       walls: [ { x, y, w, h }, ... ],    // AABBs: perimeter + interior obstacles
//       playerSpawn: { x, y },             // default spawn if this zone is booted directly
//       exit: { x, y, w, h },              // BACK-COMPAT ALIAS: always === exits[0].
//                                          // hud/radar/render/existing scenarios read
//                                          // zone.exit directly — kept working verbatim.
//       exits: [ { x, y, w, h, to, entranceKey }, ... ], // NEW — replaces the old
//                                          // single `exit` prop as the source of truth.
//                                          // `to` is a Game.ZONES key (or a not-yet-built
//                                          // zone id, e.g. "laboratory" — a deliberate stub;
//                                          // engine.js handles an unresolvable `to` by
//                                          // staying put + emitting `zoneBlocked`, never by
//                                          // throwing). `entranceKey` indexes the TARGET
//                                          // zone's `entrances` map (below) to find where the
//                                          // player appears after crossing.
//       entrances: { [fromZoneId]: { x, y }, ... }, // NEW — spawn points keyed by the
//                                          // zone the player is arriving FROM, e.g.
//                                          // warehouse.entrances.fromLoadingDock. Looked up
//                                          // via the crossed exit's `entranceKey`, not the
//                                          // literal source zone id, so a zone can expose
//                                          // more than one path in from the same neighbor.
//       waypoints: [ { x, y }, ... ],       // patrol loop #1, open floor
//       waypoints2: [ { x, y }, ... ],       // NEW — patrol loop #2 (a second guard's
//                                          // route, e.g. a cross-aisle sweep); OPTIONAL —
//                                          // only zones with a second patrolling guard
//                                          // define it (see warehouse below). Same shape/
//                                          // rules as `waypoints`: closed loop, every leg
//                                          // must be walkable at r=0.6 (see world.test.js).
//       waypoints3/waypoints4: [ { x, y }, ... ], // NEW (Comms Tower cycle) — patrol loops
//                                          // #3/#4, same shape/rules as waypoints/
//                                          // waypoints2 above, for a THIRD/FOURTH
//                                          // simultaneous guard. OPTIONAL — only
//                                          // commsTower this cycle needs 4 guards (see
//                                          // its own PATROL INTERLOCK comment below /
//                                          // src/engine.js's ZONE_GUARDS.commsTower).
//                                          // tests/zones.test.js's own generalized
//                                          // loop-clearance test only ever iterates
//                                          // `waypoints`/`waypoints2` (a fixed pair, not
//                                          // a `waypoints*` wildcard scan) — a zone
//                                          // using waypoints3/4 must cover them in its
//                                          // OWN test file (see tests/commsTower.test.js).
//       darkZones: [ { x, y, w, h }, ... ], // shadowed regions (vision uses these)
//       lockers: [ { x, y, facing }, ... ], // NEW — data only this cycle (no collision/
//                                          // interaction yet; the future items cycle makes
//                                          // these functional hiding spots). `facing`
//                                          // radians, same atan2 convention as
//                                          // player.facing/guard.facing (0 = +x).
//       cameras: [ { x, y, facing, sweepDeg, sweepPeriodS, fovDeg, range }, ... ], // NEW —
//                                          // wall-mounted security cameras, consumed by
//                                          // src/director.js (see its own contract for the
//                                          // full field-by-field breakdown). OPTIONAL/empty
//                                          // on zones with no camera coverage (loadingDock
//                                          // ships zero — see below); this cycle's pilot
//                                          // installation is 2 cameras in the warehouse,
//                                          // each mounted flush against a shelving-row wall
//                                          // face, covering one of the two aisle
//                                          // intersections along the y:14-16 cross-aisle
//                                          // band that NEITHER patrolling guard's route ever
//                                          // touches (w1 sticks to the outer perimeter ring,
//                                          // w2 to the narrow x:17-22 center-aisle spine —
//                                          // see waypoints/waypoints2 below) — the exact
//                                          // "aisle intersection the guards don't watch"
//                                          // the director/render/radar cycle's brief called
//                                          // for. Each camera's range (10m) deliberately
//                                          // falls short of covering the FULL length of its
//                                          // aisle and each is confined to a narrow 50deg
//                                          // FOV panning across only 60deg total, so a
//                                          // crouched player has a real route past on the
//                                          // far side of each camera's reach (see the
//                                          // per-camera comments below for the specific
//                                          // uncovered stretch).
//       pickups: [ { x, y, item }, ... ], // NEW (Laboratory cycle) — SCHEMA FOR
//                                          // ALL ZONES (optional/empty where a zone has
//                                          // nothing to pick up, e.g. loadingDock). `item`
//                                          // is an opaque string src/items.js's
//                                          // inv.collectPickup(item) understands
//                                          // ("keycardL1"/"keycardL2"/"keycardL3"/"chaff"
//                                          // this cycle). Collection (distance check,
//                                          // event, "already collected" bookkeeping) is
//                                          // engine.js's job (see its PICKUPS step) — this
//                                          // is pure placement data, same "engine mutates,
//                                          // module computes" split as every other item
//                                          // verb in this codebase.
//       doors: [ { x, y, w, h, lock, id }, ... ], // NEW (Laboratory cycle) — SCHEMA FOR
//                                          // ALL ZONES (optional/empty on zones with no
//                                          // doors, e.g. loadingDock/warehouse this cycle).
//                                          // `lock` is "L1" | "L2" | "L3" | null (null =
//                                          // unlocked, auto-opens on mere proximity — see
//                                          // src/engine.js's DOORS step). `id` is an opaque
//                                          // string, unique within the zone, used by
//                                          // world.setDoorOpen(id, open)/isDoorOpen(id) and
//                                          // by engine.js's per-door auto-open/close
//                                          // bookkeeping. A door AABB is otherwise a plain
//                                          // wall-shaped rect — see DYNAMIC BLOCKERS below
//                                          // for exactly how it behaves as one while closed.
//       lasers: [ { x1, y1, x2, y2, periodS, dutyOn }, ... ], // NEW (Laboratory cycle) —
//                                          // SCHEMA FOR ALL ZONES (optional/empty on zones
//                                          // with none). A laser is a TRIPWIRE, not a
//                                          // collision blocker — world.js does not consult
//                                          // this array at all (isBlocked/raycast/moveCircle
//                                          // are unaware lasers exist). It is consumed
//                                          // entirely by src/director.js (see its own
//                                          // contract for the duty-cycle/crossing-test
//                                          // write-up) via engine.js's LASERS step.
//     }
//
//   DOORS / DYNAMIC BLOCKERS (NEW this cycle — Laboratory zone): a door behaves
//   EXACTLY like a wall AABB — same closed-containment convention as every
//   other isBlocked/isBlockedCircle/raycast check in this file — for as long
//   as it is CLOSED. World now keeps a per-instance, per-door open/closed flag
//   (world.setDoorOpen(id, open) / world.isDoorOpen(id)), defaulting every
//   door to CLOSED at construction (a fresh Game.createWorld(zoneData) call —
//   e.g. on a zone transition — always starts every door shut, v1 semantics,
//   same "discard on transition" rule guards/squad/vision already follow).
//   isBlocked/isBlockedCircle/raycast/moveCircle all consult a DYNAMIC
//   BLOCKERS list — zone.walls plus whichever zone.doors are CURRENTLY
//   CLOSED, recomputed fresh on every call (doors are few — at most a
//   handful per zone — so this is cheap; no caching complexity for a v1
//   feature) — rather than the static `walls` array alone. Once a door is
//   OPEN (world.setDoorOpen(id, true)), it drops out of every one of those
//   checks entirely — a player/guard walks through the gap exactly as if the
//   AABB were never there. engine.js owns WHEN a door opens/closes (keycard
//   proximity, unlocked-on-proximity, auto-close timer — see its own DOORS
//   contract); world.js only owns the mechanical "is this rect currently a
//   blocker" question.
//
//   HONEST GAP — DOORS DO NOT ATTENUATE SOUND THIS VERSION: src/soundEvents.js
//   computes wall-crossing attenuation (wallsBetween/effectiveRadius) by
//   iterating `world.zone.walls` DIRECTLY (see its own file header's
//   IMPLEMENTATION NOTE for why it can't reuse world.raycast in a marching
//   loop) — it has no notion of `world`'s dynamic blockers list, only the
//   static zone data. soundEvents.js is out of scope for this cycle's task
//   packet, so rather than reach into it, a closed door in this version is
//   ACOUSTICALLY TRANSPARENT: a knock/gunshot/footstep on one side of a
//   closed Laboratory door attenuates as if the door weren't there at all
//   (it still fully blocks LINE OF SIGHT and MOVEMENT via world.js's own
//   blockers list above — only the SOUND radius math misses it). This is a
//   deliberate, documented gap, not a silent one — see BACKLOG.md for the
//   follow-up ("soundEvents: attenuate through closed doors, not just
//   walls") that would thread a door-aware wallsBetween through soundEvents.js
//   in a future cycle where that file is back in scope.
//   Game.createWorld(zoneData) -> {
//     isBlocked(x, y): boolean,
//       // true iff (x,y) lies inside (or exactly on the edge of) any wall AABB.
//       // Containment is CLOSED on all four sides: wx <= x <= wx+w && wy <= y <= wy+h.
//     isBlockedCircle(x, y, r): boolean,
//       // true iff a circle of radius r centered at (x,y) overlaps (or exactly
//       // touches) any wall AABB (closed containment, same convention as above).
//     raycast(x1, y1, x2, y2): { x, y, dist } | null,
//       // exact segment-vs-AABB (slab method) test against every wall; returns
//       // the FIRST intersection point (smallest t along the segment, t in
//       // [0,1]) and its distance from (x1,y1), or null if the segment is clear.
//     moveCircle(x, y, dx, dy, r): { x, y },
//       // attempts to move a circle of radius r by (dx, dy); resolves per axis
//       // (x first, then y) — a blocked axis is simply not applied, so a circle
//       // sliding along a wall still makes progress on its free axis and a
//       // circle driven into a corner stops cleanly on both. Never returns a
//       // position where isBlockedCircle(result.x, result.y, r) is true,
//       // provided the input position was itself not overlapping a wall.
//     inRegion(x, y, region): boolean,
//       // point-in-{x,y,w,h} test (closed containment), used for exit/darkZone
//       // checks.
//     zone: the zoneData object this world was created from.
//   }
// Pure data + geometry. No THREE, no DOM, no browser APIs — runs headless in
// node (vision cones, radar, and guardAI pathing all build on this module).
(function (Game) {
  // ---- local math helpers (no dependency on other modules) ----------------

  function clamp(v, lo, hi) {
    return v < lo ? lo : v > hi ? hi : v;
  }

  function rectContainsPoint(rect, x, y) {
    return (
      x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h
    );
  }

  function circleOverlapsRect(cx, cy, r, rect) {
    var nearestX = clamp(cx, rect.x, rect.x + rect.w);
    var nearestY = clamp(cy, rect.y, rect.y + rect.h);
    var dx = cx - nearestX;
    var dy = cy - nearestY;
    return dx * dx + dy * dy <= r * r;
  }

  // Exact segment-vs-AABB intersection via the slab method. Returns the
  // smallest t in [0,1] at which the segment (x1,y1)->(x2,y2) enters `rect`,
  // or null if it never does. t is clamped to 0 if the segment starts inside
  // the box (so "first hit" degenerates to the start point rather than a
  // negative t).
  function segmentVsRect(x1, y1, x2, y2, rect) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var tmin = 0;
    var tmax = 1;

    if (dx === 0) {
      if (x1 < rect.x || x1 > rect.x + rect.w) return null;
    } else {
      var tx1 = (rect.x - x1) / dx;
      var tx2 = (rect.x + rect.w - x1) / dx;
      if (tx1 > tx2) {
        var tmp = tx1;
        tx1 = tx2;
        tx2 = tmp;
      }
      if (tx1 > tmin) tmin = tx1;
      if (tx2 < tmax) tmax = tx2;
      if (tmin > tmax) return null;
    }

    if (dy === 0) {
      if (y1 < rect.y || y1 > rect.y + rect.h) return null;
    } else {
      var ty1 = (rect.y - y1) / dy;
      var ty2 = (rect.y + rect.h - y1) / dy;
      if (ty1 > ty2) {
        var tmp2 = ty1;
        ty1 = ty2;
        ty2 = tmp2;
      }
      if (ty1 > tmin) tmin = ty1;
      if (ty2 < tmax) tmax = ty2;
      if (tmin > tmax) return null;
    }

    if (tmax < 0 || tmin > 1) return null;
    return Math.max(tmin, 0);
  }

  // ---- world factory --------------------------------------------------------

  function createWorld(zoneData) {
    var walls = zoneData.walls;
    var doors = zoneData.doors || [];

    // Per-door open/closed flag, PRIVATE to this world instance (see file
    // header DOORS / DYNAMIC BLOCKERS note) — every door starts CLOSED.
    var doorOpen = {};
    for (var di = 0; di < doors.length; di++) doorOpen[doors[di].id] = false;

    // DYNAMIC BLOCKERS (see file header) — zone.walls plus whichever doors
    // are CURRENTLY CLOSED. Recomputed on every call; doors.length is small
    // (a handful per zone at most) so this is cheap. Skips the concat
    // entirely when a zone has no doors at all (every pre-Laboratory zone),
    // so this is a no-op cost change for loadingDock/warehouse.
    function blockers() {
      if (doors.length === 0) return walls;
      var list = walls.slice();
      for (var i = 0; i < doors.length; i++) {
        if (!doorOpen[doors[i].id]) list.push(doors[i]);
      }
      return list;
    }

    function isBlocked(x, y) {
      var list = blockers();
      for (var i = 0; i < list.length; i++) {
        if (rectContainsPoint(list[i], x, y)) return true;
      }
      return false;
    }

    function isBlockedCircle(x, y, r) {
      var list = blockers();
      for (var i = 0; i < list.length; i++) {
        if (circleOverlapsRect(x, y, r, list[i])) return true;
      }
      return false;
    }

    function raycast(x1, y1, x2, y2) {
      var list = blockers();
      var bestT = null;
      for (var i = 0; i < list.length; i++) {
        var t = segmentVsRect(x1, y1, x2, y2, list[i]);
        if (t !== null && (bestT === null || t < bestT)) bestT = t;
      }
      if (bestT === null) return null;
      var hx = x1 + (x2 - x1) * bestT;
      var hy = y1 + (y2 - y1) * bestT;
      var fullDx = x2 - x1;
      var fullDy = y2 - y1;
      var fullLen = Math.sqrt(fullDx * fullDx + fullDy * fullDy);
      return { x: hx, y: hy, dist: bestT * fullLen };
    }

    function moveCircle(x, y, dx, dy, r) {
      var nx = x + dx;
      if (!isBlockedCircle(nx, y, r)) x = nx;
      var ny = y + dy;
      if (!isBlockedCircle(x, ny, r)) y = ny;
      return { x: x, y: y };
    }

    function inRegion(x, y, region) {
      return rectContainsPoint(region, x, y);
    }

    // DOORS (see file header) — world.js's own half is purely mechanical:
    // remember which door ids are open, let blockers() above see it.
    // engine.js decides WHEN to call these (keycard proximity, auto-close
    // timers, etc.) — see its own DOORS contract.
    function setDoorOpen(id, open) {
      doorOpen[id] = !!open;
    }

    function isDoorOpen(id) {
      return !!doorOpen[id];
    }

    // getState()/setState() (NEW — save/restore cycle, additive only, no
    // behavior change). This world instance's ONLY mutable state is the
    // per-door open/closed flag map (doorOpen) — everything else
    // (walls/zoneData) is immutable, already restored by rebuilding a fresh
    // world for save.zoneId. getState() shallow-copies doorOpen so a caller
    // mutating the returned snapshot can never reach back into this world's
    // own live map; setState() REPLACES the closure's doorOpen var outright
    // (safe: blockers()/setDoorOpen()/isDoorOpen() above all read/write
    // `doorOpen` by closure reference, not a captured-at-construction copy,
    // so a reassignment here is visible to every one of them immediately).
    function getState() {
      return { doorOpen: Object.assign({}, doorOpen) };
    }

    function setState(state) {
      doorOpen = Object.assign({}, state.doorOpen);
    }

    return {
      isBlocked: isBlocked,
      isBlockedCircle: isBlockedCircle,
      raycast: raycast,
      moveCircle: moveCircle,
      inRegion: inRegion,
      setDoorOpen: setDoorOpen,
      isDoorOpen: isDoorOpen,
      getState: getState,
      setState: setState,
      zone: zoneData,
    };
  }

  // ---- zone data: LOADING DOCK ----------------------------------------------
  // 40x30m. Perimeter is 4 conceptual walls (top/bottom/left/right, thickness 1);
  // the top wall is split into two AABBs (walls[0], walls[1]) to leave a 4m gap
  // at x:18-22 — the exit into the Warehouse — so the array holds 5 perimeter
  // segments (walls[0..4]) followed by 8 interior obstacles (walls[5..12]).
  //
  // Layout: a center crate stack sits directly between playerSpawn and the exit,
  // so the straight shot north is blocked and the player must route around it.
  // Two shipping containers flank the center, each leaving a corridor to the
  // outer walls (left flank / right flank) plus 4m gaps on either side of the
  // center stack (center weave) — three plausible routes north. A guard hut in
  // the NW gives a patrolling guard somewhere to be; small crate clusters in the
  // south give the player near-spawn cover.
  var loadingDock = {
    id: "loadingDock",
    name: "LOADING DOCK",
    bounds: { w: 40, h: 30 },
    walls: [
      // perimeter (5 segments: top split around the exit gap, bottom, left, right)
      { x: 0, y: 0, w: 18, h: 1 }, // top-left
      { x: 22, y: 0, w: 18, h: 1 }, // top-right (gap: x 18-22)
      { x: 0, y: 29, w: 40, h: 1 }, // bottom
      { x: 0, y: 0, w: 1, h: 30 }, // left
      { x: 39, y: 0, w: 1, h: 30 }, // right
      // interior obstacles (8)
      { x: 8, y: 9, w: 6, h: 11 }, // shipping container, west
      { x: 26, y: 9, w: 6, h: 11 }, // shipping container, east
      { x: 17, y: 13, w: 6, h: 5 }, // center crate stack (blocks the direct line)
      { x: 9, y: 3, w: 6, h: 5 }, // guard hut, NW
      { x: 4, y: 21, w: 3, h: 3 }, // small crates, SW
      { x: 33, y: 21, w: 3, h: 3 }, // small crates, SE
      { x: 12, y: 23, w: 3, h: 3 }, // small crates, S center-left
      { x: 25, y: 23, w: 3, h: 3 }, // small crates, S center-right
    ],
    playerSpawn: { x: 20, y: 27 },
    // exits/entrances: the only path out of the Loading Dock is north into the
    // Warehouse through the perimeter gap at x:18-22. entrances.fromWarehouse
    // sits just south of that gap (y:4, one meter clear of the y:0-3 trigger
    // AABB) so a player crossing back in from the Warehouse doesn't spawn
    // standing on top of the trigger and immediately re-cross.
    exits: [{ x: 18, y: 0, w: 4, h: 3, to: "warehouse", entranceKey: "fromLoadingDock" }],
    entrances: { fromWarehouse: { x: 20, y: 4 } },
    waypoints: [
      { x: 3, y: 2 }, // NW corner (above all obstacles for clear north leg)
      { x: 37, y: 2 }, // NE corner
      { x: 37, y: 27 }, // SE corner (south of crate clusters, north of perimeter)
      { x: 3, y: 27 }, // SW corner
    ],
    darkZones: [
      { x: 2, y: 9, w: 5, h: 11 }, // shadow west of the container, along the left flank
      { x: 23, y: 13, w: 3, h: 5 }, // shadow between the crate stack and the east container
    ],
    // Data only this cycle (see schema note above) — placed in the west dark
    // zone, plausible near-term hiding spots for the future items cycle.
    lockers: [
      { x: 2, y: 9, facing: 0 },
      { x: 2, y: 20, facing: 0 },
    ],
    // No camera coverage this cycle (see schema note above) — the pilot
    // installation lives in the warehouse; the loading dock stays
    // guard-only until a future cycle expands coverage.
    cameras: [],
    // No pickups, doors, or lasers this cycle (see schema notes above) —
    // those all debut in the Laboratory zone below.
    pickups: [],
    doors: [],
    lasers: [],
  };
  loadingDock.exit = loadingDock.exits[0]; // back-compat alias, see schema note above

  // ---- zone data: WAREHOUSE --------------------------------------------------
  // 40x30m, industrial interior. Perimeter is the same 4-conceptual-wall
  // pattern as the Loading Dock, but BOTH the top and bottom walls are split
  // around a 4m gap at x:18-22: south leads back to the Loading Dock, north is
  // a stub toward the (not yet built) Laboratory zone — engine.js resolves
  // unknown `to` targets by staying put and emitting `zoneBlocked` rather than
  // throwing, so this stub is safe to ship ahead of the zone it points to.
  // That shared x:18-22 column is kept deliberately free of shelving, so it
  // reads as the main north-south spine connecting both exits; three shelving
  // rows (six long thin AABBs, each split top/bottom around a shared y:14-16
  // gap so the aisles are still crossable) sit on either side of that spine,
  // forming four aisles west-to-east: the far-west aisle (x:1-8), between rows
  // 1/2 (x:9.5-14), the wide center aisle (x:15.5-28, containing the spine),
  // and the far-east aisle (x:29.5-39). Crate clusters give cover/patrol
  // targets inside the aisles; two dark zones sit at aisle ends (unlit
  // shelving corners), well clear of every wall.
  var warehouse = {

          guard.facing = Math.atan2(wp.y - guard.y, wp.x - guard.x);
        }
      }
    }

    function waypointIndex_advance() {
      if (waypoints.length > 0) {
        guard.waypointIndex = (guard.waypointIndex + 1) % waypoints.length;
      }
    }

    // ---- SUSPICIOUS -------------------------------------------------------------

    function tickSuspicious(dt, ctx) {
      var stim = guard.stimulus;
      if (stim) {
        var targetAngle = Math.atan2(stim.y - guard.y, stim.x - guard.x);
        guard.facing = turnToward(guard.facing, targetAngle, TURN_RATE, dt);
      }

      if (guard.meter >= Game.VISION.ALERT_AT) {
        squad.broadcastAlert(ctx.player.x, ctx.player.y);
        setState("ALERT", null);
        return;
      }

      if (guard.stateTime >= GUARD.SUSPICIOUS_STARE) {
        if (guard.meter < Game.VISION.SUSPICIOUS_AT) {
          setState("PATROL", null);
        } else {
          setState("INVESTIGATE", guard.stimulus);
        }
      }
    }

    // ---- INVESTIGATE -------------------------------------------------------------

    function tickInvestigate(dt, ctx) {
      var caution = squad.phase === "CAUTION";
      var alertThreshold = caution ? Game.VISION.SUSPICIOUS_AT : Game.VISION.ALERT_AT;
      if (guard.meter >= alertThreshold) {
        squad.broadcastAlert(ctx.player.x, ctx.player.y);
        setState("ALERT", null);
        return;
      }

      var speed = caution ? GUARD.CAUTION_SPEED : GUARD.INVESTIGATE_SPEED;
      var stim = guard.stimulus || { x: guard.x, y: guard.y };
      var d = distance(guard.x, guard.y, stim.x, stim.y);

      if (d > GUARD.ARRIVE_DIST) {
        var stepLen = Math.min(speed * dt, d);
        var ux = (stim.x - guard.x) / d;
        var uy = (stim.y - guard.y) / d;
        var res = world.moveCircle(guard.x, guard.y, ux * stepLen, uy * stepLen, guard.radius);
        guard.x = res.x;
        guard.y = res.y;
        guard.facing = Math.atan2(stim.y - guard.y, stim.x - guard.x);
      } else {
        if (!searching) {
          searching = true;
          searchTime = 0;
          searchBaseFacing = guard.facing;
        }
        searchTime += dt;
        var t = Math.min(searchTime / GUARD.INVESTIGATE_SEARCH, 1);
        var amplitude = t * Math.PI;
        var sweep = amplitude * Math.sin(searchTime * SEARCH_SWEEP_HZ * TWO_PI);
        guard.facing = normalizeAngle(searchBaseFacing + sweep);

        if (searchTime >= GUARD.INVESTIGATE_SEARCH) {
          // Read squad.phase LIVE at completion (not latched at entry) — see
          // file header: a squad timer that expired mid-search is honored
          // immediately.
          setState(squad.phase === "CAUTION" ? "CAUTION" : "PATROL", null);
        }
      }
    }

    // ---- ALERT (real pursuit — see file header) ---------------------------------

    function tickAlert(dt, ctx) {
      fireTimer += dt;

      var target;
      if (guard.hasLOS) {
        squad.updateSighting(ctx.player.x, ctx.player.y);
        target = { x: ctx.player.x, y: ctx.player.y };
      } else {
        squad.loseContact();
        target = squad.lastKnown || { x: guard.x, y: guard.y };
      }

      var d = distance(guard.x, guard.y, target.x, target.y);
      var stepLen = guard.hasLOS
        ? Math.min(GUARD.ALERT_SPEED * dt, Math.max(0, d - GUARD.ARREST_DIST))
        : Math.min(GUARD.ALERT_SPEED * dt, d);

      if (stepLen > 0) {
        var ux = (target.x - guard.x) / d;
        var uy = (target.y - guard.y) / d;
        var res = world.moveCircle(guard.x, guard.y, ux * stepLen, uy * stepLen, guard.radius);
        guard.x = res.x;
        guard.y = res.y;
      }
      // Face the target every tick, even when holding at ARREST_DIST or when
      // d rounds to 0 (atan2(0,0) is a harmless 0, no NaN risk here since
      // target/guard positions are always finite).
      guard.facing = Math.atan2(target.y - guard.y, target.x - guard.x);

      // COMBAT (see file header) — fire on the player. Only an ELIGIBLE tick
      // (fireTimer past nextFireAt) that also has LOS + is in range actually
      // fires; an eligible-but-blocked tick leaves nextFireAt untouched so
      // the guard fires the instant conditions are met, rather than waiting
      // out a full extra interval.
      if (nextFireAt !== null && fireTimer >= nextFireAt) {
        var distToPlayer = distance(guard.x, guard.y, ctx.player.x, ctx.player.y);
        if (guard.hasLOS && distToPlayer <= GUARD.FIRE_RANGE) {
          var chance = 0.75;
          if (ctx.player.moving) chance *= 0.5;
          if (ctx.player.stance === "crouch" || ctx.player.stance === "crawl") chance *= 0.5;
          var hit = rng.next() < chance;
          if (ctx.onGuardFire) ctx.onGuardFire(guard, hit);
          nextFireAt = fireTimer + GUARD.FIRE_INTERVAL_S;
        }
      }
    }

    // ---- EVASION (coordinated sweep — see file header) --------------------------

    function tickEvasion(dt, ctx) {
      if (guard.meter >= Game.VISION.SUSPICIOUS_AT) {
        squad.broadcastAlert(ctx.player.x, ctx.player.y);
        setState("ALERT", null);
        return;
      }

      var target = squad.lastKnown || { x: guard.x, y: guard.y };
      var d = distance(guard.x, guard.y, target.x, target.y);

      if (d > GUARD.ARRIVE_DIST) {
        sweeping = false; // reset so the sweep starts fresh once arrived
        var stepLen = Math.min(GUARD.ALERT_SPEED * dt, d);
        var ux = (target.x - guard.x) / d;
        var uy = (target.y - guard.y) / d;
        var res = world.moveCircle(guard.x, guard.y, ux * stepLen, uy * stepLen, guard.radius);
        guard.x = res.x;
        guard.y = res.y;
        guard.facing = Math.atan2(target.y - guard.y, target.x - guard.x);
      } else {
        if (!sweeping) {
          sweeping = true;
          sweepTime = 0;
          sweepBaseFacing = guard.facing;
        }
        sweepTime += dt;
        var sweep =
          EVASION_SWEEP_AMPLITUDE * Math.sin(sweepTime * SEARCH_SWEEP_HZ * TWO_PI + sweepOffset);
        guard.facing = normalizeAngle(sweepBaseFacing + sweep);
      }
    }

    // ---- SLEEPING (see file header) ---------------------------------------------

    // Forces this guard into SLEEPING right now, overriding whatever state it
    // was in — used both by a headshot (guard.tranq(true), immediate) and by
    // a stagger clock expiring (guard.tranq(false)'s 3s grace period, see
    // update() step 6). setState resets stateTime/fireTimer as usual; sleep-
    // specific bookkeeping (sleepTime, meter, hasLOS) is reset here.
    function enterSleep() {
      setState("SLEEPING", null);
      sleepTime = 0;
      guard.meter = 0;
      guard.hasLOS = false;
      // Defensive invariant (see guard.tranq/cqc's own no-op-if-already-
      // SLEEPING guard): this only ever runs from a non-SLEEPING state, and
      // waking (tickSleeping below) always clears hidden/lockerFacing before
      // a guard can be put down again — so these are already false/null here
      // in practice. Reset explicitly anyway so "freshly asleep => never
      // hidden until explicitly stuffed" holds even if that invariant ever
      // drifts.
      guard.hidden = false;
      lockerFacing = null;
    }

    // Per-tick SLEEPING behavior (see update() step 0.5 and file header):
    // perception/movement/firing are all frozen; only the wake-up clock runs.
    function tickSleeping(dt) {
      guard.meter = 0;
      guard.hasLOS = false;
      sleepTime += dt;
      if (sleepTime >= GUARD.SLEEP_S) {
        sleepTime = 0;
        // WAKING INSIDE A LOCKER (see file header) — step 1m out along the
        // remembered locker facing, collision-safe via world.moveCircle,
        // BEFORE the INVESTIGATE stimulus is captured, so the guard
        // "notices something's off" at the spot it just stepped out to, not
        // at the locker's own position.
        if (guard.hidden) {
          var facing = lockerFacing !== null ? lockerFacing : guard.facing;
          var res = world.moveCircle(
            guard.x,
            guard.y,
            Math.cos(facing) * 1,
            Math.sin(facing) * 1,
            guard.radius
          );
          guard.x = res.x;
          guard.y = res.y;
          guard.hidden = false;
          lockerFacing = null;

      }
    }

    // guard.state is PATROL/SUSPICIOUS/INVESTIGATE/CAUTION (enforced by the
    // caller, update(), not re-checked here).
    function checkColleagueDiscovery(dt, ctx) {
      var sleeping = ctx.sleepingGuards;
      if (!sleeping || sleeping.length === 0) return;

      var viewer = {
        x: guard.x,
        y: guard.y,
        facing: guard.facing,
        range: GUARD.BODY_SPOT_RANGE,
      };

      for (var i = 0; i < sleeping.length; i++) {
        var body = sleeping[i];
        if (body.id === guard.id) continue; // can't spot yourself
        if (body.hidden) continue; // HIDDEN-BODY EXEMPTION -- see file header

        var key = String(body.id);
        var sight = vision.computeSight(viewer, body, { profile: 0.6 });
        if (sight.inCone && sight.hasLOS) {
          bodySpotTimers[key] = (bodySpotTimers[key] || 0) + dt;
          if (bodySpotTimers[key] >= GUARD.BODY_SPOT_CONFIRM_S) {
            squad.broadcastAlert(body.x, body.y);
            setState("ALERT", null);
            return; // this guard is now ALERT; stop checking other bodies this tick
          }
        } else {
          bodySpotTimers[key] = 0;
        }
      }
    }

    // ---- update / hearNoise -------------------------------------------------------

    function update(dt, ctx) {

      // radio-call sync / perception / FSM dispatch / colleague discovery /
      // combat steps run at all; only the sleep timer + this state's own

      if (guard.state === "SLEEPING") {

              maxSleep +

      // with the CAUTION+INVESTIGATE carve-out for a noise-driven interrupt.
      var phase = squad.phase;

      } else if (phase === "EVASION" && guard.state !== "EVASION") {

        phase === "CAUTION" &&
        guard.state !== "CAUTION" &&

      // of this particular guard's own state (see file header).
      var caution = squad.phase === "CAUTION";
      var viewer = {
        x: guard.x,
        y: guard.y,
        facing: guard.facing,
        fovDeg: caution ? Game.VISION.FOV_DEG * GUARD.CAUTION_FOV_MULT : undefined,
        range: caution ? Game.VISION.RANGE * GUARD.CAUTION_RANGE_MULT : undefined,
      };
      var sight = vision.computeSight(viewer, ctx.player);
      guard.hasLOS = sight.inCone && sight.hasLOS;

      if (guard.state === "ALERT") {
        guard.meter = 1;
      } else {
        guard.meter = vision.tickMeter(guard.meter, sight.factor, dt);
      }

      // 2.5. Colleague discovery (see file header) — only while this guard
      // is PATROL/SUSPICIOUS/INVESTIGATE/CAUTION (never ALERT/EVASION, which
      // are already fully committed to the player's live contact). May jump
      // this guard straight to ALERT (see checkColleagueDiscovery) before the
      // FSM dispatch below ever runs, exactly like a colleague's radio call.
      if (
        guard.state === "PATROL" ||
        guard.state === "SUSPICIOUS" ||
        guard.state === "INVESTIGATE" ||
        guard.state === "CAUTION"
      ) {
        checkColleagueDiscovery(dt, ctx);
      }

      // 3. FSM dispatch.
      switch (guard.state) {
        case "PATROL":
          tickPatrolLike(dt, GUARD.PATROL_SPEED);
          if (guard.meter >= Game.VISION.SUSPICIOUS_AT) {
            setState("SUSPICIOUS", { x: ctx.player.x, y: ctx.player.y });
          }
          break;
        case "SUSPICIOUS":
          tickSuspicious(dt, ctx);
          break;
        case "INVESTIGATE":
          tickInvestigate(dt, ctx);
          break;
        case "ALERT":
          tickAlert(dt, ctx);
          break;
        case "EVASION":
          tickEvasion(dt, ctx);
          break;
        case "CAUTION":
          tickPatrolLike(dt, GUARD.CAUTION_SPEED);
          if (guard.meter >= Game.VISION.SUSPICIOUS_AT) {
            squad.broadcastAlert(ctx.player.x, ctx.player.y);
            setState("ALERT", null);
          }
          break;
      }

      // 4. Stuck-state invariant (unchanged shape from part A; see
      // GUARD.MAX_STATE_S note in the file header for why EVASION/CAUTION
      // are absent from the map and ALERT is Infinity).
      var maxS = GUARD.MAX_STATE_S[guard.state];
      if (maxS !== undefined && guard.stateTime > maxS) {
        throw new Error(
          "guard " +
            guard.id +
            " stuck in " +
            guard.state +
            " for " +
            guard.stateTime.toFixed(2) +
            "s (max " +
            maxS +
            "s) — FSM invariant violated"
        );
      }

      // 5. Lone-guard self-driven squad tick — see squad contract in the
      // file header for why this is only safe when this guard IS the whole
      // squad.
      if (ownSquad) {
        squad.tick(dt, guard.hasLOS);
      }

      // 6. Staggered dart check (see file header, guard.tranq/SLEEPING) —
      // runs AFTER everything above, so a staggered guard fully perceives/
      // moves/dispatches/fires as normal this tick right up until its clock
      // expires, at which point it's forced into SLEEPING, overriding
      // whatever step 1-5 just left it in.
      if (staggerActive) {
        staggerElapsed += dt;
        if (staggerElapsed >= GUARD.STAGGER_SLEEP_S) {
          staggerActive = false;
          enterSleep();
        }
      }
    }

    function hearNoise(x, y, strength) {
      if (guard.state === "ALERT" || guard.state === "EVASION" || guard.state === "SLEEPING") return;
      if (strength === "faint") {
        if (guard.state === "PATROL") setState("SUSPICIOUS", { x: x, y: y });
      } else if (strength === "strong") {
        if (
          guard.state === "PATROL" ||
          guard.state === "SUSPICIOUS" ||
          guard.state === "CAUTION"
        ) {
          setState("INVESTIGATE", { x: x, y: y });
        }
      }
    }

    // guard.tranq(headshot) — see file header. External stimulus API called
    // by the engine (or a test/sim harness) the instant a fired dart hits
    // this guard.
    function tranq(headshot) {
      if (guard.state === "SLEEPING") return; // already asleep, no-op
      if (headshot) {
        enterSleep();
      } else {
        staggerActive = true;
        staggerElapsed = 0;
      }
    }

    // guard.cqc() — see file header. v1: choke === sleep, reuses enterSleep()
    // verbatim (same no-op-if-already-SLEEPING guard as tranq() above).
    function cqc() {
      if (guard.state === "SLEEPING") return;
      enterSleep();
    }

    // guard.stuffInLocker(locker) — see file header. No-op unless this guard
    // is currently SLEEPING (same defensive shape as tranq()/cqc()).
    function stuffInLocker(locker) {
      if (guard.state !== "SLEEPING") return;
      guard.x = locker.x;
      guard.y = locker.y;
      guard.hidden = true;
      lockerFacing = locker.facing;
    }

    // getState()/setState() (NEW — save/restore cycle, additive only, no
    // behavior change to update()/hearNoise()/tranq()/cqc()/stuffInLocker()).
    // getState() captures guard's ENTIRE mutable surface: both the flat,
    // externally-readable props listed in the file header (x/y/facing/state/
    // meter/stateTime/stimulus/waypointIndex/hasLOS/hidden — id/radius are
    // immutable for this guard's lifetime, so they're omitted; guard.squad is
    // a shared, externally-wired reference, not this guard's own state, so
    // restoring it is the CALLER's job, not this method's) AND every private
    // closure variable backing the pause/search/sweep/fire/sleep/stagger/
    // locker machinery documented throughout this file (pausing/pauseTime/
    // pauseBaseFacing, searching/searchTime/searchBaseFacing, sweeping/
    // sweepTime/sweepBaseFacing/sweepOffset, fireTimer/nextFireAt, sleepTime/
    // staggerActive/staggerElapsed/bodySpotTimers, lockerFacing) — miss ANY
    // one of these and a restored guard can diverge from a live one the next
    // time that particular sub-machine's timer/flag matters (a mid-pause
    // head-sweep, a mid-search arc, a mid-EVASION coordinated sweep, an
    // in-flight fire cadence, a partially-elapsed sleep/stagger clock, or a
    // remembered locker-exit facing) — see src/saveState.js's REPLAY GATE
    // tests for exactly this failure mode. bodySpotTimers is a plain
    // {id: seconds} map — shallow-copied so a caller mutating the returned
    // snapshot's map can never reach back into this guard's own live one.
    // NAMED getSaveState/applySaveState (NOT getState/setState) INTERNALLY —
    // this factory already declares a local function literally named
    // setState(newState, stimulus) (the FSM transition helper used
    // throughout PATROL/SUSPICIOUS/.../enterSleep/tranq/cqc above). A SECOND
    // local function declaration also named `setState` in this same scope
    // would hoist over/replace that first one (function declarations in the
    // same scope don't overload — the later one wins outright), silently
    // breaking every FSM transition in this file the instant this method was
    // added (caught by tests/*.tranq*/engine* going red — every FSM
    // transition started receiving a save-state OBJECT where it expected
    // (newState, stimulus) args). Distinct internal names sidestep the
    // collision entirely; guard.getState/guard.setState (the EXTERNAL,
    // public method names the save/restore contract requires) are just
    // assigned to point at these below.
    function getSaveState() {
      return {
        x: guard.x,
        y: guard.y,
        facing: guard.facing,
        state: guard.state,
        meter: guard.meter,
        stateTime: guard.stateTime,
        stimulus: guard.stimulus ? { x: guard.stimulus.x, y: guard.stimulus.y } : null,
        waypointIndex: guard.waypointIndex,
        hasLOS: guard.hasLOS,
        hidden: guard.hidden,
        pausing: pausing,
        pauseTime: pauseTime,
        pauseBaseFacing: pauseBaseFacing,
        searching: searching,
        searchTime: searchTime,
        searchBaseFacing: searchBaseFacing,
        sweeping: sweeping,
        sweepTime: sweepTime,
        sweepBaseFacing: sweepBaseFacing,
        sweepOffset: sweepOffset,
        fireTimer: fireTimer,
        nextFireAt: nextFireAt,
        sleepTime: sleepTime,
        staggerActive: staggerActive,
        staggerElapsed: staggerElapsed,
        bodySpotTimers: Object.assign({}, bodySpotTimers),

    }

    // applySaveState(s) — the mirror of getSaveState() above: overwrites
    // every flat prop AND every private closure var it captured. Deliberately
    // does NOT touch guard.id/guard.radius (immutable) or guard.squad (a
    // shared, externally-wired reference — see getSaveState's own note); the

      guard.y = s.y;
      guard.facing = s.facing;
      guard.state = s.state;
      guard.meter = s.meter;
      guard.stateTime = s.stateTime;
      guard.stimulus = s.stimulus ? { x: s.stimulus.x, y: s.stimulus.y } : null;
      guard.waypointIndex = s.waypointIndex;
      guard.hasLOS = s.hasLOS;
      guard.hidden = s.hidden;
      pausing = s.pausing;
      pauseTime = s.pauseTime;
      pauseBaseFacing = s.pauseBaseFacing;
      searching = s.searching;
      searchTime = s.searchTime;
      searchBaseFacing = s.searchBaseFacing;
      sweeping = s.sweeping;
      sweepTime = s.sweepTime;
      sweepBaseFacing = s.sweepBaseFacing;
      sweepOffset = s.sweepOffset;
      fireTimer = s.fireTimer;
      nextFireAt = s.nextFireAt;
      sleepTime = s.sleepTime;
      staggerActive = s.staggerActive;

// PUBLIC API:
//   Game.ITEMS — tunable constants:
//     {
//       STARTING_DARTS: 12,   // Game.createInventory()'s starting dart count
//       DART_RANGE: 14,       // meters, max travel distance of a fired dart
//       DART_HIT_PERP: 0.5,   // meters, max perpendicular distance from the
//                             // shot ray for a guard to count as hit
//       STARTING_RATIONS: 3,  // Game.createInventory()'s starting ration count
//       RATION_HEAL: 0.35,    // hp fraction a ration restores (see useRation)
//       STARTING_CHAFF: 2,    // Game.createInventory()'s starting chaff-grenade count
//       CHAFF_S: 15,          // seconds a chaff pop keeps the radar/cameras jammed
//       BOX_FACTOR: 0.05,     // vision-profile multiplier while boxOn && stationary
//                             // (boxOn && moving uses a flat 1.0 instead — no
//                             // discount, "blown if seen moving" — see engine.js's
//                             // BOX VERB contract for where this is actually applied)
//     }
//
//   Game.createInventory() -> inv
//     inv.weapon — "tranq" (only weapon this cycle; a fixed string, not yet a
//       real loadout system).
//     inv.darts  — mutable dart count, starts at ITEMS.STARTING_DARTS (12).
//       Decremented by a successful fireTranq() CALL (any call that actually
//       consumes a dart, hit or miss) — see fireTranq below. Carries over a
//       zone transition unchanged (engine.js never resets/rebuilds inventory
//       on switchZone — darts are mission-scoped, not zone-scoped).
//
//     inv.rations — mutable count, starts at ITEMS.STARTING_RATIONS (3).
//       Decremented only by a successful useRation() call (see below) — a
//       call that would be a no-op (no rations left, or hp already full)
//       spends nothing. Mission-scoped like darts (untouched by switchZone).
//
//     inv.useRation(player) -> { used: false } | { used: true, healAmount }
//       `player` is read-only here (same ENGINE-AGNOSTIC posture as
//       fireTranq below) — this function never sets player.hp itself, it
//       only decides WHETHER a ration would help and reports how much.

//        could (harmlessly, since the engine is about to freeze regardless,

//
//   RANK TABLE — Game.computeRank(stats) -> string, a PURE function (no
//   engine/closure state, callable directly by tests without a live engine)
//   exported alongside Game.createEngine, evaluated top-down:
//     - BIG BOSS  — stats.alertsTotal === 0 && stats.kills === 0. The
//       perfect, unseen, bloodless run.
//     - KILLS CAP (future-proofing — stats.kills is ALWAYS 0 this cycle, see
//       `kills` above, so this branch is dead code today, but the table is
//       written now so a future lethal-weapon cycle needs zero rank-formula
//       changes): stats.kills > 0 forfeits BIG BOSS and FOX outright and caps
//       the achievable rank at HOUND regardless of how few alerts there were
//       — MGS convention that a body count, even a clean one otherwise,
//       costs you the very top ranks. Same alertsTotal thresholds as the
//       ladder below, just starting from HOUND instead of FOX.
//     - FOX       — alertsTotal <= 1 AND missionTimeS < 900 (15 minutes).
//       Both conditions required; failing EITHER (too many alerts, or clean
//       but slow) falls through to the next rung rather than failing the
//       whole rank outright.
//     - HOUND     — alertsTotal <= 2.
//     - DOBERMAN  — alertsTotal <= 4.
//     - JACKAL    — alertsTotal <= 6.
//     - ELEPHANT  — else (alertsTotal >= 7, or anything not caught above).
//
//   COMBAT — guard fire / player damage / game over (new this cycle):
//     Step 3 (guard update loop) below passes each guard.update() a THIRD ctx
//     field beyond `player`: onGuardFire(guard, hit), guardAI.js's hook for
//     "this guard just fired" (see its own ALERT/COMBAT contract — it never
//     applies damage itself, only reports the outcome). This callback, per
//     shot:
//       1. Pushes { type: "guardFire", guardId: guard.id, hit: hit }.
//       2. Emits gunshot NOISE — a genuinely loud, SHARP stimulus regardless
//          of hit/miss: soundEvents.emitRadius(guard.x, guard.y, 10, true,
//          guards) (10m unattenuated radius, matching GUARD.FIRE_RANGE; sharp
//          -> "strong", same semantics as the knock verb — see soundEvents.js
//          contract). Listeners = every guard on the CURRENT guards array,
//          same convention as the movement-noise/knock steps in step 2 below
//          (this necessarily includes the shooter itself as a listener — its
//          own hearNoise() is a harmless no-op while ALERT/EVASION, per
//          guardAI.js's hearNoise contract, so no special-casing is needed to
//          exclude it). Any listener that heard it pushes the same
//          { type: "noiseHeard", guardId, x, y, strength: "strong" } shape
//          step 2 uses, x/y being the GUNSHOT's origin (the firing guard's
//          position at the moment of the shot). This is what lets an
//          uninvolved squadmate elsewhere in the zone converge on a firefight
//          it didn't personally see — "gunshot -> ALERT" support fire, using
//          the SAME hearNoise("strong") pathway a knock uses (a guard already
//          ALERT/EVASION ignores it per hearNoise's contract; a PATROL/
//          SUSPICIOUS/CAUTION guard investigates it exactly like any other
//          strong stimulus, escalating to ALERT itself only through its OWN
//          confirmed sighting later, same as ever).
//       3. If hit: calls player.damage(Game.GUARD.FIRE_DAMAGE), then pushes
//          { type: "playerHit", hp: player.hp } (hp read AFTER damage()).
//     GAME OVER: after the guard update loop (so it sees any damage a shot
//     just applied this same tick) — if player.hp has reached 0 and
//     engine.gameOver isn't already true: sets engine.gameOver = true and
//     pushes { type: "gameOver" }. Deliberately generic (checks
//     player.alive, not "was this tick's damage source a guardFire") so ANY
//     future damage source (traps, a boss, ...) drives game over through the
//     same single check rather than needing its own copy of this logic.
//     FROZEN ENGINE: once engine.gameOver is true, tick() returns
//     IMMEDIATELY as its very first statement on every SUBSEQUENT call — no
//     event clearing, no player/guard/squad update, no tickCount/time
//     advance. The tick that actually set gameOver still runs to completion
//     as normal (its own tickCount++ happens, its gameOver event is visible
//     via engine.events same as any other tick) — only calls AFTER that one
//     are no-ops. This means engine.events is left holding that final tick's
//     events forever after (not re-cleared to [] by the frozen no-op calls)
//     — callers polling engine.events every frame (see src/boot.js) must
//     track "have I already reacted to gameOver" themselves rather than
//     expecting the event to eventually disappear. engine.missionComplete
//     (new — see MISSION STATS / EXTRACTION / RANK above) is a SECOND,
//     independent latch with IDENTICAL freeze semantics, checked in the same
//     step-0 condition — a successful extraction is exactly as terminal to
//     the sim as dying is, just the opposite ending.
//     RATION HOOK (not this cycle — see items/director TODOs elsewhere): hp
//     restoration, when it arrives, is expected to be a plain
//     player.hp = Math.min(1, player.hp + amount) (or an equivalent
//     player.heal(amount) method) — the inverse shape of player.damage(),
//     living on src/player.js, NOT engine.js; this module's own job stays
//     "turn a damage/heal call into an event + a gameOver check", not owning
//     the hp arithmetic itself.
//
//   engine.tick(input?) — advances the simulation by exactly ONE fixed step
//     (DT seconds). THIS IS THE ONLY SANCTIONED TICK LOOP: render/boot must
//     drive the game by calling engine.tick() on a fixed-timestep accumulator
//     (never by calling player.update/guard.update/squad.tick directly), and
//     every test/sim harness that wants engine-level behavior should call it
//     the same way. Canonical per-tick order (do not reorder):
//       0. FROZEN CHECK (see GAME OVER / FROZEN ENGINE above): if
//          engine.gameOver OR engine.missionComplete is already true, return
//          IMMEDIATELY — before clearing engine.events, before touching
//          player/guards/squad/tickCount/time. Every other step below only
//          runs on a tick where this check passes (i.e. every tick up to and
//          including the one that FIRST sets engine.gameOver or
//          engine.missionComplete).
//       1. player.update(input, DT). `input` may be null/undefined, meaning
//          "no movement": it is normalized to
//          { moveX: 0, moveY: 0, run: false, stance: player.stance } so a
//          missing/omitted stance holds whatever the player was already in
//          (player.update's own "retain stance if omitted" rule handles this
//          once moveX/moveY/run are defaulted — see src/player.js contract).
//       1.5. PICKUPS (new — Laboratory cycle, see src/items.js's
//          inv.collectPickup contract): for every zone.pickups[] entry not
//          already collected (a private per-engine, per-zone-index Set —
//          see collectedPickups below — NOT reset by switchZone, so leaving
//          and re-entering the same zone never respawns something already
//          picked up), if dist(player, pickup) < 0.7: mark it collected,
//          call inventory.collectPickup(pickup.item), and push { type:
//          "pickup", item: pickup.item }. Runs right after player.update so
//          this tick's fresh position is what's tested; before the NOISE
//          STEP/DOORS below since neither depends on it.
//       1.6. DOORS (new — Laboratory cycle, see src/world.js's DOORS /
//          DYNAMIC BLOCKERS contract): for every zone.doors[] entry, in
//          order:
//            - CLOSED + lock === null: opens the instant player OR any guard
//              is within DOOR_PROXIMITY_DIST (1.5m) of the door's center —
//              push { type: "doorOpen", id }.
//            - CLOSED + locked (lock is "L1"/"L2"/"L3"): opens ONLY when the
//              PLAYER (never a guard — see file header design note, guards
//              never carry keys) is within DOOR_KEYED_OPEN_DIST (1.2m) AND
//              inventory.keycards[lock] is true — push { type: "doorOpen",
//              id }. A locked door with no key nearby, or a guard alone
//              nearby, simply stays shut.
//            - OPEN: tracks the last tick anyone (player or ANY guard) was
//              within DOOR_PROXIMITY_DIST in a private per-door timestamp
//              (doorLastNear — reset alongside collectedPickups on
//              switchZone); once DOOR_AUTO_CLOSE_S (3s) have elapsed with
//              nobody that close, closes it and pushes { type: "doorClose",
//              id }. A door that just opened this same tick counts as
//              "someone was near" at that same moment, so it can never
//              immediately re-close on the very next tick before anyone's
//              actually stepped away.
//          Runs after PICKUPS, using this tick's fresh player position and
//          the PREVIOUS tick's guard positions (guards update in step 3,
//          below) — an acceptable one-tick lag since, by design, no guard's
//          own patrol loop ever needs a door to open (see src/world.js's
//          Laboratory zone comments) — this proximity check existing for
//          guards at all is purely for the "close after 3s of nobody nearby"
//          rule to correctly NOT fire while a guard happens to be patrolling
//          right past an open door.
//       2. NOISE STEP (new — soundEvents), AFTER player.update, BEFORE any
//          guard updates, so a sound made THIS tick can already be reflected
//          in guard.state by the time step 3's guard.update() runs (matching
//          sim.js's existing "hearNoise() then update()" convention for
//          guardAI — see guardAI.js's hearNoise contract):
//            a. MOVEMENT NOISE: if player.noiseRadius() > 0 (i.e. the player
//               is actually moving this tick — see src/player.js contract),
//               call soundEvents.emitRadius(player.x, player.y,
//               player.noiseRadius(), false, guards) every such tick. This is
//               a SOFT ("faint") sound; guard.hearNoise("faint") only does
//               anything from PATROL (-> SUSPICIOUS), so repeated faint hits
//               while a guard is already SUSPICIOUS/INVESTIGATE/etc. are
//               harmless no-ops (see guardAI.js's hearNoise contract) — no
//               extra bookkeeping needed here to avoid "re-triggering."
//            b. KNOCK VERB: input.knock (boolean) is EDGE-TRIGGERED — engine
//               tracks the previous tick's input.knock internally (private
//               closure state, not an engine prop) and only acts on a
//               false->true transition, exactly once per press (holding
//               input.knock true across many ticks fires nothing further
//               until it goes false and back to true). On that edge: if
//               world.isBlockedCircle(player.x, player.y,
//               Game.SOUND.KNOCK_WALL_DIST) (the player is adjacent to a
//               wall), call soundEvents.emit(player.x, player.y, "knock",
//               guards) — a SHARP ("strong") sound — and push
//               { type: "knock", x: player.x, y: player.y } onto
//               engine.events. If the player is NOT adjacent to a wall on
//               that edge, nothing is emitted and no event fires (knocking
//               on thin air is silent).
//            For every listener that heard EITHER sound this tick (per the
//            `heard` flag in soundEvents' returned results — see
//            src/soundEvents.js contract), push
//            { type: "noiseHeard", guardId: guard.id, x, y, strength } onto
//            engine.events (x,y are the SOUND's origin, i.e. the (x,y) passed
//            to emit/emitRadius above, not the guard's own position).
//            c. FIRE VERB (new — see FIRE VERB above for the full write-up):
//               input.fire is EDGE-TRIGGERED exactly like input.knock, same
//               private-closure-state shape. On that edge, calls
//               inventory.fireTranq(engine); if it fired, pushes tranqFired,
//               emits dartImpact noise (pushing noiseHeard for anyone who
//               heard it, same loop shape as (a)/(b) above), and — on a hit —
//               calls the hit guard's guard.tranq(headshot).
//       3. Each guard, in array order: guard.update(DT, { player: player,
//          onGuardFire: onGuardFire, sleepingGuards: sleepingGuards }) —
//          onGuardFire is the COMBAT hook described above; a guard in ALERT
//          within range/LOS/cadence may call it synchronously from inside
//          this update() call, which is how a guardFire/playerHit event and a
