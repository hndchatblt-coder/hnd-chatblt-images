<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Unicorn Village — slice 2.0</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#8ad290;font-family:"Baloo 2",ui-rounded,system-ui;touch-action:none;user-select:none;-webkit-user-select:none}
  #world{position:fixed;inset:0}
  .hidden{display:none!important}

  #coins{position:fixed;top:14px;left:14px;display:flex;align-items:center;gap:7px;background:#fff;
    border-radius:999px;padding:6px 14px 6px 8px;font-weight:900;font-size:22px;color:#7a3b16;
    box-shadow:0 4px 12px rgba(90,43,107,.3);z-index:5}
  #coins canvas{width:30px;height:30px;display:block}
  #coins.pop{animation:pop .35s ease}
  @keyframes pop{40%{transform:scale(1.22)}}

  #hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 16px;border-radius:999px;
    font-weight:800;color:#5a2b6b;font-size:13px;box-shadow:0 4px 10px rgba(90,43,107,.25);z-index:5;
    max-width:56%;text-align:center}
  #hint.pop{animation:hpop .4s ease}
  @keyframes hpop{40%{transform:translateX(-50%) scale(1.1)}}
  #progress{position:fixed;top:70px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:5}
  .pdot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.6);box-shadow:0 2px 6px rgba(90,43,107,.3)}
  .pdot.done{background:#7ee081}

  #dpad{position:fixed;left:18px;bottom:28px;width:150px;height:150px;z-index:5}
  .dbtn{position:absolute;width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.85);
    box-shadow:0 4px 10px rgba(90,43,107,.35);display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#5a2b6b;font-weight:900}
  .dbtn.active{background:#ffd6f5}
  #up{left:49px;top:0} #down{left:49px;top:98px} #left{left:0;top:49px} #right{left:98px;top:49px}

  #popup{position:fixed;left:50%;bottom:120px;transform:translate(-50%,20px);width:280px;
    background:#fff;border-radius:24px;padding:16px;box-shadow:0 14px 34px rgba(90,43,107,.4);
    text-align:center;opacity:0;pointer-events:none;transition:transform .25s ease,opacity .25s ease;z-index:6}
  #popup.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
  #popup canvas{width:110px;height:110px;display:block;margin:0 auto}
  #popup .bubble{background:#fdeaf7;border-radius:14px;padding:8px 10px;font-weight:800;color:#5a2b6b;font-size:14px;margin:6px 0 12px}
  .choices{display:flex;gap:14px;justify-content:center}
  .choices button{width:56px;height:56px;border-radius:50%;border:none;font-size:26px;font-weight:900;cursor:pointer;color:#fff}
  .yes{background:#7ee081} .no{background:#ff8a8a}

  /* thin DOM layer during in-world games */
  #gameHud{position:fixed;inset:0;pointer-events:none;z-index:7}
  #gameX{position:absolute;top:12px;right:12px;width:44px;height:44px;border:none;border-radius:50%;
    background:rgba(255,255,255,.9);color:#8a5cff;font-size:22px;font-weight:900;cursor:pointer;pointer-events:auto;
    box-shadow:0 4px 10px rgba(90,43,107,.25)}
  #say{position:absolute;top:64px;left:50%;transform:translateX(-50%);background:#fff;border-radius:16px;
    padding:8px 14px;font-weight:800;color:#5a2b6b;font-size:15px;box-shadow:0 5px 14px rgba(90,43,107,.25);max-width:72%;text-align:center}
  #say.pop{animation:hpop .4s ease}
  #rounds{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:9px}
  .rdot{width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.7);box-shadow:0 2px 6px rgba(90,43,107,.3)}
  .rdot.done{background:#7ee081}

  .screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(180deg,#fff3fb 0%,#ffe9f8 45%,#eaf6ff 100%);padding:14px;overflow:hidden}
  .screen .xbtn{position:absolute;top:12px;right:12px;width:44px;height:44px;border:none;border-radius:50%;
    background:rgba(138,107,255,.14);color:#8a5cff;font-size:22px;font-weight:900;cursor:pointer;z-index:2}
  .host{display:flex;align-items:flex-end;gap:8px;margin-top:4px}
  .host canvas{width:92px;height:92px;display:block}
  .host .sayb{background:#fff;border-radius:14px;padding:7px 12px;font-weight:800;color:#5a2b6b;font-size:14px;
    box-shadow:0 4px 10px rgba(90,43,107,.2);max-width:200px}
  .cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;margin-top:12px}
  .item{position:relative;border:none;border-radius:18px;background:#fff;box-shadow:0 3px 10px rgba(90,43,107,.16);
    padding:10px 6px 8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px}
  .item:active{transform:scale(.94)}
  .item canvas{width:60px;height:60px;display:block}
  .itag{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:900;color:#8a5a12;background:#fff3d9;border-radius:999px;padding:2px 10px}
  .item.afford{box-shadow:0 0 0 3px #7ee081,0 3px 10px rgba(90,43,107,.16);animation:affordpulse 1.6s ease-in-out infinite}
  @keyframes affordpulse{50%{box-shadow:0 0 0 5px #a5edaa,0 3px 14px rgba(90,43,107,.2)}}
  .item.saving{opacity:.6}
  .item.owned .itag{background:#d9f5dc;color:#2b8a3e}
  .item.worn{box-shadow:0 0 0 3px #ff6fc4,0 3px 10px rgba(90,43,107,.16)}
  .screen h2{margin:6px 0 0;color:#8a5cff;font-size:24px}
  .note{margin:2px 0 0;color:#7a5f88;font-weight:700;font-size:13px;text-align:center}
  #homePreview canvas{width:150px;height:150px;display:block}

  #start{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#ffe1f6,#cfeeff);cursor:pointer}
  .startcard{text-align:center;background:rgba(255,255,255,.85);border-radius:32px;padding:26px 30px;box-shadow:0 16px 40px rgba(120,70,140,.25)}
  .startcard canvas{width:130px;height:130px;display:block;margin:0 auto;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-10px)}}
  .startcard h1{margin:4px 0 10px;color:#8a5cff;font-size:28px}
  .tap{display:inline-block;background:linear-gradient(135deg,#ff6fc4,#8a6bff);color:#fff;font-size:20px;font-weight:900;
    padding:12px 26px;border-radius:999px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.06)}}

  #toast{position:fixed;top:36%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.96);border-radius:26px;
    padding:18px 28px;text-align:center;box-shadow:0 16px 40px rgba(120,70,140,.35);z-index:30;pointer-events:none;font-weight:900;color:#8a5cff;font-size:20px}
  #toast .big{font-size:56px;line-height:1.1}
  #toast.pop{animation:pop .5s ease}
</style></head><body>
<canvas id="world"></canvas>
<div id="coins"><canvas id="coinIcon" width="60" height="60"></canvas><span id="coinCount">0</span></div>
<div id="hint"></div>
<div id="progress"></div>
<div id="dpad">
  <div class="dbtn" id="up">▲</div><div class="dbtn" id="down">▼</div>

</div>
<div id="popup">
  <canvas id="popupPortrait" width="220" height="220"></canvas>

  <div class="startcard">
    <canvas id="startArt" width="512" height="512"></canvas>
    <h1>Unicorn Village</h1>

<script type="module">
import { unicornCanvas, UNICORN_TYPES, COSMETIC_ART, coinCanvas, girlCanvas, treeCanvas, houseCanvas, stallCanvas } from './src/art.js';
import { WORDS, ALPHABET, COSMETICS, cosmeticById, VOICE_PROFILES } from './src/content.js';
import { AudioManager } from './src/audio.js';

/* ================= generated art assets (with procedural fallbacks) ======== */
const ASSETS = {};
const ASSET_NAMES = [
  'uni-blossom','uni-starlight','uni-frost','uni-clover','uni-sunbeam',
  'uni-berry','uni-coral','uni-dream','uni-stardust','uni-honey',
  'girl-down','girl-up','girl-left','girl-right','girl-celebrate','girl-sit',
  'house','stall','tree','signpost','well','arch',
  'house-blossom','house-starlight','house-frost','house-clover','house-sunbeam',
  'house-berry','house-coral','house-dream','house-stardust','house-honey',
];
for (const n of ASSET_NAMES){
  const im = new Image();
  im.onload = () => { ASSETS[n] = im; };
  im.src = './assets/' + n + '.png';
}
const TYPE_ASSET = {
  'type.blossom':'uni-blossom','type.starlight':'uni-starlight','type.frost':'uni-frost',
  'type.clover':'uni-clover','type.sunbeam':'uni-sunbeam','type.berry':'uni-berry',
  'type.coral':'uni-coral','type.dream':'uni-dream','type.stardust':'uni-stardust','type.honey':'uni-honey',
};
// draw any image/canvas centred at (cx,cy), contain-fit inside size x size
function drawFit(g, img, cx, cy, size){
  const w = img.width, h = img.height;
  const s = size / Math.max(w, h);
  g.drawImage(img, cx - w*s/2, cy - h*s/2, w*s, h*s);
}

/* ================= tween engine (ported from the original game) =========== */
const tweens = [];
const eOutCubic = p => 1 - Math.pow(1 - p, 3);
const eInOut = p => p < .5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;
const eOutBack = p => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3*Math.pow(p-1,3) + c1*Math.pow(p-1,2); };
function to(obj, props, dur, opts = {}) {
  tweens.push({ obj, props, start: {}, dur: Math.max(.001, dur), ease: opts.ease || eOutCubic,
    delay: opts.delay || 0, t: 0, cap: false, onDone: opts.onDone });
}
function upTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const w = tweens[i];
    if (w.delay > 0) { w.delay -= dt; if (w.delay > 0) continue; }
    if (!w.cap) { for (const k in w.props) w.start[k] = w.obj[k]; w.cap = true; }
    w.t += dt;
    const p = Math.min(1, w.t / w.dur), e = w.ease(p);
    for (const k in w.props) w.obj[k] = w.start[k] + (w.props[k] - w.start[k]) * e;
    if (p >= 1) { tweens.splice(i, 1); w.onDone && w.onDone(); }
  }
}

/* ================= save ==================================================== */
const KEY = 'unicorn-slice-v1';
const DEFAULTS = () => ({ coins: 0, met: [], cosmetics: [], equipped: {} });
let save = DEFAULTS();
try { save = { ...DEFAULTS(), ...(JSON.parse(localStorage.getItem(KEY) || 'null') || {}) }; } catch (_) {}
const persist = () => { try { localStorage.setItem(KEY, JSON.stringify(save)); } catch (_) {} };

/* ================= content ================================================= */
const WORDS4 = [
  { word: 'nest', emoji: '🪺' }, { word: 'hand', emoji: '✋' },
  { word: 'milk', emoji: '🥛' }, { word: 'frog', emoji: '🐸' },
  { word: 'tent', emoji: '⛺' }, { word: 'gift', emoji: '🎁' },
  { word: 'crab', emoji: '🦀' }, { word: 'flag', emoji: '🚩' },
  { word: 'drum', emoji: '🥁' }, { word: 'swim', emoji: '🏊' },
];
const ROUNDS = 5;
const homes = [
  { type: 'type.starlight', name: 'Starlight', game: 'Letter Match',         mode: 'match',  coins: 1 },
  { type: 'type.frost',     name: 'Frost',     game: 'Big Word Blending',    mode: 'blend',  caps: 'upper', words: WORDS,  coins: 2 },
  { type: 'type.clover',    name: 'Clover',    game: 'Little Word Blending', mode: 'blend',  caps: 'lower', words: WORDS,  coins: 2 },
  { type: 'type.sunbeam',   name: 'Sunbeam',   game: 'Big & Little Words',   mode: 'blend',  caps: 'alt',   words: WORDS4, coins: 3 },
];
const MEET_BONUS = 10;

const audio = new AudioManager();

/* ================= world =================================================== */
const cv = document.getElementById('world');
const ctx = cv.getContext('2d');
// Render at device resolution (retina) — CSS pixels for all math, DPR applied
// once as the base transform. Without this every asset blurs on phones.
const DPR = Math.min(window.devicePixelRatio || 1, 3);
let vw = innerWidth, vh = innerHeight;
function resize(){
  vw = innerWidth; vh = innerHeight;
  cv.width = Math.round(vw * DPR); cv.height = Math.round(vh * DPR);
  cv.style.width = vw + 'px'; cv.style.height = vh + 'px';
}
addEventListener('resize', resize); resize();

const TILE = 64, WORLD_W = 9, WORLD_H = 27;
const waypoints = [ [3,1],[6,4],[3,7],[6,10],[3,13],[6,16],[3,19],[6,22],[3,24] ];
const HOME_WPS = [1,3,5,7];
const hub = { home: { x:1, y:1, icon:'🏠' }, shop: { x:7, y:1, icon:'🛍️' } };
function wpPos(i){ const [tx,ty]=waypoints[i]; return { x: tx*TILE+TILE/2, y: ty*TILE+TILE/2 }; }

const gates = homes.map((h,i) => {
  const a = wpPos(HOME_WPS[i]), b = wpPos(Math.min(HOME_WPS[i]+1, waypoints.length-1));
  const gy = Math.round((a.y + (b.y-a.y)*0.55) / TILE);
  const trees = Array.from({length: WORLD_W}, (_,tx)=>({ tx, ty: gy, scale: 1 }));
  return { row: gy, trees, ceremonyDone: save.met.includes(homes[i].type),
    get open(){ return save.met.includes(homes[i].type); } };
});
const decorTrees = [];
{ let seed = 7; const rnd = () => (seed = (seed*16807)%2147483647) / 2147483647;
  for (let i=0;i<14;i++){
    const tx = 1+Math.floor(rnd()*(WORLD_W-2)), ty = 3+Math.floor(rnd()*(WORLD_H-4));
    if (!gates.some(g=>g.row===ty)) decorTrees.push([tx,ty]);
  } }

const player = { x: 4*TILE, y: 1*TILE, dir: 'down', moving:false, step:0, stepT:0 };
const buddyPos = { x: player.x - TILE*0.7, y: player.y + TILE*0.2 };
const SPEED = 190, PLAYER_R = 15, TREE_R = 22;
const held = { up:false, down:false, left:false, right:false };

const cam = { x: player.x + TILE/2, y: player.y + TILE/2, zoom: 1, locked: false };

function solids(){
  const list = decorTrees.map(([tx,ty])=>({tx,ty}));
  for (const g of gates) if (!g.open) list.push(...g.trees);
  return list;
}
function tryMove(px, py, dx, dy){
  const list = solids();
  const hits = (x,y) => list.some(t => {
    const cx = t.tx*TILE+TILE/2, cy = t.ty*TILE+TILE*0.75;
    return Math.hypot(x+TILE/2-cx, y+TILE*0.86-cy) < (PLAYER_R+TREE_R);
  });
  let nx = px+dx, ny = py+dy;
  if (hits(nx, py)) nx = px;
  if (hits(nx, ny)) ny = py;
  return [nx, ny];
}

/* ---- cached art ---- */
const girlCache = {};
function girlArt(dir, step){ const k=dir+step; return girlCache[k] || (girlCache[k]=girlCanvas(dir, step)); }
const treeImg = treeCanvas();
const typeArt = {};
function unicornArt(typeId){
  const gen = ASSETS[TYPE_ASSET[typeId]];
  if (gen) return gen;
  if (typeArt[typeId]) return typeArt[typeId];
  const t = UNICORN_TYPES[typeId];
  return (typeArt[typeId] = unicornCanvas(t.mane, { pattern:t.pattern, hornColor:t.hornColor, irisColor:t.irisColor, sparkle:t.sparkle }));
}
const buddyCache = {};
function buddyArt(){
  const gen = ASSETS['uni-blossom'];
  const k = (gen ? 'g:' : 'p:') + JSON.stringify(save.equipped);
  if (buddyCache[k]) return buddyCache[k];
  const S = 220, c = document.createElement('canvas'); c.width = c.height = S;
  const x = c.getContext('2d');
  const back = save.equipped.back && COSMETIC_ART[save.equipped.back];
  if (back) x.drawImage(back(), S*0.14, S*0.22, S*0.72, S*0.72);
  if (gen) drawFit(x, gen, S/2, S*0.55, S*0.9);
  else x.drawImage(unicornCanvas('pink'), S*0.05, S*0.1, S*0.9, S*0.9);
  const head = save.equipped.head && COSMETIC_ART[save.equipped.head];
  if (head) x.drawImage(head(), S*0.33, S*0.02, S*0.34, S*0.34);
  return (buddyCache[k] = c);
}

/* ---- residents (hop/tilt state for juice) ---- */
const residents = homes.map(() => ({ hop: 0, tilt: 0 }));

/* ---- particles (world space, drawn shapes — no emoji) ---- */
const parts = [];
function burst(x, y, kinds = ['spark','heart','spark'], n = 16){
  for (let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 90 + Math.random()*160;
    parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 110,
      life: .8 + Math.random()*.5, age: 0, rot: Math.random()*6, vr: (Math.random()-.5)*8,
      size: 7 + Math.random()*7, kind: kinds[(Math.random()*kinds.length)|0] });
  }
}
function poof(x, y){
  for (let i=0;i<7;i++){
    const a = Math.random()*Math.PI*2, sp = 25 + Math.random()*45;
    parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 25,
      life: .55, age: 0, rot: 0, vr: 0, size: 12 + Math.random()*10, kind: 'poof' });
  }
}
function drawStarShape(g, r){
  g.beginPath();
  for (let i=0;i<5;i++){
    const a=-Math.PI/2+i*Math.PI*2/5, a2=a+Math.PI/5;
    if(i===0) g.moveTo(Math.cos(a)*r, Math.sin(a)*r); else g.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    g.lineTo(Math.cos(a2)*r*.45, Math.sin(a2)*r*.45);
  }
  g.closePath();
}
function drawHeartShape(g, s){
  g.beginPath();
  g.moveTo(0, s*.9);
  g.bezierCurveTo(-s*1.2, s*.05, -s*.75, -s*.8, 0, -s*.25);
  g.bezierCurveTo(s*.75, -s*.8, s*1.2, s*.05, 0, s*.9);
  g.closePath();
}
function drawParticles(dt){
  for (let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.age += dt;
    if (p.age >= p.life){ parts.splice(i,1); continue; }
    p.vy += 260*dt; p.x += p.vx*dt; p.y += p.vy*dt; p.rot += p.vr*dt;
    const f = 1 - p.age/p.life;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = f;
    if (p.kind === 'spark'){ ctx.fillStyle = '#ffd166'; drawStarShape(ctx, p.size); ctx.fill(); }
    else if (p.kind === 'heart'){ ctx.fillStyle = '#ff6fc4'; drawHeartShape(ctx, p.size*.8); ctx.fill(); }
    else if (p.kind === 'poof'){ ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0,0,p.size*(1+p.age*2),0,7); ctx.fill(); }
    ctx.restore();
  }
}

/* ---- screen-space coin flyers ---- */
const flyers = [];
const coinImg = coinCanvas(96);
let shownCoins = save.coins, pendingFly = 0;
function flyCoins(fromScreenX, fromScreenY, n){
  const hud = document.getElementById('coins').getBoundingClientRect();
  const tx = hud.left + hud.width*0.35, ty = hud.top + hud.height/2;
  const delta = save.coins - shownCoins - pendingFly;
  const m = Math.min(Math.max(1, n), 6);
  const base = Math.floor(delta / m);
  for (let i=0;i<m;i++){
    const inc = i === 0 ? delta - base*(m-1) : base;
    pendingFly += inc;
    flyers.push({ sx: fromScreenX, sy: fromScreenY, tx, ty,
      cx: fromScreenX + (Math.random()-.5)*160, cy: Math.min(fromScreenY, ty) - 90 - Math.random()*60,
      t: -i*0.09, dur: .55, inc });
  }
}
function drawFlyers(dt){
  for (let i=flyers.length-1;i>=0;i--){
    const f = flyers[i];
    f.t += dt;
    if (f.t < 0) continue;
    const p = Math.min(1, f.t/f.dur), e = eInOut(p);
    const x = (1-e)*(1-e)*f.sx + 2*(1-e)*e*f.cx + e*e*f.tx;
    const y = (1-e)*(1-e)*f.sy + 2*(1-e)*e*f.cy + e*e*f.ty;
    const s = 30 - 8*e;
    ctx.drawImage(coinImg, x-s/2, y-s/2, s, s);
    if (p >= 1){
      flyers.splice(i,1);
      shownCoins += f.inc; pendingFly -= f.inc;
      coinEl.textContent = String(shownCoins);

/* ================= world drawing ========================================== */
function tileHash(tx,ty){ return ((tx*73856093) ^ (ty*19349663)) >>> 0; }

function drawWorldBase(t){
  // grass
  for (let ty=0; ty<WORLD_H; ty++) for (let tx=0; tx<WORLD_W; tx++){
    const h = tileHash(tx,ty);
    ctx.fillStyle = (h % 7 === 0) ? '#93d89b' : '#8ad290';
    ctx.fillRect(tx*TILE, ty*TILE, TILE, TILE);
  }
  // cloud shadows drift over the grass
  ctx.fillStyle = 'rgba(60,90,70,.06)';
  for (const cs of cloudShadows){
    const x = ((cs.x + t*cs.sp) % (WORLD_W*TILE + cs.w*2)) - cs.w;
    ctx.beginPath(); ctx.ellipse(x, cs.y, cs.w*.55, cs.w*.3, 0, 0, 7); ctx.fill();
  }
  // the path: one rounded ribbon through the waypoints + the hub plaza
  const ribbon = (pts, w1, c1, w2, c2) => {
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (const [w,c] of [[w1,c1],[w2,c2]]){
      ctx.strokeStyle = c; ctx.lineWidth = w;
      ctx.beginPath();
      pts.forEach(([px,py],i)=>{ const X=px*TILE+TILE/2, Y=py*TILE+TILE/2; i?ctx.lineTo(X,Y):ctx.moveTo(X,Y); });
      ctx.stroke();
    }
  };
  ribbon([[1,1],[7,1]], TILE*1.5, '#dbb98a', TILE*1.3, '#e8c99a');
  ribbon(waypoints, TILE*1.35, '#dbb98a', TILE*1.15, '#e8c99a');
  // grass details on top of plain tiles (tufts + tiny flowers)
  for (let ty=0; ty<WORLD_H; ty++) for (let tx=0; tx<WORLD_W; tx++){
    const h = tileHash(tx,ty);
    const cx = tx*TILE, cy = ty*TILE;
    if (h % 11 === 3){
      ctx.strokeStyle = '#6cbd77'; ctx.lineWidth = 3; ctx.lineCap='round';
      for (let k=0;k<3;k++){ ctx.beginPath(); ctx.moveTo(cx+18+k*10, cy+46); ctx.quadraticCurveTo(cx+20+k*10, cy+34, cx+16+k*10+(k%2)*6, cy+30); ctx.stroke(); }
    } else if (h % 13 === 5){
      const cols = ['#ff9ed6','#ffd36b','#a8dcff'];
      const col = cols[h % 3];
      ctx.fillStyle = col;
      for (let k=0;k<5;k++){ const a=k*Math.PI*2/5; ctx.beginPath(); ctx.ellipse(cx+32+Math.cos(a)*6, cy+32+Math.sin(a)*6, 4, 5.5, a, 0, 7); ctx.fill(); }
      ctx.fillStyle = '#ffe08a'; ctx.beginPath(); ctx.arc(cx+32, cy+32, 3.2, 0, 7); ctx.fill();
    }
  }
}
function drawClearing(px,py,state,t){
  ctx.beginPath(); ctx.ellipse(px+TILE/2,py+TILE/2,58,32,0,0,7);
  ctx.fillStyle = state==='locked' ? 'rgba(255,255,255,.3)' : '#ffe9f7'; ctx.fill();
  ctx.lineWidth=6;
  ctx.strokeStyle = state==='ready' ? `rgba(255,111,196,${.75+.25*Math.sin(t*4)})` : (state==='done' ? '#7ee081' : 'rgba(255,255,255,.55)');
  ctx.stroke();
  if (state!=='locked'){
    const cols=['#ff9ed6','#ffd36b','#8fd0ff'];
    for (let i=0;i<7;i++){
      const a = Math.PI*0.15 + i*(Math.PI*0.7/6);
      ctx.fillStyle = cols[i%3];
      ctx.beginPath(); ctx.arc(px+TILE/2+Math.cos(a)*54, py+TILE/2+Math.sin(a)*26, 5.5, 0, 7); ctx.fill();
    }
  }
}
function drawTreeAt(tx, ty, scale=1){
  if (scale <= 0.02) return;
  const img = ASSETS['tree'] || treeImg;
  drawFit(ctx, img, tx*TILE+TILE/2, ty*TILE+TILE*0.4 + (1-scale)*TILE*0.3, TILE*1.4*scale);
}
const houseImg = houseCanvas(), stallImg = stallCanvas();
function drawHubB(px,py,which,near){
  if (near){
    ctx.beginPath(); ctx.ellipse(px+TILE/2, py+TILE*0.95, 56, 20, 0, 0, 7);
    ctx.fillStyle = 'rgba(255,111,196,.28)'; ctx.fill();
    ctx.lineWidth = 5; ctx.strokeStyle = '#ff6fc4'; ctx.stroke();
  }
  const img = (which === 'home' ? (ASSETS['house-blossom'] || ASSETS['house']) : ASSETS['stall']) || (which === 'home' ? houseImg : stallImg);
  drawFit(ctx, img, px+TILE/2, py+TILE*0.35, TILE*1.75);
}
function drawAmbient(dt, t){
  for (const b of butterflies){
    const x = b.cx + Math.cos(t*b.sp + b.ph)*b.rx;
    const y = b.cy + Math.sin(t*b.sp*1.7 + b.ph)*b.ry;
    const flap = Math.abs(Math.sin(t*14 + b.ph));
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle = b.col;
    for (const s of [-1,1]){
      ctx.beginPath(); ctx.ellipse(s*6*(0.4+0.6*flap), 0, 7*(0.4+0.6*flap), 9, s*.5, 0, 7); ctx.fill();
    }
    ctx.fillStyle = '#5a2b6b'; ctx.beginPath(); ctx.ellipse(0,0,2,6,0,0,7); ctx.fill();
    ctx.restore();
  }
  for (const p of petals){
    p.y += p.vy*dt; p.x += Math.sin(t*1.5+p.ph)*10*dt;
    if (p.y > WORLD_H*TILE) { p.y = -10; p.x = Math.random()*WORLD_W*TILE; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(t + p.ph);
    ctx.fillStyle = 'rgba(255,158,214,.8)';
    ctx.beginPath(); ctx.ellipse(0,0,4,6,0,0,7); ctx.fill();
    ctx.restore();
  }
}
function drawGirlAndBuddy(){
  // buddy lags behind with a soft follow + trot bounce
  const targetX = player.x - (player.dir==='left'? -TILE*0.7 : TILE*0.7);
  const targetY = player.y + TILE*0.15;
  buddyPos.x += (targetX - buddyPos.x) * 0.08;
  buddyPos.y += (targetY - buddyPos.y) * 0.08;
  const trot = player.moving ? Math.abs(Math.sin(performance.now()/90))*5 : 0;
  const bs = TILE*0.85;
  ctx.drawImage(buddyArt(), buddyPos.x+TILE/2-bs/2, buddyPos.y+TILE*0.2-trot, bs, bs);
  const genGirl = ASSETS['girl-' + player.dir];

    ctx.save();
    ctx.translate(player.x+TILE/2, player.y+TILE*0.9);
    ctx.rotate(wob);

function worldToScreen(wx, wy){
  return { x: (wx - cam.x)*cam.zoom + vw/2, y: (wy - cam.y)*cam.zoom + vh/2 };
}
function screenToWorld(sx, sy){
  return { x: (sx - vw/2)/cam.zoom + cam.x, y: (sy - vh/2)/cam.zoom + cam.y };
}

function makeCard(o){ return { scale: 0, rot: 0, lift: 0, ...o }; }
function drawCard(c){
  if (c.scale <= 0.02) return;
  ctx.save();
  ctx.translate(c.x, c.y - c.lift);
  ctx.scale(c.scale, c.scale);
  ctx.rotate(c.rot);
  const w = c.w, h = c.h, r = Math.min(w,h)*0.24;
  // drop shadow
  ctx.fillStyle = 'rgba(80,40,90,.18)';
  rrPath(ctx, -w/2+3, -h/2+6, w, h, r); ctx.fill();
  // face
  ctx.fillStyle = c.color || '#fff';
  rrPath(ctx, -w/2, -h/2, w, h, r); ctx.fill();
  if (c.kind === 'letter' || c.kind === 'prompt'){
    ctx.fillStyle = 'rgba(255,255,255,.28)';
    rrPath(ctx, -w/2+5, -h/2+5, w-10, h*0.42, r*0.8); ctx.fill();
  }
  ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(90,43,107,.25)';
  rrPath(ctx, -w/2, -h/2, w, h, r); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (c.kind === 'letter' || c.kind === 'prompt'){
    ctx.font = `900 ${h*0.62}px "Baloo 2", system-ui, sans-serif`;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#5a2b6b'; ctx.lineWidth = h*0.09;
    ctx.strokeText(c.text, 0, h*0.06);
    ctx.fillStyle = '#fff';
    ctx.fillText(c.text, 0, h*0.06);
  } else if (c.kind === 'pic'){
    ctx.font = `${h*0.62}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
    ctx.fillText(c.emoji, 0, h*0.06);
  } else if (c.kind === 'speak'){
    ctx.font = `${h*0.5}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
    ctx.fillText('🔁', 0, h*0.05);
  }
  ctx.restore();
}
const CARD_COLS = ['#ff8fd4','#9d8cff','#5fc8ff','#ffd166'];

function startGame(idx){

const shuffleA = a => { for (let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; };

function dealCards(cards){
  game.cards = cards;
  cards.forEach((c,i)=> to(c, { scale: 1 }, .5, { ease: eOutBack, delay: .05 + i*.07 }));
}
function residentHop(idx){
  const r = residents[idx];
  to(r, { hop: 22 }, .18, { onDone: () => to(r, { hop: 0 }, .4, { ease: eOutBack }) });
}
function residentTilt(idx){
  const r = residents[idx];
  to(r, { tilt: -0.18 }, .18, { onDone: () => to(r, { tilt: 0 }, .45, { ease: eOutBack }) });
}

function roundWon(card){
  const h = homes[game.idx];
  game.locked = true;
  to(card, { lift: 26, scale: card.scale*1.15 }, .22, { ease: eOutBack });
  burst(card.x, card.y - 10);
  const sp = worldToScreen(card.x, card.y);
  grantCoins(h.coins, sp.x, sp.y);
  residentHop(game.idx);
  audio.chime && audio.chime();
  game.round++;
  renderRounds();
  if (game.round >= ROUNDS){
    say('You did it! 🎉', false);
    audio.praise();
    const p = wpPos(HOME_WPS[game.idx]);
    burst(p.x, p.y - 30, ['spark','heart'], 22);
    setTimeout(()=>endGame(true), 1300);
  } else {
    setTimeout(()=> clearCards(nextRound), 800);
  }
}
function roundWrong(card, replayLetter){
  to(card, { rot: -0.09 }, .06, { onDone: () =>
    to(card, { rot: 0.09 }, .1, { onDone: () => to(card, { rot: 0 }, .12, { ease: eOutBack }) }) });
  residentTilt(game.idx);
  audio.nope && audio.nope();
  if (replayLetter) audio.playPhoneme(replayLetter);
}

function nextRound(){
  if (!game) return;
  game.locked = false;
  const h = homes[game.idx];
  if (h.mode === 'match') matchRound();
  else blendRound(h);
}

/* ---- Letter Match ---- */
function matchRound(){
  const f = game.focus;
  const askBig = Math.random() < 0.5;
  const target = ALPHABET[(Math.random()*ALPHABET.length)|0];
  const others = shuffleA(ALPHABET.filter(a=>a!==target)).slice(0,3);
  const choices = shuffleA([target, ...others]);
  const cards = [];
  cards.push(makeCard({ kind:'prompt', text: askBig ? target.letter.toUpperCase() : target.letter,
    x: f.x, y: f.y - 78, w: 100, h: 100, color: '#9d8cff',
    onTap(){ audio.playPhoneme(target.letter); to(this, { lift: 10 }, .1, { onDone: () => to(this, { lift: 0 }, .2) }); } }));
  say(askBig ? 'Find the little one!' : 'Find the BIG one!', game.round===0);
  choices.forEach((c,i)=>{
    cards.push(makeCard({ kind:'letter', text: askBig ? c.letter : c.letter.toUpperCase(),
      x: f.x - 120 + i*80, y: f.y + 62, w: 72, h: 72, color: CARD_COLS[i%4], tappable: true,
      onTap(){
        if (game.locked) return;
        if (c === target) roundWon(this);
        else roundWrong(this, target.letter);
      } }));
  });
  dealCards(cards);
}

/* ---- Blending ---- */
function displayWord(word, caps, round){
  if (caps === 'upper') return word.toUpperCase();
  if (caps === 'lower') return word.toLowerCase();
  return round % 2 ? word.toLowerCase() : word.toUpperCase();
}
function blendRound(h){
  const f = game.focus;
  const pool = h.words;
  const pick = pool[(Math.random()*pool.length)|0];
  const disp = displayWord(pick.word, h.caps, game.round);
  const cards = [];
  const n = disp.length;
  const tw = Math.min(62, 240/n), gap = 8;
  const total = n*tw + (n-1)*gap;
  disp.split('').forEach((ch,i)=>{
    cards.push(makeCard({ kind:'letter', text: ch,
      x: f.x - total/2 + tw/2 + i*(tw+gap), y: f.y - 80, w: tw, h: tw, color: CARD_COLS[i%4],
      onTap(){ audio.playPhoneme(pick.word[i]); to(this, { lift: 12 }, .1, { onDone: () => to(this, { lift: 0 }, .22, { ease: eOutBack }) }); } }));
  });
  cards.push(makeCard({ kind:'speak', x: f.x + total/2 + 40, y: f.y - 80, w: 50, h: 50, color:'#fff',
    async onTap(){
      for (const ch of pick.word){ await audio.playPhoneme(ch); await new Promise(r=>setTimeout(r,160)); }
    } }));
  say('Sound it out, then tap the picture!', game.round===0);
  const others = shuffleA(pool.filter(w=>w!==pick)).slice(0,5);
  const choices = shuffleA([pick, ...others]);
  choices.forEach((w,i)=>{
    const col = i%3, row = (i/3)|0;
    cards.push(makeCard({ kind:'pic', emoji: w.emoji,
      x: f.x - 92 + col*92, y: f.y + 30 + row*86, w: 80, h: 74, color:'#fff', tappable: true,
      async onTap(){
        if (game.locked) return;
        if (w === pick){ game.locked = true; await audio.playWord(pick.word); game.locked = false; roundWon(this); }
        else roundWrong(this);
      } }));
  });
  dealCards(cards);
}

/* rounded-rect path helper for cards */
function rrPath(g, a, b, w, h, r){
  g.beginPath(); g.moveTo(a+r,b);
  g.arcTo(a+w,b,a+w,b+h,r); g.arcTo(a+w,b+h,a,b+h,r);
  g.arcTo(a,b+h,a,b,r); g.arcTo(a,b,a+w,b,r); g.closePath();
}

/* tap handling on the canvas (games only) */
cv.addEventListener('pointerdown', (e) => {
  if (!game) return;
  const w = screenToWorld(e.clientX, e.clientY);
  for (let i = game.cards.length-1; i >= 0; i--){
    const c = game.cards[i];
    if (c.scale < 0.5) continue;
    if (Math.abs(w.x - c.x) < c.w/2 && Math.abs(w.y - (c.y - c.lift)) < c.h/2){ c.onTap && c.onTap(); return; }
  }
});

  screenOpen = true;
  const k = document.getElementById('shopKeeper');
  k.getContext('2d').clearRect(0,0,220,220);
  k.getContext('2d').drawImage(unicornCanvas('lavender',{apron:true}),0,0,220,220);
  renderShop();
  document.getElementById('shop').classList.remove('hidden');
}
function renderShop(){
  const grid = document.getElementById('shopGrid'); grid.innerHTML='';
  COSMETICS.forEach(cos => {
    const owned = save.cosmetics.includes(cos.id);
    const afford = !owned && save.coins >= cos.price;
    const cell = document.createElement('button');
    cell.className = 'item' + (owned ? ' owned' : afford ? ' afford' : ' saving');
    const ic = COSMETIC_ART[cos.id](); ic.style.width='60px'; ic.style.height='60px';
    cell.appendChild(ic);
    const tag = document.createElement('span'); tag.className='itag';
    tag.textContent = owned ? '✓' : cos.price;
    cell.appendChild(tag);
    cell.addEventListener('click', () => {
      if (owned) { toast('🏠', 'Wear it at home!'); return; }
      if (save.coins >= cos.price){
        save.cosmetics.push(cos.id);
        spendCoins(cos.price);
        renderShop();
        toast('🎁', 'Yours! Try it on at home!');
        audio.fanfare && audio.fanfare();
      } else audio.nope && audio.nope();
    });
    grid.appendChild(cell);
  });
}
function closeScreen(id){
  document.getElementById(id).classList.add('hidden');
  screenOpen = false;
  inHub = null;
  for (const [k,b] of Object.entries(hub)){
    if (Math.hypot((player.x+TILE/2)-(b.x*TILE+TILE/2),(player.y+TILE/2)-(b.y*TILE+TILE/2)) < TILE*0.8) inHub = k;
  }
  setHint(realHint);
}
document.getElementById('shopX').addEventListener('click', ()=>closeScreen('shop'));

function openHome(){
  screenOpen = true;
  renderHome();
  document.getElementById('home').classList.remove('hidden');
}
function renderHome(){
  const prev = document.getElementById('homePreview');
  const cc = document.createElement('canvas'); cc.width = cc.height = 220;
  cc.getContext('2d').drawImage(buddyArt(),0,0,220,220);
  prev.replaceChildren(cc);
  const grid = document.getElementById('homeGrid'); grid.innerHTML='';
  if (!save.cosmetics.length){
    const p = document.createElement('p'); p.className='note'; p.textContent = 'Nothing yet — earn coins and visit the shop! 🛍️';
    grid.appendChild(p);
    return;
  }
  save.cosmetics.forEach(id => {
    const cos = cosmeticById(id);
    if (!cos) return;
    const worn = save.equipped[cos.slot] === id;
    const cell = document.createElement('button');
    cell.className = 'item owned' + (worn ? ' worn' : '');
    const ic = COSMETIC_ART[id](); ic.style.width='60px'; ic.style.height='60px';
    cell.appendChild(ic);
    const tag = document.createElement('span'); tag.className='itag'; tag.textContent = worn ? '👗' : ' ';
    cell.appendChild(tag);
    cell.addEventListener('click', () => {
      if (worn) delete save.equipped[cos.slot];
      else save.equipped[cos.slot] = id;
      persist();
      audio.chime && audio.chime();
      renderHome();
    });
    grid.appendChild(cell);
  });
}
document.getElementById('homeX').addEventListener('click', ()=>closeScreen('home'));

/* ================= main loop =============================================== */
let lastTs = performance.now();
let stepAcc = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(.05,(ts-lastTs)/1000); lastTs = ts;
  const t = ts/1000;
  upTweens(dt);

  if (!popupOpen && !screenOpen && !game && !cam.locked){
    let vx=0, vy=0;
    if (held.up) vy-=1; if (held.down) vy+=1; if (held.left) vx-=1; if (held.right) vx+=1;
    player.moving = !!(vx||vy);
    if (vx||vy){
      const len=Math.hypot(vx,vy); vx/=len; vy/=len;
      player.dir = Math.abs(vx)>Math.abs(vy) ? (vx>0?'right':'left') : (vy>0?'down':'up');
      const [nx,ny] = tryMove(player.x, player.y, vx*SPEED*dt, vy*SPEED*dt);
      player.x = Math.max(0, Math.min(WORLD_W*TILE-TILE, nx));
      player.y = Math.max(0, Math.min(WORLD_H*TILE-TILE, ny));
      stepAcc += dt;
      if (stepAcc > 0.18){ stepAcc = 0; player.step = 1 - player.step; audio.footstep && audio.footstep(); }
    }
    // edge-triggered home proximity
    let nowNear = null;
    for (let i=0;i<homes.length;i++){
      const reachable = i <= (nextIdx()===-1 ? homes.length-1 : nextIdx());
      if (!reachable) continue;
      const pos = wpPos(HOME_WPS[i]);
      if (Math.hypot((player.x+TILE/2)-pos.x,(player.y+TILE/2)-pos.y) < TILE*0.9){ nowNear = i; break; }
    }
    if (nowNear !== null && nowNear !== nearIdx) openPopup(nowNear);
    nearIdx = nowNear;
    // edge-triggered hub proximity
    let nowIn = null;
    for (const [k,b] of Object.entries(hub)){
      if (Math.hypot((player.x+TILE/2)-(b.x*TILE+TILE/2),(player.y+TILE/2)-(b.y*TILE+TILE/2)) < TILE*0.8) nowIn = k;
    }
    if (nowIn !== inHub){
      inHub = nowIn;
      if (inHub === 'home') openHome();
      else if (inHub === 'shop') openShop();
    }
  } else {
    player.moving = false;
  }

  if (!cam.locked){
    cam.x += (player.x+TILE/2 - cam.x)*0.12;
    cam.y += (player.y+TILE/2 - cam.y)*0.12;
  }

  // ---- render ----
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle = '#7cc487';
  ctx.fillRect(0,0,vw,vh);
  ctx.save();
  ctx.translate(vw/2, vh/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  drawWorldBase(t);
  for (const [k,b] of Object.entries(hub)) drawHubB(b.x*TILE, b.y*TILE, k, inHub===k);
  homes.forEach((h,i)=>{
    const [tx,ty] = waypoints[HOME_WPS[i]];
    const n = nextIdx();
    const state = save.met.includes(h.type) ? 'done' : (i===n ? 'ready' : 'locked');
    // the friend's own little house sits beside their clearing, away from the path
    const hs = ASSETS['house-' + h.type.replace('type.','')];
    if (hs){
      const side = tx > WORLD_W/2 ? 1 : -1;
      ctx.save();
      if (state === 'locked') ctx.globalAlpha = 0.45;
      drawFit(ctx, hs, (tx+side)*TILE+TILE/2, (ty-0.8)*TILE+TILE/2, TILE*1.9);
      ctx.restore();
    }
    drawClearing(tx*TILE,ty*TILE,state,t);
    if (state !== 'locked'){
      const r = residents[i];
      const bob = Math.sin(t*2+i)*3;
      const art = unicornArt(h.type);
      ctx.save();
      ctx.translate(tx*TILE+TILE/2, ty*TILE+TILE*0.45 + bob - r.hop);
      ctx.rotate(r.tilt);
      drawFit(ctx, art, 0, 0, TILE*1.15);
      ctx.restore();
    }
  });
  for (const [tx,ty] of decorTrees) drawTreeAt(tx,ty);
  for (const g of gates){
    if (!g.open) for (const tr of g.trees) drawTreeAt(tr.tx, tr.ty, tr.scale);
    else if (g.trees.some(tr=>tr.scale>0.02)) for (const tr of g.trees) drawTreeAt(tr.tx, tr.ty, tr.scale);
  }
  drawAmbient(dt, t);
  drawGirlAndBuddy();
  if (game){
    // soft stage dim so the cards and the host read clearly over the world
    ctx.fillStyle = 'rgba(255,242,250,.62)';
    ctx.fillRect(cam.x - vw, cam.y - vh, vw*2, vh*2);
    // the host stays vivid on stage, beside the cards
    const h = homes[game.idx], r = residents[game.idx];
    const art = unicornArt(h.type);
    ctx.save();
    ctx.translate(game.hostPos.x, game.hostPos.y - TILE*0.05 + Math.sin(t*2)*3 - r.hop);
    ctx.rotate(r.tilt);
    drawFit(ctx, art, 0, 0, TILE*1.35);
    ctx.restore();
    for (const c of game.cards) drawCard(c);
  }
  drawParticles(dt);
  ctx.restore();

  // screen-space coin flyers on top
  drawFlyers(dt);
}
requestAnimationFrame(loop);

/* ================= input & start =========================================== */
function bind(id, key){
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); held[key]=true; el.classList.add('active'); };
  const off = () => { held[key]=false; el.classList.remove('active'); };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointerleave', off);
  el.addEventListener('pointercancel', off);
}
bind('up','up'); bind('down','down'); bind('left','left'); bind('right','right');

{ const sc = document.getElementById('startArt').getContext('2d');
  const paint = () => { sc.clearRect(0,0,512,512); drawFit(sc, ASSETS['uni-blossom'] || unicornCanvas('pink'), 256, 256, 500); };
  paint(); setTimeout(paint, 800); }
document.getElementById('start').addEventListener('click', () => {
  audio.unlock();
  document.getElementById('start').remove();
  const n = nextIdx();
  realSetHint(n===-1 ? 'Welcome back! Visit anyone you like 💖' : `Walk to ${homes[n].name} with the d-pad 👇`);
});

/* test hooks */
window.__slice = {
  save, player, homes, gates, cam,
  get nextIdx(){ return nextIdx(); },
  get game(){ return game; },
  startGame,
  gameApi: {
    cards: () => game ? game.cards.filter(c=>c.tappable).map(c=>({ kind:c.kind, text:c.text || c.emoji })) : [],
    choose: (i) => { const cs = game ? game.cards.filter(c=>c.tappable) : []; if (cs[i] && cs[i].onTap) cs[i].onTap(); },
    tapSpeak: () => { const c = game && game.cards.find(c=>c.kind==='speak'); if (c) c.onTap(); },
  },
};
window.__ready = true;
</script>
